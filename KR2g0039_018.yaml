body:
  text: 今獻備遺卷十八明項篤壽撰薛瑄薛瑄字德溫山西河津人母夢紫衣人入謁生瑄年十二善詩賦及見程朱書嘆曰此道學正脉也遂焚詩賦專心理學永樂庚子舉鄉試第一辛丑登進士第擢御史監湖廣銀場黜貪墨正風俗手録性理大全誦讀之遷山東提學僉事諸生呼曰薛夫子正統間楊士竒薦為大理右少卿轉左少卿作大理針以自警時王振與瑄同鄉也雅欲見瑄有勸瑄拜其門者瑄曰安有受官公朝拜他人乎遇諸塗瑄獨正立振銜之會辨寃獄附振者誣瑄繫獄當死人皆危之瑄曰辨寃獲咎死何愧焉讀易自如瑄子五人伏闕下爭代死諸大臣頗申救之得免歸杜門不出造詣益深己巳額森攻都城給事中程信論薦起為大理寺丞分守北門都帥初疑其迂及與議遂訪䇿焉瑄曰以天時人事觀之彼必宵遁既而果然景泰初升南京大理寺卿太監金英奉使道南京人皆餞之江上瑄獨不往英言於衆曰南京好官惟薛卿耳召還復為大理寺卿草場火朝廷欲重罪典守者瑄力辨得免蘇松饑民乞粟富家不與遂火其廬蹈海以避罪上命王文往亷之文坐以謀叛籍其家瑄抗章論辨全活甚衆天順初遷禮部右侍郎兼翰林院學士召入內閣知制誥主考會試尋轉左侍郎詔遣使求獅子於西畨瑄諫不聽時石亨橫瑄嘆曰君子見幾而作豈俟終日乎引疾乞致仕歸從學者衆其學貴實踐不事口耳嘗曰自朱子後理學已明不必著書所著惟讀書録又有河汾集天順甲申卒年七十三諡文清嶽正嶽正字季方直𨽻漷縣人也正統戊辰會試第一廷試及第授翰林編修英廟復辟進修撰以吏部尚書王翺薦召見文華殿上遙見遽曰好既升陛登殿連曰好好問年幾何對曰四十上曰正好問何處人曰漷縣上曰又是北方人問治何經曰尚書上曰是書經尤善問何科進士對曰臣以正統十三年及第上益善曰又是我所取者顧謂正曰今用汝內閣參預機務許彬老矣不足恃也正頓首辭出赴閣至左順門石亨張軏自外入愕然曰何以至此比入見上曰今內閣朕自訪得一佳士亨軏請為誰上曰嶽正亨軏陽賀曰誠佳上曰但官小耳今須與吏部左侍郎兼翰林學士如何亨軏因奏曰陛下欲升正亦甚易但姑試之果稱職未晚也上默然正感知遇所奏對皆忠讜多稱㫖欽天監湯序言變異謂姦臣未盡之故上以問正正曰姦臣實未聞若求之將人人自危且序術不足信事遂寢時石亨與太監曹吉祥怙寵擅權有投匿名書指斥時政者緝捕甚急上令正撰榜募捕正曰為政有體盜賊責兵部姦宄責法司豈有朝廷出榜購募人邪上謂吉祥曰正言是也嘗為上言曹石聲勢太盛宜早禁制上曰汝可以朕意告之正徑造亨諷令稍自戢二人益怨正矣會承天門災上下詔責躬實正視草厯陳弊政詞極切直遂有飛語指為謗訕內批降廣東欽州同知道漷以母老留未行會有憾正者以事中正逮繫詔獄謫戍肅州鎮夷所上每念正曰嶽正倒好只是大膽曹石敗上謂大學士李賢曰嶽正向固言之賢請曰正有老母幸放歸乃命釋為民憲廟初臺諫請復正及御史楊瑄官吏部擬調南京有㫖勿調復職充經筵講官纂修英廟實録李賢欲出正為南京國子祭酒正不應有忌正者僞為正劾賢疏草賢以是怨正會廷薦為兵部侍郎與都給事中張寧名竝上寧負才氣亦被譖遂皆外補而以正為興化知府成化己丑致仕卒于家所著有深衣纂誤及類博稿論曰文清明體適用足為真儒其抗王振違石亨生死不悔所稱大丈夫者非耶嶽公受知英皇一旦拔起遂秉中軸遇亦竒矣竟忤曹石及受讒文達坎壈以死悲夫今獻備遺卷十八
