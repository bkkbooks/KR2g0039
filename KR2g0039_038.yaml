  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_038-1a, image: WYG0453/WYG0453-0702a.png}
body:
  text: 今獻備遺卷三十八明項篤夀撰王守仁王守仁字伯安餘姚人父華成化十七年進士第一人歷官南京吏部尚書守仁少有才名𢎞治五年與胡端敏孫忠烈同舉浙江鄉試十二年舉進士授刑部主事復除武選主事正德元年十二月劉瑾亂政首抗疏乞誅瑾瑾大怒縛杖闕下幾死謫貴州龍場驛丞居夷力學學益進瑾誅七年升考功郎中十一年升僉都御史巡撫南贛汀漳等處當是時宸濠蓄逆謀江西上流山溪中劇盜四出劫掠焚官府篡獄囚廣東湖廣江西諸撫臣相觀望久之積至數十萬宸濠又輒與諸賊通曲護賊十二年守仁名討賊請提督軍務兵部尚書王瓊素竒守仁請上即與兵符兼巡撫至則日夜練兵教射不數月得精兵數萬且智計絶人用兵神祕是時茶寮賊大起江廣湖郴騷然三四年矣上命三省㑹征首誅通賊者十月督江西兵自南康入破橫水左溪諸巢賊敗奔復連戰奔桶岡又攻桶岡大戰西山界賊大潰盡殪之凡破巢八十四擒斬三千餘俘三千六百有竒釋其脅從千餘衆歸流亡使復業度地居民鑿山開道夷其險阻浰頭賊尤悍黠擬官僣號是冬輋猺既殄益增機險阱毒虞王師守仁休士歸農明年正月計擒其魁遂進兵擊其懈連破三浰乘勝逐北大小三十餘戰滅巢三十有八俘斬三千餘三月還師開縣置官司堅明約束諸賊藪盡為治境䖍吉人皆立生祠嵗時祀之升副都御史十四年六月宸濠反適勘事福建道經豐城縣令顧泌告以宸濠反狀即指心籲天誓不與賊俱生急走小舸返至吉安與知府伍文定謀起兵討賊發檄召江西諸知府邢珣等兵又密遣諜四出投檄言京師及湖廣廣東廣西南京淮安浙江各發兵討賊以疑宸濠使不敢出南昌又致叛臣家族謬托心腹云吾直應敕㫖且聚兵耳又曰寧王事且成敗未可知吾安得遂進兵乎賊果疑四路兵且至不敢直趨南京又喜其或不進兵遲回數日出南昌攻南康九江安慶兵已大集始𫝊檄罵宸濠賊又遣人密書與賊心腹李士實劉養正及閔草四吳十三若有約內應者書既發故令人泄賊黨書所過處賊黨以告宸濠宸濠盡得致書人及書遂疑士實等士實等勸宸濠去安慶直趨南京否徑出蘄黃趨京師宸濠遂不聽乃進兵攻破南昌擒其居守宜春王拱滌及宸濠子三哥四哥宸濠時攻安慶聞之解圍反顧巢穴迎戰樵舍縱火攻之大破賊擒宸濠及其子大哥當是時南京大震非據上流疑賊賊不犯南京必走蘄黃矣既生擒宸濠諸奸佞導上南巡欲攘其功是時宸濠未死諸奸佞素通宸濠得金錢者多在上左右頗有異謀畏守仁不敢發守仁深機曲算內戢凶幸外防賊走撫定瘡痍激勵將士日夜如對勍敵宸濠誅內閣大臣素惡王瓊亦并忌守仁以提督軍務得専制召兵平賊歸功瓊內閣益不說久之不賞嘉靖改元詔録其功封新建伯兼南京兵部尚書參贊機務遣使迎至京宴勞諸忌者又以勞費為詞嗾言官論沮未幾外艱去服闋竟不召讒謗益甚一時勤王有功諸臣廢斥殆盡惟文定得升副都御史廕一子千户邢珣徐璉戴德孺升布政使德孺死於水珣璉亦被斥陳槐削籍紀功御史伍希儒謝源以考察去益不自安纍疏辭封乞録諸勤王者功竟格不行已而言官及大臣又交薦之嘉靖五年岑猛叛兩廣聚兵討猛死田州而其黨盧蘇王受相結再叛益發四省兵嶺南大困起守仁代姚鏌至則開示恩信班師撤旅蘇受等自縛來歸薄示懲罰遣令歸農諭蘇等朝廷宥爾宜有以報皇恩衆皆頓首願效死因八寨反側久毒嶺表與蘇等約且用爾衆一戰與期日去又因永順保靖土兵自嶺南還密與領兵官約束過八寨徑搗其巢蘇受等兵相掎角或遏其前或截其後或張左右翼夾擊八寨劇賊誅斬萬計捷奏至桂文襄素忌之言守仁挾詐専兵時亦病殊乞致仕至南安卒桂又言擒宸濠攻城紀律不臧及斥其學術不端壞士習乞削奪官爵上憐其功又封爵本先朝信令不允但停恤典子不得嗣封公英敏天成機權莫測其用兵也訓練嚴明籌畫精密對客笑談萬衆遄集擒酋斬馘獻凱轅門左右尚不知也論曰漢以來所稱三文成者其才知學識節概勳名大略相若第留侯早退終始兩全誠意新建卒阻多口信哉功名之際不亦難乎談者謂劉公術數掩其經綸王公論學偏於德性要之此兩公者真命世才也蠅㸃蠆嘻此何心哉叙曰道術之分也固者以說溺經而華者以辨破義専錮黨伐之俗成鉤釽離析之患作棼然爭乎同異之辨而後功能之說得以抵巇讐其便便巧之用利一切之效速而後真儒之澤鬱滯不得施用蓋學者好不相悅而務相勝之過也昔者夫子修六學以待來辟有意乎後世欲用其所未試其後天下爭於戰陳六籍廢闕七十子之響既絶而晚周之末猶有子游氏之儒子夏氏之儒漆雕氏之儒若是其懿也豈與夫譁衆取寵務趨合於亂國苟以徼利撓世為哉然而去之彌逺其失彌甚則有離逖本真舛馳末僞安其所已知毁其所未見於是辨說鬨於鬭訟攻難急於操戈起異說之塗而立之幟鬩同氣於牆而不顧其外侮於時法吏為師學士寖絀有反雜之目被愚誣之譏迄於暴秦乃有儒禍則是好不相說而務相勝之罪也宋之末造朱陸之門人不能觀乎兩師之深更是所聞轉相姍議同德比義之規滋缺専已耀俗之風尤熾而不知晦翁之意先條析而後貫通固未嘗索理於外而不約之內象山之意先本原而略文義亦未嘗謝事於外而空明於內也我朝經學以朱傳為宗間有肄其言而不歸之約者陽明先生倡為致良知之說示人以極本窮原之歸其學有似於象山而實非挾陸以毁朱也自陽明之教行而學者稍知趨向然有肄其言而不要其實者甘泉先生又為隨處體認天理之說示人以一本萬殊之用其學雖異於象山而亦未嘗排陸以及王也近世學者率尚髙明而棄沈密樂簡易而鄙勤渠以覺悟為天真以聞見為障礙不屑踐跡而遽談𤣥奧乃謂聖人有心法無事法不涉文字不主嚮往交騖於雅詞矩步而力行衰微矣不幾惑世誣民哉嗟乎有能紹明洙泗之業振二季之敝由博歸約明析而躬行之進則仁者之效用著退則先儒之典刑具使功能記問之士弭口不得關其說竊願為之執鞭云今獻備遺卷三十八
