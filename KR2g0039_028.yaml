body:
  text: 今獻備遺卷二十八明項篤夀撰王英王英字時彥金溪人永樂二年進士庶吉士入翰林未幾召及王直入內閣書機宜奏授修撰進侍講二十年從北征至庫楞海旋師至威敵命碎李陵臺驛令碑沉河中絶其爭上顧喜曰秀才朕需爾為用勿憚勞因言敵遁幸勿入險窮追上笑曰朕為天下國家計秀才直不欲黷武耳又曰凡軍中動靜有聞即密奏顧內臣曰秀才有事見朕勿䦨駐安平鎮軍中有恚言上怒英言此皆壯士幸宥其過稍與恩澤異日得其死力上喜立命李慶給餉及輜畜二十二年上崩榆木川東宫命英與諸大臣定喪禮議國事宿內閣凡七日升侍講學士又升右春坊大學士明年乞省歸朝景陵召入便殿謂曰洪武中學士有宋濓吳沈朱善劉三吾永樂初解縉胡廣皆有名汝英慎自勉裕陵即位充史館總裁講官正統十三年升尚書南京禮部景泰元年卒諡文安改諡文忠論曰王文忠受知成祖扈從北征規諷多所裨益歷事三朝完其勳名其亦吳胡之侣耶錢習禮錢習禮名幹以字行吉水人永樂辛卯進士為庶吉士除檢討有惡之者指為練子寧姻東楊間以聞曰習禮有文學史才願陛下憐察上欣然曰使練子寧尚在朕且用之况習禮乎獻陵初升翰林侍讀知制誥宣德初與修兩朝實録正統初與修宣宗實録三年升學士七年以故鴻臚寺為翰林院落成諸殿大學士皆至習禮不設西楊南楊座或問應曰此非三公府也二楊以聞上命工部具座禮部叙位次二楊始自內閣出坐諸學士上十年吏部上禮部右侍郎用苗衷內批用習禮而陳循代掌院事或賀之者答曰吾今且為有司又奚賀為未幾陳髙曹苖皆得升侍郎入內閣習禮尋兼署吏部稱疾辭致仕歸十五年八十九卒諡文肅曽棨永樂二年進士第一人授翰林修撰上命解縉選進士進學文淵閣棨及編修周述周孟簡進士楊相劉子欽彭汝器王英王直余鼎章敞王訓柴廣敬王道熊直陳敬宗沈升洪順章朴余學夔羅汝敬盧翰湯􅣌李時勉段民倪維哲袁添祿吳紳楊勉被選名翰林庶吉士入見上諭曰人須立志志立則功就未有無志而能建功成事者爾等自進士中拔至此皆今英俊然當立心逺大不可安於小成爾等勉之朕不任爾以事文淵閣古今載籍所萃各食其祿日就閣中玩索務實得於已將來庶得爾用不可負朕期待南城有羅玘成化二十三年進士為翰林編修時武岡知州劉遜忤岷王被逮給事中龎泮等以救遜下詔獄玘上疏救主事李夢陽論外戚收拷又疏救太監李廣死言官劾文武大臣附廣者請按廣籍斥逐玘言不可宜令諸大臣自陳或坐他事黜便正德中歷升南京吏部侍郎上大本急務疏言瑾逐榮王虛朝廷上未有子諸大臣依違不肯為國家逺慮忤時宰致仕寧庶人致百金夀玘走避深山中李文正公處瑾永間曰調護善類玘引大義責之請謝門生籍卒贈禮部尚書諡文肅論曰錢文肅早被恩眷讒說不得行幸矣以座位故忤時宰竟不獲大用惜哉羅文肅正色危言逺避淮南非發蒙振落者等錢公固不逮也鄒濟鄒濟字汝舟其先嘉興人徙餘杭洪武十五年舉通經纍官知州靖難後大臣薦修髙廟實録録成升儀制郎修永樂大典總裁征安南參贊軍事升廣東參政坐事改考功郎中獻陵留守南京改右庶子進少詹事當是時宫寮多得罪徐善述王汝玉馬京梁潛周冕相繼下獄死濟幾死者屢矣憂懼成疾卒後獻陵悼念舊學贈太子少保諡文敏子幹正統四年進士歷官太子少保禮部尚書致仕年八十四卒贈太子太保諡康靖善述天台人為左司直郎升右贊善耿介恬靖汝玉長洲人仕至贊善兼檢討坐戍邊東宫特宥之復坐纍下獄死汝玉聰敏過人文章精粹洪熙初贈汝玉太子賔客諡文靖善述太子少保諡文肅京武功人洪武十八年進士纍官北京刑部侍郎兼宫寮謫戍廣西已而有薦京者竟坐前事下詔獄死洪熙初贈少傅諡文簡潛太和人洪武二十九年鄉舉歷訓導知縣靖難後召修實録升修撰尋兼贊善永樂十五年夏吕方三尚書薦副西楊輔太子監國坐陳千户事被讒與周冕並逮詔獄卒妻楊隨潛北京潛卒慟毁不食亦卒潛闓爽𢎞毅通諸經尤長於詩易冕寧波人為司諫春坊論曰文敏父子䇿名三朝繼登峻秩可謂世濟其美者矣徐王五公輔導儲宫不免讒口豈非所謂小人之欲傾人國必先去所忌而後動於惡有以哉劉儼劉儼字宣化吉水人正統七年進士第一人除翰林修撰茂陵在東宫為左春坊大學士景泰七年考順天鄉試內閣陳循王文有子試屬之皆不得舉二人令其子録試文訟考官閲文不明取士徇私㑹譯字官劉淳卷注翰林院考中送入貢院比書榜竟落淳名二人因劾儼違制并摘命題雖欲自絶語請如洪武中劉三吾等坐罪上命髙文義公覆試諸得舉者朝退髙請奏事門上力言二臣之子文亦可觀顧解有定額儼等本無罪上令順天府准其子㑹試王文復疏辨上不喜曰敢再言者以大臣擅法論遂已先是廬陵羅崇嶽舉順天第一以詭籍斥還縣學時人為之語曰榜有姓名還是學生榜無名氏京闈貢士明年裕陵復位二人得罪其子竟不得試禮部儼卒贈禮部侍郎諡文介論曰國家用人不以其方惟賢惟才是取耳袁氏四世五公著稱漢室蕭氏八葉宰相休顯唐家世類寧足拘哉近代以來若謝文正遷發鄉舉第一人㑹試第二人廷試後第一子丕解元㑹魁及第倫諭德文叙㑹元狀元長子通參領省解次子祭酒以訓㑹元及第黃行人乾亨子御史如金史僉事俊子尚書道毛文簡紀子太僕渠張侍郎志淳子副使合俱父子發解曽狀元鶴齡孫追費狀元宏從子懋中羅文莊欽順從子珵俱進士及第孫文恪升及第而子鋌鄉薦第一礦㑹試第一升兄堪武㑹舉第一劉尚書龍祖副使潔父刑部鳯儀俱鄉試第四人龍及子郎中承恩俱第二人葛少保守禮與其孫俱發解山東周庶子述長史孟簡同科及第彭文憲時廷試第一文思華㑹試第一楊文懿守陳尚書守址劉文簡春參政台王文莊鴻儒布政鴻漸俱發解而守址春復及第楊光祿惟聰巳卯發解辛卯狀元而兄庶子惟傑丙戌及第王太史錫爵㑹元及第而弟鼎爵復㑹試第五人今海內章縫侈為盛典又宋制大臣或有不由科第者特賜于某人榜出身及纍舉不售者恩賜第有一榜盡賜及第有免解進士之目永樂間曲阜舉人孔諤乃宣聖後㑹試乙榜第一人皇太子召見特賜進士出身不第鄉試特許㑹試者即循文子陳瑛王倫竟亦不試不第㑹試特賜廷試者洪武中韓克忠等一榜進士也若以他途進者曹文襄鼐以太和典史乞㑹試得第二人廷試復為第一人後刑部吏南昱松陵驛丞鄭溫常熟黃鉞叔揚亦以典史中㑹試云儲瓘儲瓘字靜夫泰州人成化二十年進士歷南京考功主事文選郎中𢎞治七年調考功十年升太僕少卿在考功三年臧否不淆交遊稀寡嘗薦張吉等五人可任諫官論救科道龎泮等不宜以言事下獄又上言乞令史官紀注言動如古左右史康陵初升太僕卿明年僉都御史總糧南京又明年入户部為侍郎逆瑾専權愧憤引疾求去得允致仕瑾誅不數月復起時瑾雖誅諸幸佞繼用事更益不樂明年又乞休去七年改南京户部是年冬改南京吏部去辭益力起益數淳易恬靖人皆慕之卒諡文懿邵寶邵寶字國賢無錫人成化二十年進士初知許州入户部為員外郎郎中升按察副使提學江西正德四年升副都御史總漕巡撫江北雅有清譽在江淮不事改革赫赫漕大小將校皆嚴憚不敢苛黷未幾以事忤瑾瑾又惡平江伯平江伯者漕帥也事連寶瑾益怒長沙力解得致仕瑾誅起巡撫貴州升户部侍郎七年請養母歸十四年升南禮部尚書嘉靖初再辭詔特與終養卒贈太子少保諡文莊所著學史簡端録二書巡撫吳廷舉上之朝楊亷楊亷字方震豐城人成化二十三年進士為南科給事中建議皆國家大體邊防要務歷南太僕少卿通政尹順天升南禮部侍郎進尚書大禮議起具疏同南九卿上之報聞所著有國朝名臣言行録卒贈太子少保諡文恪論曰儲文懿和而善介楊文恪端而不阿邵文莊敏而毅皆以卓行著聞而學術彬彬可謂有其文質者矣國初易名之典靳與文臣自王忠文後僅乃得之永樂以來代亦不乏而得與于文者惟翰林有之儲楊邵三公者不可以為文者哉他如馬文簡京姚文敏䕫唐文襄龍葉文莊盛王文定道魏文靖騏王文莊鴻儒鄭文安賜儀文安智何文肅喬新周文襄忱何文簡孟春黃文毅孔昭蕭文昭維禎吳文恪訥王文成守仁亦不以翰林顯著王毅敏文陳莊靖文劉忠愍球楊莊敏鼎朱榮靖希周皆翰林不及諡文又以嫌名避之者也崔銑崔銑字子鍾一字仲鳬安陽人𢎞治十八年進士改翰林庶吉士授編修正德初宦瑾擅權獨長揖瑾怒謂張綵曰翰林後生多輕薄崔銑尤甚㑹孝宗實録成瑾矯㫖史官升級調部屬州縣練政理改南京驗封主事瑾誅召入翰林請告歸嘉靖元年召修武宗實録明年日講升南京國子祭酒時議大禮江南北大饑人相食銑上疏略曰近者主事張璁等以先後獻議超遷大學士蔣冕尚書汪俊修撰吕柟編修鄒守益監察御史馬明衡等以上疏罷斥御史段續陳相吏部員外郎薛蕙下獄疏入報聞十八年春改少詹事兼侍讀學士未幾擢南京禮部右侍郎致仕卒贈尚書諡文敏吕柟吕柟字仲木髙陵人正德三年進士第一人除翰林修撰與馬理康海皆有名關中瑾以鄉故欲引用之遜辟不與來往瑾憾且中柟㑹敗得已嘉靖三年議大禮下詔獄降解州判官升國子監祭酒南京禮部侍郎致仕歸卒時有馬汝驥字仲房綏德人正德十二年進士卒諡文簡武城有王道字純甫正德六年進士歷官吏部侍郎仲房簡靖端恪純甫淳懿溫恭並有文學負時望難進易退未究其用而卒善類惜之論曰自古中人之禍未有如瑾之尤也當是時崔吕之危蓋已岌岌卒免瑾禍此亦有天幸與兩公者正色危言立朝侃侃社稷臣者非耶魯鐸魯鐸字振之景陵人𢎞治十五年進士庶吉士入翰林閉門斂跡不事交遊為編修沈潛學問不専為文詞歷官祭酒端飭自勵日危坐焚香讀經史不肯言人短長及時政得失虛心約已清慎不渝憂時濟世之心至老彌篤屢請告屢起屢歸士林推慕之益兢持名節嘉靖間交薦不起卒諡文恪論曰文恪雅尚經術沈默純懿難進易退有斷斷大臣之風即位不及用而孤稜髙標亦略可見矣今獻備遺卷二十八
