  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_012-1a, image: WYG0453/WYG0453-0583a.png}
body:
  text: 今獻備遺卷十二明項篤壽撰陳洽陳洽字叔遠常州武進人也洪武中以薦為給事中奉命㸃軍過目輙識其人再至輒笞之髙皇帝聞而嘉之賜金織衣一襲父以貞戍五開死洽去官走五開觸瘴癘冐險五千里竟負骨歸葬焉居亡何兵部尚書茹瑺薦洽才可大用詔起復授文選郎中文皇正位首擢為吏部右侍郎尋轉左侍郎永樂乙酉遷大理卿丙戌交阯黎季犛搆逆命洽馳往調土兵三萬人以佐大軍交阯平召還己丑交阯餘冦作亂仍命英國公張輔討之而以洽叅贊機務遂擒簡定而還時北人犯邊上親征洽承命同張輔練兵于塞外辛丑往鎭交阯能輯和其民邊人安之乙未還京師上嘉其功進兵部尚書丁酉復同豐城侯李彬鎮交阯兼掌布政按察司事宣徳元年黎利叛成山侯王通帥師討賊洽仍叅贊焉是冬十一月八日通下令進兵洽請駐師石室縣之沙河以覘賊强弱且陳方略通弗聽麾兵渡河次寧橋大戰良久洽奮馬突入賊陣中欲生擒黎利身被數創而了無怖色旣而墜馬左右爭扶掖請還營曰主將且退走公何自苦如此洽張目叱之曰我朝廷大臣報國正今日可偷生邪左右皆潰散洽持戈直前手格殺數人大罵賊自刎而死事聞贈少保諡節愍官其子樞為刑科給事中兄濟以布衣薦為贊善亦有名論曰交阯在五嶺外即古雲蠻禹貢職方所不載漢武帝好大喜功始置交州國初陳氏首入貢髙皇帝因而羈縻之自黎賊搆亂文皇帝命將三犂其庭復置郡縣然卒有馬騏之變得而復失陳洽兩鎭其地皆有惠政竟抗節死難傷哉劉子輔劉子輔者江西廬陵人也永樂中自大學生擢監察御史巡按浙江三年按察使周新慎許可獨賢子輔陞廣東按察使坐累左遷交阯諒江知府子視交人交人愛之黎利叛攻圖諒江旁郡縣多陷沒子輔與守將倡兵民死守者數月賊増兵攻城城中食且盡遂陷兵民盡死鬭無一人降者子輔曰吾奉命守郡郡亡與亡義不可死賊手即自經死一子一妾皆先子輔死事聞贈叅政賜祭復其家時都指揮李任諒山知府易先政平知府何忠皆不屈死鄺埜鄺埜字孟質郴之宜章人也永樂中舉進士癸巳拜監察御史南京鈔法阻滯埜奉命往察擒市豪一二人還奏曰市人聞令皆震懼鈔法今通矣上頷之而罷倭冦犯遼東埜往按問奏免戍守失律應死者百餘人山海關吏卒邀陜行人以取財逃亡者受賕輙縱出境埜悉擒治抵罪丙申北京營建役者累萬人多病上命埜視給醫藥埜躬履其地潔其穢汚而時其藥食病者多不死戊戌石州人詣闕下告變言州人與陜人羣聚千餘人謀不軌上擢埜為陜西按察副使經理其事且議用兵埜至察其誣具以聞有詔勿問而誅其造誣者宣徳己酉陜饑華亭宜川尤甚公私匱竭乃移旁縣粟賑焉羸病不能興者官為粥食之正統改元拜兵部左侍郎時西鄙有警尚書往視師埜獨任事上奇其才命除其戎籍示寵異焉己未京師淫雨壞官民廬舍埜奏曰此隂氣為沴兵隂也皆臣等不職所致乞罷歸田里不許師征麓川舉蔣貴可任卒有功天下軍衞總小旗當代者例就試京師道遠無資即終身不得代埜請就各都司試之人以為便己巳額森入侵中人王振勸上親征埜上章諫止不聽遂扈從出居庸關道中數奏言邊地小不宜屈至尊指麾諸將足以成功皆不聽振惡埜數言事欲疎之勑埜與戸部尚書王佐隨老營至懷安墜馬幾殆從者請少留以便醫藥埜叱曰天子在前我大臣豈可以疾自便邪馳赴雲中駕還至宣府敵踵至埜奏請疾驅入關而嚴兵為殿不報埜詣行殿固請振怒罵曰腐儒安知兵再妄言必死埜抗聲曰我為社稷生靈而言何得以死相懼邪振愈怒叱左右扶出埜與王佐相對泣帳中明日次土黙特營中無水士馬皆饑渇衆請戰振又不許敵四面集矢雨下須臾師覆埜死焉蓋八月十五日也時學士曹鼐張益等皆遇害景皇帝旣即位之明年詔贈少保官其子儀為主事論曰己巳之變鄺公位統六師然權歸閹振無能可否惟一死塞責不足原乎劉儁劉儁江陵人洪武十八年進士為兵部主事累陞左侍郎建文中為侍中靖難後陞尚書材力縝宻勤敏能出奇應變征交趾出叅軍有功還受賞永樂六年趾賊簡定反出叅沐晟軍敗生厥江被圍卒洪熈元年贈太子少傅諡節愍時都督僉事吕毅陷陣死交趾叅政劉昱亦死毅項城人百戸從靖難陞督僉送陳天平至鷄陵關敗宥罪從征充鷹揚將軍掌交趾都司沉勇有智畧昱武陵人嚴猛有吏才曹鼐曹鼐寧晉人國初鄉舉署代州訓導非其好也願得一劇官自效改泰和典史益肆力問學嘗督工匠入京自陳願就禮部試宣徳八年進士第一授翰林脩撰正統五年陞侍講十一年入内閣與政典制文詞宏潤日講音㫖清暢尋陞吏部左侍郎兼學士是時東楊卒凡議大政諸閣老推決於鼐才識明敏類東楊視王振正色不少假振益憚之十四年没土木贈太傅文淵閣大學士諡文襄改諡文忠賜衣冠葬官其孫榮錦衣世百戸論曰劉節敏以通材出叅軍旅曹文忠正色立朝入贊帷帳蒙難以死不竟其用惜哉今獻備遺卷十二
