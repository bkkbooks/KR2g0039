body:
  text: 今獻備遺卷十七明項篤壽撰劉球劉球字求樂江西安福人也永樂十九年進士擢禮部儀制主事正統初詔求文學之士尚書胡濙以球薦預修宣廟實録成改翰林侍講京師大水民飢具奏便宜時北人數求貢球深以為憂麓川不靖王振方議大舉伐邊球上言請罷兵屯田以招降之而専意西北八年夏四月雷震奉天殿鴟吻詔求言時麓川再叛再發兵討之球陳言十事其一言宜親政務權不可下移振覽之大怒適編修董璘自求為太常卿下詔獄而球所陳亦言太常卿必得儒者乃傳會球為璘畫此謀球殊不知也遂於陛前捽球去併下獄振隂使指揮馬順夜殺球臨刑不知所坐大呼曰死當訴太祖太宗皇帝遂死獄中二子鐵鉞號哭求尸得一臂歸葬終振之世不仕皆舉進士有名景泰初贈球翰林學士諡忠愍球議論慷慨憂時恆切卒以直言取竒禍天下寃之所著有兩溪集論曰烈士徇名豈劉公之謂耶卒之王振馬順族滅身灰受禍尤烈方其得志自以為上蒙下蔽殺一諫臣不啻螻蟻孰知其禍人家國至此極也李時勉李時勉名懋以字行江西安福人永樂甲申進士改庶吉士與修永樂大典及髙廟實録初授刑部主事改翰林侍讀十九年三殿災詔求言陳十五事一止工作二罷重譯朝貢三汰冗官四賑飢荒五愼選舉六嚴考核七理刑獄八黜贓吏九散處達官十罷遣僧道十一減買辦十二革接遞軍夫十三矜免侍親充軍生員十四設法儧運十五優恤軍士皆切中時弊有旨允十四事施行之是冬復言事忤旨繫獄二十一年以學士楊榮薦復職扈從洪熙改元言事觸諱忌仁廟大怒命武士以金瓜撲十數下脅斷曳出大學士楊士竒灌以燒酒得不死乃下錦衣衛獄先是折脅內向不相著及用梃杻斷骨忽自接宣德初上幸萬嵗山召時勉入謂曰汝何激怒先帝對曰臣言制中不宜御妃嬪太子不可逺離膝下至第六事止不言上再問對曰臣不能記其詳上微笑不復問且索諫草在否曰焚之矣乃得赦出獄復官侍讀預修兩朝實録成進侍讀學士一日上懷金錢至史館撒于地縱諸臣拾取時勉獨正立上呼時勉前以袖中餘錢賜之上嘗御文淵閣賜諸學士飲顧謂時勉曰卿非朕安得飲此時勉叩首謝曰臣蒙再造恩不勝感激正統初兼經筵官每進講上必傾聽聞者莫不稱善以為范淳夫其人也進學士六年升國子祭酒倣胡安定教條隨材造就之督勵嚴甚每旦五鼓命膳夫提鈴諸生門即起誦讀夜終二鼓方聽就寢或時潛行以察勤惰無燈者旦罰治之尤禮待諸生病給醫死助棺斂未娶者使有室上書請改建太學命太監王振往視時勉與抗禮振生日時勉又獨不賀振銜之坐以擅斫文廟古木為不敬命置百斤枷枷號國學前司業趙琬掌饌金鑒皆與罰有一枷特重數斤振為時勉設也金曰鑒年壯當荷此時勉曰僕雖老筋骨甚堅即以自荷諸生司馬詢等數百伏闕以請而石大用者獨上章乞身代之遂獲釋未幾乞致仕景泰元年卒年七十七諡文毅論曰李文毅公危言直諫兩下詔獄至折脅不少挫白首荷校不悔可謂壯矣其所上諫草祕弗傳又何其篤厚君子也陳敬宗陳敬宗字光世浙江慈溪人永樂甲申進士選翰林庶吉士與修髙廟實録成授刑部主事復與修五經四書大全改翰林侍讀宣德初修兩朝實録未成轉南京國子司業進祭酒矜嚴好禮儀止端莊久居太學以師道自任遇僚屬諸生甚嚴有挾私忿誣奏之者法司將覆請就逮或謂敬宗宜上疏自理屬筆者辭多遷就敬宗曰不可被誣罪小欺君罪大具實以聞而事竟白景泰初致仕家居卒年八十有三所著有淡然集論曰詩曰抑抑威儀維德之隅陳公其選乎夫敷教在寬師嚴道尊闕一不可陳公兼之矣周忱周忱字恂如江西吉水人永樂甲申舉進士詔選庶吉士二十八人以應列宿忱自陳乞與列文皇帝喜曰是有心計留之與修永樂大典十年授刑部主事預修五經四書性理大全升員外郎北京初建太倉命忱督運南北畿郡之賦洪熙間遷越府長史宣德五年擢行在工部右侍郎巡撫南直𨽻總督糧賦初蘇松常積逋甚多忱至奏添管糧官下令大小户槩加耗請鑄鐵斛發州縣依造木斛勘烙給之繇是出入平始糧正區設正副三人嵗赴南京關勘合糧完又親齎奏繳殊煩勞忱奏減區正副二人輪赴京領勘合糧完送有司類繳之蘇賦額二百九十餘萬石有詔官田一斗至二斗以上者減什之二三斗以上者減十之三而户部移文止減抄沒官田其古額重者不準減除忱又同知府况鍾奏言洪武永樂間抄沒官田猶不甚病其最病民者惟古額官田得旨減八十餘萬舊例不許團局收糧糧長家自徴收忱曰此負欠之繇也下令水次置囤推糧長一人總之曰總收每嵗通計各户之夏秋稅及加耗則例填注由帖而户給之户自持帖赴倉不經里胥囤設糧頭囤户各一人主之使相覺察糧長惟職催併官為監收立撥運文簿加耗正糧一石收平米一石七斗起運則量支如京通等倉正米一石支三石臨清淮安南京等倉以次遞減立綱運文簿凡搏淺諸費填注回銷其支撥之羡餘者曰餘米次年餘多減耗加六又次年益多加五令縣置一倉以貯之曰濟農以備賑貸農之乏食及運夫之遭風盜者則賑之凡築墟岸濟河道人給口糧農作興則於中下二户內驗其田之多寡貸之嵗凶則再賑之其不還官者不復給故事軍民分運其長運者往返踰嵗多失農忱乃與平江伯陳瑄議奏於淮安瓜洲水次對船交兊在淮安正糧一石兊平米一石五斗瓜洲加五升運軍未過江者聽於蘇松常鎮等府縣交兊加過江米二斗民間運馬草北京者所費不資而草多敗爛奏請折銀南京則輕齎買納為北京公侯祿米例輸南京使自來受每石費耗六斗忱曰彼能於南京關支獨不可就支三郡乎以便宜上言嵗減耗米六十萬北京文武俸帖於南京賣者苦太賤銀一兩可得米七八石忱奏請折收金花銀每兩準米四石以給官俸折糧官布例重三斤率以紗粗驗退忱請不拘輕重務長濶如式兩頭織色紗以防盜剪之弊從之驛遞馬死馬頭率科之民買補無虛日忱令每田一畝帶徴米一升九合官收之以補馬之死者正統初淮楊災鹽課不足奉詔巡視奏撥三郡餘米運赴各鹽場準作下年秋糧而聽竈户以私鹽易米時米貴鹽賤官得鹽課民得米上下交便之有詔綵繪官殿計用牛膠萬餘斤遣官齎勑督辦時忱方赴京遇諸塗勑使請還治忱言第行自有處至京言京庫所貯皮張嵗久朽腐請出煎膠應用歸即撥餘米買皮上供以新易舊誠兩便從之十四年英皇北狩邊騎將薄都城衆議欲焚通州倉以絶其食忱時議事京師請令六軍運入都城聽作月糧敵至無所掠而都城食賴以足巡撫南畿凡二十一年由左侍郎九載考滿轉左進户部尚書改工部致仕景泰二年卒于家諡文襄忱謙恭言若不出口謀慮深長善采衆論征輸皆有常度嵗賦無欠且有贏餘他郡荒歉即以餘米補之凡織造上供軍需之類悉取給於餘米常賦之外無復他役初至蘇松屬嵗大飢米價翺貴忱遣人四出察出米價髙下江浙湖廣方大熟乃令人槖金至其地故抑其直而勿糴且紿言吳中米價高甚由是江浙湖廣大賈皆販米趨吳中數百艘一時俱集忱知四方米已至下令發官廩米盡出之以貸民而收其半直城中米價驟減而四方米欲還載度路遠不能乃以賤糶忱復椎牛釃酒以謝四方米賈躬自勸飲之再給以路費米賈皆醉歡去米價既平乃復官糴以入實廩吳謡曰來時周白地去時米鋪地所至延問父老利病興革或微行雜坐談時事其丈量崑山田匹馬獨行人不知為巡撫也夜則留暗燈及筆硯木簡于卧榻傍寤則籌度政務有所得即起書于簡旦日施行之運船有侵匿乃以遭風告忱忱言是日無風其人大駭服久之乃知忱令金焦山僧日具風水以報其僧皆有資給為盡力周詳多類此所至興學校及先賢祠橋梁河渠多所修治皆資餘米民不知役爭立生祠祀之知人下士所薦引者甚衆過淮見吳人施槃竒之攜歸送本學槃以狀元及第凡所建明皆永為法守後户部言餘米失稽盡括歸官由是徴需雜出逋負如故人益思之論曰文襄雄才善計受知聖明是時三楊當國夏忠靖為司徒故得久於其任言聽計從然猶困于多口觀公所上執政書良足嘆矣詩曰讒言罔極青蠅變亂自古然哉韓雍韓雍字永熙蘇州長洲人以閭右徙實京師為宛平人年十九第進士授監察御史數糾彈權幸録囚南畿碭山教諭邱純笞膳夫祝磨兒其父匿磨兒以他尸誣純坐死獄雍略捕磨兒純得白巡按江西討平廬陵諸縣盜賊升廣東按察副使大學士陳循薦擢右僉都御史巡撫江西奏革寧府護衛軍英廟復辟改山西按察副使尋以寧王誣奏逮繫詔獄致仕起遷大理寺右少卿轉右僉都御史數辨寃獄學士倪謙為怨家所誣當置重典力爭免之錦衣指揮劉敬坐飯石亨擬朋黨律雍曰當亨得志時孰不蠅聚其門若一飯即坐死過此者將何以罪之且東漢以朋黨二字毒害忠賢卒以亡國今明聖之朝奈何為此議邪巡撫大同宣府朵顔入獨石擊走之升兵部右侍郎坐事遷浙江右參政成化元年兩廣蠻冦反王師纍失利上命都督同知趙輔為征夷將軍而兵部尚書王竑薦雍宜為總帥乃拜左僉都御史贊理軍務假便宜行事議出師方略衆謂賊在廣東者宜逐在廣西者宜困之請分兵雍曰不然夫兵分而為竒聚而為正今兩廣無完城而大藤峽乃賊之巢穴不覆其根本而剪其枝葉非計之得也今全師鼓行而前南可以攻大藤峽援髙雷亷東可以應南韶西可以取柳慶北可以斷陽洞諸路舉無不克何煩逐乎疾雷不及掩耳又焉用困乎定議趨廣西師至全州五戰皆捷陽洞諸賊悉平趨桂州誅前將失律者數人衆議宜乘勝攻峽雍曰修仁荔浦為賊羽翼宜先勦之以奪峽賊之氣然後乘勝長驅搗其巢穴破之必矣乃分兵為五哨復分為二十五哨夾攻之旬月間大小數十戰攻破寨洞五百餘俘斬無算修荔悉平移師潯洲直抵大藤峽衆議峽險甚且多藏粟非旦夕可拔宜圍以困之雍曰峽周圍六百餘里數萬人圍之猶不足老師匱財或生他虞今修荔已平峽賊皆喪膽破竹之勢即成擒耳乃分兵為五哨由峽北古眉雙髻等路以進而身統大軍從峽南分八哨水陸並進復分二哨為後援别遣兵斷諸山口賊於峽南樹柵滚木礧石鏢鎗毒矢交下我軍萆山仰攻雍擐甲督戰奮戈先登士皆魚貫以上殊死戰呼聲撼山峽若崩一日盡破其山南諸大寨命縱火烈山煙焰蔽天日晝暝山為之赭日暮就營賊巢中將士皆栗栗雍自如賊潰入橫石諸崖督兵窮追破山開路棄馬徒步且戰且行直抵其地賊所據九層樓等山危險不可攻賊樹柵數重礧石大木交下巖谷響震弩矢雨注雍誘使大發潛遣壯士登其山絶頂期舉炮為應頃之賊矢若盡忽炮震賊大駭潰走雍率衆攀援以升奮擊連數日夜而山北援兵且至與大軍合勢夾擊賊大潰委棄輜重山積攻破巢寨三百二十竒燒燬廬屋擒斬賊首侯大狗等俘獲無算巢穴蕩平改大藤峽名斷藤峽刻石紀功而還至廣西大享將士而先所遣將勦廣東流賊者纍戰皆捷廣地悉平奏徙上隆州于峽內改𨽻潯州以土官岑鐸知州事設東鄉龍山二巡檢司以土人為巡檢徙周沖巡檢司于峽之上水徙靖寧巡檢司于峽之下水增設宣鄉黃江思隆三副巡檢皆以土人為之置藤縣千尸所以統徭獞易置守將安插逹官于廣州城中以備調遣諸所建置咸經久可行遷左副都御史提督兩廣軍務奏請添設巡撫二人從之丁父憂歸廷議兩廣叛服不常撫臣事權分轄宜開府梧州置總司以統之詔罷二巡撫起雍為右都御史總督兩廣軍務兼理巡撫居亡何與中人不協致仕歸雍卓犖負大節軍旅之事不學而能應機決䇿智勇並奮文牘山委剖斷若飛號令明信無敢犯者將卒所獲人畜即以豫之禆將犯法當斬賂中人請釋之雍因午節閲武射柳斬其頭懸軍門合營股栗其威嚴類此論曰兩廣自文皇朝蠻冦數叛都督韓觀山雲相繼鎮定乃後交址不寧兩廣兵調征無虛嵗加以瘴癘耗死者什七八矣而蠻冦生聚日繁正統末黃蕭養倡亂廣東西蠻煽動攻剽城邑纍征不克韓公以一書生不旬月蕩平之功亦偉矣向非純皇既明且斷委任不疑曷克有此哉人言韓公發摘姦伏如神進攻大藤峽時有老人五百詣幕府言軍情事公疑之隂選壯士千人縛搜懷中皆袖短刀悉誅之又言韓公多計數師抵大藤峽先驅白言峽深不可渡公下令今日必渡峽無舟則以軍之半填峽須臾師悉渡或又言諸蠻酋聞公名輒喪氣師未抵峽峽中藤葉皆蟲食成韓字諸如此類甚衆總之具文武材善用兵非好殺者流也人言寧可盡信乎况鍾况鍾字伯律南昌人也以刀筆事尚書吕震震薦其才授禮部主事進郎中宣德初蘇郡缺守愼擇良牧大學士三楊公及尚書胡濙等咸以鍾薦且請賜璽書以便宜行詔可郡守有敕自鍾始也既視事吏抱牘請署鍾即如言以署不可否吏咸侮易之三日吏復請署鍾曰若謂我真不能事事邪厯舉三日所署牒無遺因擲某事為故出入隱竄顛倒盡發其情狀立取舞文吏一二人撲殺庭下乃集僚屬宣讀璽書自二以下有不法得按問僚屬皆股栗鍾因舉其尤者立黜之搜逐胥吏主文掃滌積蠧置通關勘合簿以防詐偽衛卒久暴橫痛加繩禁郡體始尊凡勢豪及鄉里武斷重禁戢之蘇賦重而官田尤病民鍾奏減之凡奏減重額田正賦七十二萬餘募民開墾荒田起科免包荒糧一十四萬餘停徴淹沒田糧二十九萬餘舊欠糧草鈔數百萬錠罷嵗漕民船五百艘免買船米十五萬餘疏免詔買三梭布七百匹銀數千兩革倭船徴需請濬水道淤塞辨平民誣入軍伍者千八百餘家招復逃亡三萬有竒凡所論列悉賜施行朝廷數褒勞之述職錫宴賜詩丁內艱去蘇人上請乞還鍾復除仍任正統五年九載滿去闔郡民上章乞留赴奏闕下者八萬餘人遂再遣任七年卒于位蘇人哀思之鍾剛果敏達而度量廓如興學禮士好推轂人尤重秩祀先名賢祠皆拓新之論曰明興守令賢者代不乏人而况公在蘇到于今尸祝之是寧可聲音笑貌為哉觀其奏減田賦禁戢姦利其深識時務之要者矣起自刀筆尤喜縫掖士又何其能急先務也比良楊公不有以哉今獻備遺卷十七
