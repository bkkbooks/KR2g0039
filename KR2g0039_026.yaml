body:
  text: 今獻備遺卷二十六明項篤夀撰吳與弼吳與弼字子傅江西崇仁人國子司業溥之子也少讀伊洛淵源録心慨慕之遂棄舉業絶人事獨處小樓日取諸經傳語録玩味之不下樓者數年餘其詩曰九仭始一簣千里方跬步又曰神當通鬼神志當貫金石久之名聞京師纍薦弗起天順間以石亨薦上命行人曹隆賜璽書加束帛徴之既至命為左春坊左諭德上疏辭召見文華殿對曰老病不堪供職上不允顧謂大學士李賢曰此老非迂濶者務令供職與弼終不就詔許之進十事再召見慰勞遣行人王惟善送歸道遭風幾覆舟衆皆駭怖獨正襟危坐居鄉動必以禮家貧力耕自給四方來學者束修皆不受嘗嘆曰宦官釋氏不除而欲治天下難矣必除之吾可出病宋末箋注之繁故不輕於著述云卒年七十九論曰昔楊時赴蔡京之薦朱子譏之與弼雖不拜官第石亨之薦不出可也其學無所概見所著康齋語録及上言十事無過人者要之力學修行儒之醇者也胡居仁胡居仁字叔心江西餘干人也從吳與弼遊慨然以斯道自任其學以主忠信為本以求放心為要以聖學成始成終在于敬因以敬名其齋至性純孝父病劇嘗糞味苦尋愈執親之喪水漿不入口久之柴毁骨立杖而後能起三年不入寢室月朔之薦四時之享及緦功之喪動遵古禮簞食瓢飲處之泰然四方從學者築書館居之語學則曰為已語治則曰王道所著有居業録敬齋集論曰世所稱尊德性道問學者判為兩途亦異乎孔門博約之旨者矣觀胡公之居業録平實簡易粹然一出於正不其博學于文約之以禮者乎陳獻章陳獻章字公甫廣東新會人也身長八尺目光如星右臉有七黑子生之前夕其母夢白龍入室其光如晝幼秉竒悟中正統丁卯鄉試會試不第聞江西吳與弼講學臨川遂棄其學而學焉丁亥遊太學祭酒邢讓試獻章和楊龜山此日不再得詩讓覽之驚曰龜山不如也為揚言于朝以為真儒復出由是名振京師羅倫章懋莊泉賀欽輩皆與遊欽時為給事中聞獻章議論即日解官去獻章歸四方學者日益衆壬寅以布政使彭韶都御史朱英薦赴京師召試吏部辭疾不往上疏乞歸養授翰林檢討上表謝不辭而去教人以主靜為先或勸之著書不答𢎞治庚申卒所著有白沙集同時有陳真晟字剩夫漳州人也以主敬為學嘗獻書闕下請補正學不報論曰自薛文清公倡性理之學于河東後臨川有吳與弼新會有陳獻章者皆以盛名徴薦即其學無甚相逺要皆有志希賢其不失為君子儒者與賀欽賀欽字克恭遼東廣寧人也成化丙戌進士授給事中聞南海陳獻章講性理之學抗疏解官去執弟子禮孝皇初以大臣薦授陜西布政司參議上疏懇辭陳四事一曰資真儒以講聖學謂今日急務莫先于講學而經筵勸講之官所謂師友之臣尤當訪求真儒以充其任不宜茍以俗儒厠其間二曰薦賢才以輔治道謂歷事監生陳獻章天性髙明學術純正誠當世之大賢為士夫之矜式宜以非常之禮起之或任之內閣俾參大政或任之經筵使養君德三曰遵祖訓以處內官謂內府監司局庫衙門之設載之祖訓內官之條其職掌不過灑掃供養關防出入等事而已奈何近年以來如王振喜寧舒良王誠曹吉祥牛玉汪直尚銘梁方陳喜之輩或陷主邊庭身叛外境或主易儲君禁錮南內或謀為不軌賄易后妃或邀功啓釁流毒邊徼或恃寵招權納賂不資或引用左道蠱惑上心或導進淫巧盜虛府庫此其陷君誤國蠧政殃民昭昭在人耳目者也宜深鑒已往之弊永絶方來之禍內不可使職掌奏牘得預大政外不可使鎮守地方掌握兵權四曰興禮樂以化天下謂陛下紹基之初罷黜浮屠妄誕之邪術舉行朱子喪葬之正禮真所謂守成業而致盛治也但初政之施僅發其端故頽敗之俗尚仍其舊禮讓未行淫穢日甚乞申明正禮之當行革去教坊之俗樂則國不異政家不殊俗而風俗自美民心自善矣疏入朝廷允其辭而四事黜以浮泛罷之正德己巳逆瑾括民田東人驚疑義州民聚衆縱火劫財城中擾亂相戒毋驚賀公鄉人請欽往撫之衆皆羅拜乞生路欽曰渠輩既知悔即不殺人猶可活鎮城有體勘人來渠輩但乞命毋殺人已而體勘人果至須臾人報發軍來勦衆復呼譟相聚曰賀君素無誑言再往問之欽曰城中擾亂至此鎮城焉得不發兵兵雖至爾等苐不殺人無害也衆唯唯退城中竟不傷一人欽家居杜門潛心理學清修篤行鄉閭化之稱曰醫閭先生論曰孔子稱言忠信行篤敬雖蠻貊之邦行矣賀公篤信力行而鄉閭服之卒使強悍之徒投戈革心謂非忠信篤敬之驗乎陳茂烈陳茂烈字時周福建莆田人也少喪父補興化衛總旗晝入公署夜歸讀書祖母憐其孱弱亟止之乃韜燈默誦不少輟年十八慨然歎曰善學聖人者莫如顔曽顔之克己曽之日省學聖之法也作省克録以自考𢎞治丙辰登進士從陳獻章遊教以主靜作靜思録授吉安府推官政務大體豪家利寡婦財誣許婚斷從守志妻有夫死而嫁其孕妾者既生子歸承其業族人爭之驗類其姊爭者愧服考績歸至淮幾凍死所知覆以敝裘救之拜監察御史劾罷尚書侣鍾尋以母老乞終養躬灌園以給出則手執小油蓋卧破席無帷吏部以茂烈孝養清苦奏改為晉江教諭資其祿疏辭不拜復援侍郎潘禮事例奏給月米制可有司月給米三石復具疏辭不許母卒哀毁成疾亦卒御史王應鵬列狀以聞詔表其宅里曰孝亷祀之鄉賢恤其家論曰自孝弟力田之風微而世之希寵祿干榮名者率以文藝炫于是獨行之士不少概見于世若陳君者其獨行君子與今獻備遺卷二十六
