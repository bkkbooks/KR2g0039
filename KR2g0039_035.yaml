front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_035-1a, image: WYG0453/WYG0453-0693a.png}
body:
  text: 今獻備遺卷三十五明項篤夀撰謝鐸謝鐸字鳴治浙江太平人天順甲申進士選翰林庶吉士授編修奉旨校勘通鑑綱目上疏言宋神宗喜通鑑理宗好綱目而不能推之政治因勸求賢講學以史册質經傳窮義理則大本立而萬目自隨矣歷升南京國子祭酒上疏請增楊時從祀而黜吳澄復疏擇師儒慎科貢廣載籍復會饌均差遣尋改北雍請增號舍修堂室以廟門衢面多狹斜買地廓之買官廨三十餘區居學官以省僦直皆出夫皂雇役羡籍之于公諸生貧困者有給死者請京府致賻給驛歸其喪凡所建白皆師古義持獨見不徇俗希世也所著有方石文集及赤城論諫録赤城詩集刻方遜志集以傳仕終禮部右侍郎卒贈尚書諡文肅論曰謝公發迹藝林兩司辟雍矩嚴道立無忝師模方毅簡潔卓然罕儔矣黃孔昭黃孔昭字世顯浙江太平人天順庚辰進士歷升文選郎中嘗曰國家用才猶農積粟粟積于豐嵗可以濟飢才儲于平時可以濟事茍負矯激以閉門謝客為髙天下人才何由知之公退客至輒延見詢訪有所得即書于册參之輿論用之各當其才雖小官不忽也勢要干請輒力言其不可或不能盡沮其人多自敗在文選者十五年稱知人仕終南京工部右侍郎論曰世稱文選為庶官衡鏡百度樞機人才進退理亂繫之非律己嚴而知人哲者安能稱此任乎黃公開門以禮天下之士而苞苴自不敢入宜其用無遺才而比無私昵也張元禎張元禎字廷祥江西南昌人天順庚辰進士改庶吉士授翰林院編修憲廟即位請行三年喪上陳四事曰講學曰聽治曰用人曰風化以病告歸家居二十餘年潛心理學𢎞治初召修憲廟實録進春坊左贊善上疏勸行王道反覆幾萬言實録成升南京翰林院侍講學士乞歸養母召修大明會典為副總裁升翰林學士侍經筵日講時孝皇意向元禎就聽之進南京太常寺卿修歷代通鑑纂要復召為副總裁改太常寺卿兼翰林院學士仍侍經筵日講併侍東宫講讀命掌詹事府事司內閣誥勑上疏勸經筵講太極圖及西銘性理諸書東宫講孝經小學孝皇嘉納亟索太極圖以觀曰天生斯人以開朕也將大用之竟不果仕終吏部左侍郎論曰張公好理學負盛名家居三十年以纍薦起奮躋清華終不免于讒口夫一人之身而先後毁譽頓異若此蠅聲雷同自古然矣夏寅夏寅字正夫直𨽻華亭人正統戊辰進士除南京吏部主事進稽勳郎中拜江西按察副使専董學政復文信國祠葺白鹿書院修陶侃讀書臺以風勵學者升浙江參政處州民有苦虐政走聚山谷者招之不聽曰須夏參政來乃可寅下檄即散復業進山東右布政使嘗疏論國家之勢在離合合則安離則土崩今兩京並建其勢宜常合以制天下徐州地連山東飢饉無聊宜賜賑恤臨清乃南北咽喉或暫梗焉為害不小宜選大臣有實望者鎮守訓兵屯田示天下形勢有旨出白金四萬兩賑徐而命都御史賈俊鎮臨清焉他所論列若文廟禮樂之數正風俗立紀綱崇文化作文材之類雖不盡用識者韙之嘗語客曰君子有三惜此生不學一可惜也此日間過二可惜也此身一敗三可惜也客以為名言論曰夏公好論建其所議臨徐利害誠天下大計惜任事之日淺雖不究其用然督學政亦略概見矣王鴻儒王鴻儒字懋學河南南陽人少竒穎工書楷為諸生提學副使陳選試其文驚曰是經世之文非舉子業也成化癸卯舉鄉試第一丁未舉進士授南京户部主事遷員外郎𣙜稅淮安鳳陽皆著聲績遷山西提學副使抑浮崇雅先行檢而後詞華品藻不失因才開發終日面命不倦多士歸心焉孝皇一日與劉大夏論人才曰如山西副使王鴻儒他日可大用對曰此人才行不易得誠如聖諭歷遷吏部左侍郎以甄拔為己任博綜經史尤明習國家故事官至南京户部尚書卒諡文莊論曰王公操履端純學問博洽文行政事蔚然一時生有令聞沒有美諡夫豈溢哉王雲鳯王雲鳯字應韶山西和順人也成化甲辰進士歷官禮部郎中𢎞治丁巳上疏詆中貴闢左道人為危之上知雲鳯名置不問是嵗冬駕還自泰壇以事出知陜州遷陜西提學副使設四科以取士曰求道曰讀書曰學文曰治事建樓于正學書院廣收載籍以資誦覽取人首名節次文辭斥貪殘拔正直禁止僧道師巫邪術尚嚴威不姑息士始不堪而終服其公其所引進皆知名士仕終都察院副都御史論曰語云三晉多豪傑王公非其人歟即其侃侃竒氣不屑脂韋設教儷詞方正古雅可謂嚴師矣蔡清蔡清字介夫福建晉江人也成化甲辰進士授禮部主事調吏部尋復禮部乞改南未幾以病告歸起為江西提學副使故事三司以朔望朝王次日謁孔廟清言不可定朔望日先謁孔廟後往朝王寧庶人銜之及賀生日清又獨去朝服中蔽膝顧庶人素嫉都御史林俊以清俊所厚也乃益銜清清遂引致仕去逆瑾専政起清為國子祭酒命下清已卒清飭躬砥行動凖古人其學長於經義作易四書蒙引學者宗之論曰蔡公明經尤深於易其去衡部而乞南曹甘淡泊以逺權利知時審勢卒脫淮南之禍不庶幾哉見幾而作不俟終日者乎今獻備遺卷三十五
