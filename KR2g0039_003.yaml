body:
  text: 今獻備遺卷三明項篤壽撰傅友德傅友德者宿州人徙居碭山元末從李喜之起兵山東既歸明玉珍不能用乃率所部走武昌從陳友諒辛丑上攻江州至小孤友德率衆降上使將兵從常遇春攻廬州友諒圍洪都從上親征大戰彭蠡友德以樓船犯其前鋒身被數創戰益力殺數百人復與諸將邀擊江口友諒死復從上親征武昌督兵攻城城東南有山名高冠下瞰城中上問諸將誰能奪此山者友德即率萬人先登一鼓奪之矢中靣及脅下鏃出腦後不顧武昌平以功擢雄武衛指揮使與徐達攻拔廬州取夷陵衡州襄陽攻安陸身被九創擒其守將任亮取淮東泰州進攻淮安破張軍于馬騾港大破竹貞兵于安豐所過焚元積聚吳元年守徐州王巴拜遣驍將李二來寇伺其出掠乃將步騎二千泝吕梁搶舟登陸擊之賊將韓乙迎戰友德躍馬奮槊刺乙墜馬賊敗走友德度李二必益兵來鬭趨還城開門出兵陳于城下令士卒卧鎗以待聞鼓聲即起擊有頃李二果至友德鳴鼓士皆奮起鬭賊大敗生禽李二獻俘京師上勞賞之拜江淮行省參政大將軍徐達等北征中原上諭之曰征伐奉天命平禍亂安生民參政傅友德勇略冠諸軍可領一軍使獨當一靣復諭友德曰此行當努力今用師自山東始汝其勉之進攻沂州斬王宣下青州敗元將伊蘇兵取萊陽洪武元年取東昌棣州樂安攻克汴梁河南洛陽及諸山寨關陜平上命取元都友德引兵渡河取衛輝彰德遂下廣平克臨清德州滄州通州進克元都復將兵偵邏古北諸隘口追元殘兵所獲輜重無算略大同而還徇下保定中山真定略平定州遂克太原初庫庫特穆爾自太原出鴈門將由居庸以攻北平友德同大將軍等乘虛徑搗太原擴廓至保安州聞之還師來援其鋒甚鋭萬騎突至友德帥敢死士擊却之因夜伏兵襲其營庫庫方明燭坐帳中聞變遁去友德追至土門關不及而還獲甲士四萬餘敗元將賀宗哲於石州擊走四大王及竹貞兵敗圖魯卜于宣府同大將軍取陜西下鳯翔鞏昌臨洮攻克慶陽陜西悉平三年復命友德同大將軍等出潼關以搗定西敗王巴拜兵巴拜北遁乘勝取蜀友德為前鋒出秦州奪略陽關擒僞夏平章蔡琳遂入沔州分兵由鳯翔入連雲棧合攻漢中克之尋以餽運不繼還軍西安夏將吳友仁寇漢中守將金興旺遣人來救友德率精鋭三千攻斗山寨下令人持十炬燃于山上友仁軍望見列炬起大驚夜遁去大封功臣封潁川侯是年冬命將分道伐蜀湯和廖永忠等由瞿塘趨重慶拜友德為征西前將軍由秦隴趨成都上密諭友德曰蜀人聞西伐必悉精鋭東守瞿塘北阻金牛以拒我師若出其意外直搗階文門户既隳腹心自潰矣友德受命馳至陜集諸道兵揚言出金牛潛使人覘階文守備單弱引兵出陳倉攀緣山谷晝夜兼行直抵階州守將丁世珍率衆拒戰擊走之克階州遂趨文州蜀人斷白龍江橋以阻我師友德督兵修橋以渡破五里關拔文州渡青川杲陽白水江蜀人望風驚遁遣人諭降之引兵趨綿州阻漢江不得渡下令軍中造戰艦百餘艘以濟師欲以軍信達湯和而山川懸隔適江水暴漲乃以木牌數千書克階文綿州日月投漢江順流而下蜀守者見之咸解體尋拔漢州初夏人聞王師伐蜀命丞相戴壽太尉吳友仁等悉衆守瞿塘及聞友德破階文乃分兵還援漢州以保成都未至而友德已逼漢州向大亨悉兵出戰城下擊敗之壽等至友德下令曰彼勞困逺來聞大亨敗衆必洶洶可一戰禽也乃親督兵迎擊壽壽大敗遂拔其城是時湯和駐兵大溪口未進上引友德冒險克敵功責之而和亦得木牌於江流遂進師趨䕫州友德進圍成都戴壽向大亨等出城戰以象載甲士列于陳前友德命以弓矢火器攻之象中矢却走壽兵躪藉死者甚衆友德亦中流矢㑹湯和遣人報重慶之捷壽等遂無鬭志乃降分兵徇下州縣之未附者克保寧執吳友仁械送京師蜀地悉平師還論功御製平蜀文以旌之五年副征西將軍馮勝北征沙漠敗實喇罕于西涼至永昌敗多爾濟巴勒攻甘肅射死平章布哈降太尉瑣納住等六年大軍復出鴈門西北巡長城外友德為前鋒敵逺遁追獲平章鄧博囉特穆爾軍還留鎮北平上疏陳五事上嘉納之召還從皇太子諸王講武荆山下九年屯兵延安以備巴延特穆爾設伏大破之其麾下縛巴延特穆爾以降上將平雲南命友德巡行川蜀永寧雅播等處修城郭治關梁於是金筑普定諸山寨酋長相率來降十四年同大將軍出塞討元平章鼐爾布哈等渡北河敵騎遁友德選輕騎夜襲灰山克之九月拜征南將軍藍玉沐英副之統兵三十萬征雲南上諭之曰朕覽輿圖取之之計當自永寧先遣驍將别率一軍向烏撒大軍宜自辰沅入普定分據要害乃進兵曲靖雲南之喉襟彼必併力以拒我師出竒取勝正在於此既下曲靖三將軍以一人提徑兵趨烏撒應永寧之師大軍直搗雲南彼此牽制疲於奔命破之必矣雲南既克宜分兵徑趨大理勢將瓦解其餘部落可遣人招諭不煩兵也友德至湖廣分遣都督胡海等率輕兵五萬由永寧趨烏撒大軍由辰沅趨貴州攻普定普安下之進取曲靖梁王巴咱爾斡爾密遣平章達爾瑪將精兵十餘萬拒我師友德用沐英計倍道疾趨未至曲靖數里忽大霧冒霧至白石江頃之霧霽敵大驚我師陽渡江而潛遣數千人從下流以渡出其後遍樹旗鼓達爾瑪急撤軍禦而我師畢濟矣友德麾兵大戰矢石齊發聲震天地縱鐵騎搗之敵大敗生禽達爾瑪俘其衆萬計悉縱使歸本業遂平曲靖友德自將兵擊烏撒城之分遣副將軍下雲南梁王走死通畢節克可渡河於是東川烏䝉芒部諸蠻皆震讋降附進克大理禽土酋假世分兵略下鶴慶麗江金齒車里平𬗟皆降烏撒蠻復叛討破之復遣兵搜捕蠻黨未服者靄翠欵附蠻地悉平上數遣使勑勞友德十六年上命長興侯耿炳文往諭友德等班師友德乃因其土俗定賦稅廣屯田興學校創設諸司邊境以寧十七年凱還進封穎國公十九年再征雲南二十二年復統畨漢軍討曲靖普安等處蠻平之二十三年征沙漠至迤都山禽鼐爾布哈復征西路寧夏二十四年北征追故元遼王方進兵遽下令班師敵信之少懈趣師深入掩襲其衆而還論曰明興猛將雲從六王最著以驍力稱者莫如常開平次傅潁國耳觀其下蜀掃滇踰險隘涉荒逺席卷飈馳功甚竒偉而用兵方略悉稟朝算有以哉廖永忠廖永忠者巢縣人楚國公永安弟也乙未永安與俞通海等以舟師迎高皇帝於巢湖永忠年少高皇帝曰汝亦欲圖富貴乎永忠對曰得事明主效展尺寸是所願也上大悅即以水軍屬永安而永忠副之從渡江定金陵取鎮江常州池州及江陰宜興纍戰皆先登有功戊戌永安陷於張軍永忠代總其兵授樞密僉院己亥攻破雙刀趙克復樅陽庚子同張德勝等大敗陳友諒於龍江升同知樞密院事辛丑從上伐友諒攻安慶破其水寨長驅入江州分兵攻下瑞州臨吉諸郡壬寅從取南昌癸卯攻廬州未下而友諒圍南昌甚急七月從上討友諒於彭蠡丁亥遇之康郎山戊子大戰徐達敗其前鋒永忠與俞通海等縱火焚賊舟而賊之驍將張定邊者直前犯上舟常遇春射走之永忠即以飛舸追定邊定邊走身中百餘矢士卒多死傷日暮收軍己丑復大戰以七舟載葦荻乘風縱火焚賊數百艘烟熖漲天湖水盡赤又明日庚寅永忠通海等以六舟深入搏戰賊聫大艦以拒我師望六舟無所見意已陷沒頃之六舟旋繞敵船而出我師見之勇氣百倍合戰益力聲動天地湖水起立賊大敗相持者逾月友諒移軍湖口欲遁走永忠督諸將橫截湖靣邀其歸路友諒敗死上還建康論功賜永忠硃牌鏤金字八曰功超羣將智邁雄師甲辰武昌平以功升湖廣行省左丞從攻廬州克之救安豐取江西未下州郡乙巳與徐達等攻下泰州丙午克高郵淮安從伐張士誠吳元年以平吳功進中書平章政事十一月拜征南副將軍㑹湯和討方谷珍降之遂自明州出海道取福州洪武元年以平章兼同知詹事院事攻破延平禽陳友定閩地悉平二月拜征南將軍同朱亮祖由海道取廣東遣人以書諭降元丞相何真潮廣循惠悉附攻破僞參政邵宗愚山寨諸郡皆下九真日南朱崖儋耳三十餘城皆傳檄而定遂進取廣西六月師入梧州至九月悉定廣西二年凱還上命皇太子率百官迎於龍灣入見上撫慰歡甚復命皇太子送永忠還第賜豫甚厚三年封德慶侯尋拜征西副將軍同湯和伐蜀四年克歸州進攻瞿塘以山峻水急蜀人以鐵索飛橋橫據關口我舟不得進乃密遣壯士數百人舁小舟踰山度關出其上流人持糗糧水筒以禦饑渴蜀山多草木令將士皆衣青簔魚貫出崖石間蜀人不覺也度已至夜率精鋭出墨葉渡分兩道一軍攻其陸寨一軍攻其水寨水軍皆以鐵裹頭船置火器而前比明蜀人來拒已破其陸寨矣頃之所遣將士舁舟出上流者一時俱發揚旗鼓譟而下蜀人出不意大駭而下流之師亦擁舟前進發火炮火筒夾擊之賊大敗走焚三橋斷其橫江鐵索禽斬無算永忠入䕫府明日湯和兵亦至分道並進和率步騎而永忠率舟師乘勝抵重慶次銅鑼峽明升遣使納欵永忠以湯和未至不受和至明升靣縛銜璧出降和受璧永忠解縛承制撫慰下令禁侵掠遣使獻俘京師蜀地平凱還論功詔曰德慶侯廖永忠破瞿塘下重慶功最大賞白金文綺賜第京師洪武八年卒初捷聞上親製平蜀文第其功曰傅一廖二復命劉基作平蜀頌以旌之論曰德慶侯兄弟從龍渡江首基王業而楚公獨困于豫且惜哉方彭蠡之戰也流血為湖僵尸成丘而永忠以六舟搏其千艘出沒洪濤輕捷若飛矢石雨下而意氣彌厲竟翦修鯨功冠諸將功亦竒矣滅吳掃閩席卷五嶺及破瞿塘搗重慶智勇俱奮功齊頴國非至驍俊疇克爾哉明升之璧降也俟湯公至方始受之從容推讓有足多者竟以小眚靳列上公惜哉俞通海俞通海字碧泉巢人江淮賊起父子結寨巢湖自守通海聞上駐和陽歸欵雙刀趙謀劫上通海密白上挾兵歸營曼濟哈雅陳兆先之戰皆敗其衆攻鎮江常州宣城敗吳吕珍進兵吳江中流矢右目失明再破雙刀趙復池州升僉書樞密院事從征友諒克銅陵搗九江掠蘄黃擊祝宗復南昌上率通海等西援友諒解圍東出鄱陽湖通海乘風火焚其舟率飛舸射中張定邊友諒死升中書省平章政事總兵略劉家港平廬州攝江淮行中書省事從征浙西克湖州轉戰至滅渡橋中流矢卒贈豫國公改虢國公諡忠烈侑享太廟張德勝張德勝合肥人集衆結水寨以舟師來歸至和陽營于新河授萬户渡江拔采石取太平擒陳額森擢管軍總管曼濟哈雅陳兆先復屯方山同太平公破之從取集慶大破方山營擒兆先克鎮江下常州宣州宜興普勝陷池州擊敗其柵于江口復池州友諒犯龍江德勝呼諸軍力戰敗走友諒降其將張志雄梁鉉喻國興劉世衍追友諒至采石戰殁贈蔡國公諡忠毅侑享太廟趙德勝趙德勝鳯陽人因母在滁陽軍中棄妻子來歸太祖為帳前先鋒從克和陽儀真敗方山營苗軍水寨收丹陽金壇廣德宣城戰毗陵湖州擢左副元帥伏友諒龍江下銅陵臨山寨出淮南征髙郵從破漢水寨走友諒收黃梅廣濟克瑞臨吉撫四郡旋鏖安慶降南昌南昌叛從復南昌臨江吉撫三城叛又復三城癸卯漢圍南昌公出戰射殺漢金指揮漢益急攻城且壞德勝先諸將死戰且戰且築城城壞復完巡城至東門敵發蹶張弩中腰膂箭深入六寸即拔出拊髀歎曰命也奈何卒友諒滅贈梁國公侑享太廟諡武桓耿再成耿再成五河人癸巳來歸從征授百户立功泗滁和陽建康鎮江升元帥守鎮江克揚州改守揚州宜興數被吳寇又改守宜興尋還守揚州取處州又改守處州先是士卒徵私粟民間號寨糧民苦公白胡參政盡罷寨糧壬寅苖帥叛公方與客飲聞變上馬收戰卒不滿二十人迎賊罵曰爾衆俘國何負汝乃反趣解甲降遂揮劒連斷數槊賊刺公墮馬死追封髙陽郡公侑享太廟加贈泗國公諡武壯桑世傑桑世傑無為人甲午與廖俞蔡諸公結水寨巢湖乙未納欵趙普勝畜異志公泄其謀上得歸和陽集商舟載勇士至黃墩攻敗普勝及曼濟哈雅趨入和陽諸軍大集即攻破采石鱭魚洲鐵長官水寨取太平擒陳額森曼濟哈雅遁擒兆先入金陵拔鎮江尋下金壇丹陽從圍常州攻寧國常州平升判行樞密院事取馬䭾沙克大浦口江陰下太湖收宜興尋與諸將攻江隂石牌海寇欒瑞陷陳死贈永義侯侑享太廟論曰俞張趙耿桑五公暨胡武壯者皆以力戰死其所摧敗功偉甚上公之褒侑享太廟與六王埓有以哉班史云朽骨枯于墓苗裔流于道放東漢之續元勳在録遺老者加之意焉今獻備遺卷三
