body:
  text: 今獻備遺卷一明項篤壽撰徐達徐達濠州人元至正癸巳滁陽王郭子興據濠達與太祖髙皇帝以兵屬焉達委心事太祖從授鎮撫勇略冠軍位諸將上乙未太祖為孫德崖軍所執郭子興亦方繫德崖達身易太祖歸而郭亦歸德崖以易達由是寵信日隆從渡江下采石太平虜元陳也先太平城下東取溧水溧陽所至輒克丙申從入建康拜大將軍浮江而下大破元軍克京口授鎮江翼元帥府統軍大元帥遷江南等處行樞密院同僉進攻毗陵擒張士誠弟張九六及其將張德丁酉克毗陵進僉院徇下寧國宣城取馬駝沙戊戌克宜興太祖征婺州達守建康己亥以池州功進奉國上將軍同知樞密院征皖城擊趙普勝軍浮山寨破之得潛山庚子陳友諒寇池州設伏破之張士誠陷我宜興攻復之辛丑進江南等處行中書省右丞從攻江州陳友諒走武昌屯兵夏口還守江州召還復命守江州比至友諒已先入城守與戰大破之壬寅取豫章進征武昌而友諒將康泰以豫章叛還擊擒之癸卯張士誠寇我夀春太祖往救之達為前鋒破士誠軍遂圍廬州而友諒復寇豫章詔罷圍來救豫章太祖督諸將征友諒師次彭蠡湖友諒軍精甚達先驅陷陳俘其軍友諒軍奪氣達還守建康我軍乘勝鏖戰竟殱友諒語在開平王事中甲辰進左相國武昌平略取廬州諸郡乙巳太祖下令伐張士誠拜達為大將軍常遇春為副帥師東下大破士誠軍吳興皂林下湖州進圍姑蘇達軍葑門常遇春軍虎丘有與滁陽王同名郭子興者軍婁門華雲龍軍胥門湯和軍閶門王弼軍盤門張溫軍西門康茂材軍北門耿炳文軍城東北仇成軍城西南何文輝軍城西北築長圍困之架木塔與城中浮屠等築臺三成曰敵樓下瞰城中上置弓弩火筒又置襄陽炮所擊輒破城中大震丁未達從軍中上封事太祖敕勞之曰古者帝王之興必有命世之士以為輔佐成周伐罪鷹揚奮興炎漢仗義羣策畢舉所以克集大勳肇啓隆祚者也將軍自昔相從忠義天性然且沈毅有謀端重有武故能遏絶亂略消弭羣慝建無前之功雖古豪傑不能過也今所請事悉欲稟命而行此賢臣事君之道吾甚嘉之然將在外君不御乃古道也自後軍中緩急將軍其從便宜行之姑蘇城破擒張士誠送建康得兵二十五萬師還封信國公賞賜冠諸將拜北征大將軍遂伐中原太祖諭諸將曰征伐以奉天命平禍亂安生民故命將出師必在得人諸將非不健鬭然能持重有紀律戰勝攻取得將體者莫如大將軍達宜專主中軍策勵羣帥運籌決勝不可輕動進克沂州王宣降取益都定兖州郡縣下濟南洪武元年太祖即皇帝位進銀青榮祿大夫上柱國録軍國重事中書右丞相信國公兼太子少傅克樂安泝河取汴梁李景昌遁去由虎牢關入洛陽攻潼關李思齊走鳯翔張思道奔鄜城遂入潼關狥取華陜禹許陳汝諸州及諸山寨太祖幸汴梁達還謁行在所渡河取衛輝彰德廣平趙州自臨清趨德州取長蘆師次直沽獲元海船作浮橋以濟師使副將軍常遇春都督張興祖各帥師水陸並進元丞相伊蘇等遁去進克河西務通州元順帝及其后妃走漠北遂入元都戮其監國淮王特穆爾布哈及左丞相慶通平章塔爾布斯保賽音布哈右丞相張康伯御史中丞摩綽等獲諸王子六人封府庫圖籍寶物及諸故宫殿門以兵守之使宦者護視宫人妃主禁士卒侵暴遣人至京師獻平元表承詔置燕山等六衛守北平分狥保定中山河間真定懷慶皆下西取晉冀澤潞元順帝聞我軍趨關中使庫庫特穆爾出鴈門道保安州經居庸關以攻北平達聞之與諸將謀曰庫庫率師逺出太原必空虛孫都督統六衛之師以鎮北平足禦之矣今乘其不備直趨太原傾其巢穴彼進不得戰退無所依兵法所謂批亢搗虛者也若彼還救太原進退失利此成禽耳諸將皆曰善乃引兵徑趨太原庫庫特穆爾至保安聞之果還軍救太原乃選精兵夜襲其營庫庫特穆爾遁去遂克太原得兵馬甚衆屯軍石州崞欣霍絳猗氏平陽皆下二年取鹿臺河中關中進克鳳翔議師所向諸將皆曰張思道之才不如李思齊慶陽易於臨洮宜先由豳州取慶陽然後從隴西攻臨洮此萬全計也達曰慶陽城險兵悍未易猝拔臨洮西通畨夷北界河湟得其人足備戰鬭得其地足共軍儲今以大軍蹙之思齊不西走塞則束手降矣臨洮既克旁郡自下也諸將然之進克隴州秦州趨鞏昌降元平章梁子中等遣右副將軍馮宗異征臨洮李思齊果不戰出降張思道走寧夏而使其弟張良臣守慶陽良臣懼而降達西征平凉良臣復叛達還督諸將攻慶陽拔之盡定陜西太祖賞平中原功達功第一賜白金文幣三年破王巴拜軍定西取興元西平吐蕃略地極西北乃還是冬大封功臣授開國輔運推誠宣力武臣特進光祿大夫右柱國太傅中書右丞相改封魏國公參軍國事食祿五千石賜誥命鐵劵賜第京師表其里曰大功坊五年北征還復命守邊歲鎮北平十七年太隂數犯上將太祖心惡之召達還京師明年薨追封中山王諡武寧賜葬鍾山之隂太祖親為製神道碑文命配享太廟塑像功臣廟位皆第一子輝祖襲封魏國公永樂改元以功臣子赦不誅卒長女仁孝皇后次代王妃次安王妃論曰髙皇帝起濠滁間創基建康躬親征討惟陳氏耳餘皆以命將而中山王功最大削楚平吳其次齊魯河洛燕晉秦隴不三四年屢殱元凶電掃雷驅威敵制勝未有及之者也且不自矜伐恪遵法守位冠元臣世享爵號宜矣常遇春常遇春者濠州懷逺人也勇力絶人初屬劉聚乙未聞太祖在和陽棄聚來歸未至困卧田中夢金甲神人呼曰起主君至矣寤而太祖騎從適至即與其徒歸附無何自請為先鋒太祖曰爾來就食耳若自有主吾弗能留也遇春涕泣堅請太祖曰爾且從渡江俟克太平事我未晚也太祖引兵薄采石磯元軍列陳磯上而磯下多大舟距岸三丈餘莫敢登者遇春乘輕舟繼進太祖麾之使前遇春即奮戈先登元軍披靡遂拔采石乘勝取太平授總管府先鋒進管軍總管丙申元中丞曼濟哈雅復屯兵采石南北路絶而將士多淮西人咸懷內顧太祖命遇春攻破曼濟哈雅軍尋命守溧陽從入建康功先諸將與徐達克京口授承信校尉領軍先鋒攻毗陵新軍反圍徐達于牛塘遇春督諸將夾擊大破之擒其驍將張德進統軍大元帥丁酉克毗陵遷中翼大元帥與徐達下寧國克馬䭾沙攻取池州戊戌進江南行中書省都督馬步水軍大元帥太祖親征婺州己亥轉鎮國上將軍同僉書江南等處行樞密院事守婺州攻下衢州進僉院攻杭州庚子召還京師與徐達攻破安慶趙普勝水寨陳友諒將攻池州聲言救安慶遇春策知之乃以羸弱守城伏鋭士於九華山友諒果攻池州伏兵起大敗之友諒既陷太平寇我龍灣復與諸將設伏破之太祖追襲友諒遇春守京師辛丑拜江南行中書省參知政事從取安慶江州還守龍灣張士誠寇長興遇春往救擊破之長興圍解壬寅羅友賢據池州神􅋖寨將與士誠合杭歙震動遇春攻斬友賢餘黨悉平張士誠遣兵圍劉福通於安豐從攻破之與徐達圍廬州城將下而友諒寇豫章甚急太祖帥舟師二十萬討友諒遇春解圍來㑹友諒即東出彭蠡湖以迎我師遇之康郎山楚軍乘上流傾國而來其鋒甚鋭遇春督諸將大戰縱火焚僞平章舟風急火熾烟焰蔽天湖水十里盡赤友諒將張定邊直前搏戰遇春射中定邊走友諒乃退保鞋山諸將以楚軍尚强請縱其去遇春獨無言太祖乃命諸將逆流而上列舟蔽江以控湖口凡十五日楚軍食少突出迎戰遇春復火攻之楚軍潰逐北數十里戰自辰至未不解太祖所乘舟及遇春舟皆膠于沙遇春力戰太祖舟乃得脫去而所乘舟復突重圍以出頃之友諒中流矢貫精及顱而死得士卒十萬張定邊復立友諒子理于武昌引兵合圍之甲辰理銜璧出降荆湖皆附進中書平章政事與徐達取廬州略下臨江之沙坑麻嶺十洞牛陂諸寨攻熊天瑞于贛州克之狥定南安南雄韶州還取安陸襄陽與徐達攻克泰州丙午克髙郵淮安濠泗徐宿安豐皆下進攻浙西擒張士誠將尹義于太湖直趨湖州之辨山水陸鏖戰張軍大潰遂圍湖州僞丞相張士忠悉發境中兵來援屯於舊館出我師之背遇春將竒兵繞出賊後結營東阡且填壅溝港絶其歸路士誠知事急親出兵拒鬭勝之士誠奔還遣其將徐義統赤龍船親軍來援復敗之烏鎮舊館降將兵六萬狥湖州李伯升出降湖州下遂圍姑蘇擒張士誠進中書平章軍國重事封鄂國公拜為副將軍命與徐達北征中原戊申春正月太祖即皇帝位進銀青榮祿大夫上柱國兼太子少保攻下山東諸郡取汴梁進攻河南元軍五萬人陳洛水北遇春單騎突入其陳敵攢槊刺遇春遇春一發中其前鋒大呼殺入悉俘其衆河南平渡河取河北諸郡進攻元都克之下保定中山真定趨太原元庫庫特穆爾帥衆來禦遇春與徐達謀曰我騎兵雖集而步卒未至不可以戰莫若選精騎夜劫敵營其衆必亂主將可縛也達從之庫庫特穆爾果敗遁去進攻大同竹貞棄城走河東下西入秦張良弼走李思齊降奉先鳯翔鞏昌臨洮皆下元伊蘇侵通州詔遇春還擊之遂搗永平趨大寧伊蘇遁去攻破開平元順帝北走追至北河獲宗王三人及平章鼎珠等得軍萬人車馬無算還師次栁河川薨贈翊運推誠宣德靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡忠武配享太廟及功臣廟位皆第二子茂襲封鄂國公論曰開國初忠武常公獨以驍勇著聞友諒地廣兵强勢居上游僭竊閏位彭蠡之役空國而戰可不謂徑乎而忠武公獨賈勇死戰方其走張定邊脫髙皇舟一何壯也髙皇帝嘗曰當百萬衆勇敢先登摧鋒陷陳所向披靡莫如遇春信哉李文忠李文忠者字思本泗州旴𣅿人也父禎隴西恭獻王尚曹國長公主生文忠年十二而公主薨隴西公攜文忠走聞太祖在滁陽謁上大喜即收養文忠丁酉以舍人領軍策應池州陳友諒寇池州擊敗之戊戌攻下青陽石埭太平旌德敗元判院鄂爾和萬年街遂破苗獠于於潛昌化進次淳安夜襲破僞洪元帥營降其衆千餘㑹兵取嚴州授帳前左副都指揮兼領元帥府事守嚴州張士誠遣將率苗獠水陸奄至大敗之取所俘馘載巨筏中乘流而下賊見遁去己亥攻下諸暨壬寅苗獠蔣英賊殺越國公胡大海反據金華文忠馳赴之賊棄城走擢浙江行中書省左丞癸卯謝再興據諸暨以叛太祖命築新城於諸暨西以拒之再興誘連張士誠寇東陽擊破之甲辰升右丞乙巳士誠復遣僞司徒李伯升率衆號二十萬寇新城文忠去新城十里營于龍潭新城守將胡德濟以衆寡不敵請入城避之文忠曰我衆非彼敵彼謀非我敵謝𤣥八千人不破苻堅八十萬乎乃下令曰彼衆而驕我少而鋭以鋭當驕一戰可禽也文忠橫槊據鞍引數千騎乘髙馳下直出陳後衝其中堅手格殺數人出入陳中所向皆靡因督乘之賊大潰城中將士亦鼓躁而出呼聲動天地斬首數萬生擒僞同僉韓謙等六百餘甲士三千捷聞髙皇帝大喜徵入賜御衣名馬丙午命總水陸之師進克桐廬新城富陽餘杭杭州守將潘元明出降文忠入城令曰有敢擅入民居者斬卒有借民釜者即磔以狥由是內外帖然得兵三萬糧二十萬就加浙江等處行中書省平章事洪武元年討平閩寇二年拜偏將軍副開平王常遇春征進迤北敗江文清於錦川次大寧元將伊蘇逆戰敗之追至灣河斬其宗王慶生及其將鼎珠進克上都開平王薨軍中詔文忠領其衆大同受圍急文忠馳救之師次馬邑元邏騎數千猝至擊敗之擒其將劉平章進次白楊門擒四大王阻水為營敵乘夜來攻文忠堅壁不動以二營委之士皆殊死戰比明策其饑疲乃分軍為左右翼出擊大破之擒其將圖魯卜降其衆萬餘人進兵至孟格齊不見敵而還三年春授北征左副將軍總兵北伐出野狐嶺降其守將師察罕諾爾平章珠展克應昌獲元順帝孫滿達勒巴拉及后妃宫人諸王達官宋元玉璽金玉冊玉鎮圭大圭玉斚玉斧元太子北走追之不及而還擒元將江唐國公于中興進攻虹螺山悉降之師還上平捷表加右柱國大都督府左都督封曹國公同知軍國事四年蜀平詔文忠鎮撫五年同中山王征迤北文忠總東道兵取和林師至哈喇莾賚元師遁文忠曰兵貴神速千里襲人難多重負乃留東平侯韓政守輜重臚朐河令士卒人持二十日糧兼程至土刺河元將曼濟哈喇章渡河列騎以待文忠督軍力戰追奔至稱海敵兵益集乃據險為營示以單弱敵疑有伏遁去軍還失故道乏水渴死者衆至格爾默色所乘馬忽以足跑地泉隨湧出六年出朔州擒元太尉巴延布哈七年詔總兵北伐駐兵代縣遣將四出至賽音布拉克擒其平章陳安禮瑪蘇翻至順寧陽門者斬其將珍珠律至白登者俘其國公鄧博囉特穆爾復攻大寧髙州大石崖克之斬其宗王托多實哩擒承㫖伯嘉努召還參軍國重事兼領國子監事十七年薨于京師子景隆襲封曹國公論曰岐陽王以肺腑至親遭際風雲東征西討所向輒克五出漠北克上都破應昌殘元竄匿繫孫子獲名王壯矣哉家居恂恂若儒生賦詩雅歌有祭遵遺風可謂允文允武萬邦為憲者矣鄧愈鄧愈者泗州虹縣人也父順興起兵臨濠與元兵戰死長子友隆代領其衆病死衆復推愈年十六出戰必當先破敵人服其勇乙未率所部歸太祖于滁陽充管軍總管渡江下采石太平入金陵拔溧水京口所至有功升元帥出守廣德長鎗謝元帥來寇廣德愈擊之俘其總管武世榮及軍士千餘人轉行樞密院判移戍宣州取休寧績溪乘勝克徽州浙江苗元帥率衆十萬來攻城愈與胡大海等分門出戰大敗之擊殺元帥特穆爾布哈斬首五百餘級獲士卒三千餘遂克婺源取嚴州攻破淳安縣賊金子珍降三千餘人遷同僉樞密院事尋轉僉院略浙江臨安大敗張軍鎮饒州陳友諒據江州數遣舟師來攻城愈屢殱其衆除江南行省參政仍兼僉院總制諸翼軍馬取浮梁樂平悉定饒地進攻江西鄧克明據撫州遣使通款而實無降意愈知其情即卷甲夜趨比旦入其城克明單騎走愈號令嚴秋毫無犯城中人爭持羊酒迎勞悉謝不受授江西行省參政鎮南昌友諒悉發國中兵圍南昌愈固守相持者三月太祖親征友諒大戰彭蠡湖友諒敗死與開平王合兵取贛州南安南雄韶州皆下進江西右丞加湖廣行省平章出鎮襄陽西抵巴蜀北控河洛新附之民未有定志愈撫以恩信逺邇恱服吳元年擢御史大夫洪武元年命大將軍經略中原而以愈為征戎將軍攻下唐州南陽隨州金商均房之境悉定三年拜北征左副將軍平隴西大敗王巴拜于定西招降河州土畨諸酋帥及朵甘烏思藏等部來歸者甚衆封衛國公五年拜征南將軍討灃州溪洞蠻平之九年吐蕃部落邀阻烏思藏使者掠其輜重命愈為征西將軍討之愈分兵為三深入覆其巢追至崑崙山斬獲無算召還道卒追封寧河王諡武順論曰友諒之順流而東也卷土合圍氣吞豫章頓兵城下者三月寧河王固守以待王師扼其喉咽使友諒進退失據者皆其力也卒之蹶康郎挫彭蠡一發盡殪不有所自哉即其作鎮八州威嚴敵愾恩信得人禮賢下能古名將不能過也湯和湯和字鼎臣鳳陽人也幼有竒志與羣兒嬉必習騎射為戲及長身長七尺倜儻多智略元至正壬辰滁陽王起兵濠州和仗劍率壯士千餘人從之時髙皇帝處滁陽甥館和委心推戴從攻滁州授管軍總管乙未髙皇帝取和州時諸將多滁陽部曲驕不盡禮惟和率所部聽命甚謹帝甚嘉和陳額森來攻和州擊走之從渡江下采石取姑孰因分兵取溧水句容丙申從入建業同中山王取京口升統兵元帥復同中山王取金壇轉同僉樞密院事丁酉克常州命和鎮守攻取江隂戊戌張士誠再寇常州擊却之癸卯大破其軍于陽山拜中書左丞甲辰遷平章乙巳擊斬江西賊姚大膽遂取永新州仍守常州吳元年㑹諸將取姑蘇擒張士誠除御史大夫兼太子諭德方國珍據溫台慶元三郡和督諸軍征之國珍懼乘大舶逃海島中遣人諭降之乘勝下福州洪武元年略定閩中諸郡擒陳友定以歸髙皇帝幸汴梁和扈從同宋國公馮勝取懷慶澤潞晉絳二年同中山王拔河中入潼關關隴皆平三年襲敗庫庫特穆爾取寧夏東勝大同宣府封中山侯四年奉詔征僞夏蜀人鎖瞿唐峽以遏舟師和以計敗之水陸並進遂搗僞都明升降五年北征窮追至和林八年移鎮彰德十年進封信國公同岐陽王練兵鳳陽十一年巡撫西河州繕完其城十四年北伐下灰山擒平章伯爾克及樞密副使文通十六年詔往四川永寧治墉濠飭士馬十八年五開山獠為亂和帥師討之夷其窟穴俘戮四萬人入朝乞骸骨上喜賜第於鳯陽復謂和曰日本小夷數擾東海卿雖老强為朕親視要害地築城戍守和乃築海上數十城民四丁取其一為兵以守之二十一年新第成賜歸鳳陽賞賫甚厚二十八年薨封東甌王追諡襄武論曰襄武王與髙皇帝比肩事滁陽同受寵信乃能識真主知所攀依可謂知矣久鎮常州力抗僞吳使帝無東顧得專意漢楚功亦不細至于擒士誠降國珍掃閩定蜀無一不與寵眷彌篤以功名終智矣哉沐英沐英字文英鳳陽之定逺人也少孤隨母避兵母病死無依八歲謁髙皇帝于濠陽髙皇帝憐而子之賜姓朱氏年十八授帳前都尉鎮京口稍遷廣信衛指揮使洪武元年復姓沐氏從東甌王定閩中纍升同知大都督府事九年乘傳安輯熙河十年副寧河王征畨西渡黃河略川藏耀兵崑崙山轉鬭千里俘獲萬計封西平侯十一年拜征西將軍征西畨平朵甘納琳七站拓地數千里十三年征和林略額濟訥渡黃河涉流沙偵報去穹廬五十里乃分軍為四翼銜枚疾走夜薄其營親督驍勇衝其中堅元國公托果齊等全部皆降十四年出古北口渡臚朐河獲知院李宣以歸雲南不庭詔拜潁國公傅友德為征南將軍英為副將軍討之繇辰沅出羅鬼攻下普定普安元梁王巴咱爾斡爾密遣其平章達爾瑪以精兵十萬拒我師于曲靖會天大霧冒霧趨白石江敵大驚以為自天而下也潁國欲濟師英曰我軍逺來利在速戰然步卒未集不若以計破之乃陳兵徉若渡者潛遣其兵從下流以濟出其陳後鳴鑼角樹旗幟以疑之陳動英麾軍泅水以渡大戰者良久率鐡騎撞之出而復入生擒達爾瑪俘二萬人梁王走死滇池島中狥下烏撒澄江惟大理不下乃分一軍夜從間道登㸃蒼山襲其背黎明英擐甲亂流攻破龍尾關進薄大理城攻破之生擒段世永昌鶴慶㑹川皆平悉定雲南地詔班師留英鎮守乃辨方物以定其貢賦視民數以均其力役節目疏簡人咸便之麓川緬車里八百媳婦皆內附然夷性反覆數叛輒討平之二十一年平摩和勒斬首千餘級緬思倫發以三十萬衆寇定逺英親將兵三萬討之始戰獲一象殺百餘人英曰吾知賊不足破也下令分軍為三多用火器間以長刀明日大戰乘風縱炮象皆股栗三軍夾擊呼聲震山谷殺其大將刀斯郎等蠻師大奔斬首三萬級俘萬人獲四十七象餘盡殪思倫發遂附自是平緬不復反矣二十六年薨于鎮追封黔寧王諡昭靖子春字景春年十七即隨英征西畨及從征雲南江西順天王賊皆先登襲爵西平侯鎮雲南數平蠻寇有功在鎮七年闢田至三十萬餘畞復民户五千餘鑿鐡池河灌田數萬畝民受其利春沈毅果敢明識絶倫綽有父風論曰黔寧王善用兵能以少擊衆方其踏崑崙踰流沙焚穹廬即霍衛弗能過也及其殱梁王定雲南作鎮十年數平蠻夷撫卒伍禮賢者政令寬簡西南晏寧匹美中山盛矣哉今獻備遺卷一
