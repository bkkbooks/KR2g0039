front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_023-1a, image: WYG0453/WYG0453-0634a.png}
body:
  text: 今獻備遺卷二十三明項篤夀撰楊瑄楊瑄字廷獻江西豐城人景泰甲戌進士拜監察御史天順初印馬畿內民羣訴曹吉祥石亨奪其田瑄具以聞併言其怙寵擅權之罪詔稱瑄敢言稱職命吏部記其名時彗孛連見二凶勢益張瑄與同官謀劾之事先泄亨與吉祥合謀上譖暨彈章入上震怒召諸御史至文華殿俾誦彈章而歷詰之瑄與御史周斌且誦且對歷陳二凶罪狀上怒不解悉下錦衣衛獄逼瑄誣引大學士徐有貞瀕死無一語他及有司文致坐瑄死而十三道長皆坐戍餘多貶奏上㑹京城大風雹拔木壞屋走正陽門下馬牌于郊外於是獄皆減論瑄戍鐵嶺衛赦還或謂瑄宜詣謝二凶瑄不可復戍南丹二凶誅詔瑄還里憲廟初以言官奏復拜陜西道御史尋升浙江按察副使巡海禁軍官私放戍卒五日一操閲奏增通判以理邊餉而革勢豪攬糧延師以教武人子弟凡城隍墩堠廨署舸艦兵甲悉繕治之修築定海捍海塘走馬堤及霩衢所裏外海塘健跳所海塘海鹽縣大海塘皆為永久利海鹽至今尸祀之奏濬西湖湮塞溉田十六萬頃成化丁酉諜報倭奴數百犯邊僚寀驚問瑄徐曰彼果來犯吾當盡誅之乃出巡寧波府衛已戒嚴守令呼民兵受甲矣瑄曰海上兵自足用內地安用此今農事方殷亟散之至定海乃知倭僅兩船入貢耳升按察使以憲度久弛力振之嚴門禁搜吏奸斷訟明決無留獄禁官署毋蠶桑以爭民利甫半載病作將革寮寀往問尚論築海塘之法浚西湖之利無片言及私子源𢎞治間任欽天監五官監候正德改元逆瑾亂政源上疏言占候得大角及心宿中星動搖天旋天機天權星不明請安居深宫絶逺遊獵罷弓馬嚴號令毋輕出入闢除內侍寵幸遊逸小人節賞賜止工役親元老大臣日侍講習詩書疏下禮部本部及科道稱源占候之言深切時弊源復疏言十月二十六日占候得連日雺霧交作為衆邪之氣隂冒陽臣欺君小人擅權為下叛上引譬甚力瑾怒矯詔杖三十釋之源又疏言自正德二年來一向占候得太星入太微垣帝座之前或東或西往來不一勸上宜思患預防意在瑾也瑾大怒呼源叱之曰爾何官亦學為忠臣乎復矯詔痛杖三十謫戍肅州行至懷慶卒于孟縣之河陽驛妻斬蘆荻覆尸葬之論曰楊公正色昌言首排曹石身貫三木幾死直聲震天下而源以京房之術伐恭顯之姦慷慨有父風忠直聲名與天壤俱可也練綱練綱字從道蘇之長洲人大父則成洪武初由春坊司直改河南道御史以直言受旌賞宣德乙卯舉鄉試第二入國子監歷事都察院正統己巳英廟北狩景皇帝即位上中興要務八事一謹天變二急先務三正軍法四布恩澤五廣言路六屏奸邪七公薦舉八察羣吏冬十月額森逼京城復上勤王急務謂敵勢甚猛非直要求金帛而已未必不欲效金人以汴宋待我也我國家固非宋比然求如种師道李綱其人亦未多見乞遴選武臣授以方略俟其深入乃奮擊之敕邊將勒兵內向邀其歸路設有倡為和議緩於武備且請南遷以圖偷安者即為姦臣宜急加誅以為衆戒疏入上竒其才授浙江道監察御史命施行其言景泰改元上時政五事辛未巡視兩淮鹽課按劾趙駙馬不法權貴斂戢壬申還朝復上軍國大計八事皆見嘉納時吏部缺尚書綱率諸御史言左都御史王翺嚴公峭直右副都御史年富操履端方大理寺卿薛瑄持正不回此三人者擇而用之上乃召王翺為吏部尚書以年富為户部而薛瑄亦相繼大拜先是京師有警召募四方丁壯𨽻勇敢營嵗久多逋逃大臣請治其罪編之尺籍綱上言召募之初諭以大義且許事定遣歸故健夫勇卒雲集京師爭先自效淹留日久恩寵未及饑寒迫身勢必逃避皇上好生何至使應募無辜之民𨽻尺籍刑賞失中莫此為甚方今水旱相仍流亡接踵搜求太急恐生他虞兼之邊務尚殷急於用武倘復召募誰其肯從有詔不問得歸復者數千人甲戌巡按福建時官臺山民聚為盜渠魁未獲而逮繫脅從綱釋之趣師勦捕追各典守者坐是忤衆按察使楊珏乃誣托綱于朝當道者多忌綱左遷陜西邠州判官再徙甘州前衛經歷部符未下綱已遭艱歸賦性剛鯁嚴於嫉惡遇事輒盡言院中語曰甌寧練綱口論曰綱以太學生慷慨論國家大計搏擊糾彈臺諌風生可謂能其官矣然遭蹶不復太剛則折奚足異乎張寧張寧字靜之浙江海鹽人景泰甲戌進士授禮科給事中遇事敢言每大議景皇帝必問張給事云何丙子順天府鄉試大學士陳循王文以其子下第歸咎考官寧奏大臣私其子而為暴才稱屈失大臣體不可居內閣乞罷免之英皇復位勵精因灾變御齊宫寧率六科上疏乞詔諸司凡秕政苛法所當芟改者悉奏舉行其不盡不實者許言官劾奏更乞澄心専慮轉移天心上優詔答之曹石専橫事關禮科者寧舉奏無避受知英皇嘗獨召寧論事多所匡益欲大用之未果憲皇初首勸經筵進講大學衍義薦起王竑李秉奏定鄉試舉人名額並俞行之有建言請以天縱二字加孔子者寧曰孔子道大德尊所貴明其理以行其道被之天下𫝊之萬世不在封號一名一字所能重輕議遂寢太監覃苞重寧纍見不往尋以㑹亦不謝成化改元皇太后令節建設齊醮大臣相率詣寺觀行禮寧奏言皇上表揚孝心慰悅聖慈無所不用其極人臣但當仰贊聖孝上綏懿祉不當崇奉釋老祈祝瓣香秪壞風俗傷名教耳南京給事中王徽等劾大學士李賢不職獲罪謫邊方寧率六科申救大忤賢㑹兵部薦寧與嶽正堪任侍郎都御史內批升寧知府得汀州以疾致仕家居三十年纍薦不起卒毛吉毛吉字宗吉餘姚人舉進士授刑部廣東司主事嚴明亷硬訊獄能折疑平反指揮門達怙寵作威人多避之吉獨與抗禮由是銜吉偵之無所得因吉失朝下錦衣獄衛卒羣吠脅之吉曰有國法在爾曹奈我何達聞愈益怒嗾健卒掄巨梃梃之見骨幾死吉自如遷廣東按察司僉事分巡潮惠黜墨吏摧强宗殄海盜民以寧輯代還潮惠人乞更借一年擒殺劇賊楊輝曽玊謝瑩破其寶龍石坑龍歸三洞斬俘甚多時廣西蠻賊滋蔓髙雷亷尤甚吉四顧悲憤慨然有削平之志至亷州內官監珠池者方繫數十人徴賄箠擊幾死吉盡釋之進擊雷州賊破之因條平賊方略奏之上嘉歎降敕奬諭升副使委總廣東軍務賊掠惠州河源縣督兵敗之賊走清逺守將都督僉事張通與戰不利吉馳救賊見其幟呼曰毛家軍來矣遂潰廣州新㑹縣告急吉敗之大磴賊走陽江縣營于雲岫山峒進擊敗之賊棄營走山上我師狃勝突入其營陳亂賊乘之師遂潰吉勒馬持刀大呼曰劄住劄住潰已不可遏從騎勸吉避走吉叱曰爾去吾誓不與此賊俱生奮而前揮刀斫賊不已力屈被害成化元年三月一日也是日晝晦風雷大作山谷震動踰七日得尸貌如生事聞贈廣東按察使諭祭賜賚其家録子科為國子生論曰張公以直言受主知竟不能盡用其才以死毛公有澄清嶺西之志氣亦壯矣師敗身夷豈造物所忌名與才耶今獻備遺卷二十三
