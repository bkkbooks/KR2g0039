body:
  text: 今獻備遺傳記類三總録之屬提要臣等謹案今獻備遺四十二卷明項篤夀撰篤夀字子長秀水人是編専採明代名臣事跡編為列傳起洪武訖嘉靖計二百四人蓋本袁袠所著而稍增損之明史藝文志亦載有其目其曰備遺者自序謂姑備遺忘蓋謙言之不敢以作史自任也明代文人類多留意掌故其以纍朝人物彚輯成書者如雷禮之列卿記徐紘之名臣琬琰録焦竑之國史獻徴録卷帙最為浩博而冗雜汜濫不免多所抵牾篤夀此書頗為明簡有法雖其中記載亦未能悉當如劉基飲西湖上見西北雲氣謂是天子氣在金陵我當輔之此術家附會悠謬之談今明史已刋削不取而篤夀乃著之基傳中實不免於輕信又如徐有貞之悍鷙李東陽之模稜張孚敬之偏愎皆未可稱一代完人而篤夀並推重甚至其進退亦為寡識然序述詳贍凡其間年月先後事跡異同皆可以為博考恭稽之助視他家之猥俗龎雜者義例較為謹嚴於史學未嘗無禆益也乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀今獻備遺原序世談昭代文獻者無慮數家大都略同而文直事核則端簡鄭公名臣記及古和雷公列傳為詳其他諸家皆可觀採而抵牾同異罕有統歸微隱節槩亦多疏濶間或委巷叢菆幽蔀俚雜讒夫嫁禍之口諛墓媚竈之篇文既不闕信寧可傳哉嘉靖初胥臺袁公博雅多聞起自開國逮于康陵公卿將相烈士才人崇勳懋德純懿孤稜稱首八朝者論次成編貫穿附離用意良勤矣篤壽病廢餘閒居多暇日輒不自揆稍加芟剪漫附臆揣姑備遺忘談者又謂陽秋古人義兼美刺今之所撰溢焉褒稱曽不知譽當有試他闕何妨即永陵以來名臣碩德彬彬有聞雖蓋棺論定良可考信而採托未備姑且已之其諸忠節佚事不可遺亦未可詳也録而藏焉聊以存厚亦以用諱云爾嗟乎生人每不幸世亦鮮有完人思亷史材也揚名祖父祇貽姍鄙休文詆毁裴宗招揚家醜妄意㸃人乃以自㸃所謂無言不讎即弄其文墨不足道也若乃天刑鬼禍尚口興戎昌黎之于栁州辨論詳矣可不畏哉項篤壽序
