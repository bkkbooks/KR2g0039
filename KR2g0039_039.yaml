body:
  text: 今獻備遺卷三十九明項篤夀撰胡世寧胡世寧字永清浙江仁和人𢎞治癸丑舉進士授湖廣德安府推官升南京刑部陜西司主事西寧矦家訟更九司十三道訟者老且貧矣世寧一閲得其情即日斷決富翁顧金箔誣致大辟為辨出之上疏言時政備邊十事一曰嚴考核以正士風二曰崇節儉以制財用三曰從權宜以足邊儲四曰立簡便以收鹽利五曰汰冗食以選將校六曰閲軍實以修武備七曰廣收蓄以儲將材八曰立經制以禦外侮九曰董將權以責成效十曰用間諜以覘敵情復應詔陳言六事勤學問廣延納公用人汰冗費重守令慎輔導乙丑進山東司署員外郎機户顧謙侵官鏹纍萬世寧立正其罪謙乃干逆瑾訴下南道阿瑾者疏謙無罪劾世寧為枉牘上仍如世寧所擬謙發配阿瑾者竟抵重罰世寧以守正得免升廣西太平知府郡邊荒屬夷桀黠難制世寧撫以恩信而絶其私饋邊人皆服太平州土官李璿阻兵拒命久不能討潜檄龍英州趙元瑶捕縛之思明府黃文昌兄弟作亂大將徂征駐師太平世寧協贊方略與有功郡治三面阻江惟北面無險不可守建築壺關至今賴之擢江西按察副使備兵撫州東鄉東鄉賊巢也世寧撫馭反側甚有恩信其怙亂者擒殺之效順者為奏原其死遷縣築城民賴以安調征姚源大盜王浩八力疾提兵深入戰裴源山下十日三捷及征建昌毛坊盜皆有功因城廣昌又城南豐又城新城三縣遂免寇患宸濠反跡已著人莫敢言世寧發憤抗疏首陳江西賊情撫勦機宜因言江西之禍不止盜賊可慮者省城被火延燒萬室基地所便盡歸王府債負所責遍及閭閻莊田所逼民久立寨三司官員多受鈐束問刑參吏舉奉成案買辦漸行於外府騷擾遍及於窮鄉此不善處則良民不得安生皆起為盜臣下恐有隱禍多懷二心禮樂政令漸不出自朝廷地方之事益有可慮者矣又言寧王自討護衛以來威勢日盛乞推選大臣兼任提督巡撫假以便宜之權悉聼區畫更乞戒諭崇謙逺嫌遵依祖訓嚴戢下人有㫖令宸濠鈐束其下自是世寧厨廨門逵本貫舊任濠皆置人焉久之無所得乃擲前疏中語為離間親親奏逮世寧未下而世寧以升福建按察使離任矣臨發中毒下血幾殆巡按浙江御史忽遣官挾寧府私卒數十人誘執世寧世寧間道走京師投繫詔獄刑訊逾年世寧瀕死者數矣又數從獄中上書皆不報言官論救不已用事者迫於公議得減死謫戍遼東瀋陽中衛躬履行間授徒以自業撫鎮而下延致館穀皆不就凡四載濠反庚辰復湖廣按察使擢僉都御史敕撫四川嘉靖初進吏部右侍郎蒞蜀甫兩月首處松畨軍餉令近邊者輸租于邊而縮其額以所縮之額加徵內地內地勿輸邊復條奏急處重邊以安全蜀要在用人才添兵將更賞罰足財用四者而已被召上疏乞早定追崇之禮而赦群臣議禮不合之失因言宦官外職不可假以威權言官不可加罪藩臬守令不得其職纍數千言切中時弊䝉嘉納施行之乙酉召為兵部左侍郎進言保養聖躬在慎起居節飲食而已願慎用醫藥又撰講義三章以進疏皆留中引疾改南京吏部左侍郎拜南京工部尚書福建解料銀二萬兩皆赦前已徵者也所司以市價不讎欲令加徵世寧疏言各省未輸者盡聽蠲免而此解至者反欲加徵乎得請勿市料輸其銀于京師是秋以左都御史召還改刑部尚書用議者言特加太子少保仍左都御史掌院事入見辭免宫保首疏勸上虛心以執中聽言用人之道上嘉納焉既總憲務持大體奏上畫一之法申明職掌凡十條最後論執法被誣奪職者乞復其官詔以所奏付中外遵行而考察奪職者始許大臣言官論辨矣改刑部尚書凡中外諸司要囚劇獄皆研慮參訂務當情罪不以文法嫌怨禍福自沮至有獄械已成罪在不測衆莫敢言者世寧必奮身論救賴聖明感悟數見優納時刑官分録天下罪囚事竣悉審别當否品其勤怠不職者劾治之其因事建明得著為令者三復因災異陳言勤聖學一事恤民任官九事轉兵部尚書加太子太保陳兵政十事一定武略二崇憲職三重將權四增武偹五更賞罰六御土夷七足邊儲八絶弊源九正謬誤十惜人才已丑復上增武偹用人才足邊儲三事內薦都御史馬昊陳九疇副使施儒楊必進堪統軍旅而吏部言昊不可用世寧引疾求去三疏得致仕是年秋詔起為南京兵部尚書參贊機務不拜猶上疏勸圖廣嗣育容受直言愛惜人才庚寅卒于家賜諡端敏贈少保公雅志儉朴位居端揆布素如寒士門無私謁接引後進談論世務終日不倦嘗曰學貴經濟不在詩文因讀衍義補著膚見四卷居遼陽著春秋志疑十八卷幼精騎射及遇盜于滄敗楊虎劉六群賊述滄洲退賊事略一卷德安行稿太平寶慶雜稿各二卷姚源建昌征案東昌撫案共十卷撫蜀雜稿一卷讀易私記四卷詩文二卷自述年譜一十六卷奏議二十卷論曰方宸濠之謀逆也吏江西者劫於積威輒依違不遑間有循默自保觀望規避脫虎口於幸耳孰有奮不顧身如胡公者哉疏入禍發左右寢居皆逆徒也而間走得免及械繫掖庭備嘗百毒黨濠者批抵機穽幾陷不測賴御史徐文華等抗章申救末減逺戍而濠之逆謀始彰著矣已卯之變孫許駢戮朝野震驚向使當國者採徙薪之謀謹履霜之戒先事制變禍階何自生哉端簡鄭公謂胡公身不踰中人言期若不出口及論大政事決大疑侃侃諤諤守死不回居常憂國不遑寢食事有不可者即閉門草疏無少顧忌嘗憤守正者遭誣落職懇懇言之正色立朝孤立無與賴主上明聖曲加優納一時新進用事之臣雖極恩寵然上所敬憚者胡公一人而已見幾勇決進退有禮世尤髙之孔子所謂大臣莊助所云社稷臣若胡公者近之矣吳廷舉吳廷舉字獻臣廣西梧州人成化丁未進士知順德縣與陳獻章游時庶吉士鄒智以直言謫石城吏目廷舉敬禮之初市舶內臣每市物于縣縣輒還其直廷舉陽不知由是忤意升同知廣東盜起以薦拜兵備僉事征十三村池水諸洞賊平之兼理屯田鹽法㑹逆瑾查盤庫藏取內進銀衆以為當出于鹽法廷舉疏請留備軍需瑾大怒已而廷舉方劾岷府門正陳鶴買藥至廣多不法又劾總鎮太監潘忠數十事忠亦訐奏廷舉逮繫詔獄考掠無所得乃坐枉道還鄉罪枷號吏部門外九日死而復生謫戍鴈門㑹風霾變放為民瑾誅起雲南副使未行而江西姚源峒賊發乃升右參政往撫之為賊所留劫以威不為動居賊巢者數日乃稍以利賄其左右有力者使執其酋卒以平定升廣東右布政使疏立畨舶進貢交易之法定均平省驛遞以舒民困嶺西猺獞哨聚命兼兵備副使經略其事尋升右副都御史賑濟湖廣處分辰州土官讐殺得其情嘉靖改元升兵部侍郎改南京工部轉户部侍郎進右都御史巡撫南畿賑濟凶荒均補糧運抑遏豪右稱貸除積年供應之無藝者所至令人種蔬以自給升工部尚書致仕歸創東湖書院積書萬卷每夜必閲數卷乃寢家居二年卒所著有奏疏數百篇詩文數十卷論曰粵南荒徼自開國來名臣罕有聞者吳公清操特立卓偉不凡乃蒼梧桂林彬彬竒士間出斯焉取斯殆聞吳公之風而興起者與今獻備遺卷三十九
