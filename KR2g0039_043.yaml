body:
  text: 題今獻備遺後是編凡四十有二卷計二百四人所可考信者僅僅有此他所遺佚良不知其幾也諸君子者勳名德業即人人殊要之皆以心術為本而以正直忠厚行之故其立朝也有蹇蹇諤諤師師之風其居鄉也有雍雍肅肅溫溫之度而卑卑庸庸赫赫可喜者不與焉彼之容恱深刻猜媢險僻朝粵暮楚變面易辭者可以觀矣斯編也豈徒善足法哉然則思齊者固內省之一助也談者乃謂有美無刺紀事之體宜爾豈其然乎癸未至日篤夀再題
