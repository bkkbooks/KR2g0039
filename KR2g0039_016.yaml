body:
  text: 今獻備遺卷十六明項篤壽撰于謙于謙字廷益杭州錢塘人骨相異常年七嵗僧蘭古春見而竒之曰此他日救時宰相也書過目成誦為文如雲行水湧少補邑庠生以古人功業自期常夜行吳山道中人遙見燈燎騶從甚盛人及前視之乃謙也永樂中舉進士宣德初拜監察御史謙音吐洪暢每侍奏對宣皇必注聽都御史顧佐嚴甚獨器重謙巡按江西平民被誣為盜辨出之王府官屬驕橫奏黜數人代還同錦衣衛官校搜捕馬快船夾帶私鹽不避權貴悉置之法上親征漢庶人命謙移檄稱旨由是上屬意謙河南山西災命謙為兵部右侍郎巡撫兩省在河南謹備荒飢預防河患凡山東陜西流民編立里甲以居之且給田為業在山西革大同鎮將役占軍士盡入其田為軍屯請留京操軍修築鴈門奏減柴炭乞停徴流民舊欠稅嘗夜行經太行山遇羣盜從者駭愕謙厲聲叱曰汝何為者盜驚散走山西參議劉宗孔以清嚴受贓誣謙上章白其事正統十一年乞致仕舉參政孫原貞王來以自代時王振用事御史有姓名類謙者常忤振振疑即謙也嗾言官劾謙擅舉自代罷為大理寺左少卿兩省民赴闕下乞還謙而親藩亦以為請乃復任明年召還為兵部右侍郎十四年額森侵邊境至獨石馬營詔親征謙與尚書鄺野請將無煩六師固留不聽八月十五日師駐狼山土木衆騎奄至天子北狩報至京師大震謙慟哭誓不與敵俱生太后命郕王監國是日科道官廷論王振郕王方攝朝倉猝未有處分錦衣衛指揮馬順素黨振呵衆官起去給事中王竑首起捽順捶死于廷且索振所親信二內侍班行喧雜無復朝儀大臣多驚避謙固立不動郕王亦疑懼屢欲退謙直前掖扶王請留且請降旨諭羣臣復班勿擅動振罪宜族俟請命太后行誅順罪應死勿論命紅盔將軍以金瓜擊二內侍立死衆乃定退朝漏過午刻矣謙袍袖皆裂徐步出左掖門吏部尚書王直執謙手曰今日事賴公王直何能為謙辭謝避進兵部尚書首列扈從失律顧興祖王佐等罪郕王即位遙尊英廟為太上皇帝改明年為景泰元年謙入見泣曰邊人不道遮留皇輿既已得志必將深入宜早為計頃者各營精鋭盡揀隨征軍資器械喪棄略盡宜即召募官舍餘丁義勇起集民夫替還漕卒以備操調令工部分局併工督造戰守具京師九門為最要宜令都督孫鏜等分兵以守而選給事中御史如王竑者佐之徙城外居民於城內使彼無所掠通州倉糧數百萬不可棄以資敵宜令在官食糧者悉詣關支隨其所欲多寡受糧而歸官籍其數以準月糧誠兩便大同宣府經其剽掠請勑守臣協力防禦訓練士馬挑濬壕塹凡關隘墩臺樓櫓務使有備文臣如輗者宜令巡撫武臣如楊洪柳溥者宜為將帥凡軍旅之事臣請身任其責不效則治臣之罪上嘉納即施行焉時羽檄交馳人情恟懼而謙勇氣彌厲剖斷若流旬日間戰守略具衆恃謙為安太監喜寧邊種也土木之潰降額森為之鄉導奉太上皇趨紫荆關京師戒嚴朝臣多南奔或倡議南遷謙慟哭抗言于庭曰京師天下根本宫廟山陵社稷及百官萬姓帑藏倉儲在此此而不守去將何之宋南渡事足可監也議遂定主將石亨請閉九門堅壁以避其鋒謙曰不可是示弱也請率先將士躬擐甲胄出營德勝門外乃閉門以示必死日涕泣以忠義拊循三軍軍皆感奮爭死敵十月朔額森入紫荆關聲言送駕還京師前驅突至我軍堅不為動知有備稍引却額森擁太上皇至城下索金帛萬萬計且邀大臣王直胡濙及謙出和禮部遣使問謙謙曰今日之事知有戰而已他非所敢聞對壘者七日是月既望諜報太上皇移蹕去敵壘稍逺下令發炮擊其壘死者萬計而大學士陳循復請旨寫榜文潛遺敵營中有能斬額森首來獻者賞萬金封國公以疑其心額森果宵遁或請追擊不許京師解嚴論功加少保總督軍務或言今日宋李綱不如也謙曰四郊多壘卿大夫之恥城下但不盟耳敢言功乎大同參將許貴奏遣使議和以緩邊患謙言去冬嘗遣指揮季鐸嶽謙齎金帛以往敵輒深入繼遣通政王復少卿王榮往議迎復不見上皇而回敵情譎詐和不足恃邊將邀求無厭莫若選將練兵養威蓄鋭無輕遣使從之奏增兵涿鹿真保定易州及白羊紫荆倒馬諸關以衛京城諜報敵逼總兵朱謙於關子口明日復報追石亨於鴈門關甚急衆議急發兵救之謙不動奏上方略密授亨等令挑選精鋭若將尅日大舉者尋報敵已出境復以計密授楊俊擒喜寧送京師廷劾其罪誅之繇是額森遣使入貢請送駕還京師朝廷疑未之信下廷臣議謙曰此天意也君臣大義兄弟至親當速奉迎以承天意倘彼不信則我有辭矣乃遣侍郎李實及楊善等以往辛未九月駕至自邊庭時河間東昌永樂中安置降人甚衆額森方入冦欲乘機竊發謙因南征奏遣之天壽山陵寢所在而無城郭乃奏城昌平徙兵民守之臨清通商引漕京師之襟喉額森入冦謀據之奏遣平江伯陳豫築城以守初獨石馬營八城為敵所據議者欲棄之謙曰棄之則宣府懷來難守而京師將動搖矣奏用都督孫安授以方略率兵度龍門關且戰且守八城復完謙以京軍𨽻五軍神機三千諸營者不相統一或遇調發兵將不相識請選諸營馬步軍十五萬分為十營每營以都督一人總之每五千以把總都指揮一人領之每千以把總指揮一人領之每隊用管隊官二員團結訓練體統相維兵將相識有警調某營則自都督以下督率以往名曰團營楊俊請盡出團營兵併三邊各路軍馬大舉伐之謙曰不可如此則京師各邊皆空虛彼或分兵牽制何以應之非萬全之道也俊議遂寢時閩浙則有鄧茂七葉宗留廣東西則黃蕭養相繼煽亂殘破郡縣謙懸制遙度談笑折衝雖在萬里外若親厯其地咸就勦滅貴州苗賊反侍郎何文淵乞罷布按司復置宣慰司以土官蒞之而留都司以轄諸衛遣大將鎮守其地謙言貴州自祖宗創置已久豈可以小醜輕棄之何議竟不行上以謙軍功授其子冕副千戶賜第京師謙懇辭不許乃以所賜玉帶蟒衣盔甲金帛諸物移置第內封識加謹間一往視焉謙患痰疾上遣太監興安及太醫院使董宿來視云此非竹􅅹不愈安言之于上且述謙自奉甚約上親幸萬嵗山伐竹以賜仍命計所資用出尚方給之謙握兵久且功髙為衆所忌而石亨素貪縱數為謙所裁亨姪彪驍猛善戰同握兵居京師謙患之出之大同二人皆怨謙思傾謙矣丁丑正月英廟復辟亨與有功遂誣謙迎立外藩與大學士王文等俱下獄所司以金牌勑符具存禁中他無顯迹而亨等必欲殺謙所司遂以意欲二字附會成獄死之時天日無輝太監吉祥麾下有逹官托爾者聞謙死慟哭都市酬以壺漿祥責之明日往哭如初都督陳逵密賂守者收謙尸瘞之有司籍其第惟朝廷所賜物而已初土星犯太微上相杭之西湖水竭土裂孫原貞方以尚書鎮浙語人曰賢才之生實鍾山川之秀湖之竭哲人其萎乎至是乃驗謙長身山立面白自項以下甚黑嘗對鏡自照曰此一腔血竟灑何地謙自知功髙必不免也久之上頗悔一日邊報急廷議不決恭順侯吳瑾進曰于謙若在豈患此上默然而京師人語曰鷺絲冰上走何處尋魚嗛言難再得于謙也成化改元冕上書訟父寃憲廟追復其官遣行人馬䁢祭其墓𢎞治初贈太傳諡肅愍建旌功祠春秋祀之所著有奏牘及詩文集行世論曰方額森之入侵也中外震駭永嘉靖康之禍呼吸間耳于公以書生砥柱狂瀾屹然不動使社稷危而復安觀其分守九門移營城外堅壁清野以挫其鋒而喪君有君廟算亡失専意戰守罷絀和議計擒喜寧芟除禍本反皇輿於漢漠正帝座乎黃屋謀國之善古未聞也而卒取竒禍何哉假令當景皇帝不豫之日首帥百官迎復英廟或請憲廟嗣何至紛紛奪門哉當時大臣計不出此更誰咎耶夫以肅愍大功猶將十世宥之而走狗先烹長城自壞亨等諸人讒賊何慘也讀倪太宰李獻吉著碑銘令人哽咽久之杭三少保兩少保死亦相類於呼痛哉楊洪楊洪者陜西漢中人也拔起行伍間有機變馭衆威嚴士皆用命善出竒好劫邊營衆憚洪呼為楊王初為指揮杜衡所誣魏尚書源論救貶衡廣西繼為部卒李友全等所奏天子付洪自治故得成其功名己巳之變洪固守宣府是年冬破敵于固安擒斬數十人奪還人口無算拜昌平侯進封潁國公諡武襄論曰己巳之變內有于謙善謀石亨善戰外有楊洪郭登善守故以京師危急而九服宴然良田大同宣府為之扞蔽也額森善戰知兵恐宣大尾其後將有腹背交受敵之患故長驅深入不敢持久狼顧而去卒以無成使洪登淺謀輕出失利宣大不守禍延京師土崩之勢孰能禦之哉郭登郭登字元登直𨽻臨淮人營國威襄公英孫也正統七年征麓川靖逺伯王驥薦登為副分兵鎮臨安檄召諸夷長宣布朝廷威德諸邊境帖服爭獻珍貝不受十四年七月額森入侵天子親征至萬全西寧侯宋瑛武進伯朱冕相繼覆沒乃拜登都督僉事副廣寧伯劉安鎮大同尋詔班師登語學士曹鼐張益曰駕還宜從紫荆關鼐等入奏已得請從紫荆矣俄折而東竟從居庸未入而天子蒙塵大同城晝閉軍士多戰死所存皆創殘登涕泣拊循之且曰吾誓與此城存亡當不使諸人獨死也八月額森奉上皇至城下索金帛萬計約賂至即歸駕登閉門不納上皇傳旨曰朕與登有姻連何外朕若此登傳奏曰臣奉命守城不敢擅啓閉竟不出校尉袁彬以頭觸門大呼劉安及給事中孫祥知府霍瑄乃出見納賂而額森實無歸駕意也登曰此紿我耳莫若以計伐其謀劫其營奪駕入城此上䇿也因召壯士與之盟激以忠義曰事成當封侯受上賞壯士皆踴躍效死力將遣行或以危言沮之敵遂驚疑擁上皇去登大慟曰駑材果敗吾事時邊勢張甚而劉安借他故還京師獨登守城十月又擾京師登率所部并糾集忠義從鴈門入援先以蠟書馳奏其略曰邊馬長驅三關失險彼留連內地為患非輕臣今悉起官軍民壯入護國庭京兵擊于內臣兵擊于外使彼有腹背受敵之患首尾不救之虞又曰忠誠切已敢忘報國之心成敗在天不負為臣之節奏至敵已退優詔褒答焉登復上疏曰敵人雖回離邊不逺傳報有云黃河已凍且向延綏青草漸生再侵京闕事雖未信情亦可疑又曰推誠待下仄席求賢擴天理克人欲以成聖學之功親君子逺小人以收天下之望十二月邊將復犯京師登奏言京軍新選不可輕戰宜分營犄角以逸待勞勿求僥幸務出萬全敵自屢勝以來出入自由不聞有出一兵拒之者登不勝憤晝夜以忠義激厲其軍定為賞格期必殺彼諜報東驛敵入境登率兵躡之行七十里至水頭日暮休兵夜二鼓諜報二十里外沙窩有敵營十二登召將士問計皆曰彼衆我寡莫若全軍而還登曰我軍已去城百里且疲困一退避彼以鐵騎來追雖欲自全得乎即按劒起曰敢言退者斬進薄其營昧旦敵以數百騎迎戰登奮勇先登諸軍繼進呼聲震山谷登射殺二人手刃一人敵大敗追奔四十餘里至拷㧯山共斬首捕獲二百餘騎奪回人口牛馬弓械以萬計捷聞封定襄伯是役也以八百騎破敵數千初至大同戰士僅數百馬百餘匹不數年馬至萬五千匹精兵數萬人常恨馬少步卒追捕不及乃以已意設攪地龍飛天網等法鑿為深塹覆以土木人馬通行如履實地敵入圍中令人發機自相擊撞頃刻十餘里皆陷又用炮石擊之一發五百餘步人馬死者數千欲大興屯田而苦乏牛種乃上疏乞官為措置嘗憤贓吏病民疏論之其略曰承平日久人心驕逸在官既無亷恥蒞政者惟肆貪婪釀成汚風致有邊禍登亷潔善謀與敵大小數十戰未嘗挫衄善撫士卒有古良將風英廟復辟命掌南京中軍都督府事尋謫戍甘肅憲廟嗣統復爵鎮守甘肅以薦召還總神機營掌中府事尋命提督十二團營多所建明登工詩所著有聨珠集謫甘州時有詩送嶽正曰青海四年羈旅客白頭雙淚倚門親莫道得歸心便了天涯多少未歸人又曰甘州城南河水流甘州城北塞雲愁玉關人老貂裘敝苦憶平生馬少遊大學士李東陽評其詩為國朝武臣之冠卒贈定襄侯論曰郭定襄以敗卒守孤城竟立封侯之業觀其閉門不出與城存亡募兵入援敵王所愾有國士之風矣至所論建文士不如也今獻備遺卷十六
