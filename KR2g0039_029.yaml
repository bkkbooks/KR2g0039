  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_029-1a, image: WYG0453/WYG0453-0662c.png}
body:
  text: 今獻備遺卷二十九明項篤夀撰項忠項忠字藎臣浙江嘉興人也正統壬戌進士授刑部雲南司主事遷陜西司員外郎己巳扈從北征羈留邊外飼馬久之挾二良馬南馳馬疲遂棄馬步走間道凡七晝夜達宣府視其足陷蒺藜刺者百數還升山東司郎中景泰二年升廣東按察副使按部髙州諜報賊攜男婦數百流劫村落部將請發兵公曰賊無攜家理慎無妄殺及訊其俘果皆良家被掠者盡釋之天順三年拜陜西按察使嵗飢不待奏報輒發倉賑之會內艱陜人赴闕留者千人詔還任明年以大理卿徴既行陜西人復詣闕下借留乃拜右副都御史撫其地時洮岷生熟畨作亂調兵撫捕之遂降成化改元邊冦延綏調兵禦之皆遁走關中水泉斥鹵宋有龍首渠嵗久湮廢奏開渠三十里復疏鑿涇陽鄭白渠灌田七萬餘頃四年固原土人穆蘇叛據石城守將寧逺伯王夀廣義伯吳綜巡撫都御史陳價等帥師勦捕失利都指揮費良死之詔以公總督軍務同總兵官劉玉討之伏羌伯毛忠戰死我軍遽退公即斬一千户以徇衆乃定會有星孛于台斗占者以木在秦州不祥公曰賊虐害生靈惡貫滔天仰仗皇威問罪師直而壯兵法曰禁祥去疑昔李晟討朱泚熒惑守嵗卒以成功今殆類此乃不候援至即以師據賊水草困之朝廷以師久無功詔問公可否益兵公奏曰京軍怯不諳戰益之無用時兵部及前失律者惡公異已各煽浮議公堅主坐困之䇿相持者百日公度賊已困單騎抵其寨諭以禍福賊衆多出降獨滿四與左右數來劫營前後大小三十餘戰輒敗之已而滿四使愛將楊虎貍出汲被擒公命曳出斬之虎貍乞命公乃許以不死解所東金鉤賜而遣之約為內間卒擒滿四斬首七千六百有竒俘二千六百因陳四事為經久計上皆從之凱還進右都御史京圻大水敕公巡視發廪賑之復勸貸得米一十六萬五千石銀布牛具各萬餘所全活者二十七萬八千餘人荆襄賊李胡子本劉千斤餘黨也倡流民為亂命公總督軍務乃下榜招諭其負固者縱兵搜捕放遣者百四十萬編戍者萬餘斬首二千餘級獻俘于朝者百餘人進左都御史仍獻便宜十事詔暫留撫治會有星孛于天田言者謂荆襄殺戮所致公再疏自明言為國任怨實未嘗妄殺因乞骸骨上溫詔慰勉尋召還成化十年拜刑部尚書踰月改兵部錦衣百户韋瑛挾汪直為詗察屢興大獄擅執京朝官中外重足莫敢言公奮筆草疏率諸公卿奏之瑛坐謫戍朝野稱快而其黨千户吳綬者先在軍中以撓法為公所黜時方用事乃極力搆公坐落職尋復兵部尚書致仕家居二十六年卒贈太子太保諡襄毅論曰襄毅公將略具馬公西征石城記中浮言不顧卒以成功昔先零未服而辛武賢請亟進兵淮蔡將下而李逢吉請班師非漢宣之明唐憲之斷何以成功哉襄毅公雖得之滿四然卒以荆襄招怨讟故曰難成者功也易興者謗也君子以身任天下大事死生以之蒼蠅點玉自古然矣詩曰愷悌君子無信讒言不有君子誰可語此乎陳俊陳俊字時英福建莆田人也正統丁卯舉鄉試第一戊辰舉進士授户部主事歷遷員外郎郎中嘗督天津諸衛舊欠秋青草束奏減三十五萬束蘇松諸郡負折糧銀七十五萬有竒俊往徴不數月悉完天順中兩廣用兵遣俊督餉下令弛鹽商越境之禁使得隨處貿易而别輸粟二斗以餉軍成化乙酉升南京太常少卿戊子召為户部右侍郎時邊務殷四方奏災傷移咨旁午俊裁決如流曲當事宜辛卯京師飢奉敕發太倉粟一百萬斛減價糶以利民俊請凡糴以升斗計滿一石者不許以故權貴人不得乘時射利壬辰命將北征敕俊督餉于秦晉諸邊時嵗飢邊庾空竭而榆林延綏道險逺輸者病之俊發金內郡市易且修西安韓城同官徑道以便飛挽凱還加俸一階尋遷吏部進左侍郎晉拜南京兵部尚書轉吏部致仕加太子少保𢎞治元年卒諡康懿論曰陳公以綜練之才所至職辦修慎簡重清白自持位登八座蕭然如寒士世多推之余子俊余子俊字士英青神人景泰二年進士為户部主事升員外郎出為西安知府為開新渠號余公渠涇陽山髙水下溉田不得畜水為鑿山開道灌田千頃升副都御史巡撫延綏延綏自正統中命都督王禎鎮守榆林未城也禎始城榆林及十八寨移鎮榆林尚未衛也成化六年置衛八年廣榆林城增三十六營堡請盡釐陜中人有伍籍詭落者及罪謫南戍子孫不服南風土者實榆林衛又請建學立官弟子教之樹蔬果開界石外地興屯田嵗得糧數萬石自是始為重鎮東渡河連大同西接寧夏敵不敢復肆又上疏言陜西有三邊延慶寧夏甘肅三邊之中延慶為內地國初逐出北人逺遁黃河外至正統初渡河犯近邊始於沿邊立界石創營堡築墩臺天順以來敵知東西諸邊各據險以守難窺伺惟延慶一帶地無險阻可以馳突屢來犯邊掠我邊人為鄉導遂知河套所在入屯其中自是敵顧居內而我列屯守禦反在其外莫若於沿邊一帶墩臺空處築為邊牆立寨堡况舊界石一帶多髙山斗崖依山形隨地勢或剷削或纍築或挑塹綿引相接為邊牆便報東起清水營紫城寨西至寧夏花馬池東西二千里每二三里間為對角敵臺寨連比不絶空處築牆如新月狀以偵敵避射凡為堡十有二崖寨八百一十九小墩七十有八大墩十有五兩月成自是邊警益稀十二年移鎮陜西會詔議弭盜安民選將厲兵之方條上七疏皆行之著令十三年入兵部為尚書未幾致仕召加太子太保改户部十八年又出總督宣府大同山西三關軍務言禦敵利用戰車條式奏上二十年再出宣大還京以左都御史致仕復召為兵部尚書乞致仕平生仕宦多在西北邊榆林修邊之功最大已而入兵部出邊鎮欲推榆林法盡修大同宣府兩鎮邊牆沮於讒忌功有緒竟不能就嘗曰人臣事君當隨事盡力必為百年之計又曰大臣謀國遇有大利害當身任其責豈得養交市恩逺怨自全鎮榆林時怨謗紛起堅執不撓卒能成功卒年六十一贈太保諡肅敏方巡撫榆林時羅山徐廷璋巡撫寧夏亦浚壕築墉繕亭障有功當是時禹陽巡撫陜西稱關中三巡撫廷璋由選舉以工科都給事為副都御史巡撫論曰昔先襄毅以撼汪直去位余公繼入為兵書余承乏職方覽故所存堂稿皆明確可為法守其所經畫邊事大都重修守先牆堡意深逺矣當是時市事不常有間被邊患猶有餘力及板築頻年通市烽火稍希練習兵將綢繆户牖可置不講乎竊迹二公勳名在榆林尤著而才幹宇局及出處會遇亦略相同公即旋罷旋起席不及溫襄毅一蹶竟不復起成功難居多口難調豈非命耶李承勛李承勛字立卿嘉魚人𢎞治六年進士歷郎中出守南昌正德六年贑賊犯新淦執參政趙士賢靖安賊據越王嶺瑪瑙岸華林賊破瑞州勢甚猖獗至即廣詗諜繕壁壘扼溪澗屢進戰擒胡雪二才還府華林賊又叛殺副使周憲諭降健賊王竒約內應夜引兵舉火為號大破賊徒境內安輯復上疏請蠲租八年桃源賊起江浙間執兵備吳廷舉總制俞諫請邊兵勦賊承勛曰賊乏食必掠裴源積粟請贑兵自德興南昌兵自嶽源分兩翼伏裴源而令邊兵驅賊賊果走裴源大敗遁太監黎安誣承勛竄賊詔大理卿燕忠即訊廣信事白升浙江按察使歷右左布政使十五年副都御史巡撫遼東遼東無邊患自汪直開邊衆輒攜二擾我開原懿路汛河三城極殘破公至即修築定逺慶雲古城鎮夷松山柴河六堡堠望百八十一所屯田千五百頃又修中固鐵嶺蒲河撫順諸城皆濬隍樹木為阻固東圉稍寧請告嘉靖初起南臺轉侍郎進尚書又召入吏部尚書道改刑部加太子少保改兵部尚書兼都御史代胡端敏公提督團營惡郭勛驕縱剪其羽翼勛訴之欲并中端敏力辭營務不允嘉靖八年還守兵部田州岑猛叛用兵兩廣騷動芒部沙保又叛土魯畨奪我哈密搖河西小王子嵗入塞承勛與胡端敏相繼本兵同心經理戎事頗戢奏裁各省鎮守守備內臣二十七人錦衣官校旗勇內府詭匠數千人騰驤四衛者詭冒依附不可詰疏請官軍考選清核並如旗手等衛制曰可內臣言四衛禁軍𨽻兵部不便往嵗彰義門大破東市勦曹賊皆四衛功以直內故得號召易集下兵部再議承勛執言往嵗之事彰義門之戰由王振東市之賊即曹吉祥也上從其議九年大風晝晦上恐懼憂邊詔問承勛答曰去嵗冰合北人盡入河套以故陜西邊患延寧固原為急甘肅軍餉専仰河東宜於蘭州及時糴貯以備河西災窘曩時河西患苦土魯畨伊伯勒又深入兩冦夾擾孤危益甚海賊套衆出入殺掠並經莊浪被其殘害急宜繕塞設險斷臂截踵使賊相隔絶烏梁海最近京師不善撫即為門庭之寇雲南安鳯之叛軍民困敝臨安蒙自盜賊復起曠日持久恐釀成大患交趾世子流寓老撾異日歸命請援或據地求封皆未可測惟用人理財早為警備以保社稷幸甚十年議耕桑禮詔問之答言禮有儀文政有根本惟上下儉節墾田興水利足民衣食今日急務議郊禘又詔問以傅經術順人心對是年春充正使册九嬪晨起趨朝暴疾卒贈少保諡康惠提兵南北曉暢軍事通達國體議論英發潔亷自守家無餘資論曰李康惠明習邊事深識敵情與胡端敏繼掌邦政蹇蹇匪躬萬里長城斯其屬之矣胡之早計淮南李之請罷鎮守謂有社稷功者非耶今獻備遺卷二十九
