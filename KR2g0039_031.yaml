body:
  text: 今獻備遺卷三十一明項篤夀撰劉大夏劉大夏字時雍湖廣華容人天順甲申進士歷任職方郎中時有中官獻取交南策有㫖索永樂中調軍數大夏匿其籍使者數被撻若弗聞者徐以利害告尚書余子俊入言之事寢朝鮮使者為建州兵邀擊請改貢道事下兵部大夏曰朝鮮入貢自鴉鶻關由遼陽經廣寧過前屯而後入山海關迂回三四大鎮此祖宗微意今欲改道自鴨緑江抵前屯山海路太徑恐貽他日憂卒不從敵兵數入雲中邊將失律中外震驚每報至尚書必曰劉郎中云何所言輒行行輒有效時右侍郎缺有欲薦大夏者大夏遜詞謝之遂乞外補出為福建參政奉勑巡海道兵久弛倉儲為勢豪所侵且盡首選衛所軍政官而擇其尤者總諸水寨軍造戰哨船各千艘葺倉計儲立收支法進廣東右布政使嘗過崖山弔大忠祠宋慈元后陵寢無主立廟祀之河決張秋擢右副都御史往治集山東河南二省守臣議大夏曰河性猛悍張秋乃下流喉襟未可輒治宜治上流導之南行築長堤以禦橫波且防大名山東之患候其循軌而後決可塞也乃疏孫家渡河三十里四府營河十里築長堤起河南胙城盡徐州經滑長垣東明曹單諸縣長三百六十里量能任功五旬而事竣𢎞治丁已北邊乏糧芻大夏以户部侍郎簡命經畫至則召父老日夕問盡得其要領揭榜通衢云某倉缺糧幾千石每石給官價若干但願告報者米十石以上草百束以上俱聼軍民有糧芻者得自告報由是倉場有餘積而私家有餘財矣尋乞致仕歸庚申進右都御史總督兩廣軍務壬戌升兵部尚書進太子太保時北邊告急上以兵事屬苗逵謀出兵上召大夏問計大夏不可上曰永樂頻出塞用兵今何不可對曰皇上聖武固同太宗但今兵逺不逮耳且當時如國公丘福稍違節制數萬甲兵俱陷邊地今之將帥又在丘福下焉能决勝逺討上悟曰朕幾為人所誤事遂寢上嘗召問天下軍士何如對曰與民一般窮安能養其鋭氣上曰在衛有月糧從征有行糧何以至窮對曰江南困于漕運江北困于京操此外浪費猶有臣等不能知者所以俱窮翌日詔諸司凡軍民弊政悉疏以聞上欲以近地團操人馬以衛京師以問大夏對曰京西保定地方獨設都司以統五衛仰思祖宗恐亦此意尋有御史請將保定軍萬人回衛團操上可其奏忽有造飛語誣大夏者上曰宫門豈外人可到必不得私役此軍者忿而誣之耳修清寧宫奏減軍夫五千餘人督工者訴于上上令司禮監語內閣曰劉大夏不以大工為事率意減去人夫即調㫖切責大學士劉健曰愛惜軍夫司馬職也近日劉大夏纍乞歸朝廷勉留尚請之未巳若切責彼將以不職固辭孰可代之司禮監入告孝宗欣然納之卒減工役癸亥四方奏災異京師四月五月不雨條上十事一曰京住官軍苦于出錢供用二曰在營軍士困于私役做工三曰江南軍士因漕運破家四曰江北軍士因京操失業五曰竭軍民之力運糧而濫食者衆六曰罄生民之財買馬而私用者不顧法禁七曰各處鎮守太監貪婪八曰各處守偹內臣占軍數多九曰升賞被于勢要十曰禁衛苞苴公行悉施行之上每有大政事輒召大夏及都御史戴珊面議乙丑春奏對畢出白金二錠以賜曰卿等將去買茶果朕聞朝覲日文官避嫌有閉户不接見人者如卿等雖開門延客誰復以賄賂通也朕知卿等故有是賜且命不必朝謝上一日召大夏面語曰事有不可每欲召卿商量又以非卿部內事而止今後有當行當罷者卿可密寫揭帖封進對曰不敢上曰何也大夏曰先朝李孜省可為鑑戒上曰卿與我論國事豈孜省營私害物者比乎對曰臣下以揭帖進朝廷以揭帖顯行是亦前代斜封墨勑之弊也陛下宜逺法帝王近法祖宗事之可否外付之府部內咨之內閣可也如用揭帖日久上下俱有弊臣不敢效順上稱善者久之上嘗問天下何時太平朕幾時做得如古之帝王大夏曰求治不宜太急凡用人行政有疑者即召內閣併執政大臣面議務求至當順理而行便是太平上曰劉健嘗薦劉宇可大用宇小人也豈可用哉户部郎中李夢陽言事下錦衣獄尋詔復職他日獨召大夏奏事畢上曰近日外事若何大夏頓首曰近釋李夢陽中外歡呼聖德如天地上曰李夢陽奏事狂妄朕不得已下之獄所以即釋復職更不令法司擬罪也大夏頓首謝曰陛下此事堯舜之仁也刑部尚書閔圭讞重獄忤㫖批答久不下大夏獨召對上因語及之對曰人臣執法不過效忠所以聖帝明王屈意從之閔圭所為無足異者上曰且道自古何君何大臣亦嘗如此對曰臣讀孟子舜為天子臯陶為士瞽䏂殺人臯亦執之而已今之法司似未可深責也上頷之㫖下一如圭所擬光祿寺多冗食大夏因嵗飢疏論之詔裁减嵗省銀錢八十餘萬奏革騰驤四衛勇士節宫府冗費數百萬每奏事內庭輒造膝武皇初四土章請老致仕逆瑾擅權因尚書潘蕃總兵毛鋭獄詞連大夏逮赴北鎮撫獄同繫者請行賂以求生大夏曰如此而死禍止一身稱貸免死則纍子孫且喪一生矣瑾怒欲置之辟㑹議朝堂左都御史屠鏞曰檢律劉尚書無死罪瑾曰充軍罪亦無耶法司阿瑾意引例戍肅州士大夫聞大夏出獄且喜且泣發都城日觀者如堵所在罷市父老涕泣士女攜筐饁進果食有焚香密禱願公生還者至戍所即買地為墓不挈子姓侍行或以問大夏曰吾仕宦日不能令子孫官發配老死顧令子孫補伍乎庚午肆赦得放歸瑾誅復官致仕卒于家諡忠宣論曰敬皇御極寤寐忠良優禮元老廟堂有都俞之風薄海奏熙和之績維時華容劉公獨以篤棐之忠受特達之遇寵冠百􅒼造膝黼扆屏人密語日旰未退雖元勳碩輔腹心禁近不得與聞君臣之交不啻魚水即登三邁五不足異也而鼎湖抱泣遐荒僻裔如喪考妣劉公白首束縛幽囹逺戍青海士大夫聞者知與不知無不流涕遂使毒流縉紳幾搖社稷剝復相倚天實為之嗟乎君子不患𢎞道遭時難遭時匪難遇君難乘時遇合矣而垂成之功墮于奄忽曷故邪韓文韓文字貫道山西洪洞人世居相州宋魏公裔也生時母夢紫衣人語曰送文潞公與爾因名文成化丙戌進士授工科給事中劾左都御史王越邀功啓釁且薦王竑李秉宜召用語侵兩宫逮至文華殿考訊幾死歷遷南京兵部尚書參贊機務嵗凶道死者相枕藉移咨戶部請預支官軍三月俸度支以未得命為辭文曰救荒如救焚民命在旦夕安能忍死以待邪即得罪吾請當之遂發米十六萬石米價漸平人不病糴改户部尚書尋加太子太保敬皇帝召見諭以鹽法大壞邊餉不足使釐革宿弊文退上七事一曰革開中引鹽之弊二曰革興販私鹽之弊三曰革賤賣官鹽之弊四曰革買補殘鹽之弊五曰革夾帶殘鹽之弊六曰革越境賣鹽之弊七曰革運司廢弛之弊指摘剴切嘉納之苗逵征討無功日費逾千金文論劾之逵銜甚乞文督餉而文復疏請追究羽流幻術抑戚畹中貴占奪和買民田及舉正窩占引鹽怨讐叢積文自如也毅皇登極文首倡府部科道等官伏闕抗章暴逆瑾罪繼之以泣乞置諸法毅皇帝覺悟已得請矣亡何輒報中止瑾愈肆矯㫖致仕言者論救再降級閒住子士聰髙唐知州士竒刑部主事皆坐免為民仍假失落簿籍差官校械繫下錦衣衛獄會早朝有投匿名文書于丹墀録瑾罪惡且言必欲殺文以報私怨瑾愈怒仍矯㫖罰輸大同米一千石後更罰二千石皆稱貸以給庚午瑾誅詔復原職致仕世廟初賜璽書褒嘉尋以守正被害加太子太保令有司存問復賜誥有曰比因權姦之竊柄痛惟朝綱之紛更爾能守正不阿以忠自誓倡危言而叩闕屹乎山嶽之難搖甘竒禍以忘家凜爾氷霜之不變天下仰其風采神明相其夀康起文彥博于九袠之餘人心攸屬繼韓魏公于百代之後家慶彌彰卒贈太傅諡忠定論曰余讀史至石顯殺望之王甫誅陳竇豈不信哉忠佞不兩立哉蓋奸人之窺伺神器者必先誅戮以立威而務去其異已者庶幾可得志也華容洪洞非逆瑾之素所畏憚者哉故其得禍最烈而先去之固知其必不附已不如是不足以逞其圖也噫有天下者其無使小人去其所畏以成其勢哉馬文升馬文升字負圖河南禹州人景泰辛未進士授監察御史兩按山西湖廣有聲天順癸未升福建按察使鎮守擾民輒繩以法穆蘇反起為右副都御史巡撫陜西與都御史項公㑹兵討之生擒穆蘇捷聞升左副都御史時漢中李胡子潼關火蝎兒蒲城王彪各聚衆劫殺悉剪除之壬辰敵侵臨鞏文升督兵追之黑水口生擒平章德哷蘇斬首數千遂陳時政十五事及禦邊三策尋命節制三邊北人攻固原及好水川檄召諸路兵按伏湯羊嶺敵至伏發盡棄輜重遁走擒斬首惡因改其嶺為得勝坡勒石紀功焉乙未召為兵部右侍郎適遼東有警命往備之制五花營八陳圖以訓士卒復上禦邊十五事事寧升左侍郎食二品俸戊戌建州女直來侵巡撫都御史陳鉞欲誘殺進貢來使以掩己罪上命文升再往時太監汪直亦奉命巡邊隂主鉞議邀文升偕行弗聽先馳赴其地招撫哈斯岱等二百餘人直至敵亦解散無所獲文升獨與抗禮還奏文升不與彼農器以啓邊釁而言官復劾鉞激變事詔刑部尚書林聰同直再往勘遂逮文升下錦衣衛獄文升言實禁兵器非農器也竟謫戍重慶直敗詔復文升官致仕甲辰起為左副都御史巡撫遼東𢎞治改元召為左都御史掌院事上耕籍田文升與行九推禮教坊司出狎語即斥去之二御史以糾儀下獄文升言即位之初不宜輒罪言官遂獲釋哈密忠順王先為土魯畨首蘇勒坦阿里所擒併奪王母金印蘇勒坦死𢎞治四年其子阿哈瑪特以金印城池來歸守臣以聞文升請立元之遺裔善巴者襲封忠順王以主哈密未幾阿哈瑪特復攜善巴及金印以去文升時為兵部尚書請以阿哈瑪特所遣入貢賽音莽蘇爾等四十餘人皆安置閩廣閉關絶貢以孤其勢而阿哈瑪特復遣伊蘭據哈密文升請勑肅州副總兵彭清統蕃漢兵襲伊蘭伊蘭遁走追勦六十餘人阿哈瑪特遣使謝罪入貢併以善巴金印來歸遂復哈密海西人當布嘉克謀叛械繫京師巧辨不服文升徐以數語折之遂竄海南戊午春皇太子立加少保兼太子太傅文升上疏曰太子國之儲二天下之本宜擇老成純謹之士以資啓沃不宜雜以浮薄恐虧損盛德上欣納焉邊人和碩攻大同威逺京師戒嚴上親􅎈宸翰賜以尚膳召文升至便殿咨戰守之策因舉成國公朱暉等練兵以待且令各邊謹斥堠修戰具敵知有備遁去轉吏部尚書上召至暖閣面諭曰明年天下諸司朝覲卿務用心訪察大彰黜陟之典文升對曰聖心求治如此宗社之福臣敢不盡心以圖報稱乙丑考察大朝官員汰去不職者二千餘人正德初太監王瑞以大昏禮欲用儒士七人篆刻畨字文升不從給事中安奎言宜聽文升言瑞誣文升抗拒賴大臣力救得白㑹兩廣缺總制被薦者不樂于外乃嗾御史劾文升文升求去疏凡二十一上未幾致仕卒贈太師諡端肅論曰敬皇勵精綜核寤寐俊髦禹陽馬公實秉衡鑑故六曹之長莫非民譽下至百司咸濟濟焉士敦恥讓俗返淳朴衆賢和朝萬民和野即周之成康漢之文景蔑以加矣雍泰雍泰字世隆陜西咸寧人成化五年進士授吳縣知縣吳濵湖湖漲淪田千頃作堤護田民受其利稱雍公隄吳民有妾亡者妾父訟其夫密殺之匿尸湖中石下泰訊其父曰匿石下汝安得知之此非汝女必殺他人女冀得賂也一考而服召為監察御史巡鹽兩淮為都御史巡撫宣府參將李稽不法部下狀其惡具草且聞稽跪堂下乞受責圖自新泰曰此軍法也縛下杖之稽已乃譛之時相言官遂以擅辱將官論之遂罷正德二年詔起副都御史操江固辭弗允未幾升南京户部尚書時逆瑾用事以泰鄉人欲親用之不應遂斥去而諸所嘗薦之者禹陽靈寶皆獲罪年八十卒論曰雍公築堤利吳人人至今道公功不衰踪其所以懲辨士可謂嚴而恕矣卒為所中罷去再罹瑾禍并逮舉主何其厄也今獻備遺卷三十一
