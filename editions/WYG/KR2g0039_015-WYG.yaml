  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_015-1a, image: WYG0453/WYG0453-0596c.png}
body:
  text: 今獻備遺卷十五明項篤壽撰曾棨曾棨字子啟江西吉水人也永樂甲申進士第一人文皇帝初御極欲興起斯文乃選進士中秀敏者二十八人為庶吉士以應列宿開文淵閣使讀中秘書大官供膳月給内帑鈔為膏火費棨以翰林修撰居首選上時召試二十八人棨迅筆立就諸吉士弗如也上數舉羣書問棨輒應口對深見奬重修永樂大典為副總裁五年陞侍講七年扈從巡北京數侍燕間應制賦詩輒稱㫖人有薦文士者必問如曽棨否預修髙皇帝實録成賜文綺衣鈔十六年考禮部㑹試陞侍讀學士修天下郡志為副總裁二十二年考禮部㑹試仁宗初陞左春坊大學士仍兼翰林侍讀學士宣德二年考禮部㑹試兩朝實録成陞少詹事仍兼侍讀學士賜寶帶七年卒贈禮部左侍郎論曰國初劉宋以司制代言文體渾厚至子啓天才雄麗倚馬萬言其文如蘇長公浩浩不竭所乏者謹嚴精潔耳要之才致固各有長其所為詩古體有魏晉風律宗初盛唐亦一代之鴻匹也劉定之劉定之字主静江西永新人㓜强記天資絶人其父日授書千言禁為文定之輙私自作文父偶卧所得所作祀竈文及詩大驚終不口然之自是稍以文辭進每進每輒斥之他日更進父曰此八􅆕受敵才也宣德丙寅㑹試第一廷試第三人授翰林編修正統己未京師大水詔求直言定之上十事其一言命令宜公賞罰必信其二言公卿侍從宜數召問觀其才能察其心術而進退之其三言降敵近處畿甸宜稍移于南其四言宜出京官使任郡縣其五言宜倣唐制京朝官舉人自代其六言武官子孫宜習韜畧其七言守令宜詳加考課其八言宜抑豪强以卹貧困其九言廷臣丁憂宜令終制其十言宜杜僧尼異端不報景泰帝登極定之時為侍講上言十事一戰陣宜倣古制二守禦宜繕亭障三簡用使臣四遷移降敵五増給兵餉六戒守令貪虐七選將士八覈冗濫九攬權綱十勤講學上嘉納之尋拜洗馬壬申北人遣使來邀報禮議不决定之䟽請暫遣羈縻邊人使我得益修備即我以和往彼以惡來則我詞更直累千百言當事理云成化間進禮部左侍郎入内閣再進密䟽皆國家大計定之于書無所不窺文章宗蘇氏尤善舉子業卒贈禮部尚書諡文安論曰劉文安好言事其所論列皆明辯深切可見諸行事非無當空言者流也今獻備遺卷十五
