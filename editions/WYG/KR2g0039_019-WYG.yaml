body:
  text: 今獻備遺卷十九明項篤夀撰徐有貞徐有貞初名珵字元玉呉人宣徳甲寅進士改庶吉士授翰林編脩益肆力用世之學與脩宣皇實録尋脩玉牒進侍講正統初上言承平久宜脩邊防上嘉納己巳京師戒嚴分遣文臣守要害地有貞守河南還景泰初充經筵講官二年陞右諭徳兼侍講會河決張秋沙灣詔拜有貞左僉都御史往治之至則上疏言水之性可順以導不可逆以湮葢河自雍而豫自豫而兖土益疏水益肆而沙灣適當厥衝於是決焉以奪濟汶入海之路而去諸水従之以泄隄潰渠淤潦則溢旱則涸此漕運所由阻也臣請首疏水勢勢平乃治其決決止乃浚其淤因為之防以時節宣後乃亡患制曰可乃作制水之閘疏水之渠渠起張秋金隄之首西南行百里至于大潴之潭乃越范暨濮上而西凡數百里經澶淵以接河沁水勢既平命其渠曰廣濟閘曰通源凡河流之旁出弗順者則堰之由是水不東衝沙灣乃更北出以濟漕渠之涸阿鄄曹鄆之田頼以溉者百數十萬頃乃作大堰其上揵以水門繚以虹隄導汶泗之源而出諸山滙澶濮之流而納諸澤濬漕渠數百里復作閘于東昌之龍灣魏灣者八積水過丈則放洩之皆通于河以入于海三年而功乃成擢左副都御史景皇七年都督張輗張軏武清侯石亨太監曹吉祥共謀復辟以問大學士許彬彬曰此社稷功也彬耄矣無能為也盍謀之徐元玉其人經濟材也亨軏就問計有貞曰太上皇北狩以赤子故非游畋也今天下無離心能奉以復辟此天人同符也因互陳籌畫亨軏去越二日辛巳夜復來有貞升屋覽乾文亟下曰時在今夕不可失也亨軏唯唯去有貞焚香祝天訣家人曰事成社稷之福不成家族之禍吾去矣歸耶人不歸鬼矣遂潛與亨輗軏吉祥及鴻臚卿楊善盡收諸城門鑰有貞命壮士踰南内門入與外兵合太上皇復辟陞翰林院學士掌文淵閣事尋陞兵部尚書進柱國封武功伯賜鐵券數召對恩寵隆渥有貞感知遇以身任天下條奏剴切無復顧慮施行若流曹石等嫉之私謁多不従復諫止節縮由是益恚怒御史楊瑄劾曹石奪民田上曲宥之曹石疑有貞所使也愈憾有貞數巧辭激上怒上殊不為動上時時屏人與有貞語中人竊聴之以告上上曰何自知之對曰此有貞宣言之上大驚始疑久之讒益深上愈惡有貞亨吉祥因竊造封事假給事中李秉彛名上之時秉彛己丁憂去逮至拷訊死曹石因言此徐有貞怨望使所親馬士權等為之遂下詔獄上猶念功出為廣東左㕘政曹石復上急變考掠亡状士權曰今欲吾等何所承邪刑官曰徐有貞謀逆汝等同謀耳士權大呼曰徐有貞欲使今皇帝為堯舜之君今百姓為堯舜之民如此而已不知其他獄久不成適承天門災上寤出有貞安置金齒為民至滇寓僧舍中日讀易而已居三年詔還田里家居杜門謝客曹石敗始出游湖山以自娯自稱天全居士憲廟初詔賜冠帶閒住有貞于書無所不通文章雄竒詩宗李白書法率更南宫所著有史㫁及文集若干卷論曰方武功伯之鎮彰徳治水張秋其材已槩見矣英皇復辟之初公獨奮其智勇與二三武人決機定䇿取日虞淵呼吸之頃天下晏然功存乎社稷忠貫乎天地可謂竒矣及其秉衡軸胙茅土舉國授政方將致君堯舜而憸壬側目卒以逺竄讒夫之禍吁可畏哉夫以徐公大功猶不免于雌黄之口况下此者乎李賢李賢字原徳河南鄧州人也宣徳癸丑進士見薛瑄講論淵源恱之益究心理學授驗封主事轉文選郎中輒閉户讀書五經要義多所自得景皇即位進正本十䇿景泰四年陞兵部侍郎轉吏部天順改元進吏部尚書兼翰林學士入内閣景皇薨上欲令汪妃殉塟賢止之大同巡撫年富被逮上以問賢對曰能奉公革弊上曰此必石彪私惡之耳因請命官往勘果無實富得致仕去上念建庶人輩久幽掖庭間以問賢對曰陛下此念天地鬼神實臨之太祖在天之靈實臨之堯舜存心不過如此遂遣居鳯陽聴令婚娶或曰不可上曰有天命者任自為之乃宣諭羣臣御史楊瑄言吉祥石亨强奪民田亨等入訴于上曰此賢與徐有貞主之耳下鎮撫司獄是夕天大風雷承天門災賢等獲釋降㕘政未行復召賢為吏部左侍郎尋復前職上躬親萬幾頗厭祥等謂賢曰奈何賢曰獨㫁可革也石亨薦江西處士呉與弼上以問賢對曰與弼儒者之髙蹈古之聖王莫不好賢下士若陛下行此一事亦本朝盛舉乃命行人齎勅帛聘之既至薦為左諭徳不拜仍請遣行人送歸上患左右招權賢曰權不可下移人主自攬則彼自消又曰讒說殄行帝王深惡絶之最是二年郊禮成上太后徽號因襃崇外家以元舅會昌侯總大營兵其弟復乞陞上曰足矣復希恩澤太后必見怒賢曰祖宗以來外戚不與政今會昌侯若此不識太后知之乎上曰太后正不樂此今猶悔之賢曰此見太后聖徳但後不可為例耳禮部請東宫出閣上語賢曰宜先讀何書對曰宜先大學尚書上曰書經有難讀者朕昔讀禹貢盤庚周誥殊費心力寫字必用心朕初習字任意寫去以此寫得不佳賢曰二典三謨太甲伊訓說命諸篇可先講讀字不必求佳但㸃畫當不茍耳上嘗問政治得失因極言錦衣官校差提罪人不勝其擾有譖賢妄言者上宻察之盡得其實乃待賢如初四年正月天下吏入覲上將以布政賈銓為户部尚書命賢觀之以貌不稱名對乃薦年富而以銓為副都御史會試舉子奏考官劉宣校文不公上疑之以問賢對曰此私忿耳如臣弟譲亦不中可見其公乃命禮部會翰林院試其人文不成章命枷號禮部前羣議乃息五年上言官軍一季俸闕銀十四餘萬兩何以處之賢曰自古國家惟患冗食今軍官有増無減如人只生不死無處著矣自古有軍功者子孫一再犯法即國除豈有累犯不革職者耶上曰此事誠可慮當徐為之七月曹欽之變賢被重傷加太子太保憲廟即位進少保華葢殿大學士尚書如故成化丙戌廷試太宰王翺以程敏政善書力薦為第一賢曰論文不論書卒取羅倫第一及賢丁父喪起復倫奏請許賢終制不許明年卒贈太師諡文達論曰國朝入直内閣當國最専且久者三楊之後惟李文達公方天順初徐薛罷位吉祥亨彪怙寵蟠結李公燮調其間數進匡順可謂良矣儷美三楊以勲名終不亦宜乎彭時彭時字純道江西安福人也正統戊辰進士第一人授翰林脩撰景泰初簡入内閣英廟復辟再入閣時大學士李賢獨見寵信數召對賢退即以諮時匡賛居多天順末錦衣指揮門達以事中賢上將罷之而屬意於時時為力辯賢得釋河南有武弁不法刺事者誣其謀反時語門達曰人可輕殺邪具言於上得末減憲廟初進吏部右侍郎職如故同知經筵丙戌歸省丁亥召還四川宣府遼東皆地震上陳六事規切時政總裁英廟實録成進太子少保兼文淵閣大學士尚書如故議慈懿山陵事甚力卒従所請彗星見三台上疏乞痛加脩省謂宫中根本至急望正名分均恩愛以廣繼嗣為宗社大計又言大臣進退皆宜㫁自宸衷不可専委臣下上嘉納之平涼土人滿四反官軍累失利都御史項忠奉詔討之時策其必成功而朝議咸欲再遣將時與商輅執不可或動以危語時不為動未㡬獻俘至議者始服己丑冬無雪上言自古旱災皆由民怨感動天變近日光禄買辦各城抽分掊尅太甚而獻珠寳者重規厚利請盡革之以恵貧民上是其言辛卯冬彗復見時與商輅上言七事其一乞崇正道其二乞謹命令其三請延接大臣其四刑賞太濫其五聴受直言其六慎簡將帥其七恵恤軍民上嘉納之太監劉永誠沒或言其有軍功宜追封為伯時曰祖宗成憲具在孰敢私之事遂寝乙未進少保尋病卒年七十贈太師諡文憲商輅商輅字𢎞載浙江淳安人宣徳己卯浙江發解正統乙丑會試廷試皆第一授翰林脩撰進講筵己巳陞侍讀入内閣時乗輿北狩額森逼京城有倡議南遷者力排之請郕王正位與大學士陳循等經畧戰守遣官撫輯畿甸降衆徴邊兵入援掲榜購邊人偽為喜寧報誘擒額森書故遺敵營中敵得榜與書果自相疑遁錦衣指揮盧忠妄言南内事中官阮浪等坐死窮治不已輅言之獄遂不竟忠得罪壬申諌議易儲甚力踰年鍾同章綸請復儲下獄輅因召對力救綸竟不死英廟初坐免成化丙戌冬詔起復任首疏八事勤政納諫儲將材飭邊備革冗員設社倉崇先聖之號以配天開入徳之基以造士上嘉納之戊子議慈懿山陵詞甚切至彗星見言官有言輅者上欲加罪輅力救之得已尋陞尚書仍兼學士是時穆蘓叛命將討之未下廷臣請再出師以邀功輅執不可卒以成功己丑冬燠輅陳時政之弊辛卯冬彗出天田入太㣲垣復疏七事崇正道謹命令親賢臣慎賞罰納諫諍勵官守恤軍民言多採納上議及郕王監國事輅言有社稷功當復位號左右皆泣上亦泣遂復景帝號壬申天下災請省科斂減力役寛兩税㢮利禁悉従之丙申夏皇子薨上方以嗣續為憂左右知西宫儲貳已長莫敢言輅委曲言之東宫乃立禁中建玉皇閣奏毁之黒𤯝見因陳彌災八事曰畨僧國師不得重給符券四方常貢外勿受玩好諸色人許直言自達分遣部使者諸囚停不急營造實三邊軍儲守縁邊闗隘増置雲南巡撫上皆嘉納丁酉汪直創西厰刺事權傾中外輅疏其十罪以聞懐恩傳㫖切責輅復數直罪又云此人不黜國家安乎危乎懐安咋舌而退即日撤西厰尋乞致仕進少保兼吏部尚書謹身殿大學士如故賜璽書給驛以歸家居十年卒贈太傅諡文毅論曰彭文憲公與商文毅公皆以科名致位宰輔諸所論建切中時弊概見施行勲名行誼相伯仲矣易儲一事商公不能以死争之不可則止之義寧無媿乎徐溥徐溥字時用宜興人景泰五年進士授編脩泰陵初以吏部侍郎兼學士入内閣𢎞治七年加少傅兼太子太傅吏書謹身殿是年上言機務日繁誥勅委積正統中王直王英皆侍郎兼學士在内閣専誥勅上従溥言用李謝二文正公未㡬星隕地震京師雨土飛蝗乞罷不允八年命撰三清樂章率同官上言三清邪妄不可黷禮上嘉納欽天監正李華者不職罷傳㫖復職公言傳帖行倖門啟不敢阿従十年三月韋太監急走閣下言上坐文華殿宣四先生溥及劉李謝三公倉皇至殿叩首上曰近前諸司禮皆環跪御案傍上曰看文書諸司禮取諸司題奏與溥及劉以片紙數幅與李謝每一疏上必曰與先生輩議溥等擬批答上上覽或更定二三字或刪去一二句應手疾書畧無疑滯溥等懼不能稱上意頓首請曰疏中事多者臣等請將下閣㸔詳擬上上稍不說曰文書尚多欲盡閱閣中亦閒盍就此面議諸輔臣又頓首曰唯自裕陵召見南陽等後四十年茂陵及泰陵初嵗不過一二見道二三語是日溥等得見上天資明睿聖心仁厚大喜顧應對不能副上意又輒慙懼自是不復召十一年溥目𤯝乞休卒年七十二贈太傅諡文靖在相位數年能任人凡𢎞治中所上章疏皆屬李公而溥因事納忠隨才器使屢遇大獄保全善𩔖従容調劑弭謗消讒雖無勇功智名而培養國家元氣多矣劉健劉健字希賢洛陽人天順四年進士授編脩泰陵初陞禮部侍郎兼學士入内閣七年進太子太保武英殿大學士明年薦李謝二公入内閣十一年進少傅太子太傅户書謹身殿大學士上方勵精凡國家大事召見輔臣宜興去召健及李謝二公至文華殿平臺煖閣面議大政如呉一貫張天祥獄睿皇后陵寢殿禮進退五府四營公侯伯灾異去留大臣皆上前相可否健確直見事稍遲李才敏達謝方質三人同心時人語曰李謀劉㫁謝尤侃侃十六年五月一品服九載當是時治平無事上顧公喜諭曰勞卿久矣兼支大學士俸先是率同官上疏近有㫖令中官往武當山設像懸旛脩醮命臣等撰勅并祝文者實為無益矧宜斥邪妄以正人心十七年又率同官上言近有㫖朝陽門外脩建夀塔者非所以訓天下垂後世也又令撰真人杜永祺等誥命及封號疏言臣等竊惟異端不可信誥命封號不當與祖宗廟號不過十六字親王及文武大臣有功徳者諡號止一二字此輩何賢何能封號多至十八字天下後世其謂之何上時憂勞思治益明習機務眷念民莫欲盡革諸煩苛弊蠧召對輒屏近侍左右不得聞大懼竊従屏隙中觀但聞上數數稱善上仁慈敬慎尤欲守成法惡􅃤刻健等亦見太子未壮上體清癯務却謀逺顧省機宻𤼵使天下隂受其福至上語及宫中事毅然欲創抑盡刷洗中權復髙皇帝舊然亦未敢輕動也康陵即位新政猶肅未㡬健三人上疏極諫請誅瑾等不報又與諸大臣伏闕門諫焦芳洩於瑾瑾得先見上泣請并斥言諸大臣過上果疑怒諫竟不得入健乃因致仕去謝亦去焦芳遂入内閣瑾尚恨不已矯㫖奪健官罰輸粟瑾欲起大獄盡殺諸不附己者矯勅羣臣指内官王岳范亨徐智健及謝公洪洞浮梁楊守隨林瀚郎中李夢陽主事王守仁王綸孫槃黄昭檢討劉瑞給事中湯禮敬陳霆徐昻陶諧劉􅉅艾洪吕翀任恵李光翰戴銑徐蕃牧相徐暹張良弼葛嵩趙仕賢御史陳琳貢安甫史良佐曹蘭王𢎞任諾李熈王蕃陸崑張鳴鳯蕭乾元姚學禮黄昭道蔣欽薄彦徽潘􅚻王良臣趙佑何天衢徐鈺楊琸熊倬朱廷聲劉玉為奸黨榜之朝瑾誅得復官致仕嘉靖初年已九十降詔存問又遣撫臣即其家賜束帛餼羊上尊酒又官健及謝公洪洞子并為中書舍人年九十四卒贈太師諡文靖論曰徐劉諸公受明主知造膝論議可謂榮遇跡其直言不阿正色立朝者非耶楊廷和楊廷和字介夫新都人父春湖廣提學僉事成化十四年舉進士除檢討正徳中歴陞户部尚書文淵閣大學士入内閣三年加少保兼太子太保四年脩會典成降俸二等俄以脩實録加俸二等七年加少師兼太子太師華葢殿大學士十一年憂去服闋梁文康請上遣行人召入内閣康陵崩内外危疑能擒滅凶奸奉敬皇后㫖迎世廟入繼大統改元詔湔除弊政朝野肅清勅封伯辭不受一品十二載考績進太傅賜襃勅宴禮部復辭太傅以論大禮去削籍子慎正徳六年進士第一人亦以論禮杖闕下謫戍雲南論曰余聞之人云辛壬之交中外多故楊公擁戴明聖捧日虞淵其所釐正功亦偉矣升菴博雅為儒林宗不媿科名世稱闗西楊氏為著若新都父子不庶㡬哉今獻備遺卷十九
