body:
  text: 今獻備遺卷四明項篤壽撰王禕王禕字子充金華義烏人大父炎澤夢五色芝産于門而生禕長身山立有偉度師事黄溍與宋濂齊名弱冠游元都上萬言書不報臨川危素太原郝逺者圖等交薦之有齊琦者善康節數推言天人興衰甚有驗見禕歎曰公異代人物也禕知元室將亂走歸隱青岩山中高皇帝下金華遣使徵禕謁見行在所署中書省掾參與機務語必稱子充而不名數於上前論文章上輙稱善因命采故實為四言詩以授皇太子上親征江西禕進平江西頌上覽喜曰知浙東有二儒卿與宋濂耳學問之博卿不如濂才思之雄濂不如卿授江南儒學提舉司校理除侍禮郎兼引進使遷起居注陞同知南康府事洪武元年召還議禮不合出判漳州上䟽言祈天永命在修徳修徳之要在法天道順人心願寛刑威減賦稅以固國本上嘉納之二年詔修元史召禕與宋濂總裁書成拜翰林待制同知制誥兼國史院編修官預教大本堂出使吐蕃尋召還五年上以雲南弗臣命禕持詔往諭之禕即日就道既至見梁王君臣諭以禍福梁王君臣相顧駭服已有降意乃改館而加禮焉未幾元之遺裔有自立朔漠者遣使托克托徵糧餉于雲南且欲連兵以拒王師知梁王持二心因以危言迫梁王梁王兩可未決命達爾瑪匿禕于民間爾瑪知之愈責誚梁王不得已出禕見之托克托欲以威屈禕禕罵曰天訖汝元命我朝實代之我天子使豈為汝屈有死而已顧謂梁王曰汝朝殺我大兵夕至矣遂被害時六年季冬之二十四日也八年上復命刑部尚書吳雲諭雲南而梁王使其鐵知院等二十餘人使漠北為王師所獲械送京師上釋而歸之令與雲俱至雲南之沙塘口鐵知院等謀曰吾屬奉使不達中道被執而還罪必不免乃説雲改易制書共紿梁王雲不從欲殺之而梁王亦遣人來劫雲使降命易服束髪以見雲厲聲斥之遂死十四年命征南將軍傅友徳等伐雲南生擒達爾瑪梁王走死禕及雲死事始聞于朝革除間贈禕翰林學士諡文節文臣有諡自禕始正統間改諡忠文而雲未有䘏典論曰昔李希烈殺顔真卿而王廷凑不殺韓愈夫事固有幸不幸也世多謂子充不即死又從匿民間嗟乎豈知子充者哉王紳王紳字仲縉禕仲子也警敏絶人貫穿經史百家言為文縱横出入數千言可立就宋濂見而竒之曰王華川其有後乎一時材俊皆遜服洪武二十五年蜀獻王聞其賢以書幣聘之教授蜀郡請于王走雲南求禕遺骼不獲即死所祭焉號慟幾絶過者泣下述滇南慟哭記建文君即位言官交薦召為國子博士遂入詞垣編摩高皇帝實錄嘗以禕死事聞于朝得贈諡庚辰冬卒于官所著有繼志齋集三十卷子稌有文行有祖父風孫炎孫炎字伯融金陵句容人也博學雄辨有口才善詩歌好飲酒所交皆豪俠炎負氣蔑視章句儒衆中常自許曰孫炎豈齪齪輩伍耶高皇帝既下金陵開省江南聞炎名召見炎陳元運將終宜延攬智能以圖大業上大喜論事慷慨所謀多當上意從下浙東擢同知池州府事改池州為華陽府即拜炎知府事召為省都事會處州降乃命耿再成守之而以炎為總制錢穀兵馬悉委之不取中報且以省符未署者付之聽得自辟署炎匹馬入處州時城外皆賊營不奉官府約束炎坐㕔事召城中人諭以元將亡及上起兵意爾等皆良民奉法則生否必死語極剴切城中人皆叩頭流血誓不敢有二心炎復下檄旁縣徧諭之由是悉投戈降炎乃擇其驍勇者練為兵而以衆所推服者長之賊至即率以殺賊事罷散歸為農有警馳召之莫敢後者奸吏豪族畏之如神皆謂得孫使君晚時上方寤寐豪傑而秀民有才能者皆竄匿山谷中炎訪得姓名為書招之青田劉基最有名自以嘗仕元耻事二姓使者再往返不起以寳劒一奉炎炎賦詩報之以為劒當獻之天子我人臣不敢私用封還之且為書數千言開陳天命人事以論劉亡何就見炎炎置酒高會縱論古今成敗亹亹可聽劉深嘆服曰基始自謂勝公今聽公論議基何敢望也炎以口舌安反側郡上方征伐無一兵與炎苗將賀仁徳李祐之叛襲炎而炎所練卒反應賊炎被擒幽空室中列卒環守脅炎降炎紿之曰若生吾吾能成若事賊知炎非本意恐自遺患乃夜以燖鴈斗酒饋炎曰以此與公訣炎㧞佩刀割啖之舉巵酒引滿仰天嘆曰嗟乎丈夫乃為鼠輩擒邪飲酒自如卒令解衣炎大罵曰賊狗奴此紫綺裘乃主上賜我者賊勿解我當服此裘以死賊遂殺炎而守將耿再成方與客飲聞苗軍反即上馬收戰卒不滿二十人迎賊罵曰爾衆俘國何負於汝汝反耶趣解甲降不降吾斬汝汝謂吾劔不利耶賊怒欲刺再成再成運劔奮鬭連斷賊數槊賊躍而前槊中再成頸再成遂墮馬大罵不絶口而死再成死炎無援故及於難高皇帝既即位追封再成為高陽郡公炎丹陽縣男建廟處州嵗時祀之炎妻王氏靖難初王師入金陵不屈死論曰國初死忠者如王禕之使滇希烈之真卿也花雲之守姑孰祿山之杲卿也韓成之誑楚沛公之紀信也張子明之偽盟晉人之解揚也而胡越國之死金華孫耿之死栝蒼其事與唐張鎬李絳頗𩔖要之皆能死者其真烈丈夫哉胡大海胡大海字王甫泗之虹縣人高皇帝駐兵滁陽杖䇿謁見語合遂居前鋒從克和州渡江㧞采石太平克金陵與徐達等攻下京口毘陵皆先登授右翼統軍元帥宿衛帳下從破宣城副鄧愈戍守取績溪進攻徽州㧞之元將楊諤勒哲率衆十萬取臨安而命鎮撫李才攻圍徽州大海自婺源兼程以進横槊大呼斬李才擒其將吕旺吕昇賊衆敗走克嚴州遷樞宻院判大海與諸將議曰蘭谿宻邇嚴州蘭谿下婺右臂斷矣引兵攻下之從上取婺州陞僉行樞宻院事攻下諸暨州而張士誠復遣吕珍圍諸暨堰水以灌城大海馳救奪堰水灌珍珍勢蹙乃於馬上折矢誓求解兵大海許之都事王愷曰賊狡滑難信不如擊之可大勝也大海曰比若再來吾當取之言出而背之不信既縱而擊之不武遂引還人服其威信取衢州遂攻處州克之陳友諒㓂龍江上命大海出兵擣信州乃率師攻破信州時信方絶糧衆請還師大海曰信乃閩楚襟喉奈何棄之繕城浚隍為堅守計上以婺為浙東大藩通甌引越非得重臣守之不可乃授大海江南等處行中書省叅知政事守金華苗將蔣英劉震等謀叛率衆入省署陽請大海觀弩八詠樓下遂遇害併殺郎中王愷婺人莫不流涕上聞之震悼為文以祭命配享晉卞壼廟追封越國公諡武莊論曰國初死事者多矣惟胡越公最著聞高皇帝之初下金陵也疆宇未廣首取浙東專城之責付之胡耿禍發肘腋雖知乏先幾而仗節以死可謂壯矣成敗寧足計乎花雲花雲者懷逺人也少孤隨母更嫁張氏驍勇絶倫癸巳謁高皇帝於滁陽使將兵略地所向輒克破懷逺城俘其帥以歸攻全椒㧞之上將取滁州雲單騎前驅猝遇賊數千人遮道顧後騎未至欲退走不可雲獨提劔躍馬衛上横衝賊陣而出賊驚曰此黑將軍勇甚不可與爭鋒後騎至遂克滁從取和州得兵三百人以功授管勾渡江先登克采石取太平上以雲重厚可託因命宿衛常在左右從克金陵陞總管徇下鎮江丹陽丹徒金壇諸縣過馬䭾沙劇賊數百人邀戰雲且行且鬭三日夜悉擒殺之授前部先鋒判行樞宻院克常熟得兵萬人命雲將之㧞常州守牛塘營領兵趨寧國時羣盜蟠結所在梗塞雲操戈前行遇賊輙鬭斬首數千出入榛莽泥淖中凡八日始達寧國尋命守太平陳友諒以舟師入寇圍太平雲率麾下三千人迎戰相持者三日友諒不得入乃引大舟泊城西南軍皆縁舟尾攀堞而上城中乏食而雲士馬俱憊城遂陷賊縳雲急雲怒罵曰賊奴爾縛我我主必滅爾斬爾為膾也遂奮躍大罵縛盡解奪賊刀格殺五六人復罵曰賊奴非我主敵也曷不趣降賊怒碎雲首縛之舟檣衆射之雲至死罵不絶口知府許瑗院判王鼎皆被執不屈而死吳元年上追悼雲封東邱郡侯瑗高陽郡侯鼎太原郡侯立祠太平命有司嵗時祀之方雲與賊戰甚急妻郜氏抱其所生三嵗兒拜家廟泣謂家人曰今城且破吾夫忠義人必以身死之夫死吾必不獨生然花氏獨此一兒若等幸善視之聞雲就擒即赴水死侍兒孫氏收郜氏屍瘞之遂抱兒走匿為陳軍所獲至九江軍中惡小兒啼數欲棄之水孫氏乃潛以簪珥屬漁媼養之王師伐漢漢敗孫氏脱身至漁家視兒瞷漁人出竊負而走宿陶穴中明日僦舟渡江遇陳軍敗還争舟捽孫氏及兒投之江方出投波中有斷木自上流浮來附之入蘆中採蓮實㗖兒凡七日不死忽夜半聞人語聲呼之則一老父也問其姓名曰我雷老也告之故偕行達上所上聞雲有兒即召見孫氏涕泣抱雲兒再拜上亦泣數行下抱雲兒坐膝上曰此花雲兒將種也命賜老父衣老父已不見追之無所得衆以為神雲兒八嵗入侍皇太子就學年十三授虎賁後衛副千户陞水軍左衛指揮僉事名煒論曰國初死忠節者惟花雲最烈而王禕孫炎次之至其妻之死夫妾之存孤事尤卓異即睢陽常山寧足多哉廖永安廖永安字彦敬廬州巢縣人也與俞通海等屯巢湖為水寨左君弼據廬永安等數為所窘乙未聞高皇帝駐和陽遣人納欵且乞援高皇帝大喜親馳赴之永安與弟永忠及諸將奉迎登舟出湖口攻敗元中丞曼濟哈雅水軍徙還和陽六月朔從渡江乗風齊發永安舉帆前導須臾及牛渚守者大駭諸軍奮擊之遂㧞采石乘勝取太平授總管克蕪湖大破海牙軍俘獲萬計擒陳兆先從攻集慶克之拜昭武大將軍統軍元帥與徐達等攻克鎮江毘陵以功陞同僉行樞宻院事宿衛帳下克池州樅陽奪馬䭾沙陞同知樞宻院事再破張軍于福山港及狼山與徐達等攻復宜興轉戰太湖孤軍深入為士誠將吕珍所獲永安不屈遂拘囚之丙午七月丁未卒于姑蘇追封楚國公諡武閔改封鄖國公論曰初高皇帝駐和陽渡江無舟頼永安諸將以舟師迎附得渡定基金陵厥功不細矣永安雖幽囚死不究厥成其節義固足稱也濮真濮真鳯陽人也以忠勇受知高皇帝從渡江定金陵破吳楚北定中原皆與有功由副元帥擢西涼衛指揮陞都督僉事洪武初征高麗兵敗被執高麗王詰之曰無故加兵亦有説乎真曰天子神聖撫有華夏爾國叛服不常遣使諭意不奉明命遣將聲討豈無故耶王愛真驍勇徐曰吾欲用爾為將亦不失富貴真厲色斥之即㧞所佩刀剖心而死王大懼遣人詣闕謝罪併歸真從行兵士上喜真忠節追封為樂浪公子璵甫生數月即襁褓中封西涼侯幼趨朝為多士蹋傷母夫人以聞上命御用監鐫一字玉牌懸其冠上每朝俾人避之論曰濮公剖心不顧一死而夷人失色使國勢重於九鼎真烈丈夫哉韓成韓成虹縣人也壬辰從高皇帝起兵徐泗間破諸山寨甲午克滁州授鎮撫守禦乙未從渡江進克金陵下京口陞元帥守禦金壇從攻常州解牛塘之圍取揚州戊戌從下婺州復池陽敗陳友諒於龍江及取江州南昌皆與有功癸卯陞帳前總制親兵左副指揮使專侍宿衛四月陳友諒率師六十萬圍南昌七月從上親征大戰鄱陽湖自戊子至庚寅三勝之復鏖戰良久賊悉衆合圍數重矢石雨下一時諸將計無所出上方設竒成進曰臣聞古有殺身以成仁者臣不敢辭也遂賜成龍衮冠冕與上服同對賊投水中死陳軍皆呼萬嵗遂解圍御舟乗間得脱竟殱友諒封高陽郡侯建祠康郎山設像祀之成位第一子觀累官都督同知洪武中數討破廣西諸蠻寇及征五開有功革除末年掛征南將軍印廣西操練軍馬尋鎮守廣西永樂九年征交阯既平留觀鎮守十二年卒論曰彭蠡之戰諸將死行間者甚衆廟祀康郎山者凡三十六人而韓成功第一其事與紀信誑楚絶相𩔖至今廣西人談觀威略猺獞畏之如神與山雲齊名語有之蠋飛涓涓育子為蠶觀誠賢不猶出其父之型范乎張子明張子明者不知何許人國初授千户從守洪都嵗癸卯四月陳友諒悉發國中兵號六十萬圍洪都親督兵晝夜攻城期必㧞守將大都督朱文正等嬰城固守被圍者八十五日六月文正遣子明告急於建康子明取東湖小漁舟夜從水關潛出越石頭口夜行晝伏半月始達建康上問友諒兵勢何如子明對曰友諒兵雖多而戰鬭死者亦不少今江水日涸賊之巨艦將不利用老師食少方轉漕武昌若援兵至可必破也上曰汝歸語文正為我堅守一日吾當自取之不足慮也子明還至湖口為陳軍所執友諒曰若能誘城降非但不死且得富貴子明偽許之至城下大呼曰大軍百萬至矣固守以待友諒怒殺之後封忠節侯廟祀洪都于光于光字大用南康都昌人也元末從徐壽輝署江東宣尉元帥鎮鄱陽陳友諒既弑壽輝光謂其麾下曰我不殺友諒可事之乎庚子以饒州來附高皇帝命鄧愈往鎮之光佐焉以功拜江西行省叅政尋授行樞宻院判改戍徽州召還解金連環并縧賜之光頓首謝曰臣䝉厚恩敢不效死辛丑從上親征友諒取安慶江州壬寅從下南昌癸卯從破友諒於彭蠡轉振武衛指揮同知甲辰從平武昌陞鷹揚衛指揮使乙巳取淮東諸郡吳元年擒張士誠皆與有功洪武元年與大將軍徐達等北伐下山東河南諸郡㧞潼關承制以光戍守其地大敗元兵二年移鎮鞏昌王巴拜屢引兵來冦輒擊走之保保復移軍圍張濫于蘭州光馳救之遇賊于馬蘭灘戰敗被執至蘭州城下使呼張將軍出降光大呼曰我不幸被執公等堅守大將軍總百萬師至矣賊怒批其額而死論曰豫章忠臣廟凡十四人而子明位第八及考死事獨子明最竒方其冒重圍出百死以走金陵晝伏夜行竟致其命斯可謂忠且智矣身雖被執以死而大呼不屈城守益堅卒完孤城以殱大憝于光事畧相𩔖因以附焉今獻備遺卷四
