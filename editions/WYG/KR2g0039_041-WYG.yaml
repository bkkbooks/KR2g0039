body:
  text: 今獻備遺卷四十一明項篤夀撰李東陽李東陽字賔之茶陵人戍籍居京師四嵗能大書景帝召見加諸膝賜寳鏹六嵗八嵗兩召試講尚書大義命肄京庠年十六舉鄉試天順八年進士翰林庻吉士𢎞治間兼文淵閣大學士入内閣時占城為安南侵擾請賜詰問東陽曰安南雖奉正朔然負固已久今遣官往小必飾非大或抗命不問則損威多即問罪興師尤貽大患宜勿聴十年中官李廣以燒煉齋醮被寵率同官上疏人君之心必有所繫正士疎則邪說乘間入近以有齋醮燒煉進者此乃異端惑世之術聖王之所必禁宋徽宗崇信道流社稷顛覆金石酷烈一入腸腑為禍百端唐憲宗藥發致疾雖杖殺方士栁泌何益今上清龍虎宫神樂祖師殿及畨經厰皆焚毁無遺是天厭其􅁾亦已明甚矧熒惑失度太陽無光天鳴地震草妖木異四方殆無虚日伏望嚴早朝之節復奏事之期勤講學之功優接下之禮逺邪佞斥誣罔太平之業可保矣科道疏救武岡知州劉遜上震怒俱下獄又同疏申救得釋尋召至平臺奏事云十一年太子出閣加太子少保禮部尚書召見面議四營總兵官去留是年清寜宫災又與同官上疏曰近年灾異頻仍内府尤甚且賄賂公行賞罰失當紀綱廢弛賢否混淆工役繁興軍民困憊下情不達上澤不宣愁嘆之聲上干和氣灾異之積正此之由時康陵即位加少傅兼太子太傅正徳元年又與同官上疏曰近日視朝太遲免朝太多奏事漸晚嬉遊漸廣夫奢靡玩戲非所以崇儉彈射釣獵非所以飬仁鷹犬狐兔田野之物不可育于朝廷弓矢甲胄戰鬭之象不可施于宫禁正人不親直言不聞而此數者交雜于前臣竊憂之近六月中風雨飄蕩雷霆震怒正殿鴟吻太廟脊獸天壇樹木禁門房柱摧折燒毁災異尤甚惕然省悟側身勵精庻可囘天􅇺人不聴又與同官上疏曰先帝顧命惓惓以陛下為托臣痛心刻骨誓以死報邇者地動天鳴五星凌犯星斗晝見白虹貫日群災疊異併在一時歴觀載籍徧閱古今未有如此而不亂者且詔令廢格變易殆盡憂在于民生國計若罔聞知事渉于近幸貴戚牢不可破或㫖從中出略不預聞或有所議擬徑行改易臣若諉顧命之名不盡輔導之責天下後世其謂臣何不報又陳政令十失是冬加少師兼太子太師吏部尚書華盖殿大學士二年逆瑾擅權益恣尚寳卿崔璿御史姚祥主事張偉為邏卒誣執荷校長安門外力救得戍内苑御船獵獸上疏曰今嵗自端陽後金鼓炮火聲徹都邑廏牧厮役紛充禁廷大臣畏忌不敢言小臣震懾不敢諌不知祖宗分軄設官朝廷縻禄飬士將焉用之伏望鑒古道以端好尚視朝加早則炎暑不侵進膳有時則元氣日盛三年給事中安奎御史張彧忤瑾荷校都御史楊一清逮繫至皆力救之是夏早朝有投匿名文書數瑾罪者瑾怒群臣悉逮詔獄又力救五年夏旱霾上疏條四事㑹張永發瑾奸伏誅上以其有反正功加特進左柱國七年流賊數十萬殘破半天下賊就平加䕃一子錦衣衛指揮辭上以京軍不習戰陣欲調邊軍衛京師上疏陳十不便不聴遂乞休卒年七十贈太師諡文正論曰西涯善調護周旋逆瑾間和不失正所保全善類尤多跡其抗言時政要亦侃侃不阿者矣楊一清楊一清字應寜雲南世寜州人父徙巴陵又徙丹徒年八嵗以竒童薦入翰林為秀才成化八年進士為中書舍人出為提學歴南京太常卿𢎞治十五年劉忠宣公言馬政廢壊陞副都御史督馬召詣闕面授勅行明年拜理茶馬鹽馬陜西人素喜一清顧官益髙才益展布條上茶鹽監收事宜及易置馬吏奏請輒允十七年敵入花馬池塞十八年勅往經畧邊務兼巡撫陜西禦敵遂遁去正徳元年改總制三邊兼理馬政是年陞右都御史疏言陜西各邊延綏城堡據險寜夏甘肅河山阻隔敵雖侵犯為患猶淺惟花馬池至靈州一帯地里寛漫城堡稀疎兵力單弱一或失守彼衆拆牆入犯環慶宼固原深入平􅃫臨鞏其間漢土雜處倘兵連禍結内變因之根本動揺誠非細故成化初年北人在套時尚未有邊牆恣肆出入已而巡撫寜夏都御史徐廷璋修邊牆二百餘里開濬溝塹一道延綏地方邊牆壕塹又巡撫都御史余子俊修濬完固北人知不能犯不復入套者二十餘年世平人玩邊備稍踈牆既日薄溝又日淺𢎞治十四年敵竟由花馬池拆牆而入戕破内郡邊人得志始蔑我邊牆為不足畏連年擁衆拆入我軍動輒失利寜夏鎮巡屢奏乞築牆濬塹提督軍務都御史史琳又乞于花馬池韋州設立營衛兵部奏下總制尚書秦紘紘止添修四五小堡及于靖邊至環慶地方挑穵邊塹一道七百餘里自謂可無邊患𢎞治十七十八年冬又復大舉仍自花馬池清水營拆牆深入紘所修邊塹營堡不能捍禦阻遏攻陷清水營殘破花馬池上厪宸慮勅臣經理臣歴官陜西敵情邊事頗甞究心但腹裏頻年旱荒倉廩空虚餽餉不繼彼兵動號數萬倐聚忽散未至而廣徵士馬則徒費芻糧既至而調兵應援則緩不及事縱使大兵既集務速則彼或不來持久則我師先老恐終無以伐其深入之謀沮其方張之勢甞聞防邊之計莫危于戰莫安于守自慶陽環縣延綏定邊寜夏花馬池興武清水營直抵靈州一帯邊城牆堡墩臺躬親閱視廣集衆思兼收群䇿㕘酌損益始有定論其大要有四修濬牆塹以固邊防増設衛所以壮邊兵經理靈夏以安内附整飭韋州以遏外侵當務之急莫先于此但陜西財匱民勞修邊之役人多異議然利害有輕重闗繫有大小大事可成則小費不足計逺效可圖則近怨不足恤今之河套即周之朔方漢之定襄赫連勃勃統萬城也唐張仁愿築三受降城置􅇏堠千八百所自是突厥不敢踰山牧馬朔方無宼嵗省費億計減鎮兵數萬受降逺在河外古今舉大事者未甞不一勞而後永佚𩔖如此受降據三面之險當千里之蔽正統以來浸失其險舍受降而衛東勝已失一面之險又輟東勝以就延綏則以一面之地遮千餘里之衝遂使河套沃壤為彼甌脫巢穴其中深山大沙勢顧在彼而寜夏外險反南備河此陜西連歳兵患所以相尋而莫之能解也兹欲復守東勝因河為固東接大同西接寜夏使河套方千里之地歸我耕牧開屯田數百萬用省内運不然則陜西用兵殆無虚日八郡之人疲于奔命民窮盜起禍將何及今將延綏寜夏一帯邊防設法整飭敵來有以待之雖非上計猶愈于無策彼其聞知或數十年未敢輕犯我得休飬生息東勝之議未必終不可復也世之論邊事者或専主于戰伐臣亦非敢忘戰者方將蒐選官軍策勵將士修車馬備器械儲糗糧明斥堠今冬邊人若復侵犯謹當督率諸將恭行天罰今年套内無事腹裏有秋人民稍安正可有為之日應合經理邊防事冝條奏下兵部議􅃯自經理二年又疏臣即兼廵撫已不能専理馬政今冒總制事益廢閣乞仍遣廵茶御史兼馬政是年引疾東歸瑾惡之已乂逮詔獄長沙力救得釋兵部疏言一清修邊纔有端緒而去凡糴餉費銀十餘萬兩起户役銀十六萬兩及諸犒勞藥餌轉運木石皆一清精神運用計慮周悉今付之新任撫臣意有異同事無統紀恐徒費財靡益邊務乞遣大臣専理議上兵部右侍郎文貴右副都御史張鼐陜西廵撫副都御史曹元乞簡用瑾意不欲修邊内批罷役銀鎔大鏹解京事竟止五年安化王反寜夏召起總制陜西延綏寜夏甘凉各路軍務同張永討賊兵纔至陜仇鉞先已擒賊遂謂永曰藩室亂易除國家内變不可測柰何永曰謂何一清曰公豈一日忘情顧無能為公畫策者遂促席手畫瑾字永曰渠日夜在上傍上一日不見渠不樂今其枝附已成耳目廣矣柰何曰公亦天子信幸臣今討賊不付他人付公上意可知試班師入京詭言請上間語寜夏事上必就問于此時上寘鐇偽檄并述渠亂政凶狡謀不軌海内愁怨大亂將起上英武必悟且大怒瑾瑾誅柄用公益矯瑾行事吕強張承業暨公千載三人耳永曰即不濟柰何曰他人言濟不濟未可知言出公必濟顧公言時須有端緒且委曲上萬一不信公頓首請死願死上前即退瑾殺奴餵狗又涕哭頓首得請即行事無緩頃刻漏機事禍不旋踵永勃然作曰老奴何惜餘年報主乎已而永入京請見如策竟誅瑾永力薦其才望長沙又薦之召入户部尚書尋加太子太保六年改吏部尚書中原盜起上平賊十一策賊平加少保兼太子太保在吏部時給事中王昻劾吏部謫官御史孟洋劾内閣謫官皆為疏救宻雲陜西鎮守太監誣奏廵按御史張璞劉天和王廷相逮下詔獄又疏救之十年入内閣加少傅太子太傅大學士武英殿尚書如故被劾去歸丹徒嘉靖初遣使存問大禮議起閱永嘉疏曰此論聖人復起不能易也張桂内用力薦之嘉靖四年邊人入塞擾闗隴起兵部尚書兼憲職提督軍務陜西未幾召入内閣首薦起餘姚鉛山遂請老亦請老尋加公少師改華蓋殿上憐其老令朝朔望復銳意修邊及選將練兵屯田防邊上亦用公言竟中止惡武定侯勛横驕諷御史陳鏜劾勛奪勛後府及團營八年秋計去張桂霍韜曰議大禮者吾輩三四人張桂去且及我急上疏列一清罪二十四事上立召永嘉還内閣俄朱繼宗獄起坐受張容金錢名請永誌又輙與容指揮世錦衣上憐大臣且老不問言官劾上削籍明年疽發背卒嘉靖二十七年贈太保諡文襄論曰䆳菴以文學顯而明習邊事曉暢軍務有將相才其所陳說修築牆堡詳哉乎其言之也至于定謀誅瑾有社稷功而煩言嘖嘖烏能掩之國初自徐太傅達出為總兵大將軍入為中書右丞相其出將者文襄而後若翟文懿廵九鎮楊文敏三使寜夏甘肅與寜逺西寜謀軍務景泰中王毅愍髙文懿皆以賑濟行江少師督察四川軍情理儲餉行李文正以次輔祭孔廟兼撰碑文以闕里完故重之也席書席書字文同遂寜人𢎞治三年進士初知郯城歴河南按察僉事兼理廬鳳㑹嵗饑請漕臺京粟賤宜截漕粟賑糶積舟車費又數萬皆可易銀轉京庫又便得截粟四十萬石饑民大濟正徳四年陞副使提學貴州延王守仁省城講授十二年右布政使雲南勦霑益搆亂土舍轉左福建聞宸濠反發庫金募兵二萬討賊嘉靖改元陞南京兵部侍郎時江淮南北大饑奏截漕粟五十萬石給軍餉又條上賑法一言江北四郡饑最甚江南八郡蘇松常鎮次之徽池寜太又次之廷中方難得人往賑見書疏喜請以賑事付之書賑有法斂郡縣銀米數并截漕粟戸部賑銀量饑重輕為多寡大抵専設粥以故侵冒者少全活數十萬逾兩月人稍蘇當是時大禮未定桂文襄上疏并錄書及方文襄疏同封進上覽疏喜急徵入京言官論書賑事無法書亦疏辭召尋陞禮部尚書内𫝊下言官又交論賑濟乾没銀八萬兩三法司户部出案之上曰衆且中傷書再遣司禮監官事得白廟議定將下詔令書議詔條書力言不可召至左順門𫝊問又力言不可遂止尋檢姚崇要說上圖新政十二事御史藍田論書自比姚崇是以𤣥宗視陛下大不道乞罷不許削田藉大同軍叛書薦一清守仁討賊時相方主撫議不果又議世廟街宜避太廟及禮樂宜遜減于太廟者四事上大禮集議纂要六卷五年獻帝實錄成進少保時已失明薦羅欽順自代修明倫大典充總裁官六年加武英殿大學士賜第給俸留京師卒贈太傅諡文襄弟春吏部侍郎論曰席公舉荒政策亦甚良坐是竟被煩言頼先皇明聖得白然亦岌岌矣卒被恩眷以功名終若席公才烏能久為人下乎張孚敬張孚敬初名璁字秉用永嘉人七試禮部正徳十五年始得舉進士明年嘉靖改元賜進士時議大禮未定公上疏為上極言父子之倫不可奪是年冬授南京刑部主事嘉靖三年上疏上召與衆廷議竟如公說陞翰林學士四年進廟議陞詹事兼學士五年陞兵部右侍郎轉左謁廟議及奉安獻皇帝神主儀六年兼翰林學士進大禮要略命修明倫大典是年八月詔訊李福達獄署都察院事公卿臺諫郎署多得罪謫戍削籍福達竟脫死十月陞禮部尚書兼文淵閣大學士入内閣賜銀圖書二忠良貞一䋲愆弼違公遂奏革鎮守内臣清勘皇親庄田七年加太子太保辭遂再加少保上享太廟見公喜賜詩稱公貌竒才傑進姚溪書院集賜書院名貞義六月明倫大典成加少傅進太子太傅吏部尚書謹身殿大學士建議請嚴宣諭杜私謁重制誥平潞賊定服制應制陳言曰審幾微専委任惜人才求民隠八年勅重脩大明㑹典是年與桂文襄不相能八月降勅諭百官並勒致仕公至天津召還九年有四郊之役知營建事脩祀儀成典進郊祀議又請倣古立九嬪以廣儲嗣又正孔子祀典去王號以名與御名嫌請更名上改名孚敬字懋恭十年雷震午門西樓致仕十一年召還三月加兼太子太師進華盖殿少傅尚書如故八月又致仕十二年四月召還十三年加少師餘官如故十四年病乞致仕十五年命錦衣千尸視病諭疾愈還朝至舟疾作歸再起至金華疾又作歸卒年六十五嵗贈太師諡文忠論曰張公晚遭其遇合甚竒即其議禮明倫裁罷鎮守百代不能易也方永陵初朝著建論殆紛紛矣公危言激說不隠豪強舉袂抗顔頓挫卿相中人貴近廩廩下之可謂傑矣惜議獄一事黒白交亂數起詔獄是誰階之其被恩遇天子命名賜字不甚隆乎今獻備遺卷四十一
