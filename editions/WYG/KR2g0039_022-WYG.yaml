  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_022-1a, image: WYG0453/WYG0453-0631a.png}
body:
  text: 今獻備遺卷二十二明項篤夀撰劉實劉實字嘉秀江西安福人宣徳庚戌進士選翰林庶吉士除金華府判值嵗旱郡多逋賦實奏貸之贖還所鬻子女郡中有顔孝子宗澤吕東萊祠墓下令脩治義門鄭氏合爨久漸不能自給又嵗供山西驛馬實奏免之景泰中召脩宋元史于東閣擢知南雄府中貴人使嶺外惡實慢已將呵辱之南雄民争走入驛為實謝過以身翼實而出中貴人大驚詢知其素欲召與釋實不復往中貴人去至韶韶人言南雄守已驛書言公矣中貴人乃亦以驛馬兼程疾馳先聞逮至京師實入見具言臣従官三十年不以妻自隨餐粗衣敝欲為國家愛養小民不忍勞費之以是觸忤天使無所逃罪上意解將釋之尋病卒實好學尤長於春秋所著書今不存陳選陳選字士賢浙江臨海人也天順庚辰進士拜監察御史純皇帝嗣位上疏言君子小人進退治道所係不可不慎言甚剴切提學南畿陞河南按察副使初治軍尋改提學遷按察使以憂去行李蕭然士民遮道泣送為樹碑立祠擢廣東布政使首罷和買減徭役備賑濟數辯寃獄閩人賴克夀等三十九人漁于海風漂其舟至潮守者獲之以通畨論邑民黄福等十九人被誣為盜悉辯出之奏減提督市舶役户三十人畨人馬力麻私通海商詭稱蘇門答剌國使者市舶利其貨不問選發其偽賽瑪爾堪使者以獅子入貢浮海還國云欲往滿剌加更市獅子選言此西域賈人圖利耳使墮其謀必貽安南諸夷之笑中貴人素憾選以他事誣奏之勘事者文致以罪竟就逮廣人數萬號泣遮留之中貴人復以賂誘選所黜吏張聚令誣證之聚死不従行至南安病死論曰劉公能使其民赴救急難即古之循良何可得過陳公被逮張聚不敢以怨賊故誣之亦猶李平之哭諸葛者與楊繼宗楊繼宗字承芳山西陽城人也天順丁丑進士授刑部主事獄中重辟囚多瘐死繼宗每提牢必給食飲三日一櫛沐全活者衆擢知嘉興府以蒼頭一人自隨若旅寓然御史楊瑯奏最下詔旌之九載滿去民遮道泣留為立去思碑陞浙江按察使憲度振肅初藩臬諸司所用皆取辦于下鎮守中官日給萬錢悉革去之丁内艱去將行悉以廨中物付有司篋中惟律數卷衣數襲而已制終詔起陞左僉都御史巡撫順天權貴斂跡成化乙巳上疏左遷雲南按察副使𢎞治九年陞湖廣按察使復陞左僉都御史巡撫雲南卒于官論曰楊公清嚴疆遂赫赫擅聲郡中婦女孺子皆知其名至今稱之不衰兩漢良吏不逮也嗣後有徐公盈何公祉郭公應奎劉公慤皆以清介稱而劉公又有禦倭大功此其葢棺論定最章章者也又曰海寇初發難也當事者拘文守常鮮應猝弭變之具罕有果敢奮發踔厲徼竒懐保困窮拊循元元者嘉靖癸丑甲寅間吾郡外迫寇暴内苦軍興葢蒿然無所歸命矣一里涇及呉淞江之兩遭寇也東北近郊民家掃地㡬半是時兵不集援不至寇玩民殃極矣乃郡侯萬安劉公竭心力鼓將吏嚴城固守逺郊士民攜扶而至號呼城外且欲嬰城閉扄公曰賊來飈至其去鳥散門可長閉乎且吾恃有以御賊不在閉門請毋閉門而嚴其備即有變請受其咎民賴以蘇而城因以完者皆其力也寇既退人情多欲休公曰不可斯非補牢顧犬時乎顧吾民病甚而吾不可以乏興簡徒繕卒保連伍長使士之材諝者將之卒伍成乎内軍正定乎外然後離散者還戢安集矜寡幼孤各得其所而郡人忘焚掠之􅉃矣乙卯之後即文武大吏謀㫁相資式遏寇亂得無亡矢遺鏃之費者公不有力哉公名慤在郡凡五年平易近人人無敢干以其私者清介如楊公而幹局更優有文武材民到于今思之専祠如楊公云傳曰所居民富所去見思生有榮號死有奉祀詎不信哉林鶚林鶚字一鶚浙江太平人也景泰辛未進士拜監察御史論事持大體監試京府大臣子有不預薦者誣考官狥私奏之而鶚之邑人林挺方中式因逮挺將中鶚以法及閱驗試卷皆如式事乃得白英廟復辟陞鎮江知府陛辭召見諭勞太官賜食給鈔為道里費至郡興脩弛墜口不及前守者之短鎮江漕河經孟瀆頗險言者請鑿河自七里港引金山上流通丹陽以避之上官主其議鶚言道迂且多石壊民廬墓多不如按京口牐甘露壩故跡因而浚之春夏以牐秋冬以壩則道近而工省従其言果便壬午撫臣劉孜言鶚材宜治劇請以蘇守姚堂易之踰年擢江西按察使遷布政使議獄多平反廣信民妄𫝊神異逺近驚疑鶚榜諭之戮其魁恠遂息嵗饑奏減恒賦十五萬禁樂户買良人女遏嶺南洞蠻不使入境召為刑部右侍郎獄必以情人無寃者以孝敬聞卒之日圖籍之外嚢槖蕭然論曰蘇守自况公外有姚堂林鶚之清謝公鐸嘗稱林曰古人有言居官亷雖大臣無厚蓄林公真其人哉今獻備遺卷二十二
