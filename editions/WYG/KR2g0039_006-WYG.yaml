  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_006-1a, image: WYG0453/WYG0453-0552c.png}
body:
  text: 今獻備遺卷六明項篤壽撰楊士竒楊士竒名寓以字行江西泰和人也少孤好學郡縣交舉皆不就革除間翰林脩撰王叔英薦之徵入翰林任編纂授齊府審理副文皇即位擢編脩時方開内閣命解縉黄淮胡廣胡儼楊榮金㓜孜及士竒七人處其中典機宻尋陞侍講仁宗皇帝立為皇太子兼左春坊左中允嘗於文華殿呈大學講義上曰先儒謂堯典克明峻徳章一部大學皆具士竒對曰二帝三王脩身治天下者皆大學之道上曰孟子道性善言必稱堯舜講説之際以古為證庶幾易入侍講學士王達講乾九四舉儲貳為説皇太子以問士竒對曰此出宋儒胡瑗曰與常人言亦舉此説乎士竒曰程子嘗言卦中六爻人人有用且王昭素嘗為宋太祖言之講臣非有據豈敢妄出意見皇太子嘗閲文章正宗喜之士竒曰徳秀真儒其著大學衍義尤有益君臣皇太子取視命刻之饒州人朱季友獻所著書斥濂洛關閩之説上怒曰此儒賊也羣臣請罪之士竒曰當火其書毋令惑人從之廣東布政徐竒朝京師以嶺南藤簟諸物將遺廷臣或得其目以進上閲無士竒名獨召問故士竒曰竒自都給事中受命赴廣廷臣皆作詩文贈之故有此餽臣時病偶不與為物甚㣲受否亦未可知上意乃解禮部尚書鄭賜為侍郎趙羾所間憂搆疾暴卒上以問諸臣士竒曰賜病數日但未敢即安耳上曰㣲汝言幾誤疑之賜本君子第才不足耳六年冬詔廵狩北京命士竒視草上稱善又命與諸尚書觀之兵部尚書劉儁曰道中供帳皆已自備請以有字易自字士竒善之奏用儁言明年駕幸北京皇太子監國命士竒同蹇義等輔導贊善王汝玉每以詩法進皇太子以問士竒對曰詩以言志明良喜起之歌南薰之詩可見舜之志漢高祖大風唐太宗雪耻除兇之作所尚者霸力非王道漢武秋風辭志氣已衰若隋煬帝陳後主皆淫靡不足道殿下講道之暇兩漢詔令皆可娛意禆益治道詩非所急也皇太子曰儒者作詩否士竒曰儒者固作詩然儒品不同有道徳之儒有經濟之儒專意詞章君子謂之俗儒人主尤當辨此皇太子喜讀易命取朱子本義纂其要以進名周易直指士竒因進曰易固為卜筮作然脩齊治平之道悉具請編緝以備觀覽書成名曰周易大義九年上還南京召問東宫果何如以孝敬對使言其實對曰有事宗廟祭品祭器皆親閲每進御用物皆親閲封識車駕北征不敢寧居恒日中昃始食駕還而後即安上曰此子道當然士竒曰古聖賢亦皆盡其當然者耳且殿下天資高或有過未嘗不知知之未嘗不速改其存心以愛人為本將來必不負付託之重上悦十二年正旦日食先是上以問羣臣曰正旦日食行賀禮否禮部尚書吕震曰日食與朝賀不同時當賀侍郎儀智曰終然同日宜免賀士竒曰日食大變宋仁宗時元正日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有還自契丹者言彼是日罷宴仁宗悔之今宜免賀上曰君子愛人以徳士竒智言是也遂免賀及宴十四年上聞高煦有異志疑未決獨召問士竒對曰漢王始封雲南不肯行改青州又不肯行今知將遷都北京惟欲留守南京天下疑之惟陛下善處以全大恩上黙然後數日悉得其狀大怒縶之西華門内皇太子力救乃命削兩護衛處之樂安州曰此去北京邇即作禍可朝發夕擒也是年冬周王楚王來朝謁孝陵上命皇太子皇太孫及諸皇孫陪謁以問翰林諸臣拜位當何如士竒對曰二王尊屬當分列居前東宫稍後居中皇太孫又後亦居中諸皇孫與太孫同班而分列兩傍上出片楮所書位次與士竒言合下有六字未書授士竒筆足之遣人持赴陵所遂以宸翰賜士竒上命擇廷臣侍皇太孫講讀士竒以儀智薦衆老之士竒曰智道理明執守正老成正大廷臣無比上曰智雖老識大體能直言不阿向言元旦日食宜免賀可謂得人矣仁廟即位進禮部侍郎兼華蓋殿大學士尋陞少保進少傅詔減冗費惜薪司例賦北京山東棗八十萬斤為香炭之用士竒奏減其半尚書吕震言于上曰今喪服已踰二十七日請如太祖倣漢制易吉服上未答震徧語羣臣易吉士竒曰今未可比此例蓋洪武中有遺詔且仁孝皇后崩太宗皇帝衰服後仍素衣冠絰帶者數月今可遽即吉乎明旦上素冠麻衣麻絰出視朝文臣惟士竒武臣惟英國公張輔如上所服既罷朝上諭左右大臣曰吕震奏當易服梓宫在殯吾豈忍之士竒所執是也張輔知禮文臣乃不如邪時天下諸司來朝兵部尚書李慶言民間畜馬蕃請令朝覲正佐官領馬嵗課其息士竒奏言朝廷求賢任官今乃使養馬而課責與民同豈貴賢賤畜之意乎不報士竒復極論之陜西按察使陳智亦言畜馬不便詔止散馬已領者准官員乗馬例勿責其息上監國時御史舒仲成常以事忤㫖後陞為湖廣按察使因他事逮治士竒疏曰向來得罪者陛下即位多宥之今追理仲成即詔書不信上即命罷治仲成大理少卿弋謙言事過激上免謙朝士竒曰陛下使謙因言取咎人將謂朝廷不能容直言遂令朝如常且令百官言事毋以謙為戒上賜璽書加勞且製楊貞一印賜之上嘗論科舉事曰北方學問不逮南人士竒曰長材大器多出北方如取百人則南六十人北四十人則無遺材矣宣廟即位遂行之元年高煦反上親征罪人既得尚書陳山請移師襲趙王上問楊榮榮贊決之士竒不可曰太宗皇帝惟三子今上惟二叔有罪者固不可恕無罪者自宜加厚上不懌而止駕還言者猶未已上皆不聽特召士竒問之對曰趙王於陛下最親當思曲加保全之豈可惑於羣臣乃命廣平侯袁容都御史劉觀持璽書往諭趙王得書喜曰吾生矣即獻䕶衛上表謝恩而言者頓息二年安南黎利乞立陳氏後上召士竒與楊榮謀之榮曰永樂中費數萬人命得此至今勞者未息困者未蘇因其請而與之便士竒曰榮言當從數年來兵民困于交阯極矣願勿疑上意遂決七年建議方靣及郡守請令京官三品以上及布政按察使薦舉吏部審其可用奏授以官後犯贓罪併坐舉者軍民中有才行卓異及智勇精於武略者亦宜察舉唐虞之世罰弗及嗣今極刑之家有賢子弟例不許進用非鯀殛禹興之意也上皆從之正統初數上書言軍國大計多見采聽進少師柱國八年卒年八十贈太師諡文貞士竒有文學立朝四十年公正不阿論事必當大體常扶君子而抑小人取人必先徳行而後才能總裁三朝實録悉徵諸實尤篤於故舊解縉尹昌隆之死言於仁皇皆存其後所著有三朝聖諭録及東里文集行於世論曰世稱相業必曰三楊而文貞尤為稱首歴事五朝既專且久其所匡贊動必以正可不謂貞乎夫其勲徳文學人已罕儔而休休樂善無少媢嫉斷斷大臣庻其近之矣楊榮楊榮初名子榮字勉仁福建建安人也洪武末舉鄉試第一㑹試第三登進士擢翰林編脩文皇即位更名榮簡入内閣典宻務榮年少警敏一日晚上出右順門召内閣諸臣獨榮在上出示江西三司所奏吉安鄉民之嘯聚者已悉復業蓋朝廷初遣行人許子謨齎􅃯撫諭子謨行將一月又遣都督韓觀率兵繼之如撫諭不下即加兵及是奏至上諭榮曰觀不至不下其降勅褒觀對曰計發奏之日觀尚在中道不足褒從之時四方事殷上時至閣中閲所治稱㫖進脩撰復進侍講五年奉命往甘肅視邊還稱㫖七年春扈從北京甘肅總兵何福奏言托克托布哈等率所部來歸命榮馳往處置還奏上悦命持節即中軍封福為寧逺侯八年扈從北征巴尼雅實哩重脩高皇帝實録為總裁十年甘肅守將西寧侯宋琥奏叛冦婁達罕逃居齊勤蒙古衛將為邊患時豐城侯李彬鎮陜西勅彬勦之且命榮往與彬計度可否還奏餉艱沍寒小醜不足煩王師命罷征亡何叛者復歸十一年從狩北京十二年扈從征衞喇特既還脩性理五經四書大全榮為總裁十四年陞翰林學士十七年進文淵閣大學士十八年扈從北征是冬將西征親藩奏建文中江西所集民兵可徵用上出奏示榮對曰陛下命罷之已二十年矣今復徵非信遂寢三殿災陳便宜十數事皆見施行尚書夏原吉以兵餉不給坐繫侍讀李時勉數言事上怒榮悉為辯解兩從北征軍務悉以委榮中道軍餉不繼請班師詔可浙江奏麗水政和山冦刼掠請合兩省兵討之榮言愚民為有司所苦耳願遣使撫諭不足煩兵上從之師次榆木川文皇帝上賔凡喪禮軍務悉決于榮馳歸報仁皇帝即位進太常卿進太子少傅兼謹身殿大學士陞工部尚書賜䋲愆糾謬銀圖書文廟暨仁廟實録皆榮總裁宣徳初髙煦反榮首勸親征扈從討平之馬騏激變交阯黎利叛偃兵息民榮有力焉是年八月車駕廵邊至遵化聞敵逼塞下以道隘師難竝進上率鐵騎數千先馳擊之文臣獨榮從既還陞少傅正統初脩宣廟實録榮復總裁書成進少師五年謁告還京道卒贈太師諡文敏榮闓疏果毅遇事當為奮前不疑議刑辟片言立決務歸寛恕勤職事盛寒暑及小疾未嘗少怠於四夷邊徼事及邊將勇怯靡不通知内篤孝友睦婣之行喜賔客濟窮恤患無問疏戚貴賤大小皆歸心焉所著有北征記及文集行於世論曰文皇帝頻征朔漠文敏輙扈從與宻謀善斷大事當是時稱西楊文學東楊政事國家有大議文敏一言決之彭惠安公贊文敏曰文武通才信矣哉楊溥楊溥字𢎞濟湖廣石首人也登革除庚辰進士授翰林編脩永樂初仁宗皇帝正位東宫陞司經局洗馬兼編脩一日東宫觀漢史嘆張釋之不易得溥進曰釋之誠賢然非文帝寛仁何由得行其志臣以為釋之在漢不易得如文帝三代而下不易得也退采文帝事編為事𩔖以獻仁廟喜甚賜書褒美漢庶人搆陷宫官下錦衣獄十餘年家人供食數絶糧又上命叵測方勵志讀書不輟每對人曰朝聞道夕死可也甲辰仁皇帝嗣位榮獲釋拜翰林學士進太常卿兼翰林學士宣徳正統間入内閣歴官少保兼禮部尚書朝廷大制作多出其手時名臣稱三楊文貞江西人為西楊文敏因居第為東楊而溥以郡望每書南郡乃號南楊溥謙恭小心接吏卒亦不敢慢鄉試時胡儼典文衡批其文曰初學小子當退避三舍老夫亦讓一頭地又曰他日立玉階方寸地必能為董子正言不效公孫𢎞阿曲也遂薦第一世稱儼為知人後儼為祭酒溥在禁垣執門生禮不衰儼亦不辭人兩高之論曰文定遭䜛幽繫十有餘年苦心力學不改故初卒致通顯居高思危謙虛下士靖共事君迹其勲徳亦文貞文敏之流匹也世稱三楊詎不信然今獻備遺卷六
