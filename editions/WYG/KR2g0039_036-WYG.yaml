body:
  text: 今獻備遺卷三十六明項篤夀撰鄒智鄒智字汝愚四川合州人也年十二能文章登成化丁未進士選庻吉士孝皇朝御史湯鼐當侍班糾儀智造其私第告曰祖宗朝御史糾儀得面陳政務得失近年遇事惟退而具本此君臣之情所由間隔不通也公以言官奏對幸值大政維新之日請効故事此太平機㑹也吏部尚書王恕徴至京智曰三代而下人臣不獲見君事多壅蔽願公弗受職先請見君政之可否歴陳于前庻其有濟一受職再無可見之時矣恕善其言是嵗冬星變智抗疏極論隂陽之理請黜萬安劉吉尹直而用王竑王恕彭韶疏入不報𢎞治己酉言事者誣知州劉概御史湯鼐妄議朝政事連智下錦衣獄身親三木神色自若供詞略云智與湯鼐等往來㑹聚或論經筵不宜以大寒大暑輟講或論午朝不宜以一事兩事塞責或論紀綱廢弛或論風俗浮沉或論生民憔悴無賑濟之策或論邊境空虛無儲蓄之具議者欲處以死刑部侍郎彭韶辭疾不判案獲免左遷廣東石城吏目之官甫兩月廢政悉舉居無何暴病卒論曰􅏝諤風衰士多緘黙以射富貴間有能自樹立者必摧挫不能容其身以死如汝愚者世豈少哉黄鞏黄鞏字伯固福建莆田人也𢎞治乙丑進士授徳安府推官部使者交薦之以考績留為刑部主事堂官皆遣子就學令掌一部奏牘尚書何鑑轉兵部奏調鞏為兵部主事倚任尤専正徳甲戌進員外郎充㑹試同考官得馬理等三十餘人皆知名士歴車駕職方二司郎中以母䘮去服除時武宗北狩人心危疑或謂鞏勿出鞏題其書室曰茅屋石田為生太拙䲭夷馬革自許何愚盖已有志殉國矣補武選郎中已夘春有㫖南廵時寜藩蓄逆上下以為憂大臣科道交疏不聴諸部寺司屬咸起而諍之鞏以其事出于邊將江彬誘惑彬方席寵擅權無敢及之者鞏獨疏六事略曰陛下臨御以來祖宗之紀綱法度一壊于逆瑾再壊于佞倖又再壊于邊帥至是將蕩然矣天下知有權臣不知有陛下者寜忤陛下而不敢忤權臣陛下弗知也亂本已生禍變將起竊恐陛下知之晚矣試舉圖治六事於今為最急者為陛下陳之其一曰崇正學二曰通言路三曰正名號四曰戒遊幸五曰去小人六曰建儲貳文多不復載車駕員外郎陸震見其疏稿願同署名以進疏既入自分必死為書别知友托以後事彬果大怒欲必寘之死乃下詔獄廷跪五日杖百餘除名陸竟死鞏幸得甦以詩遺其弟曰不用汝謀方至此須知吾道固當然盖萬死不悔也兩都盛𫝊鞏疏幾于紙貴盖無不嘆其剴切者鞏歸杜門著述家貧留客輙貸米鄰舍日中未舉火晏如也嘉靖初起為南京大理寺丞尋病卒贈大理少卿論曰武皇南幸外有宸濠之覬覦内有江彬之惑亂危疑甚矣黄公獨危言極論明白痛切可為流涕世所傳諫書未有及之也乃卒以夭死是曷故哉今獻備遺卷三十六
