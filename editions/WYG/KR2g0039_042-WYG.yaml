  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_042-1a, image: WYG0453/WYG0453-0718c.png}
body:
  text: 今獻備遺卷四十二明項篤夀撰李夢陽李夢陽字獻吉陜西慶陽人年十八舉鄉試第一明年𢎞治癸丑舉進士授户部主事倡為古文辭時外戚張氏怙寵驕恣聲焰薰灼莫敢問夢陽上疏論之語極切直下錦衣衛獄掠問辭氣慷慨無所撓孝廟召見大學士劉健李東陽謝遷問李夢陽宜何如健叩頭對曰夢陽狂直不足深罪遷從容對曰夢陽雖狂然其心無他實欲盡忠于陛下孝廟曰謝先生言是有㫖夢陽復職一日孝廟獨召見兵部尚書劉大夏問日來外間事何如大夏曰近釋李夢陽中外歡呼聖徳如天地之大孝廟曰初下夢陽獄有勸朕杖之者恐殺直臣故釋之大夏曰此堯舜之心也夢陽既材髙不肯同流俗人以是多忌之者久之遷江西提學副使振起古學力變士習時宸濠懐逆召致文學士以夢陽有大名折節下之按察使鄭岳為濠所陷而夢陽與岳素不相能岳既得罪謂夢陽傾之也遂相訐奏夢陽閒住歸大梁濠敗辭連夢陽賴刑部尚書林俊力救得免後桂萼方獻夫霍韜暨撫按數論薦不用卒子枝善文賦有父風舉進士終海州判官論曰昔人言文章與時髙下不其然哉漢氏去古未逺而遷向雄固之下亦鮮稱矣殆後韓栁歐王蘇氏父子各以所長擅稱漢唐而說者猶低昻之昭代文章發于金華數子而宋劉二公潤色鴻業特尚典則雖竒麗不足而朴醇有餘氣運熈洽使然也𢎞治間李公夢陽以命世雄才洞視元古謂文莫如先秦西漢古詩莫如漢魏近體詩莫如初盛唐乃與姑蘇徐禎卿信陽何景明作為古文辭以蕩滌數百年來之陋而後學者有所凖的彬彬郁郁蔑以尚矣李公才最髙其人負竒氣傲晲一世以是得竒禍坎􅇄終其身世咸疾之如讐世𫝊李公䨇瞳烱烱如電論古今終夜不少休世莫能容良有故矣若李公者安能使無聞哉何景明何景明字仲黙河南信陽州人八嵗能屬文十五舉鄉試第三明年㑹試以文多竒字不第入太學比歸祭酒林瀚賦詩贈之𢎞治壬戌舉進士授中書舍人方逆瑾用事上書諸大臣言宜自振立以抑瑾權不用謝病歸踰年免官瑾敗大學士李東陽薦復授中書舍人直内閣制勑房經筵官其友李夢陽遭江西之訟衆多謀孽其短莫肯為直者景明獨上書争之訟得辯乾清宫災上書陳時政言人事不修天變將作且詆義子不當蓄宦官不當寵疏留中不下時四方學士咸願知景明車馬填門巷錢寜欲交驩景明持畫求題謝曰此名畫不可㸃汚卒不許進吏部驗封司員外郎仍直内閣陞陜西按察司提學副使政尚嚴務在崇本起弊士初稍不堪久而安之病嘔血棄官歸卒于家所著有何氏集十二論及雍大記常曰文靡於隋韓力振之而古文亡於韓詩弱于陶謝力振之而古詩亡於謝人以為知言論曰𢎞治初北地李夢陽首為古文辭變宋元之習文稱左遷賦尚屈宋詩古體宗漢魏近律法李杜學士大夫翕然從之同時濟南邊貢姑蘇徐禎卿及景明最有名世稱四傑四人者才各有所長李天才雄健徐陶冶精融而景明藻思秀逸皆藝苑之傑也邊公朴質有餘而華采不足豈天限之與徐禎卿徐禎卿字昌穀呉人也善屬文弱冠作談藝録以究詩體之變斷自漢魏而止舉進士與北地李夢陽遊李方以文雄海内見禎卿所為文異之特相友善人稱徐李禎卿善賦頌怪揚雄反騷作反反騷賦其辭曰稽卬氏之攸肇兮纍楚均之遐瓞侯帝頊之流裔兮承靈澤之汪澈夙陳力於皇軌兮歆仁朗之所廬反仰吾均之潔修兮羌引軀以伏羲播昌烈之赫煜兮雧衆芳之菲菲憤遭世之眊濁兮雜紛揚於江之汜在炎漠之微季兮孰臨岷而悼均投束藻之谹麗兮何理拙而誹深寃志而抑道兮冀披誦而有明惟帝鑒之孔聖兮敢黨族而誣貞初均幼志於粹清兮乃中情之獨與􅏝厲節以植身兮熹浩蕩之脩譽進亹亹於中行兮恐日月之凋邁凖前脩以共蹈兮遑先時而逆敗約性行以赴榘兮經五常以綴佩靈脩謂其允淑兮目成歡而叶妃夫均既沐靈修之眤澤兮又信言之噲噲苟中路而遷好兮寜予心之有介汎光華之的皪兮衆姢姢而妬之何有懼䜛與招慝兮排蛾眉而錯之颺蕙服之芬郁兮遭紛媢而幽毁寜遭幽以迸斥兮敢詭汚而合􅁾鳯凰翔林而挂經兮龍行陸而困蟻為鳯凰神龍豈無知兮亦處身之多虞所貴賢者之韞玉兮不迷邦而遐舉哀宗社之不長兮比干皇皇而不忍去世蔑復以相明兮心耿耿以無從涉湘波以南愬兮昭均心之確忠俗叢蕭而鄣蘭兮寔重華之所醜効精白以殞軀兮自先聖之所厚奉靈氛之𤣥筮兮申以巫咸之嘉告覽九州以求匹兮寜閨容之有淑則神古其未然兮豈均曾好此詭疑諗從人以辱義兮不如赴身於淤泥飱莠芬以介齒兮竟河清之難俟違苟生以保譽兮夫何悔於九死泛浮雲之翳翳兮晦沉茫其曷排陽陵微而渝度兮晨北風又雨霾精徘徊而不去兮憑拙誠其未爽人情重于捐故兮焉冀白日之囘光懐薜蘿與荰蘅兮時不與其有芳雜緄粒以颺波兮馥烈烈其彌章精氣通于至清兮神髣髴以憑虚駕玉虯與雲驂兮訪太素之舊廬聞至道其可承兮欽均誠之匪懈舍佚遊以自湛兮夫何以誅其好怪昔貞士之䝉佞兮憤伏斃而靡悔務光沉於淵瀬兮將惡浮埃之霏䨴忠賢忉切以苦身兮盖有隠於隳祚韙三仁之所裁兮見嘆譽於孔父獨耿耿而靚侮兮曽吾均之所尤卬愬之惟詖兮駢執正於陽侯作書與李夢陽論文載集中初授大理寺副非其好也上書乞改國子監博士好飬生習攝形化氣之術久之病死京師所著文集六卷談藝録一卷新倩集一卷其文純雅出入漢魏間曹陸弗過也論曰初𢎞治間海内淳耀縉紳先生翕然興于學厭時俗頽薾踔厲振􅌺務撫先秦西京之畫而詘唐宋當是時李獻吉尚型范而何仲黙貴幼眇號稱復古天下嚮風焉徐生崛起江南雄視中土議論雄辯飇飛泉涌即才不逮識而鎔冶雕飾歩凖趨䋲華而不靡質而不俚深而不晦壯而不怒約而精騁而中節斯亦竒矣頻嵗以來風尚日茂卓然名家者何啻十倍顧文勝之弊其流滋煩靡靡同風漸而怪僻甚且奴僕左馬掇拾莊荀竒字澁詞意庸識淺方乃雄視千古恣情䋲弹誕滯浮薄即文藝未足數也况器識乎今獻備遺卷四十二
