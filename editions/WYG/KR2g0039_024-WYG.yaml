front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_024-1a, image: WYG0453/WYG0453-0638a.png}
body:
  text: 今獻備遺卷二十四明項篤夀撰王恕王恕字宗貫陜西三原人也正統戊辰進士選翰林庶吉士授大理左評事陞寺副上言刑罰不中者六事命著為令出知揚州府嵗飢𤼵廩不俟報遷江西右布政使𠞰平流賊呉廣華尋拜都察院右副都御史撫治南陽荆襄流民南陽豪争礦殺人恕擒其魁餘悉解散以内艱去襄陽盜起詔恕起復㑹兵擊走之與平劉千斤有功初大將欲縦兵搜山恕不可復榜諭流民復業巡撫河南嵗旱蝗上疏自劾且乞崇儉去奢以回天意入覲言時政六事上采納焉改刑部左侍郎巡視漕河上疏乞禁馬快船私貨及轉輸通州倉糧赴京汰巡河冗官上皆納之尋改左副都御史巡撫雲南陳禦邊方畧時鎮守中貴人私市外國誅求無厭恕劾之逮械其同事者輸所没寳石于京師陞右都御史中貴人獻黄鸚鵡恕疏言其不可時有駕帖下郎中鍾蕃所恕言故事駕帖下諸司司禮監用印刑科掛號皇城諸門闗防今皆無之何以為信又曰昔交阯鎮守非人致一方陷沒騰衝一夫啟釁致麓城叛逆今日之事殆又甚焉不報在雲南凡九月疏二十上進南京兵部尚書㕘賛機務請出内庫物貨易銀以造官艦江北五衞京操官軍不宜放回己亥命巡撫南直𨽻條上六事請禁兩京收糧官苛政罷光禄寺厨役所食白粲易以脱粟従之恕以中官貢獻太多所在擾害疏乞取回織造官凡四方珍玩竒貨戒勿復獻不報辛丑江南夏旱秋大水奏免蘇松常鎮應天太平六府湖州秋糧馬草㡬百餘萬故事應天鎮江太平寧國廣徳官田減半徴而民田全免久之民田多歸豪家而下戸多官田力為損益量減官田稍増民田公私便之中官王敬乗𫝊東南搜索竒玩同惡王臣孫麟尤暴横所至驚懼恕上言其失人心傷國體致召災沴詔下戒敬太監段英奉命蘇松造藥梅氷梅恕極言不可因併論王敬先是敬誣奏常州知府孫仁復誣奏恕憲廟不問宻遣人偵敬盡得其姦状乃收捕下獄敬戍孝陵衞王臣斬首東市梟之江南恕因申救仁得復任上林苑録事邵義𫝊奉遷蘇州府判具疏論之有㫖革為民併降黜李孜省等十二人甲辰轉南京兵部尚書仍㕘機務刑部員外郎林俊以諫造永昌寺下獄經歴張黻救之亦下獄恕言二人以忠得罪恐百官自此以言為諱設有奸邪誤國誰復言者疏入令致仕孝廟即位召為吏部尚書尋加太子太保抑僥倖奬名節拔滯淹中外無敢以私干者守備蔣琮與南京給事中周紘御史張昺相訐奏紘昺外補琮自如恕言宫府一體陟罰不同上未允行言官復交奏之紘昺乃得改京任徽王乞陞禹州為府晉王乞為世子設典膳皆論止之兩廣都御史秦紘奏安逺侯柳景不法坐致仕去恕極言紘當用乃起為户部尚書知州劉槩御史李興以忤劉文穆下獄恕為力辯得減死内降以通政司經歴髙禄為本司㕘議恕言之中寢恕嘗謂天下事設未得當十易無害若謂已行無及古之納諫如流者豈盡未行乎恕忠清直亮遭時得君知無不言言無不盡在刑部時順徳知府黎永明以毆公使獲譴浙江布政使劉福等以督造違式致罪㑹赦不原恕言詔以示信天下而黎永明等獨不䝉宥是不信也乞復其官復上疏論鎮守中官提問四品官及濫受民詞之害語極詳切既秉衡引置當路者皆極天下之選致仕家居㡬二十年以碩徳宿望師表海内卒年九十三贈太師諡端毅子承祐官至户部尚書清慎有父風論曰端毅公以忠誠受知憲廟諸所論奏不憚貴近無復諱避悉見優納及秉衡鑑抑躁奨恬黜幽陟明援薦羣賢布列三事迹其貞純直諒希文君實不足多也何喬新何喬新字廷秀江西廣昌人吏部尚書文淵季子也少穎異年十一翰林脩撰周中規見而竒之問所讀書曰陳子桱通鑑續編周曰其書若何應曰吕文煥降元不書叛張世傑溺海不書死節曹彬包拯之卒不書官紀羲軒則採不經之談書遼金則失疆域之辨此其書多可議者中規大驚間質其父曰趙普沮立徳昭是逢君惡也死可書爵乎宋舉人呉澄仕元何以従祀文淵竒之舉景泰甲戌進士為刑部主事有農婦牧牛于野二戍卒驅其牛去錦衣衞捕盜者坐以强盜喬新曰此白晝奪人物耳律當徒盜有分所刼綵繒遺逆旅主人巡徼者并執之喬新曰此分􅂍耳當與强盜殊科司寇陸瑜喜曰子慎刑若此不愧乃翁矣廣東司分轄錦衣衞官校率暴横司屬多優假之否則捃摭報復喬新曰法者天下之公有犯輒坐以法不少貸銜之者輒嗾其黨捃摭無所得由是官校相戒不敢犯陞福建按察副使擒盜礦賊奏減礦課捕通畨者清流歸化界將樂沙縣間民多恃險曠捕徭賦奏立歸化縣擢河南按察使辯溺河民寃開封大饑力賑貸之陞湖廣右布政使㑹荆襄大水漂溺千家為拊循𤼵粟俾葺民居陞都察院右副都御史巡撫山西兼督兵三闗北人入攻設伏灰溝橋斬獲甚衆小王子入大同圻輔震驚喬新奉勅巡邊經畧戰守為必搗老營之計敵遂遁走山西大饑人相食命往賑之請發内幣并淮鹽銀勸貸穀粟所活三萬人招回復業者十四萬人附籍者六萬餘户播州宣撫楊友以反狀誣宣慰使喬新受命往訊具得其情奏直之遷之保寧孝廟初進南京刑部尚書奏還留守所奪民蘆洲請給精㣲批以革官校私出駕帖京師大水乞選官録囚請禁京師殊服流語言多聴納大學士劉吉惡其切直嗾御史鄒魯以事誣之乞致仕去累奏薦起竟不用𢎞治壬戌卒于家喬新鯁介寡與筮仕即自誓不營私不阿權貴不以愛憎為賞罰持身亷潔即一介不妄取諸所餽遺悉謝不受督閩市舶中貴人死鎮守分其貲遺司道力辭不獲輸于公帑嗜學好古所著有周禮註解左傳擷英宋元史臆見椒邱集贈太子少傅諡文肅論曰椒邱徳學政事世所希有儻得柄用惡可量哉而卒以讒廢命耶觀其氣節推恵安文學推文莊意可占矣太宰盛徳不減椒邱世謂賢逾乃父要亦才節更著也裔孫源尹嘉興有恵政亦以才節聞彭韶彭韶字鳯儀福建莆田人也天順丁丑進士除刑部主事時有張岐者自外臺擢僉都御史韶力論其人不才請召王竑李秉葉盛以従人望下詔獄都給事中毛𢎞論救得宥外戚指揮周遵與圻内民争田命韶往勘還奏曰民乃國本食乃民天食足則民安民安則國安以民田給國戚是傷國本也再下詔獄科道交言韶無他得釋尋有請荒田者上曰彼不見周遵事又請邪立寝其奏星變復上疏言漸不克終者四事以為陛下嗣位廢立中宫特詔天下正家之禮嚴矣數年以來聞諸鎮守内臣貢獻方物於皇妃或加中宫之上又襃崇其家㡬與先帝時后家等此正家之禮未終也成化初内侍近臣進用希簡防㣲之意深矣近年増益數以萬計利源兵柄多付其手違禁犯科輒宥弗罪所請輒従此防㣲之意未終也成化初罷天下貢獻儉約之徳著矣兹者復詔鎮守内外等官貢獻方物此持儉之徳未終也成化初保傅六卿未嘗輕授用人之慎至矣近日公卿無故輒加保傅寺監諸司多以髙官兼掌及其致仕濫予恩澤此用人之道未終也陞四川按察副使晉廣東左布政使鎮守太監顧恒嵗貢方物民不勝擾奏減其半太監梁芳弟錦衣千户私採禽鳥異物進獻韶論之忤㫖調貴州擢都察院右副都御史巡撫蘇松踰年召為大理卿未上坐前論貢獻事非宜改右副都巡撫順天等處兼整飭薊北軍務復陳時政及議糧運孝廟初以薦召為刑部侍郎詔巡視浙西劾罷守臣亡状者尋兼僉都御史整兩浙鹺政疏言浙西鹽利倍浙東而浙東亭户抑配尤甚宜定折價輕重及減温處課額事竣還朝倣鄭俠流民圖圖竈户窮苦状以進改吏部左侍郎人不敢干以私者庚戌冬彗星見天津承詔言四事曰厚根本曰減役錢曰正近侍曰慎官爵時左右侵權韶於正近侍及之畧曰内臣出入左右言語輕重能為禍福人所畏憚今軍馬錢糧人匠柴炭盡付其手凡有奏請無不先允而後下於該部承而行之不復審處是失政體也及至有犯多従寛宥毆人致死竟不提問或提問成獄旋復宥之是失刑威也耗財妄費不惟不禁而反助之死者給葬生者葢祠第宅踰制服食求竒於斯極矣聲勢移人望風震懾伏望收攬綱權黜逺壬佞又請復午朝延見大臣面議政事上嘉納之陞刑部尚書時安逺侯柳景總鎮兩廣都御史秦紘𤼵其􅂍罪事聞以屬吏韶奏奪其爵景干内降併欲危紘韶執不易復下大臣廷議竟如韶言景追􅂍未及什一詔免之韶復論奏不従亢旱求言陳四事乞速㫁荆庶人獄正内官王明苗通髙永之刑減昌國公墳塋工程優免陵户差役言皆切直累疏乞致仕歸乙卯卒于家諡恵安所著有名臣賛録三卷續莆陽志十卷成都志二十五卷天曹日記北岳代行稿秋臺録及滯稿若干卷行于世論曰彭恵安好直言兩幽犴獄勁氣不少衰何其壯也竟以剛直不獲大用惜哉而易名之典殊不稱情見素林公葢嘗請之竟寝其事直道之難亶其然矣秦紘秦紘字世纓山東單縣人也景泰辛未進士授南京御史以事忤都御史軒輗疏降北黄驛丞御史練綱薦知雄縣歴嘉穎二州成化中為鞏昌知府清亷自守所至輒有恵政歴遷副都御史巡撫陜西時秦府旗校肆横民甚苦之紘擒治不少貸秦王不能堪奏紘欺蔑純皇帝怒逮下錦衣獄命内臣尚亨籍其家止黄絹一疋故衣數事亨還奏上親閱其貲嘉嘆良久曰紘貧一至是邪詔釋紘且賜鈔萬貫調撫河南汪直以事至與抗禮直素重紘不之較也而紘宻疏直多帶旗校擾地方請禁治之直還京上問諸省撫臣孰賢直獨稱紘上以紘疏示之直伏罪益稱紘賢上釋之總制兩廣時總兵官安逺侯柳景不法紘論逮下獄景挾戚畹干内降冀減其􅂍且摭他事誣紘亦被逮赴獄坐免臺諫交章申救吏部尚書王恕極言紘當大用乃起為户部尚書紘為都御史丰采益峻劾罷御史姜紘輩臺綱肅然人謂有顧佐風平生剛毅亷介歴官四十餘年所居僅蔽風雨及卒家無餘貲未㡬子孫有貧乏不能存者論曰秦公潔清端諒受知主上懋矣即守正不撓汪直猶賢之素所蓄積然耳直下紘紘乃論直直益賢紘直固不可盡廢也今獻備遺卷二十四
