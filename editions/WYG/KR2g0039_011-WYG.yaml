body:
  text: 今獻備遺卷十一明項篤壽撰周新周新字志新南海人也初名日新文皇帝嘗獨以新字呼之遂更名焉國初以貢入太學選授大理評事以剛直稱永樂甲申拜監察御史彈劾不避權貴權貴皆畏之稱之曰冷面寒鐵公或以怖小兒曰冷面寒鐵公來皆走匿擢雲南按察使未到官轉浙江獄囚有寃繫久者聞新來喜相告曰冷面寒鐵公來吾屬生矣新至即辨釋之有商自逺歸未抵家日暮恐獨行為盜所掠潛以其貲置一祠石下至家妻問之商告以故旦求之無有也訴于新新曰是必而妻有外遇也鞫之果然蓋歸語妻時為姦人所竊聽而是夜先往取之矣境中暴虎為害新為文以告城隍須㬰虎詣堦下伏罪格殺之道行者蠅蚋羣聚馬首尾之見一暴屍及一鑰一小木私記收之乃令人市布取入比印號不同者即發還已而得同號者捕之乃劫布商賊也悉以其贓召布商家人給之家人大驚時商去家已二年始知為盜殺也𤼵奸擿伏類此嘗巡屬縣易服色以入觸怒縣官收繫獄中盡知一縣疾苦明日迎按察使乃自獄中出縣官恐懼免冠伏謝罪竟按黜之由是諸郡縣吏皆望風股栗莫敢肆一日同僚以鵝炙餽新新懸之後有遺者指以示之其僚有受遺者必問冷面寒鐵公知否朝廷命錦衣千戸如浙挐贓吏即受吏贓新時進須知遇諸涿州捕之繫于涿獄千戸逸走詣闕下以聞上怒令馳驛縛新旣至伏丹陛下猶口口歴數其罪不已上愈怒命肆諸市臨刑大呼曰生為直臣死當為直鬼是夕奏文星墜上甚悔之論曰以新之勁直而獲罪明主古云太剛則折新之謂矣新之事𫝊者頗少南海彭叅政森有冷面寒鐵公𫝊其所稱怪異不經不足信也陳諤陳諤字克忠初字一諤廣東番禺人永樂六年舉鄉試入太學八年擢刑科給事中舉劾權貴無所避每奏事大聲如鐘上令餓之數日奏對如故上曰是天生也每見呼為大聲秀才嘗言事忤㫖命坎瘞奉天門外七日不死赦出還職尋陞吏科都給事中一日率同列論事觸上怒落職罰脩象房同事者先治完降官去諤貧不能雇役躬治之甚力值駕至觀象上問治屋者為誰諤前俯伏具道所以上憐之命復其官搏擊愈甚十一年奉使雲南擢順天府尹政尚嚴察嘗出行誤衝皇太子駕太子訴于上上曰陳府尹是父母官竟不問其優假如此旣而執政者忌之出為湖廣按察使洪熈改元諤先以忤親王貶海鹽知縣上一日問左右大聲官人何在宜置輔導使人得聞過乃授荆府長史多所匡益上賜以忠良鯁直四字示寵異焉宣徳三年與王不協遷鎭江府同知致仕歸正統九年卒于家論曰陳公以犯顔敢諫屢瀕于死賴文皇仁皇之明躓而復奮然竟齟齬坎壈其身惜哉今獻備遺卷十一
