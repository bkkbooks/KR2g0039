front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_008-1a, image: WYG0453/WYG0453-0565c.png}
body:
  text: 今獻備遺卷八明項篤壽撰蹇義蹇義字宜之重慶巴縣人也洪武乙丑進士授中書舍人受知髙皇帝奏對稱㫖初名瑢偶奏事畢上問曰汝蹇叔之後乎御書義字賜之以易舊名革除年擢吏部右侍郎文皇帝即位轉左侍郎尋陞吏部尚書時政令制度有非洪武之舊者詔悉復之義言損益貴適時宜上從之或有譛義者上不聽永樂二年冊立仁宗為皇太子以義為詹事七年駕狩北京輔皇太子監國中外庶務惟諸王及邊逺奏請達行在所餘悉啟聞處分義明習故典識達政體不動聲色而事賴以濟命兼禮部事職務塡委處之裕如十七年丁父䘮歸有詔起復詣北京謝上慰勞遣中官䕶送歸南京明年從皇太子朝北京遂命巡撫應天諸郡問兵民疾苦及文武吏賢否而陞黜之義言國家多事過以法繩吏人将不勝乃黜其太甚者數人餘弗問兵民利弊當興革者具奏行之仁宗即位進少保兼吏部尚書尋進少傅又進少師賜銀圖書文曰繩愆糾謬宣宗即位監脩兩朝實録成賜白金文綺鞍馬扈從征庶人髙煦還寵賚甚厚復從巡邊既還上憫義年老不欲任以煩劇乃輟吏部事日侍左右備顧問繼賜銀圖書曰忠厚寛𢎞以象徳也賜第大明門内累命中貴人進式皆不稱上親畫圖以命工戒十日落成厯少師九載考滿降勑褒諭賜宴禮部宣徳十年薨于位贈太師諡忠定論曰蹇忠定厯事五朝以忠實受知遇文皇北征委以國事不動聲色而天下宴然官冢宰者幾三十年取人先純朴而黜浮華故永宣之間士風吏治龎厚可觀秦誓所謂斷斷兮無他技者公有之矣夏原吉夏原吉字惟喆湖廣湘隂人也父時敏洪武初以布衣徵授湘隂教諭母廖氏夢三閭大夫降其室而生原吉以鄉舉士入大學選入禁廡寫誥髙皇帝幸書所見原吉丰儀及書法特賜襲衣復命人窺諸書生原吉端坐正書儼如上前使者還報上心喜之授戸部四川部主事陞戸部右侍郎充採訪使巡撫福建所過考察吏治咨訪民隱人咸悦服時楊榮在諸生中公識拔之出鎭蘄州文皇帝入正大統轉左侍郎踰月陞尚書永樂初兩浙諸郡大水三奉命往治發浙西兵民十數萬䟽決壅滯自松江黄浦東北入于海水患乃息民饑奏𤼵廪三十餘萬石賑之召還掌部事首請裁冗食省浮費均出入平賦役禁勢要中鹽及富室專錢鈔之利革包攬戒侵欺清倉場廣屯種皆宜定立規制以頒行天下上嘉納之四方有水旱災異必以聞嘗手書倉庾庫帑及丁戸田賦盈縮之數袖中檢畫上臨朝問天下糧儲幾何原吉具對不爽上益重之時賞靖難功大封親藩討邊境建宫殿増置武衞百司所費億萬處之裕如不以擾民初建北京採宫殿材於東南命督運仍給官校得從便宜顧善拊循人樂盡力七年扈從巡幸北京命兼行在禮部都察院事復兼刑部上親征北地皇太孫留守北京命原吉輔導兼掌行在六部都察院大理寺事庶政脩舉京師肅然扈從還南京尋命輔皇太孫周行鄉落以觀民俗至村店取虀黍先嘗以進皇太孫皇太孫為嘗虀一莖黍數匙有犯駕者皇太孫欲罪之原吉言上命所至毋擾民罪之非上意也乃止召見鄉老長令陳民間疾苦賜髙年帛表節義給孤獨駕還有兎逸出道左太孫將馳射原吉進曰豐草中多狐䑕穴縱驥馴御習能保不測之蹶乎太孫為罷射初上命指揮周敬邏從卒擾民者敬執數人太孫使釋之敬不肯太孫召繫敬原吉進曰上有命而卒違之不罪而又繫執者是重違命也不如釋之因而厚賜以勵其直太孫立出敬勞以羊酒輔皇太孫閲武于郊考九載滿上親宴于便殿監脩髙皇帝實録十九年三殿災詔求言主事蕭儀言徙都北京非便上震怒寘之極典而六科十三道相繼言之上命諸大臣與言官跪午門前對辨親御門樓視之都御史陳英等迎合意㫖抗言御史給事中皆白面書生不知大計宜重罪上命中人出問對辨云何諸大臣皆紛然啐罵言官妄言原吉獨從容奏曰臣等罪也科道言是上宻命中人復問原吉對如初上兩宥之或咎原吉背初議原吉曰不然天威嚴重吾輩厯事久言雖失幸上憐之若言官得罪所損不細衆嘆伏交阯平上問原吉陞賞孰便對曰賞費一時有限陞費後日無窮臣誠愚多陞不若重賞西域法王來朝上将親勞原吉諫止之他日法王見便殿上命原吉拜長揖而已上曰卿何木强耶山東唐賽兒反逮至妖黨三千餘将盡誅之命原吉審録皆商人被脅非眞賊奏請原宥詔可衆遮道呼原吉曰公生我原吉叱之曰爾等罪當誅此上恩也陜西賊僞稱金輪王報至上議命将討之原吉言亂止數人脇從者衆若遣将必多殺以希功請遣廷臣愼重有謀者往擒其首餘當自定從之谷庶人謀逆上問長沙居人通謀否對曰謀出自彼何預居人臣敢以百口保之竟免究上将親征北地原吉言今邊儲不足請遣将無煩六師忤㫖繫内官監獄仁廟嗣位即日復戸部尚書加少保未幾加太子少傅尚寶袁忠徹以相術得幸文皇帝上以其言不遜首欲誅之原吉曰忠徹言誕罪固當誅今山陵未畢而遽刑近侍柰先帝所愛何乃罷忠徹官賜繩愆糾謬銀圖書侍講李時勉廷諍過激上大怒原吉曰時勉小臣言過豈能損聖徳願少霽威下法司議罪從之宣徳初監脩兩朝實錄髙煦反上親率六師擒之原吉扈從還賜白金文綺及閽人三復賜金銀圖書八其一曰含𢎞貞靜葢象徳也嘗侍遊西苑詔騎從原吉騎後乗輿甚邇從者私相問曰前龍衣而髯者非至尊乎上聞之還顧原吉恐懼下馬頓首謝曰天威咫尺而臣不能肅下罪萬死上笑曰朴實哉卿𨽻也人賜鈔十五貫復命登御舟遊太液池上顧謂原吉等曰以操以御羣卿之力君臣之義休戚是同上射鳬獲之旣烹上躬割以啗原吉且手酌玉觥以嚼曰卿於朕啟沃良多今老矣扈從巡邊還賜寶刀上念原吉春秋髙命解職務而仍其祿朝夕侍謀議恩遇益厚家有御賜名馬性甚靈每召命将至輒蹄嚙閽者以報原吉具衣冠出而中使至矣上嘗命尚方賜原吉翠甌一旣拜賜上笑曰卿夫人得無競乎復加賜一又命製束髮小玉冠二上用其一以一賜原吉曰使卿之子孫知吾君臣一體也五年薨贈太師諡忠靖原吉孝友徳量寛𢎞人莫測其際吕尚書震為子乞官上以問原吉請與之或謂之曰彼昔奏公公忘之耶原吉曰吾自得罪彼何與焉平江侯陳瑄靖難時嘗欲害原吉後原吉薦瑄總漕又内賛其所請以濟國事二公深敬服嘗言處有事當如無事處大事當如小事若先自張皇則中便無主矣每論大政決大疑皆從容裁决莫能易也薦人自布衣至公卿其人不知引用周忱黄福李隆論救尚書郭敦金濓都御史劉觀及郎中李暹諸如此類不能盡述焉論曰北都初建庶務草創大者如宫殿諸司封建征討財用四出而夏公從容經畫節縮浮冗以資計度天下宴然留守北京兼理諸曹繽紛厖錯迎刄而解贊襄帷幄無非讜謨薦引士不啻已出與忠定同徳同心可謂謀斷兼資才徳並優者矣胡濙胡濙字源潔常州武進人生而髮白彌月乃黒在姙母李氏夢僧以花遺之覺而生濙亾何有僧來索觀濙見僧即笑僧曰此吾師後身也命我來見以笑為驗今果然聞者異之洪武庚辰登進士授兵科給事中永樂改元奏對稱㫖陞都給事中丁亥文皇帝察濙忠實可託命巡遊以訪異人為名凡十有七年轍跡幾遍天下雖窮鄉僻邑無不到者在湖廣尤最久丙申還朝進禮部左侍郎復出巡浙江癸丑自沔襄還朝時文皇帝征北境駐蹕宣府馳謁行在所上方臥不出聞濙至喜甚起見濙勞之曰卿驅馳良苦賜坐與語凡所厯山川郡縣民情休苦悉陳説上欣然不復疑慮比退漏下四鼓矣仁廟監國時飛語上聞上屬濙往察之濙至即所見七事皆孝敬宻䟽以聞上覽之大悦仁廟即位聞濙有宻䟽疑之乃轉太子賔客兼南京國子祭酒一日閱章奏得濙宻䟽深嘉之章皇帝即位復禮部左侍郎兼官如故還任行在禮部事宣徳改元進尚書髙煦反濙贊上親征事平受上賞賜第給閽者戊申賜銀章四生日賜宴於其第八月扈從邊己酉命兼詹事府事五月扈從北巡辛亥命兼行在戸部事御製詩賜濙及蹇義楊士奇楊榮四人而已因賜宴盡醉而罷新建禮部成命光祿設宴大臣皆往賀濙立石㕔事以紀之每燕見上輒問曰卿有何言奏入即施行之正統初寵任益隆凡軍國重務濙悉與聞己巳上親征北地留守京師進太子太傅景泰初進少傅兼太子太師英廟復辟以老致仕家居七年卒年八十有九卒之日常守卓天賜夢濙來辭已而聞訃大異之贈太保諡忠安濙寛和樂易敬愼亷靜立朝幾六十年厯事累朝十知貢舉天下之士盡出其門平居無疾言遽色雖庸夫孺子皆知為長者所著有芝軒集論曰胡公碩徳厯事六朝並受知遇即其忠勤篤棐夙夜匪解晝接蕃庶冠絶百僚有由然矣説者謂為潞公之儔信哉今獻備遺卷八
