  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_034-1a, image: WYG0453/WYG0453-0690a.png}
body:
  text: 今獻備遺卷三十四明項篤夀撰耿裕耿裕字好問河南盧氏人也弱冠登景泰甲戌進士授給事中以父九疇官尚書奏改翰林檢討為文辭醇深有古風歴遷國子監祭酒師範端嚴陞吏部侍郎進禮部尚書改南京兵部尚書㕘賛機務召還復為禮部尚書拜吏部尚書尋加太子太保銓綜公明坦夷無物世多稱焉諡文恪論曰世稱耿文恪剛嚴不及清恵而長厚過之惟其長厚故無私怨惡而能愛惜人才為國家養和平之福崇恥遜之風視世之中懐媢嫉而外矯詭異者不亦異乎倪岳倪岳字舜咨直𨽻上元人也父謙仕終禮部尚書甞奉命祀北岳其妻姚夫人夜夢緋袍神人入室寤而生岳因名岳狀貌魁岸目光烱然望之如神人舉天順甲申進士選翰林庻吉士授編修進侍讀歴陞學士與修英廟實録及憲宗文華大訓每進講必以古義傅時事其言剴切而音吐鴻暢進禮部侍郎𢎞治初議祧廟禮詔悉從之議者欲改定孔庭從祀諸賢及七十二子之祀岳言馬融王弼之徒其立身不無可貶然秦漢以來六經出于煨燼賴諸子抱遺經専門講授經以復存唐之註疏咸祖其言而今之經傳引用尚多其說何可盡廢况七十二子名字自馬遷以來相沿已久今生千百年後安敢臆定從祀諸賢咸仍其舊進左侍郎有詔災異求言岳與尚書耿裕等疏寅畏天戒七事上深嘉納焉復陳八事多從之京師雨雹岳上疏請勵精以勤聖學推誠以開言路止無功之賞停不急之役黜奸貪進忠直時有㫖召畨僧珠展岳言珠展僣侈為異端首皇上即位首賜罷黜中外稱聖一旦召復為聖政累西域人從海道貢獅岳言獅子外國之獸真偽未可知且海道非西域常貢之路詔還之進尚書加太子少保改南京吏部尚書改㕘賛兵部吏部缺尚書特召用岳兵部尚書馬文升上言天下財力大耗計無所出獨蘇松折糧銀價輕宜稍增之詔下廷議岳曰東南民力竭矣又復重之可乎乃不果增雲南思疊梗化守臣請用兵馬文升上疏言民疲財困兵不可用且欲遣京朝官往諭之岳言不可用朝官不如姑遣藩臣有威望者諭之卒從岳議卒贈少保諡文毅論曰國朝罷中書省専任六部而慎簡之其更迭登用期以練習世務非徒叙遷已也世循耳目人習浮沉稍自振迅即以立異目之故卓然自立者鮮昔在東漢多謹畏襲故循常其流必如胡伯始者謂士之中庸倪文毅挺然任事不少避忌其亦異乎患失者哉周經周經字伯常山西陽曲人也天順庚辰進士選翰林庻吉士歴陞春坊左中允𢎞治己酉擢禮部右侍郎每議政蒞事必傅經義奏卻西域貢獅子改吏部左侍郎内降欲以通政司經歴髙禄為叅議經獨承諭不可退與尚書王恕上疏論之乙夘諸司以災異言事吏部請早視朝勤聴政節侈費省遊幸止貢獻而斥樂戲一事語尤激經所草也後有踪跡草䟽者以問尚書耿裕經曰宜以實對裕曰吾為尚書不宜他諉時論兩賢之拜户部尚書加太子太保諸王府多奏乞自領河泊所賜稅罷其官經言國體非便且民力不能堪乃止南京供應機房奏給長蘆鹽八千引鬻于兩淮仍給淮鹽銀二萬兩經言鹽筴本以濟邊且各有分地若官鹽許越境則私販必多官鹽反滯命長蘆鹽勿給浙江守臣亦請給竹木銀鈔稅為織造費經言關征非舊且浙地大水民困征役乞暫停織造從之每委官監稅必戒以節愛民力如課入多者則與下考大同缺馬兵部尚書馬文升請給折糧鹽市之且戒督糧官毋得沮格既得㫖經言糧馬各有職不宜侵奪且引祖訓六部不許相壓之文詞甚激上為改命兵部以馬價銀充用給事中魯昻以財用不足請令諸省公帑積貯及均徭羨餘盡輸太倉經言用不足者以織造賞賚齋醮土木之故若一切節省自冝少裕必欲盡括天下之財恐非蔵富于民之道有㫖取太倉銀三萬兩為張燈具經言不可内靈臺奏増灑掃卒當給月廩經言禁地非外人所得入不過為守者私役耳疏再上竟寢清寜宫災方議修建兵部欲調山東民夫七千餘人經曰今嵗歉民貧不可使逺去鄉井請以本部羨銀就京師僱役便外戚張氏有河間賜地數百頃欲并其旁民田千餘頃得之且乞畝加稅銀二分經言河間地多沮洳比因久旱貧民即退灘地耕之遇潦輙没即欲加稅將貽無窮之害且王府賜田例畝稅二分而此獨加稅人將謂朝廷待外戚與宗親異矣疏三四上後有以雄縣退灘地獻為東宫庄者上因經奏皆抵之罪凡貴戚陳請經悉以法裁之久掌國計以身任事不顧利害有古大臣風卒贈太保諡文端論曰周公抑寺戚縮浮濫裕國用紓民力嘉猷讜議可謂有大臣風矣彼侈費而亟於求財浚膏血以填谿壑者獨何心乎今獻備遺卷三十四
