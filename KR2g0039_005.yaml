body:
  text: 今獻備遺卷五明項篤壽撰宋訥宋訥字仲敏大名滑縣人也元至正間舉進士授鉛山縣知縣洪武十三年徴詣公車除國子監助教應制撰諸勑文操筆立就稱㫖超拜翰林院學士遷文淵閣大學士日見親信太學成擢祭酒師道尊嚴諸生畏且愛之乙丑戊辰兩科取士多出大學而魁選尤多大被賞遇訥嘗有疾上遣中使致諭略曰卿禀純誠病必速差且命畫工繪象以肖焉上覽之甚喜然終老之召其子望江主簿麟侍養京師居常寢食恆在廂房不宿于家疾革乃歸卒于私第年八十上親為文以祭官其次子復祖為司業論曰董生有言養士莫大乎太學高皇帝初建成均得宋公為師教人先躬行而後口說故士皆務實人材質直朴醇足以適用蓋身教行而師道立也諺曰桃李不言下自成蹊惡在多言哉朱善朱善字備萬江西豐城人也十嵗能文通經義元末隱居纂述所著有詩經解頤詩經輯釋史輯諸書事繼母李氏甚孝避兵扶母竄匿者十餘日竟兩全高皇帝既定天下開設學校而豐城仍舊為富州州守强富中請為訓導南昌守許方以名聞于朝授郡教授洪武八年徵赴京廷試第一除翰林院修撰署院事兼知制誥逾年以家屬不完謫教遼東著遼海集未至遼賜還鄉十七年召授翰林待詔十八年奉㫖校文禮闈授文淵閣大學士以疾告歸卒卒之前夕有星如虹墜于所居鄉人異之論曰朱公雖純默以明經薦陟館閣不為不遇矣劉嵩劉嵩字子高江西泰和人也初名楚國初更名嵩以經明行修薦為兵部職方郎中歷署總部事奉命徵糧鎮江多公侯官田嵩歸奏之有㫖分官民田尋命往廣東買馬及㸃視山東驛遞相視萊州遭風海船皆稱職遷北平按察司副使政有聲績徵拜禮部侍郎嘗奉勑撰勳臣神道碑銘及封誥宋濂見其文嘆曰此今之司馬子長也進攝吏部尚書踰月以災異免徵拜國子司業賜鞍馬令朝夕見必燕語移時未幾以疾卒于京師嵩性廉慎所居屋壞半以茅覆之曰令後世師吾儉家有田五十畝居官弗復增一布被十餘年為鼠所傷命更置之仍補鼠傷者以衣其子赴北平時始盡支職方俸得白金九十兩封識託其鄉人及歸取之其人悉用去嵩不復問所著有職方詩集行于世論曰劉子髙之清近世所未見也其權吏部也不逾月而免功業不概見惜哉董倫董倫字安常東昌恩縣人也世居燕之宛平元末徵辟不出洪武十五年單縣張寧以倫薦徵為春坊贊善大夫賜冠帶事懿文皇太子其所陳說多忠厚高皇帝聞而喜十八年升春坊大學士會東宫晏駕二十五年出為河南左參議在任盡心民事名其退食之堂曰後樂方孝儒為之記嘗草封事數千言悉當上意二十六年上書薦肇州吏目諸葛伯衡擢為陜西右參議三十年詿誤坐免謫教須南皇太孫憐而老之賜白金若干鎰建文初眷念舊學屢問倫左右多言倫可用召拜禮部侍郎兼翰林院學士與方孝儒入內閣侍經筵考庚辰會試得名士胡廣吳溥楊榮楊溥胡濙輩號稱得人解縉之謫河州也與倫書祈哀倫言之于上召還以縉為翰林待詔其拳拳汲引類此倫質直敦厚有文學為時所重濟時匡君之念老而益篤革除年間卒論曰昔魏徵言願為良臣不願為忠臣有以哉董公以井盤之舊建文中復赴宣室之召從容清禁壽考令終將不得為良臣乎哉陳瓘陳瓘字同故江西廬陵人也少讀書元季知天下將亂棄去習兵法環所居皆良田改築場樹木人莫測其意數年樹成列四方盜蜂起遂募義勇屯其中保障一鄉賴以安堵七年陳友諒將熊天瑞强致瓘與俱至九江瓘知陳氏必敗去之甲辰高皇帝克武昌瓘因𢎞文館學士羅復仁謁軍門陳救亂安民之䇿悉見聽納擢湖廣行省左右司員外郎改左司都事僉郎中升大都督府經歷大將軍徐達北征瓘贊軍事既克泰州留瓘督築城之役尋命總制真州軍事丙午除寧國知府首興學育材問民所疾苦禁并兼核欺隱所創户帖命布之天下宣城民田濵江者嵗患水加築隄防伐石作水門以時蓄泄强盜劫麥舟坐死者四十八人瓘曰此皆愚民因舟漂抵岸引梃取之非素有合謀安得論死至衆邪乃坐先取者一人餘減死論奉命督餉北平還京師臺省爭薦之瓘固辭歸召赴京道病卒論曰瓘有文武材雖早死不究所用然其才不已可概見乎陳遇陳遇字中行金陵人篤學博覽至正中授溫州路教授棄官歸人稱為靜誠先生上定金陵秦元之薦宜顧問召見與語大悅稱先生與官辭不就上問保國安民大計以不嗜殺人薄斂任賢為對再除翰林學士固辭除禮部侍郎又固辭上望見連呼君子除禮部尚書又固辭自是不煩以務每燕見賜坐食談說經史人有過被譴力為解上嘗曰卿老矣有子可帶刀衛朕頓首伏地辭年七十二卒時江西鉛山龔斆學博行淳以明經為教授御史葉孟芳薦徵至洪武十三年秋上坐武英殿見諸儒使言志皆對曰不敢上負聖主自棄明時上喜始置輔官以王本杜佑及斆為春官杜斆趙民望吳源為夏官秋冬官缺令兼攝未幾斆致仕十四年起為國子司業升祭酒杜斆壺關人勤慎力學精通易書詩為四輔官兼太子賔客後以疾卒源興化儒學教授洪武十三年中書舍人林廷綱薦源德行本以儒士行誼著聞論曰靜誠堅志辭爵祿而恩禮不衰豈徒高尚其事要亦明哲自保者矣龔斆王本杜佑杜斆趙民望吳源亦一時之俊也樂韶鳳樂韶鳯全椒人乙未從渡江參贊機事洪武三年授起居注遷兵部尚書改侍講學士修大明日厯重定洪武正韻更製釋奠先師樂章病免八年升祭酒尋致仕歸以壽終友人趙奎王才魯文質陳旭陳友竝起畎澮從上渡江取采石奎有材略立功授總管守宜興洪武四年從征井肅猝遇敵衆畏怖奎獨奮殊死戰敗之旭英毅多智識友有膽氣常居前鋒才有材武文質攻醫授太醫院判奎才竝都指揮使旭從靖難封雲陽伯友平蠻功封武平伯陶凱陶凱字中立臨海人博學善文洪武初薦修元史選授太子書尋除翰林應奉文字三年超升禮部尚書四年請建奉先殿乾清宫左上日焚香朔望薦新及節序生辰祭用常饌行家人禮上從之凱每議禮與藁城崔亮相可否亮亦善論奏是嵗請選人專任東宫官罷兼領職上曰古者不備官惟賢能是用廷臣有才望勳德者兼東宫官非無謂也嘗慮廷臣與東宫官有不相能遂成嫌隙其禍非細若江充事可為明鑑朕今立法令府省臺官兼東宫贊輔之職父子一體君臣一心庶幾無患五年凱言漢唐皆有會要記載時政及起居注記言記事宜令臺省府各置銅匱簿録聖㫖及時政依會要編類為書上從之出為湖廣參政致仕八年召為國子祭酒尋老復以參政致仕自稱耐久道人上怒曰何自賤也尋坐罪初牛諒與凱同為禮部尚書以怠職犧牲不中廢功臣廟不葺降主事尋復尚書未幾坐不職罷時有潼川楊訓文者元淮海書院山長居江都吳元年徵為起居注兩遷中書省左司郎中入禮部亦與凱同為尚書已而改户部出為河南行省參政亮初為禮曹主事洪武元年召為禮部尚書滕毅不知何許人與訓文同以儒士徵從事徐相國幕下授起居注上命集古無道之君如桀紂秦皇隋煬事以進曰往古人君善惡皆朕龜鑑也洪武元年初設六部首擢毅為吏部尚書論曰兩祭酒學行醇固模節克端一時趙王輩文武兼資足稱為憲者矣唐鐸唐鐸鳯陽人洪武庚子從攻江州授西安縣丞召為殿中侍御史升刑部尚書改兵部尚書改諫議大夫左遷復為兵刑二部尚書致仕再起為太子賔客尋升太子少保二十八年使龍州諭趙宗壽還復出參議總兵楊文軍事經畫守衛撫輯蠻獠鐸重厚慎密靖廉不妄取豫上初起兵時即侍左右每以故舊遇之僚屬罪數連鐸上念鐸篤行皆不問時諸卿中詹徽以才勝鐸以德勝不動聲色而政務自理人咸愛之論曰唐公重厚少文獨受眷知簡導春宫有以哉郁新郁新臨淮人洪武二十二年除户部度支主事賜名新超升戶部右侍郎升尚書凡十三年綜理周密而取民有節上嘗問天下户口田賦地理險易計數新答無遺謬時親王嵗祿米五萬石他賜物又萬餘新定嵗一萬石并定郡王將軍中尉主君祿建文中調兵食效勞靖難後復戶部尚書永樂元年言淮河間多淺灘趺坡阻運舟請自淮安用船可載三百石以上者運入淮河沙河至陳州潁溪口趺坡下復以淺船可載三百石以上者運至趺坡上别以大船載入河至八柳樹諸處令河南車夫陸運至衛輝入衛河輸北京二年上屯田賞罰例三年卒論曰郁公定諸王宗室詔祿之額及置漕淺船轉輸之制至今賴之乃者屬籍繁增祿入匱竭後將不繼漢唐服窮親盡皆不得衣食縣官而四民之業俾得自效載在典籍可考也安得起新與之議哉詹同詹同字同文徽州新安人元舉茂才異等為郴州學正避亂黃州事漢為翰林學士承㫖兼御史甲辰兵下武昌來見授國子博士升考功郎中丙午為起居注命有司訪求古今書籍因謂曰三皇五帝之書不盡傳於世後鮮知其行事漢武帝購遺書六經始出雄才大略後世罕及吾每觀孔子之言如節用愛人使民以時真治國之良規萬世師也吳元年上諭曰國史貴直筆昔唐太宗觀史雖失大體然命直書建成事是欲以公天下也豫平日言行是非善惡汝等皆當直書勿隱自翰林待制遷直學士升侍讀學士上嘗諭曰古人文章明道德通世務如典謨皆明白簡易無深險怪僻之語孔明出師表亦何嘗雕刻為文而誠意溢出至今使人誦之忠義感激近世辭雖艱深意實淺近即使過於相如揚雄何禆實用自今翰林為文但取通道術達時務者無事浮藻洪武四年升吏部尚書上言陛下起兵渡江以來征討平定之蹟禮樂治道之詳雖有紀載尚未成書乞編日厯傳于後世上從之命公與侍講學士宋訥為總裁官七年五月大明日厯成自上起兵臨濠至六年癸丑冬十二月凡征伐次第禮樂沿革刑政設施羣臣功過四夷朝貢之類莫不具載為一百卷公及宋訥又言日厯藏之天府人欲見之有不可得臣請如唐太宗貞觀政要分類更輯聖政為書以傳天下後世上從之分四十類自敬天至制蠻夷凡五卷名皇明寶訓自後凡有聖政史官日紀録之隨類增入尋以翰林學士承㫖致仕未幾復為承㫖翰林學士卒開濟開濟字來學一字學臣洛陽人以明經舉為府學訓導升國子助教與胡丞相善以疾罷歸訓徒里中洪武十四年御史大夫安然薦濟有治才召試刑部尚書未幾為真濟勤敏有為嘗奏令司置考功圖日書所行事稽核勤怠上喜賜大第十五年監察御史趙仁言曩以賢良方正聰明正直孝弟力田列置郡縣政績少聞又聘天下秀才以資任用臣愚莫若考其經明行修達於政事者為一等通曉四書才兼幹濟者為一等量才授職往代舊官其既代之官就令布按二司核其稱職平常不稱職給文赴吏部再核去留上覽其言謂濟等曰秀才今徵至數千人宜嚴試授職濟等條議乞選有才識文武之臣公暇延訪秀才以明經行修為一科工習文詞為一科通曉四書為一科人品俊秀為一科言有條理為一科曉達治道為一科六科備者為上三科以上為中三科以下為下不通一科者不在擢中上從之濟敏慧有才辨凡國家經制田賦獄訟工役河渠事一算畫即有條理可為世守人忌其才高又見上每召濟議事謗言遂起竟暴卒論曰開公以名世才通達政體言聽計從幸矣竟不免于讒口讒說之堲有以哉吳伯宗吳伯宗金溪人洪武四年進士第一人時初開科取士賜袍笏冠帶擢禮部員外郎命與學士宋訥同修大明日厯胡惟庸方用事欲人附已伯宗性剛直不肯下惟庸恨之八年惟庸竟中伯宗謫居鳯陽論時政因言惟庸專恣不法不宜獨在中書辭甚剴切上得奏即召之還十二年進講東宫陳正心誠意之說明年改翰林典籍上製十題命賦援筆立就詞語峻潔上曰伯宗才子除太常寺丞辭改國子司業又固辭忤㫖貶金縣學教諭至召還翰林檢討十五年初設殿閣學士伯宗為武英殿大學士十六年冬坐弟仲宴為三河知縣謬薦人詞連伯宗復為翰林檢討明年卒所著有南宫使交成均玉堂諸集論曰吳公以首科及第受知聖主簡直密勿可謂遇矣而旋起旋廢才不究用謂非命耶吳沉吳沉字濬仲金華人博學善屬文洪武十二年薦授翰林侍制應對失㫖左遷渭源教諭未行改翰林典籍升東閣大學士十六年進精誠録三卷上命沉為叙時撰千家姓沉為表進未幾考功劾怠事降侍書尋改國子博士致仕嘗著辨言孔子封王為非禮自是布政使夏寅祭酒邱濬皆以封孔子王及諡為非禮論曰吳公議孔廟事百五十年始行之讀所撰千家姓多異其不見傳何也劉三吾劉三吾字如孫以字行初名崑茶陵人洪武十七年通政使茹瑺薦徵至老矣應對詳慎除左贊善歷升翰林學士博學通經史文章典麗既入翰林備顧問每預密議懿文太子卒上意在文皇問公對曰太孫年富子沒孫承適統體也即立燕王置秦晉二王何地上遂立建文君為皇太孫十八年三月上省躬録上命儒臣編古帝王祭祀灾祥感應可為鑒戒者為存心録既又命公編漢以來灾異之應臣下者為書賜名省躬録二十六年以壻趙勉為戶部尚書坐罪乞免官未幾又復學士上厭表箋多諛詞纎巧命公及右贊善王俊華撰定頒天下尋暴卒論曰劉公耄年遭遇潤色洪業翊贊經綸詞命典實卓然名家可不謂有學有守者哉今獻備遺卷五
