  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_037-1a, image: WYG0453/WYG0453-0698c.png}
body:
  text: 今獻備遺卷三十七明項篤夀撰孫燧孫燧字徳成浙江餘姚人𢎞治癸丑進士授刑部主事遷郎中讞獄江西疑獄不決者斷決如流多平反以忤劉瑾連罰贖瑾誅遷陜西㕘政累進都察院右副都御史廵撫江西時逆濠横斂剥民王府人暴甚白晝市殺人奪人財産燧至首舉官校及樂官之尤者請具獄濠駕其罪宗室而薄懲之燧因宻疏其罪狀章凡七上悉被邀匿屢乞骸去亦不報乃於是平嚚訟均賦役清詭寄嚴保甲寛課辦汰墨旌賢峙粮練兵囚徒自大辟以下悉聴入金榖贖罪申飭衛所郡縣募敢勇戒部伍以時閱操預防制變㑹南昌人張儀官于京衛具以濠事告御史蕭淮淮以聞詔遣重臣戒諭未至而逆校林華自京師馳報濠己夘六月十四日三司官入謝生日宴禮濠隂令諸兵校衷刀匿幕中出立露臺曰太后有宻㫖令我監國燧請㫖㸔濠曰不必多言我往南京汝保駕否燧曰天無二日臣寜有二君太祖法制在誰敢違之濠怒却入殿庭易戎服以出幕中兵皆走出露刃環立濠大呼罵燧曰我何負於汝奏我七本燧曰朝廷何負於汝汝反耶一時官屬駭愕相顧咸股栗不敢出口獨副使許逵厲聲反覆辨白我輩亦方面大臣何得若此濠大怒喝武卒縛燧并逵反接曳出恵民門外刦之跪皆挺立不屈罵不絶口遂遇害是日方烈忽隂曀黯然無光城中男女無大小皆流涕泣數行下事平皆扶攜吊哭一日數十祭祭數十人或百餘人皆哭盡哀詔贈禮部尚書諡忠烈立祠曰旌忠春秋祀之初燧於㕔事前掘得有古銅鏡背刻字二十有八有昭明光運忠扶日月等語竟死忠盖先兆云論曰𫝊有之徳厚者流澤逺徳薄者流澤卑此非虛語方孫許二公之罵賊請詔義形于色躬蹈白刃辭氣不撓豈意計奉甞于百祀流慶于來裔哉廼其士民相率奔走哭而廟之臺諫數以聞隆錫諡贈俾有司秩之殷祀勒銘斾常標炳史册此其于身至厚矣兩家者廕叙世官皆能拾武巍科紹其家聲孫氏奕世六十年來若都督堪尚寳墀宗伯陞都督鈺光祿鑨少宗伯鋌㕘藩錝文選鑛進士如法錦衣如津好脩積學陟膴馳芳舒鴻漸之翼弼熈明之治諸曽若𤣥又鸑奮鵬騫策茂實以衍丕樹而忠直之節訓辭之良播在表著較諸簮紱之家莫可比隆當此時志節之士咸扼掔稱忠臣之遺烈近也天與人盖若相接施予速于響應徴負白于質劑豈或然之數哉所稱海内冠冕他如鄞縣楊氏吏部右侍郎詹事府丞守陳南吏部尚書守址工部尚書掌大理寺事守随廣西右布政使守隅守陳子刑部侍郎茂元按察使茂仁靈寳許氏太子少保吏部尚書進進子少傅吏部尚書文淵閣大學士讃南京戸部尚書誥太子太保兵部尚書論及諸子孫為郡守曹郎登科甲者又十餘人福州林氏郡守元美子南京吏部尚書瀚瀚子太子太保工部尚書庭南京禮部尚書庭機子通政司㕘議炫庭機子南京禮部尚書燫副使郡守烴呉江呉氏尚書洪子尚書山㕘政巖知府崑諸孫行太僕卿邦禎布政承燾鄉貢士六七人鉛山費氏少師大學士宏少保尚書寀伯父㕘議瑄宏子武選懋賢從子脩撰懋中工部郎中完孫憲副堯年歐陽氏少宰鐸大宗伯徳御史席少司空塾太保必進太僕卿衢都御史重餘丞郎數人潘氏少司馬珍及旦少司空希曽大司空鑑大司馬潢㑹稽陶氏㕘議懌司馬都憲諧少宰學士大臨南大宗伯承學布政使㓜學㕘政大年按察使大順憲副大有尚寳允淳主事允宜隆萬間同時入進士而薦鄉科者又十餘人㕘之世家皆其章章者也其他名宗華冑繼起高位都榮名者僕又未能悉數之也許逵許逵字汝登河南固始人也正徳戊辰進士拜樂陵令以靖寇功陞山東僉事進江西副使時宸濠持權利制誘諸守臣逵獨違之數縶縛其黨禁抑不少假濠大憾逵濠反縛都御史孫燧將殺之次問許逵何言逵曰惟有赤心耳豈從汝反耶反覆辨論不可濠怒喝武卒弁縛逵斬之逵甞與燧謀欲先𤼵後聞至是顧燧曰早聴吾言當不至此既就縛慷慨大罵曰我則死汝逆賊亦當旋死自府中出道行比受害罵不絶口挺立死恵民門外觀者壯之濠復竿逵及燧首于通衢者三日江西人思其遺愛痛其忠烈殮二公屍供奉佛寺中時諸守臣皆就執繫獄户部主事馬思聰不食三日死㕘議黄宏以索蹙其項亦死逵父方家居聞江西有變殺一都御史一副使便為位易服而哭人怪問之曰吾兒素有此志今必果然贈左副都御史諡忠節唐龍曰嗚呼孫許不可加矣馬黄亦難哉夫大節同者不拘小異至徳合者不狥微迹四子雖死有先後身有執弗執首領或割或不割要皆同於能死而已其餘不必屑屑論也故杲卿罵而磔龔勝餓而殞巡先殺逺後亡君子不敢有軒輊者豈非以臨難能死者是賢乎嗚呼士于君猶女于夫終身弗易焉滅義求活故持二心乃禽獸之道逆理之行春秋所譏也四子免矣論曰淵淵乎先王之御天下也賞不遺幽罰不淫逺恵流而不費威震而不有風被羣動功洽后世所以導物闡化經世軌俗者也髙皇帝躬冒矢石昭奠華夏而燕朔諸州䘮淪千祀者亦始復我帝王疆土之舊侔徳天地邁功湯武越既首褒元忠臣余闕及殷祀先代休烈懿臣肇脩天常茂建人極二百年來朝有批鱗之臣野多死綏之士雲蒸霧變異世同揆聖人一變之功若是至已夫王教之作也始未甞不飭終以玩也匪浚則湮弗植則仆恒度而時振之故操倦而人靡有匱已自夫教之衰也士知死而不知恥于是懐二心以事上忠義之道鮮焉故危言色厲氣溢于平居而徼􅓈恐詘靦顔苟難旁睇則鷹擊豹眒無少下廼預危茹詬豕䑕突竄者衆也衽金䝉革委誠敵愾者時弗知聞而媻姍選愞于睢罔上者或登大僚洞􅈾達腋元殞弗懲顧死不得以蒙澤其全軀保妻子之臣自掛吏議輒復嫁禍他人以掩其罪譬之醜婦穢行益掩益彰不更足嗤哉嗟夫貪夫狥生畜縮竦讋自視恬然久矣生為游氣死為萎草聞者弗知見者罔道哲人狥義守死潔身氣蒸霜雷騰虹薄星聞斯嶽嶽酸鼻撫􅈾故義士不以須臾而易萬世不以同盡而䘮永存以予觀于孫許兩公者今而後可以喻也今獻備遺卷三十七
