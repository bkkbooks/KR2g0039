body:
  text: 今獻備遺卷二十五明項篤夀撰章懋章懋字德懋浙江蘭溪人也成化甲戌㑹試第一人改翰林庶吉士授編修時元宵舉放燈火命館局賦詩懋與同官莊昶黃仲昭連名諫止忤㫖杖闕下左遷知臨武縣言者申救改南京大理寺左評事遷福建按察司僉事毅然以振風紀為己任勘獄牒剔吏蠧踣官邪滌民瘼招通畨貨以便商聽民採礦以絶盜認納海田虛稅計擒泰寧沙尤諸盜考績赴部疏乞解官吏部尚書尹旻詰之曰不罷軟不貪酷不老病如何可退懋曰古人正色立朝某則罷軟古人一介不取視民如傷某則貪酷年雖未艾鬚髮早白可謂老疾竟得請歸閉門不入城府力耕以自給四方弟子執業者雲從名卿隱士接軫于門家貧刈蔬脫粟而餉之或諷為文章曰小技爾豫弗暇請著述曰儒先之言至矣盡矣刪其繁蕪可也𢎞治辛酉以薦起南京國子祭酒母喪力辭詔增設司業聽終制赴官癸亥服闋再辭弗允始就列首厲教化明道術肅儀軌六館之士翕然向風姑蘇尤樾母病不得歸省懋許之或謂無例曰吾寧以違制受譴不忍絶其母子之情也再上修舉學政條陳弊政二疏正德改元陳言勤聖學隆繼述謹大婚重詔令敬天戒五事疏八上乞歸尋升南京太常寺卿進禮部侍郎致仕世宗初特進南京禮部尚書仍致仕辛巳冬卒年八十有六贈太子少保諡文懿論曰章公純粹塞淵耄期好學博而能約含章自晦碩聞益彰篤實輝光斯之謂矣羅倫羅倫字彛正江西永豐人也成化丙戌㑹試第三人廷對萬言不屬草中引程正公語接賢士大夫之時多親宦官宫妾之時少執政者令節下句倫不可擢第一人授翰林修撰大學士李賢遭喪朝廷留之倫詣賢私第告以不可上疏歷陳古今起復之非反覆數千言疏入調泉州市舶司提舉明年召還改南京修撰辭疾歸隱金牛山授徒著書嘗欲倣古置義田以贍族人有助堂食錢者謝弗受衣乏衣者遇道死者輒解以覆之客晨至令具飯妻曰瓶粟罄矣命其子干之旁舍比舉火日巳午倫晏如也山中結茅屋以居間為文章以發其感慨之意所著有一峯集論曰一峰孤介絶俗不愧科名坎壈以死其所建白偉然與日月爭光信孝敬之准式人倫之師友矣語多𫝊故弗叙近世諸君子之于江陵豈聞先生之風而興起者與江陵非文達比難易輕重世能辨之矣莊昶莊昶字孔暘直𨽻江浦人也成化丙戌進士選庶吉士授翰林院檢討與羅倫陳獻章相友善同編修章懋黃仲昭上培養君德疏諫止上元放燈忤㫖謫湖廣桂陽州判未行給事中毛𢎞御史陳壯論救改南京行人司左司副遭艱不起𢎞治甲寅以薦赴部入謁三揖不跪太宰耿裕起揖延之茶復除行人司副升南京吏部郎中丙辰以病告歸所著有定山集論曰世稱莊定山豪邁胸中多竒早以直諫著聲可謂偉矣老而赴召偃蹇以去信哉出處之際人所難言也今獻備遺卷二十五
