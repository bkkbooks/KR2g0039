body:
  text: 今獻備遺卷十三明項篤壽撰王直王直字行儉江西泰和人也永樂初進士改庶吉士召入內閣典密務授翰林修撰駕幸北京仁宗為皇太子監國直與楊士竒黃淮三人留輔導與修高皇帝實録進侍讀洪熙初進侍讀學士宣宗為皇太子進右春坊右庶子仍兼侍讀學士凡經筵講義制誥皆以屬直兼司記注聖政聖訓悉録備纂宣德初與修兩朝實録成進少詹事仍兼侍讀學士英廟即位詔修宣皇帝實録命直總裁書成進禮部左侍郎仍兼學士尋拜吏部尚書己巳秋上將親征北漠直率廷臣疏止不聽命留守京師景泰元年禮部㑹奏北人請遣使迎復當從之上御文華殿門內諭諸大臣曰朝廷因通和壞事欲與邊絶而卿等纍以為言何也直首進曰必乞遣使勿有後悔上色不悅曰當時大位是卿等要朕為之非出朕心少保于謙進言大位已定孰敢異議但欲答使紓邊急耳上意解曰從汝羣臣既出太監興安出呼曰爾等欲遣使孰可行者孰為文天祥富弼其人邪直大言曰今日羣臣皆朝廷人一惟朝廷用孰敢有不行者辭色俱厲興安語塞而去乃升禮部侍郎李實等為正副使以行尋進少傅兼太子太師天順改元致仕六年卒年八十四贈太保諡文端直器宇宏偉性嚴重寡言笑屢典文衡得人最盛在翰林三十年恭勤不懈及位冢宰益加廉慎海內想聞其風采尤留意人才委任司屬凡御史差還令報人才髙下以備拔擢時稱得人奔競頓息遇不如意事輒誦古人詩自寬有初拜給事中即欲干撓選法者則曰偶然題作木居士便有無窮求福人御史有言吏部進退官不當者則曰若教鮑老當筵舞更覺郎當舞袖長其諧戲切中云居第隘陋淡泊寡欲家居杜門不出論曰太宰百官之表國初以亷愼公明著聞者前有蹇公後有三王顧不難哉王翺王翺字九臯直𨽻鹽山人也永樂乙未進士改庶吉士授大理寺正左遷行人宣德改元以楊士竒薦拜監察御史升右僉都御史鎮守江西移鎮松潘靖商巴之亂正統七年提督遼東軍務總兵以下庭謁翺詰責何以失機命左右悉曳出斬之哀請良久始得釋由是軍中股栗無不用命至廣寧不逾月巡邊自山海關直抵開原髙垣牆深溝塹五里為堡十里為屯烽燧斥堠千里相望簡閲行伍汰老弱賑貧窮配鰥寡下令曰邊不可以文法治也有訟聽入穀粟贖罪重者如人命亦如之九載考滿進左副都御史十二年勦邊塞斬首無算捷聞賜勑奬諭升右都御史尋升左都十四年額森犯京師分兵冦廣寧翺方坐教場賞軍邊騎數萬猝至我軍大潰翺收散卒堅壁固守衆遁去居遼東十餘年積銀萬餘兩糧數萬石馬千餘匹邊用饒足器械鮮利軍士樂戰舉用將材如施聚焦禮皆自衆中拔起為敵所憚景泰三年召還加太子太保尋命總督兩廣軍務自總兵以下悉聽節制得便宜行事南征大藤五屯龍山諸蠻獠聞翺威望咸畏匿稀出冦鈔翺略去兵威推誠諭撫之參將范信有才略因贓革職翺上言使功不如使過復其官信卒為名將四年入拜吏部尚書嚴考察公銓注痛抑幸進請謁不行英皇復辟大學士李賢坐事罷內閣上欲用翺翺固辭遂薦嶽正正罷上問李賢何如人翺頓首曰賢與臣處久始終如此本分人也遂復賢內閣上每用人必問翺翺所薦必以公嘗言北人誠實可用由是北士多進用然未嘗使其人知進太子太保尚書如故曹欽反夜執李賢于東長安傷其首血流被面奔翺所求救賊併執翺翺厲聲曰朝廷何負汝汝反邪殺他人寧殺我賊謝曰豈敢殺長者遂上馬去李乃得免其為賊所憚如此翺端方强毅清白儉約事無巨細一涉厯終身不忘有所當行不遑寢食居第三十年不易公餘退宿朝房門無私謁權勢請囑婉而拒之嘗曰吏部豈報恩怨地邪李賢嘗曰臯陶言九德王公有其五亂而敬擾而毅簡而廉剛而塞强而義又曰王公處事無一滲漏世稱信然成化三年卒年八十四諡忠肅論曰世稱王公知人喜推轂北士夫立賢無方豈分南北哉蓋亦矯枉之意也然王公所薦皆至公尤不問恩怨若王公者雖謂之九德咸備可也顧佐顧佐字闕河南太康人也庚辰進士除莊浪知縣午節㑹射將官以文士易之佐三發連中且進止安暇觀者驚服推監察御史守正嫉邪遷江西按察副使召為應天府尹剛稜不撓吏民畏服貴戚斂手有赫赫聲改通政使宣德初楊士竒楊榮交薦之拜左都御史賜璽書令考黜不肖洗滌積弊佐奏黜御史不肖者二十餘人廷臣貪墨者劾罷之奏禁用歌妓糾肅百僚天下想聞其風采四年吏有遭笞者托佐過謂受皂𨽻賂放歸悉具姓名以聞上以示楊士竒對曰所訴誠有之今朝官月俸止給米一石薪炭馬芻咸取給於皂𨽻不得不遣半歸使備所用皂亦得歸耕實兩便京朝官皆然自永樂以來如此仁廟知之故增朝臣之俸上歎曰朝臣之艱如此因怒訴者曰朝廷用一好人輒為小人所排乃以吏所訴狀付佐自治之佐召吏示狀吏恐甚佐曰上命我治汝我姑容汝但改行為善竟不問上聞之喜曰佐得大體矣居亡何有囚告佐數枉人重罪上大怒曰此必有重囚教之排佐命三法司鞫之則千戶臧清所使也清時殺一家無罪三人當坐極刑上立命磔清于市正統初以風疾乞歸家居十餘年卒佐性嚴重不口毁譽人旦晚候朝前呵雙藤立朝房外百僚騎而過者皆折旋避之非公事未嘗與諸司羣坐時稱為顧獨坐焉論曰都察院風紀之表也其職主糾壓百僚正紀綱飭憲令非獨理刑獄而已國初劉張二公皆以重望居之太康剛稜不畏疆禦使人畏而不敢犯然卒以直道不能安其位惜哉耿九疇耿九疇字禹範河南盧氏人也弱冠登永樂甲辰進士宣德辛亥擢禮科給事中正統初遷兩淮鹽運司同知盡革宿弊條奏數事悉著為令丁母憂鹽場數千人走闕下乞留乃進鹽運使亷聲震江淮間嘗臨水坐有童子戲其傍疇曰此水何清童子曰尚不如使君清亡何以詿誤逮京師獲免升刑部右侍郎數辨疑獄有婦誣其夫所司擬斷異疇不可杖其婦而歸之鳯陽嵗饑盜起奉勑往綏之乃留英武飛熊諸衛軍且耕且守招徠流民七萬餘戶一方晏寧命兼理兩淮鹺政尋奉勑巡撫江北諸郡景泰初命録諸郡大辟囚原免者二十六人有婦來何菊家既去死其家訟菊與弟殺之疇辨其誣後果得殺婦者遷撫陜西初六部卿佐使外者文移不得徑下按察司多偃蹇不受約束疇奏下之邊將請增臨洮諸衛兵下疇議疇上言邊兵已足用在馭之何如耳不然雖增兵何益徒冗食耳竟如疇議初邊民春夏出就田作秋冬輒入徙疇奏言將所以禦冦衛民者也今民皆避冦失業將焉用彼將哉乞禁民入徙邊至將不能衛民者罪之轉右副都御史仍鎮其地詔下有司買羊角置燈疇上疏曰昔宋神宗買浙燈蘇軾諫止之今買羊角無乃類是乎書曰不矜細行終纍大德遂罷買災異求直言復上疏乞廣聰明别忠佞擇守令簡將帥上優詔答焉天順改元上顧侍臣曰耿九疇正人也今安在即日召為右都御史首進五事多見采納時邊情不寧疇以罪由石亨將率諸御史廷劾之事泄為亨所誣出為江西布政使尋改四川上一日與李賢論人才曰耿九疇何罪賢曰此人操行誠不易得未幾召還拜南京刑部尚書疇性孝友平生慕司馬文正為人敦尚古道躬服儉約退食惟焚香讀書慎交與關節不到其門權貴亦敬憚之論事侃侃坐是數困于讒賴英皇知之讒不得行卒諡清惠子裕自有𫝊論曰儒者恥言錢榖𣙜課之地尤不樂居之耿公清操嚴峻學士至今誦之不衰信乎清濁由人居何與也軒輗軒輗河南鹿邑人永樂甲辰進士嘗推糧淮上冬月舟行墮水衣盡濕以綿被自褁有司為製衣弗受待衣乾服之為浙江按察使惟著一青布袍蔬食不厭三日以俸米易斤肉故舊過者留一飯或烹一雞人即為異聞親喪即行僚屬有未及知者升副都御史總理南京糧儲天順初召為刑部尚書數月以疾致仕上復念之問李賢對曰輗素行海內共知冉召為左都御史復總理南京糧儲輗律已甚嚴居南都閉門謝客嵗時詣禮部拜表慶賀屏處一室朝服端坐終事竟歸不告于同事者同事者亦不樂與處皆避去年富年富字大有直𨽻懷逺人初姓嚴洪武初附籍訛為年遂因之舉永樂丁酉鄉試為德平教諭以最擢吏科給事中宣德乙卯吏部擬升光祿少卿章皇帝欲大用之特留不下久之升陜西右參政周厯郡縣察民疾苦興學勸農尤嫉贓吏時邊儲多空乏朝廷屬富總之富量地逺近定徴科謹出入邊廩以實正統甲子升河南右布政使流民十數萬聚南陽陳州間剽掠為患富撫定之悉籍為民己巳轉左布政使額森入侵道阻餉絶命富督糧餉邊邊將上其功拜左副都御史巡撫大同招亡撫存革科擾廣屯種軍功冒濫者悉核正之天順改元守將石彪以危事中富逮繫京師免官尋起為南京兵部右侍郎轉戶部巡撫山東改左副都御史四年召為戶部尚書八年以陜西連嵗用兵而督餉者多非其人乃薦楊璿余子俊等可用吏部以為侵官富上疏極論薦賢為國之道且乞致仕尋卒于位年七十諡恭定富剛方廉靜遇事敢為臨利害不少變世尤多之論曰軒公以亷潔聞年公以朴忠著所至輒樹聲績其箕疇所謂有為有守者乎夫亷者士之常也而濁世以為過矯薦賢以為國也而隘者以為侵官何哉段民段民字時舉武進人永樂二年進士庶吉士與修永樂大典除刑部主事又與修五經四書性理大全永樂十八年妖賊唐賽兒反十九年冬升山東參政討平之當是時索賽兒急盡逮山東北京尼既又盡逮天下出家婦女先後幾萬人撫定綏輯曲為解釋駕征北漠敕民轉餉舟自濟寧至通州俄又令陸轉居庸關出塞民節約曲算省財民力不擾事集道中忽降敕令民與巡按御史考所過郡縣吏宣德三年召入户部為右侍郎尋改刑部特賜敕民廉介端謹令考察在京百司先是榜例越訴者杖百謫戍邊民請罪如律九年卒官貧不能喪吳文恪力為經紀始克殮成化間葉文莊請褒之不果贈刑部尚書諡恭肅樊瑩樊瑩字廷璧常山人天順八年進士為御史條上清軍事宜著令巡雲南交人誘邊氓盜掠殺吏民方議用兵瑩移諭禍福交人納欵知松江府布衣疏食孚於士民又議折徴米榖减布縷征通斡漕法數事行之再知平陽以黃孔昭薦升河南按察使未幾尹應天府三年升南工部侍郎改都御史巡撫湖廣計擒錦田賊酋散解其黨奏省諸藩王營造費金凡百萬計尋以疾致仕薦起撫治鄖陽鄖襄流冗安輯馬鈞陽又薦召為南刑部侍郎雲南晝晦五日勑瑩考察雲貴諸吏罷遣千餘人召還部為尚書十八年致仕正德三年逆瑾誣瑩妄理隆平侯事及擅减上供布收贖奪其官比瑾誅已卒三年詔復其官十四年贈太子少保諡清簡論曰段樊兩公以廉靖著恭肅理賽兒獄清簡奏裁邸第營造可謂明恕慎節者矣皆以比部秉黜幽之典非素有樹立安能然乎熊繡熊繡字汝明道州人成化二年進士為御史坐事謫清豐知縣纍官都御史巡撫延綏操勵潔亷自甘蔬布餼廩有羡不入私室憂邊練武套衆三年不大入塞憂去家拜兵部右侍郎升兩廣右都御史逾年召入南臺正德三年中官李榮忽傳旨熊繡致仕即屏居山中斷絶書問生事蕭條俯仰益恬適卒巡撫秦金為請于朝贈南刑部尚書明年太僕少卿何孟春上疏曰竊見致仕故都御史熊繡事母孝事兄友居貴貧居常儉揚厯中外四十餘年守法狥公推賢嫉惡不邀時譽不急近功言無爽於屬垣行弗虧於顧影往年都御史戴珊張敷華卒其門生屬吏子孫咸請易名主事張鳳翔孔琦卒鄉人請恤其家聖朝表勸清賢不吝恩霈繡才節操履無讓珊等賜諡恤孤惟宸衷軫允幸甚詔給繡繼子子端米月一石諡莊簡論曰學士先生之于世也雖靜躁殊軌取舍異途然大約可知矣道巖穴者絀朝市甘富貴者羞沉淪孔子曰道不同不相為謀信哉夫不賔之士絶塵高蹈蟬蛻於塵埃彼其視世若垢也故踚然而自清雖失其中行然志意足高矣至于貴顯廊廟邈焉山林之思則將浮沉淟涊局促寰區營營與利馳逐也顧身沒而名不揚諺曰注瓦者工注金者蒙何者得失愈厚則內視益眩也世之縉紳樂仕者亦往往雅志山林至命以自謂然矯易去就則相違逺矣豈所謂道不同者非耶古之哲人行泥而乘雲身處煩囂之中神馳釗曠之域豹隱龍翔鳳覽蠖屈得時則行知難則退翩翩居貞其于富貴巖穴無有也故能揆道豫慮抗志潔身垂休而譽無斁矣若熊公者非其人哉陳壽陳壽字本仁新淦人戍籍遼東成化八年進士𢎞治元年以都給事中升大理寺丞御史爭寺丞劾壽吏部尚書三原王公言壽廉正稱執法吏改光祿少卿升南鴻臚寺卿十三年升僉都御史巡撫延綏十六年升南京副都御史正德元年南科道劾瑾被逮壽抗疏救諸言官瑾怒奪職八年薦起巡撫陜西未幾遷南京兵部侍郎九上疏乞休進南京刑部尚書致仕初壽在科萬貴妃寵族人橫甚中官梁方又結妖僧繼曉干國是上疏論繫詔獄得釋在榆林㑹和碩入侵出竒兵却之加俸一等既歸田杜門謝客陜西鎮守內臣廖堂暴虐吏民楊文襄公言夀忠鯁輕去就宜起壽撫陜壽至陜清徑鏜畏斂戢比夀去陜人號哭擁不行及卒久之都督楊宏陜人也上疏言壽仁廉恤下知兵能遏敵請恤其後壽厯官四十年大半在散地食祿任事不久而廉名最著老無所于歸諸子旅寓飄泊環堵蕭然歿不能葬久之親舊相周僅歸其喪壽為言官時直論時政得失無隱不喜彈劾人曰吾父戒我勿作刑官枉人若言官枉人尤甚吾不敢妄言文襄公曰宋王素為諫官言人才難得無事之時當為朝廷愛惜程明道為御史告君曰使臣拾遺補過則可若搜索臣下短長以沽直名臣不能也本仁得之矣論曰夫人臣之事君也狥祿者虛榮積勞者實舉故非高位艱致之為患也畢慮宣猷服勤履節竭知無反謀盡誠無餘計致義而遺利執直而輕患處危若佚素位弗餒則庶乎古之道哉余竊觀今之進言者其盡忠弗回良可謂壯且直矣其或纖舉毛擊釋巨爭細甚或雷同附和分朋植黨是諫以近實直以近名以言為餌也揆之憂國愛君之忠則非矣然則劘切之論其仕進之階哉甚則一蹶自廢悒悒觖望更白為黑萍鳬於天下雖至辱身而不自汚易執而不惜以為世之莫豫知也是二者有賢不肖焉其相去無幾矣陳公言論風㫖無少下人者其以妄言戒豈以言為諱哉良以人才難得故亦難知而回邪報復黑白易眩也厚建弗拔堅抱弗脫大直弗革陳公其猶行古之道哉又曰𫝊有之貧者士之常然則亷也故非仕之常乎而世于亷士獨推重之豈非貪夫殉財夸者死權之儔乎段樊熊陳四公皆都大位躋顯列而生計蕭條至死無以殮生無可藉顧不為難乎世之人挾炭爐冶炙乎相煦已愧前修况復有恣巧與豪漁釣􅛔蚌者乎今獻備遺卷十三
