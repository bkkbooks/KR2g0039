  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_032-1a, image: WYG0453/WYG0453-0682a.png}
body:
  text: 今獻備遺卷三十二明項篤夀撰李秉李秉字執中曹州人正統元年進士景泰二年宣府總餉侍郎劉璉巡撫都御史任寧罷秉以僉都御史總督邊儲參贊軍務劾退柴溝堡都督董斌又盡更置諸不才將校三年秋衛喇特入貢上言迤北使臣納克楚等三千人馬駝畜四萬餘匹除進貢外存飬宣府日支草料宣府草不過二十萬束料二萬石我兵尚不給何以供邊使且永樂宣德間邊使進馬官驗不堪者令於外地牧放不許入境窺伺正統間許住牧大同以故深知地利數數犯邊今衆多譎詐不可不防是年冬兼巡撫尋改提督軍務遂薦葉盛參贊獨石諸城軍務劾總兵紀廣副總兵楊能上曰塞圉方棘不得以細故捃大將下巡按御史核報廣亦訴秉専召秉還京以右通政蔣琳為僉都御史代之言官交章請留秉上為且留琳遣言官即勘白之改琳貴州鎮守督軍務巡撫秉留宣府四年掩土木鷂兒嶺戰沒遺骼萬五千請下大同紫荆諸鎮並掩凡十數萬是秋病乞代不許許一子視疾成化二年董山誘海西攻遼東秉及武靖伯討降山逮山至廣寧誅之徙其黨廣西加太子少保還臺四年入吏部為尚書五年春致仕崔恭崔恭字克讓廣宗人正統元年進士為户部主事出督延綏邊儲南陽薦知萊州府府庫故嵗入漕海布數萬輒浥爛破庫人家恭請量留漕海布餘並出為軍餉不踰年布盡歸守庫者八百家十三年萊大旱蝗捕蝗發賑乞免下邑逋租明年敵擾京師集兵數千遣官部署勤王在萊六年吏畏民懷景泰三年升湖廣右布政使盡革諸冗費及和市苗賊侵武岡督餉訓民兵勦賊賊皆聽撫公安監利流民相殺恭曰勿急急且大變下令流民願附籍者聽否且俟秋成遣歸衆遂定調左江西囊中惟律比圖書衣數襲省有廣濟庫者庫官吏乾沒五十萬盡發其奸贓行臺韓雍竟法連坐布政使失職郡邑肅然制為役法調輕重任一嵗勞得逸九年天順二年升右副都御史巡撫蘇松諸郡會都督徐恭請浚儀真漕河役夫六萬人程工贍廩民不告勞又浚常鎮河避江險四年鹽山薦為吏部左侍郎成化五年代李秉為尚書不久罷歸九年起為南京吏部尚書卒贈太子少保諡莊敏恭寬平坦易中無芥帶好善惡惡出於天性臨事剛而不亢柔而不䙝其在吏部慎惜人材奬拔後進亷靖自居人知嚴憚姚䕫姚䕫字大章桐廬人正統七年進士明年為吏科給事中條上時務八事內㑹邊警纍疏言禦敵方略景泰元年超升南京刑部侍郎三年改南禮部勑考察雲南諸吏四年留禮部上皇復辟調南刑部未幾召還禮部天順二年南陽薦改吏部代孫𢎞佐鹽山七年代石瑁為尚書禮部茂陵初率羣臣上思艱難戒逸欲重名器數事睿皇后崩議合葬禮議祔廟禮七年滿九載加太子少保是時屢有灾變力陳屢遭祲異禍亂將起疚心危論冀上感悟因乞歸不許未幾卒贈少保諡文敏䕫資儀山立議論河懸雄才偉度遇事立斷獎誘後進振拔淹滯意所交識不避親故成化初言少保黃福得諡忠宣土木死事大臣尚書王佐鄺野雖贈少保未得易名佐操存正大經略𢎞逺野心術端介處事嚴恪沒於王事乞諡如福例制曰可諡佐忠簡野忠肅尹旻尹旻字同仁歷城人正統十三年進士入翰林為庶吉士天順初遷通政司參議六年督餉陜西成化二年升吏部右侍郎五年轉左歷佐王李崔姚四公九年代姚公尚書纍進太子太傅致仕卒贈太保諡恭簡旻選法通敏賢愚皆說竟為津要人所惡中傷去論曰李公策勳宣府所向輒克崔知萊州有惠政督浚漕河至今賴之姚好建白皆切中事冝三公者與尹遞掌邦治簡毅通敏各擅其長要之皆天官之良也今獻備遺卷三十二
