body:
  text: 今獻備遺卷十明項篤壽撰張輔張輔字文弼河南祥符人父玉元樞密知院洪武初歸附纍官兼山護衛指揮同知以忠勇受知文皇帝戰死東昌追封河間王諡忠武輔雄壯有父風靖難時纍功封信安伯加新城侯永樂五年安南國王陳闕為其下黎季犛所弒拜輔為總兵帥師八十萬討之既入境賊沿江列柵七百里水陸拒守輔督兵拔多邦城進攻交州入之乘勝蹙清化城覆其巢降衆十餘萬季犛遁入海輔屯兵鹹子關賊來襲擊敗之督舟師往攻斬首數萬級窮追奇羅海口生擒季犂并二子蒼澄以獻交南平得郡縣一百三十四戶三百一十二萬建議復古郡縣置交址都布按三司統之凱還進英國公七年餘孽簡定復叛命輔帥師二十萬征之獲簡定于吉利柵之山而歸九年陳季擴倡亂復陳氏輔承命再往賊聞王師至走海洋據險荷花口進兵攻之至愛子江登岸賊設象伏以伺輔偵知之下令軍中羣象來一矢落其象奴再矢披其象鼻象奔還自相蹂踐大軍乘之賊大敗擒斬無算禽陳季擴獻俘京師留輔鎮守餘冦悉平召還仁廟即位進太師宣德初漢府密遣人與輔謀輔縛其人以聞宣廟益重之寵賚無虗日天下倚以為重四陲莫不知名正統間王振專權獨加禮於輔十四年死於土木之難追封定興王諡忠烈論曰定興王善用兵三犂交址可謂壯矣苐建置省會郡縣不數年而復失大喪師徒文武大吏皆死賊手惜哉嘉靖中莫登庸篡黎命將問罪莫氏面縛降因命為都統神武不殺其斯之謂乎陳瑄陳瑄字彥純合肥人也父聞洪武中纍官成都右衛指揮同知瑄隨侍焉弱冠習兵法善射嘗從大將出郊遙望孤鴈雜鵝羣中命從者輪射不中最後命瑄一發斃之有鴟翔於上應絃而墜屢試之皆奇中蜀府初建宫城遣將伐材於山皆後期且材不中度所經瘴地士多死者改命瑄别取善道七百里以入先期而還材皆適用士且不病從征南畨及散毛鎮南有功尋襲父職父坐事謫戍遼東瑄伏闕奏請代行特詔父子並免復職從征越雋討建昌酋長伊嚕特穆爾復從征餘冦賈哈喇賊數萬據險以拒官軍分三道瑄將後軍涉打中河由間道出奇兵作浮梁渡河既渡撤梁以固士心遂壓賊境賊憑險迎敵一日十三戰奪其險明日復大戰凡七合賊大敗出降械送賈哈喇于京師復會雲南兵征百夷纍功升都指揮同知進都督僉事文皇帝靖難師至江上瑄具舟迎濟封平江伯時北平軍儲未充命瑄歲董運百萬石道海給之創建百萬倉於直沽尹兒灣城天津衛籍兵萬人戍守瑄善任使節勞逸秋毫無取於下漕舟所經島夷畏官軍悉閉匿瑄下令俾出為市而遣官監臨平其直軍無敢譁人兩便之舟還值倭冦劫沙門島瑄督兵追至朝鮮焚其舟殆盡殺溺無算海溢􅔐沒隄岸起揚之海門厯通泰北至鹽城凡八百里奉命以四十萬卒修之既建北京罷海運浚濟寧臨清河通南北餉運建議造淺艖二千艘疏清江浦引水由管家湖入鴨陳口達淮以避淮河之險就管家湖築堤十里以便引舟浚儀真瓜州二壩潮港之湮鑿吕梁徐州二洪巨石以平水勢築刁陽南望湖長堤開泰州白塔河以通大江築髙郵湖堤堤內鑿渠亘四十里以通舟南北造梁以便陸行自淮至臨清相水勢髙下建閘四十有七以時啓閉於淮口作常盈倉五十以貯江南輸稅於徐州臨清通州皆置倉以便轉輸自淮抵通州濱河置鋪舍五百六十八所舍置卒以道引舟緣河堤鑿井樹柳以便夏月行者凡有興作慮之周而為之國初歲運二百萬石後增至五百萬石國用以足仁廟即位應詔陳言七事皆切中時務其略曰南京國之根本冝選將益兵以嚴守備長民長兵者皆宜擇賢使能賢能在推舉推舉在核實乞選朝臣之公正者分巡天下考察有司政事得失進亷能黜貪鄙則官得人而治可興府州縣學教官多不得人乞令風憲考察罷黜别選中外軍伍多缺乞勑五府兵部都司嚴禁私役就行清理老疾者令戶丁代逃者責限追補戶絶者除伍邊防之要在兵食足近歲如開平等處城不足兵兵不足食乞選武臣之有方略者授以精兵足其衣食日肄習之如有沃壤兼務耕守湖廣江浙及蘇松漕運北京甚逺乞令運於淮徐收貯别令官軍運至北京則民力可蘇官軍漕運者財力殫乏所管頭目又别役以重困之乞加嚴禁上覽奏嘉納即施行焉宣德初鎮守淮安兼督漕運八年卒追封平江侯諡恭襄論曰文皇定鼎幽燕據天下形勝以制禦北境轉漕東南其初海運多漂溺之患賴平江之功疏通河渠鑿石築堤江浙之粟皆踰淮厯濟灌輸京師誠萬世之利也時同事有尚書宋禮今並廟祀濟寧山雲山雲字闕徐州人也姿貌魁梧工騎射深沉有將略永樂中以指揮使從太宗征迤北功先諸將升都督宣德三年拜總兵挂征蠻將軍印出鎮廣西先是守將韓觀頗喜誅殺雲繼之鎮靜寬仁而號令嚴肅賞罰必信親督兵與蠻賊韋朝列等前後十餘戰臨機應變身先士卒所向有功斬獲無算築永平等九堡宣武四城創鋪舍五百餘猺獞屏伏居民按堵上嘉其功進都督同知恩賚甚厚正統三年卒于鎮贈懷逺伯諡襄毅雲有亷操帥府有鄭牢者老𨽻也性鯁直敢言雲進之曰世言將不忌貪矧廣西素尚貨利我亦可貪否牢曰公初到如一新潔白袍稍沾汚如白袍點墨終不可湔也雲又曰人云土夷餽送不納彼必疑忿奈何牢曰居官黷貨朝廷有重法不畏朝廷乃畏蠻子邪雲笑納之其馭土官一以威嚴凡有征調符下立至無敢後期有驚怖成疾者至死不敢歸與士卒同甘苦故人樂出死力廣西人立祠祀之論曰余聞永宣中都督韓觀山雲出鎮嶺西猺獞皆望風竄匿不敢出論考其行事信然世患無山韓耳何用黷兵為哉郭資郭資字存性武安人洪武十八年進士為戶科庶吉士試主事總部曉練錢穀升僉都御史尚書郁新薦改北平參議進布政使靖難兵起資獻䇿防禦已而留侍獻陵居守李景隆改北平晝夜扞備轉給餽餉靖難後升戶部尚書上曰資朕蕭何也建北京置行部與雒僉並改行部尚書永樂十九年罷行部復為戶部尚書時百興皆資調度獻陵即位立東宫兼太子賔客升太子太師致仕宣德三年夏輟部務明年召資以太子太師致戶部事免朝參卒年七十三贈湯隂伯諡忠襄永樂後文臣贈伯四人金純山陽伯吳中茌平伯金濓沭陽伯金忠金忠鄞人少慷慨負意氣靖難兵起布衣田冠上典謁召見言舉大事人材為急授署紀善侍帷幄贊戎務升署長史靖難後升工部右侍郎治事北京永樂二年召入兵部為尚書儲位未定上密問忠厯數古昔嫡孽故事對上喜賜公大鏹又曰詹事宫端汝以尚書兼詹事幸善調護佐太子或謗廷臣及宫寮過者上密令忠察之每白其誣上或不喜即又頓首言臣保無他即如人言臣甘連坐以故全護者衆每導人寬愛無為苛刻公事輒推同官使展其才能有闕誤引為已過不遺片善不念舊惡俸賜有餘周賑鄉族仁皇初念忠贈少師諡忠襄以其子達為翰林檢討儀智儀智髙密人洪武中薦為教官知髙郵州升知寶慶府永樂二年升通政兼右中允未幾升湖廣布政使三年入侍郎禮部十一年元旦日食吕尚書請賀如常智執不可上令擇老儒侍太孫議未決顧太子問曰講讀得人未太子應曰舉儀智未決上喜曰智雖老能直言元旦日食智議免賀智可用智寬平嚴正務持大體尚忠厚遇事是非又輒别白為太孫陳説不屑附會年八十致仕卒贈太子少師諡文簡子銘字子新學于吳訥洪熙時為行在禮科給事中內府教書厯編修侍講正統中為郕王長史景帝初出南京為禮部侍郎以立懷獻太子故加太子太保未幾召為兵部尚書尋掌詹事府事卒贈太師諡忠襄論曰世所稱三忠襄者郭習錢穀聲齊鄼侯金定䇿建儲與留侯比隆儀以靖謹侍春宫負園綺之望焉可謂名稱其實者矣郭璡郭璡北圻新安人初名進太學生永樂中為戶部郎官宣德初為行在吏部左侍郎兼少詹事上為改名璡四年代蹇忠定為吏部尚書五年冬上諭曰朕以用人付卿卿為朕擇才昨郡守多缺命廷臣薦舉古人當斯任者必勤於咨訪有得即録故官不乏才吕蒙正夾袋虞允文材官録是也慎留意正統旱蝗侍臣言大臣尸位妨賢內批令自陳諸大臣遂皆乞去璡獨不可曰主上沖年吾輩皆先朝簡任受付托一時請去誰與共理宜引罪乞改過璡老矣官至冢宰豈敢貪位顧君臣恩義如此衆是公言疏上盡留諸大臣七年請老先是宣德初內閣謂用人之柄不宜專在吏部令三品以上京官薦用方面風憲郡守至璡入吏部又令五品以上京官薦用御史知縣人多嗜進覔薦至行金錢相請乞者言官論奏僅罷五品薦舉璡秉衡十四年名不及蹇公然潔亷務採實行不用浮薄遊聲譽之士雖為內閣所侵能堅忍持正自行其志論曰君子之仕也以行義履道不越而已也是以榮莫大於守官顯莫過於達志行莫病於尸祿恥莫尤于內疚而中外崇卑無與焉夫郡之有守也以君千里長萬夫位尊而責重不可謂榮且顯也哉且今之所謂榮且顯者紆金襲紫出入巖廊之上雍容髙議終歲而無民事是其身則誠足安也然未知其職之所共也是故侍幃幄不能攄慮畢誠奉明主之𢎞休而規針其闕坐廟堂不能侃侃正色表儀羣工振清明恪愼之風司論列不能察利害陳得失糾違弼直有端徑恭靖之節營營于于恐難無疚于其心也至於揚厯州郡典司民牧茍無所振施加恤於其下則君之所畜以乂其民者將若何而已也嗟乎其植之表者弗振而化導漸靡積輕重之過哉是故先王之立政也擇才布位出入均勞逺邇一體中外第遷賢哲胥進勢無綦重焉故能杜僥幸之門絶財賄之途殺固寵之志僚庶旦暮無倦思媚庶民以承天子四海之內軌清紀順休烈弗閼而頌聲流浹也逮夫治之季也士大夫貴內賤外悅逸惡勞安冒進而恥事實居朝為尊親民為卑苟簡之習成鞅掌之嘆作君子病之而弗能返也嗟乎殆矣宣皇帝時加惠天下嚴親民之選乃畢閲要郡缺九守焉敕公卿廷議推能得况鍾以下九人帝躬臨軒敕治錫燕賦詩世咸以九人者為榮其在郡則皆矢力布忠勤民善治蔚然為當時良吏是以上下豫康政不逾朝而天下咸度固憂民之效而化導之功也詎不信哉羅通羅通吉水人永樂十年進士授御史十九年奉詔言事與六科官並謫邊知州正統元年升兵部郎中三年從尚書王驥甘肅征阿勒坦多爾濟巴勒有功十四年冬邊報至通守居庸關給事中孫祥守紫荆關廷議並授僉都御史時景帝初面諭吏部誤云副都御史二人竟得為副都御史通守關有方略才警敏擒首人納延特穆爾提精兵五千南襲勦至拗羊山斬捕獲有功召入參贊軍務理院事景泰元年給事中言通本河泊所官以內閣陳循薦其曉暢兵法尋升副臺參昌平侯軍務更兼院事妨誤兵機不便是年通疏乞敕石亨楊洪各率精鋭馬步官軍亨自紫荆出大同洪自居庸出宣府沿途巡提督官軍堵塞關口修理牆榨勦除邊患防護耕種通又言邊軍妄報首功虛張敵勢德勝之賊近在都門斬敵幾何升六萬六千有餘又言腰玉珥貂者皆苟全性命忌能憎言于公謙不喜上言德勝當先一萬九千八百八十人升一級陳亡三千一百一十八人升二級餘皆給賞且乞罷兵柄六府部院翰林科道議乞留于公亦言通志在滅敵為國計無他謙等冝同心協力勿互猜嫌是年通乞下令擒斬額森巴延特穆爾喜寧者賞萬金封公侯于公上言口外軍民連歲被兵不能種藝恐邊人野無所掠擁衆以送駕為名突至太原則山西搖動而河南淮甸之間亦可憂矣冝選有謀略文職大臣住鎮山西上以命通時昌平侯乞差文武大臣率兵出鴈門用鹿角擡營護山西餽運大同兵部請命通意不欲行疏言于謙楊洪建此䇿乞令與臣同行奏下于公疏曰當國家多事之秋非臣子辭勞之日臣謙諳熟山西事情謙宜去上仍令通往三年冬通言敵恃馬力出入塞下今額森使臣有馬四萬宜增價酬之價重則馬益至不數年邊馬自空此坐弱強敵之䇿也是年督兵逐走懷來至長安嶺又斬首有功龍門雕鶚諸城殘破守將撤兵內徙遺芻糧數萬通上言敵來有鄉導欲奪芻糧守則軍力不足運則民財不足焚則國用不足乞廷議戶部尚書金濓奏下通及總餉侍郎劉璉總兵朱謙共計上已而敵退請班師還京協贊軍務四年上將傳要略命以訓練將士是秋與蕭維禎並升左右都御史天順二年致仕𢎞治十八年隆慶父老奏己巳之變通守關有保障功敕祠居庸關論曰羅公明習邊事所向有功至謂德勝之捷録賞過濫于公不能奪之及懸畫搆額森䇿攜二其與不亦偉乎陳鎰陳鎰字有戒吳人永樂十年進士為御史擢副都御史鎮陜西得便宜行事慈厚寬洪清慎悉民疾苦不作聲色專務安輯凡練兵屯田水利鹽法事有經畫薦按察使王文副使金濓入內臺正統元年于公上疏請定輸粟贖罪法在陜十餘年教興政理每入朝民必遮道送不忍舍比還歡迎父老或走數程久旱鎰至即雨雨久至必霽人益愛戴之召入臺為右都御史與王文共事正統景泰間文與鎰更出鎮陜西已而文當代鎰入陜御史為文上疏言文風采乞留內臺耿清惠以侍郎出代鎰尋升左都御史太子太保景泰四年秋致仕卒諡僖敏陜人尸祝之馬昂馬昂字志髙滄洲人鄉舉入國子監授序班正統二年薦升監察御史整敕大同兵備八年升刑部右侍郎改副都御史參贊甘肅軍務劾都督王喜罪遼東守臣貢駝馬齊勤蒙古罕都諸蕃掠去昂出戰擒大酋索諾木奔景泰初病乞還朝勒致仕四年薦起總督軍務代鹽山兼巡撫兩廣擒偽將軍周鐵等三人升右都御史七年平斗洞賊轉左都御史天順元年致仕入見復留命巡視山西還院二年陳汝言坐贓下獄論死代為兵部尚書五年番冦陜西昂總督軍務與懷寧侯孫鏜西征師且出會曹欽反與鏜擊賊賊誅加太子少保仍掌部事裕陵每召對詢將官短長用邊鎮巡撫亦令南陽鹽山與昂議茂陵即位改戶部尚書與都御史林聰簡十二營軍致仕卒年七十八贈少保諡恭襄論曰陳僖敏鎮關中有遺愛恭襄所至有克敵功其慎簡營卒可謂知時務之要者矣今獻備遺卷十
