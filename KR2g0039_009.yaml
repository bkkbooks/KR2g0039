body:
  text: 今獻備遺卷九明項篤壽撰黄福黄福字如錫東萊昌邑人也洪武甲子以鄉舉入太學初授項城縣簿厯陞龍江左衞經厯上書論國大計髙皇帝奇其才陞工部右侍郎特見信用永樂初治齊黄離間之罪李景隆於上前指福為姦臣福厲聲言臣罪應死但目為姦則非上知其為人不問遷左侍郎陞工部尚書初建北京置行部時北方歲用兵民敝甚改福為刑部尚書以撫之交阯平郡縣其地建三司總之而以福兼掌布按二司印福視民如子交人愛戴之中官馬騏怙寵肆虐數裁抑之騏誣奏福有異志上深知其妄曰此君子不容於小人奏遂寢居交趾十九年仁宗登極上六事悉見采用召還交人扶老攜㓜號泣送不忍别宣徳初馬騏激變交阯時兵部尚書陳洽代福鎭交累奏乞還福蓋以交人思之深也復命福以往而黎利已叛朝廷命将討之及戰王師失利福為賊所得皆下馬羅拜曰公不北歸我曹不至此言已皆泣下福諭以順逆利害賊無悔罪意然終不忍害福其酋長餽以餱糧白金以肩輿送福出境至龍州悉以所餽歸之官旣還拜戸部尚書命偕平江伯陳瑄董漕運江南上言足食足兵省役三事上嘉納之尋改南京戸部尙書正統初進少保仍兼尚書叅贊軍務守備南京五年正月五日卒福性鯁直初宣廟命觀戯對曰臣性不好戲命圍棋曰臣㓜時父師嚴只教讀書不教圍棋上黙然論曰黎利之變陳洽柳昇皆大臣死賊手黄公獨免其惠澤誠固結其心也孔子曰忠信蠻貊可行信哉張本張本字致中山東東阿人也洪武中以國子生擢江都令靖難兵至率民治戰守具母夫人曰此天命也乃詣軍門朝内難平陞知府進江西左叅政以材譽召為工部左侍郎坐累謫交阯還拜刑部右侍郎仁宗皇帝初嗣位曰張本特立不阿拜南京兵部尙書兼都察院事明年召見言國家大計遂留行在兵部宣徳初髙煦反上親征罪人旣得命本撫輯其衆而録其餘黨兵政久敝姦人以貨脱伍籍而援平民實伍者甚衆本請擇廷臣釐正之尋命兼太子賓客復命兼戸部事宣徳六年正月八日卒論曰張公即無赫赫名而搜蠧舉墜厯四曹可謂孜孜奉公者矣死之日家無餘藏清脩不足多乎虞謙虞謙字伯益鎭江金壇人也洪武中以太學生擢刑部郎中陞杭州知府永樂初召為大理寺左少卿尋陞左副都御史命巡視淮楊旱災至則䟽民所苦請發廪賑貸官為贖還所賣男女皆從之復命督兩浙蘇松諸郡運賦建議丁多糧最少者運北京丁多糧少次者運徐州丁糧俱中運南京淮安丁少糧多存留本地倉巡撫浙江察亷糾貪上言十數事多見施行仁皇初曰大理天下之平也乃擢謙為卿先是都察院論誆騙罪准洪武榜例梟首謙言比奉詔書自今准律斷罪誆騙在律當杖而流梟首非詔書意上曰虞謙言是天津衞倉災焚糧數十萬石御史亷視還言主典者故多侵盜縱火自蓋追逮幾八百人考掠誣服論死者衆謙白于上得減論凡所上獄皆親閲之必求其平大辟尤愼曰彼無憾斯我無憾矣有詔求直言謙上七事其一曰得人則興非人則墮人主之職在擇人耳其二曰教育人才本在師範不惟其備惟其人三曰都察院職司耳目典綱紀今專治獄非設官本意四曰國用空乏宜預為備五曰畿府之民困於養馬宜分給無馬郡縣以蘇之六曰鈔法不通出多入少故也多收少出則民重鈔鈔自通矣七曰京師中軍民雜處故多盜宜勑五城兵馬司立甲伍之法互相覺察皆中時弊謙偉儀貌瀟灑不羣工詩所著有玉雪齋稿論曰虞公為廷尉以亷平稱其所讞獄故多平反與深文重入者殊蒼鷹乳虎此何為哉劉季箎劉季箎諱韶以字行浙江餘姚人也洪武甲戍進士授行人使雲南四川朝鮮餽遺一無所受事聞賜衣鈔陞陜西左叅政陜有逋賦嘆曰民積嵗不能輸為人父母忍督責之邪下令緩征民感激假貸以輸陜不産碙砂而歲有課額為奏罷之洪渠水溢為民患乃設法治堰水不病民召為刑部左侍郎獄多平反尤重民命善斷疑獄永樂乙酉纂脩大典命季箎討論裁決人多服之庚寅坐失出人罪左遷兩淮鹽運副未行改工部營繕主事躬勤治職不以崇庳為意性清素好學工詩癸卯卒論曰劉公用獄詳慎卒以失出坐貶經曰寧失不經觀過可知仁矣今獻備遺卷九
