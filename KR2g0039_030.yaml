body:
  text: 今獻備遺卷三十明項篤夀撰髙明髙明字上達江西貴溪人也童時割股愈母疾以孝聞景泰辛未進士拜監察御史巡都城所議獄多著為令巡按河南罷去不職吏甚多天順改元率諸御史劾兵部尚書陳汝言怙勢亂法汝言下獄死明直聲益振都察院獄囚忽劫獄走衆相顧駭愕明馳片紙報九門毋出行者使號諸塗得卒百餘襲捕之庚辰劾天下述職官御史趙明為疏首實明所草也辭頗激上詰草疏者誰明獨任之不以纍趙御史寇深素重明從容言于上曰纍年彈文奏草皆出髙明手幸不以細故罪之上曰是能御史也置不問吏部奏擬明為山東按察使上謂李賢曰髙明宜內任又謂寇深曰明可都御史未幾遷大理寺丞御史鍾同景泰間諫復儲下獄死尸久不獲明求得之率諸同年買棺治斂屬其子歸葬焉憲廟初擢京右僉都御史時淫雨為災明極言內自宫禁外至邊境皆有隂盛陽微之象又請塞納馬納粟諸幸途薦郎中何宜等可用揚州鹽寇作亂敕明督捕造巨艦名曰籌亭往來江南北躬督卒擒滅之中官鬻私鹽擅執儀真衛指揮卒閧不可解明撫卒令勿譁籍其鹽入官論劾户部及諸武官縱法狀陳利害十餘事多施行焉尋乞終養歸上杭盜起敕起明往捕力疾視事誅止首惡餘悉輕坐海濵民集亡命為不軌止坐妖言律誅之奏置永定縣疾作上疏乞歸不俟報去嘗自號五宜居士曰無才一宜退有疾二宜退親老無昆弟三宜退及以治鹽徴謂宜再起功成疾作再宜退論曰髙公為御史號敢言有捕盜功急流勇退賢于流俗逺矣昔孔戣言三宜去司空啚言三宜休古今人豈相逺哉鄧廷瓉鄧廷瓉字宗器湖廣巴陵人也景泰甲戌進士授淳安知縣政尚慈惠不求赫赫名終九載人無知者兵部尚書張鵬巡撫廣西薦廷瓉知梧州會內艱去不果貴州新設程畨府在萬山中夷獠雜聚號難治吏部求其人得廷瓉曰是嘗薦知梧州府者既至榜諭諸夷使受約束政令公平莫不感恱墾田不踰入市不擾四境晏然凡城郭街衢及祠廟廨舍以次興造歷遷都察院右副都御史巡撫貴州適黑苗叛上敕廷瓉兼督其軍招撫不從調兵勦平之條上十一事始設都勻府獨山麻哈州清平縣擇流官土官兼治之尋命總督兩廣軍務政尚清淨屬吏不職者劾罷太甚者一二人而賢勞者輒薦舉之奏汰冗濫曰祿出于民毋徒費也奏改都御史金澤巡撫江西以便徴調遷衡州兵備于郴設千户所于廣東之隴水調遣新軍守禦而給地以為屯種悉施行之瓉以恩信撫邊境兵不輕出出必成功若鬱林川雲罏大桂諸蠻及四會等賊以次平之官至左都御史卒贈太子少保諡襄敏論曰鄧公寬簡勤敏善委任人卒以成功賢于瑣細苛察逺矣王信王信字君實陜西南鄭人也父忠征迤北戰死正統中襲寬河衛千户己巳也先薄都城拒戰西直門外有功擢永清右衛指揮僉事景泰乙亥征五開蠻遷指揮同知天順辛巳曹欽反戰東市遷指揮使選充文華殿侍衛成化初尚書王翺薦鎮通州改守倒馬關繕治城堡敵不敢近丙戌石和尚劉千斤反信時守荆襄率數十騎馳據房陵調民兵不滿千人賊奄至合圍亟攻而主帥逗遛不救信多張旗幟舉火晝夜不息相持四十餘日間命死士出城舉火炮賊以為援兵至驚潰走追敗之升指揮同知敕鎮臨清兼管倉糧凡公私利病及河道閘壩廢壞區畫悉當尋作鎮湖廣有詔詢軍民機務條上八事曰繕城隍廣儲蓄省徭役立賞罰選能吏禁窩户練將才慎守備又疏言地方水旱鄖陽新築城垣衝坍過半軍民愁歎倉廪無儲皆當預防因條四事一慎専任二實倉儲三修兵衛四禁科罰悉施行之永順保靖二土長世相讐殺諭以威德悉奉約束靖州及武岡蠻久不靖守臣議勦滅之信巡邊面諭竟不煩兵而下詔諸苗犒以牛酒且詰其順逆之由苗稽顙謝曰纍嵗苦于徴索故作亂幸遇將軍屬役恐後耳顧敢反耶信上疏曰湖廣蠻夷雖曰內蠧實無能為我軍利其竊發可以邀功今宜挑選精鋭常加提防其患自息荆襄流逋逃避徭役長子老孫已成家業濫行誅削恐及無辜當修葺城池整飭武備防彌之耳田地髙低不齊農家素無積蓄斂穫未竟餱糧已空機杼才停布縷何在求免飢寒必不可得乞選守令大加存恤濫升官員無慮千百不勞一矢冒列崇階乞查勘削奪三司方面所以折衝禦侮承宣激揚者也當公以格物亷以律已端本澄源在朝廷而已上下其章于所司疏薦所部都指揮劉斌張全其略曰英俊之士處心剛正寧肯抑心低首奔走媚求若不曲加延訪則賢才多隱志士沈匿任用何能廣乎升都督同知總理漕運即日上道語人曰荷國厚恩未能報稱此行當以江水洗滌肺肝少盡區區耳帥府舊有湖開通泊運舟信沈毅簡重不營私産不為子弟乞官劉忠宣曰將官若王君實那討得來信然王驥王驥字尚德束鹿人永樂四年進士為兵科給事中使山西蠲徐溝鹽虧課二十餘萬入尹順天宣德二年升行在兵部侍郎坐事縛下獄尋復任升尚書正統二年阿勒台多爾濟巴勒數入塞寇掠甘涼驥出總諸軍與便宜敕西征至軍中大會諸將轅門縛不畏軍令都指揮安敬斬轅門遂大閲士伍定更畨減輸挽飽士調馬養鋭待敵敵至莊浪授方略出戰稍捷敵引去未幾又復至即馳至甘州簡副將蔣貴率精騎追擊戒貴曰努力破之樹功名否無相見貴遇於石城兒泉戰敗之敵尚數窺邊近驥曰彼未大衄不畏我不退去我罷於奔命遣諜知敵巢所在復用貴先鋒率兵與都督任禮等分道出塞期會夾攻轉戰二千餘里俘邊人畜數千六年雲南思任發叛木麓川木麓川本百夷僻逺不當中國一郡驥統兵十五萬轉餉半天下至雲南大暑衆請且按兵驥曰賊方熾毒吾民行不可緩敢阻軍者斬部署至金齒分三道搗上江上江者賊巢也攻三日不下會大風縱火焚賊柵乘勢力戰斬首五萬賊退走保險拒我我兵深入破連環七寨於沙木籠山又破其象陳馬鞍山思任發遁移兵討韋郎羅韋郎羅者維摩賊僭稱廣新王驥遣偏師抵賊境言王尚書大軍且至賊黨潰韋郎羅走安南傳檄且入安南追賊安南人懼斬其首并縛妻子來獻七年班師還京封靖逺伯食祿一千二百石世指揮同知未幾思任發自緬甸復反驥督征發卒轉餉三十萬人擊思任發緬甸思任發遁革麓川宣慰司設隴川宣撫司于隴把加祿三百石是年巡寧夏甘涼塞十三年木麓川賊孽思機發反孟養又督軍至金沙江賊堅柵西峯拒我驥潛渡破賊柵思機發遁苗富蟲者僭稱剗天王驥充征蠻將軍討之獲俘獻京師加祿一百石景泰元年與世劵行在兵部右侍郎柴車言敵性譎詐叛服靡常托克托特穆爾者永樂初隨其部長巴圖特穆爾等來歸未幾叛去逮今三十年又復來歸安知異日不叛况京儲漕運不易請因其初來分處外地各衛所下兵部驥言永樂間來降達官柴永等分保定等府乞如例遣送河間德州等處授田畜牧自便著此為例上從之尋改南京兵部總機務三年罷天順元年復兼兵部尚書加祿一百石尋請老四年卒年八十三贈侯諡忠毅論曰王忠毅文武兼資䇿名邊鄙為國世勳庶幾哉萬邦為憲者矣忠順官軍給有土田嵗有布花與土著無異近亦有慮及之者要之無能為也牟斌牟斌字益之正德初掌錦衣鎮撫逆瑾竊政逐方正大臣言官劉蒞戴銑等凡數十人一時下詔獄斌輕刑緩械曲為申救任御史者自訴諸僚上奏時置其名彼實他出斌曰古人恥不與黨人爾為忠乃悔耶瑾令復獄詞去銑疏首權閹字斌不肯謂其僚曰存此則諸君子臣節白他日昔宋鄒道卿以失原奏被害吾儕毋自為計奏入瑾大怒又偵知斌庇言官矯旨廷杖斌垂死瑾誅復任鎮撫知府劉祥與內臣相訐下斌治內臣賄張雄令曲祥并賄斌斌不從雄陷斌安置武昌感疾而卒前有袁彬者以小校從裕陵北狩當是時文武羣臣或捐軀草野或奉頭鼠竄彬獨從上恭謹服勞駕還入南宫升試百户復辟後升都指揮掌錦衣衛事門達中彬調南京達敗戍邊召彬還嘉靖中劉東山之獄錦衣王佐忠勤亷徑有名論曰牟公忠直沈毅有烈士風其護持諫官曉任御史者見尤偉甚近代詔獄士流不斃杖下謂非掌刑者力哉夫亦聞牟風而興者乎馬永馬永字天錫遷安人世金吾左衛指揮使正德六年流賊起督戰功升都指揮同知江彬統宣府兵練西內永以千總𨽻彬稱疾不起彬強起稱病篤以故得脫彬禍十年守備遵化明年敵入馬蘭峪塞殺參將陳乾以永為參將守太平寨十二年又入塞戰柏崖堂再戰白羊峪斬首五十十三年升署都督僉事充總兵官治三屯營尋署都督同知盡簡諸軍散遣老弱聽其農市取其庸倍給諸健武者衣餉健武者又皆喜人人奮習武藝當是時漁陽一軍稱雄未幾上至喜峰口欲出塞永扣馬諫不可上注視久之顧內侍曰此馬永耶笑而止諾延長巴爾斯結諸國邀官賞不得輒入塞永迎擊洪山口大敗之斬首五十八升右都督嘉靖三年巴爾斯入青山口塞斬其驍酋遁去巴爾斯自是效順保塞四年大同軍亂殺都御史張文錦參將賈鑑用兵不利朝議且撫永上疏力言不可撫敕永提兵出居庸討之俄以流言中止五年永上言乞宥諸言大禮獲罪者又言陸完有平定功宜贖罪録用其子奪總兵寄祿南京督府十二年大同再亂殺總兵李瑾討之久無功廷臣薦永召至業已撫罷兵復還南京十四年遼東軍亂逐都御史吕經召永總兵遼東十七年敵入塞率兵五千人搗其巢焚其廬還十八年遼軍再亂率家兵逼之斬四十餘人遂定升左都督卒於遼東遼人為罷市哭喪過漁陽人皆哭兩鎮皆祠之永善知人奬拔蕭升劉淵祝雄皆起列校為方鎮論曰馬公起侍臣歷邊鎮有破敵功而扣馬力諫卒以回鑾其䇿討叛卒壯而好謀也竟以抗言尋起尋止而遼陽遺愛至今思不衰即其知人善任所奬進士不以其方休休焉有大臣風矣梁震梁震新野人世榆林衛指揮使嘉靖七年升署都指揮僉事協守寧夏興武營慣戰敢先登破敵八年進遊擊將軍東西援應有斬敵功十一年進副總兵延綏十三年斬敵首功歷升都督同知十四年總兵鎮守陜西當是時關中少邊患大同宣府敵數入塞殺掠吏民十五年升右都督改總兵大同大同自五堡之役殺巡撫張文錦參將賈鑑尋又殺總兵李瑾鎮巡每甘言煦之稍不如意即反唇瞪目或飛章訛語相搖撼震聞命率家丁五百人馳至雲中申嚴約束曰我無爾陵爾無我叛王法軍令具在我不敢破綱紀誤國其家丁時時向鎮兵語曰爾敢蔑主將者恃衆耳兒郎輩無不一當百五步內恐爾不得用其衆鎮兵稍斂縮十六年春震率兵出玉林川斬首共一百四十進左都督又出黑山門貓兒莊各斬首八十敘一子百户十八年震鳩卒給餉修五堡軍中不敢譁震益身先之與同甘苦五堡竟復敵不敢近塞震卒以五堡功贈太子太保卒後五堡亦旋廢十九年二十年俺答阿十孩吉囊三入雲中塞直逾太原窺平陽震不死五堡不再廢去亦不敢輒輕入塞自是鴈門河東雲中上谷殘破朝廷亦思震優與恤典贈太保諡武莊震在邊専練家丁時時出塞劫其營故不敢輒近塞得其營馬盡與諸出塞劫者以故人皆效死趨利敵以故益畏之或誚震出邊起釁曰起釁律有之謂承平時敵牧獵為生不擾我邊而我邊將撲殺邀功也乃今敢數深入駐帳塞上官堡民堡十去七八我合搗巢否也震卒家丁無所歸守臣以聞令入伍與衣糧邊將頗得其力論曰余聞之端簡鄭公云武莊得士死力卒之日家丁無所歸攝即籍入行伍竟亦不及前時近有都督馬芳者以驍勇著馬故降敵起健兒䇿身三朝以勳名終時時謂余曰往嵗名將暨開府秉鉞者皆練有家丁有及千餘人者以故善揣邊情彼亦知所嚴憚近拘文法乏羡財養亷土地俱籍入其租况以市故不復言兵事不聞有家丁者即有之亦遊談寄空名狎客耳儻有邊患安能出死力破敵哉今獻備遺卷三十
