  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_002-1a, image: WYG0453/WYG0453-0516a.png}
body:
  text: 今獻備遺卷二明項篤壽撰劉基劉基字伯溫括蒼人也元末舉進士授江西髙安縣丞揭文安公曼碩見而竒之寓燕京時書肆有天文書一帙因盡閲之翼日即背誦如流其人欲以書授基基曰在吾胸中無事於書也江西行省辟為掾史議事不合去復為江浙儒學副提舉上書言御史失職事寢不行遂投劾去嘗遊西湖有異雲起西北光映湖水中時魯道原宇文公諒諸同遊者皆以為慶雲基大言曰此天子氣也應在金陵十年後有王者起其下我當輔之方國珍反省憲復辟為行省都事基建議方氏首亂宜捕而斬之省以基所議請于朝準招安且授國珍以官乃駁基所議行省復以基為行樞密院經歷而經略使李國鳳奏基有軍功執政者皆右方氏遂置不録授處州路總督府判乃棄官屏居青田山中著郁離子以自見人有謂公畫江自守計者基曰吾嘗惡方張輩所為可身自為之耶及髙皇帝下金華定括蒼基指乾象謂所親曰此天命也遂決計趨金陵而總制官孫炎適以上命來聘遂間道詣金陵陳時務十八策偽漢陳友諒入寇或謀以城降之者或謀出據鍾山者或欲決死戰者基張目不言上召問基曰議降與奔者可斬也如臣之計莫若傾府庫開至誠以固士心宜伏兵龍灣伺隙擊之取威制敵以成王業在此舉耳乃用基策乘東風發伏擊之大敗友諒軍上喜賞基基辭不受元旦中書省設御座將奉小明王行慶賀禮基罵曰牧竪何能為因極陳天命所在上大悟遂定征討之計攻皖城不拔基請徑取江州上悉軍而西友諒走湖廣拔江州上使馮勝攻皖命基授方略基書片紙授之令夜半出兵至某所見某方青雲起是賊伏也慎勿妄動日中後黑雲漸薄與青雲接者此賊歸也即銜枚躡其後疾擊之可盡擒也驗之果然如基所授計擒賊而還遂拔皖城洪都守將胡廷瑞使其子約降請禁止諸事上初有難色基自後踢所坐胡床上悟許之廷瑞以洪都降以母富夫人喪辭歸時苗軍反金華括蒼殺守將胡大海孫炎等衢州守將夏毅莫知所為會基至迎入城一夕而定即移書金處屬縣諭以固守遂同諸軍克復處州擒苗帥方國珍素畏基名數遣人致書問基不敢受遣人白上因令基與通問因宣示國家威德國珍遂納土入貢上時時使人以軍國事問基基條答悉中機宜赴京道嚴州適張軍寇嚴州岐陽王欲奮擊之基使勿擊曰不出三日賊當自走追擊之此成擒耳比三日基登城望曰賊走矣衆見賊壁壘旗幟如故且鼓聲戒嚴疑莫敢輕動基趣使疾進兵至則皆空壘擊鼓者乃所掠老弱耳追至東陽悉擒之基既至金陵時陳友諒據湖廣張士誠據浙西衆欲先取士誠基曰士誠自守賊耳友諒居上流竊偽號宜先伐之陳滅張不足定也時友諒復寇洪都上親征友諒大戰彭蠡湖基密請移軍湖口期以金木相犯日決勝上從之友諒死荆湖平上還京定計取士誠因定中原拓地西北基密謀居多上或時至基所屏人語移時乃去人莫有聞者拜太史令一日見日中有黑子奏曰東南當失一大將時參軍胡深伐閩果敗沒他日基見上時方欲刑人基曰何為上語以所夢基曰是衆字頭頭上有血以土傅之得土得衆之象也應在得夢時三日當有報至上乃留所欲刑人三日後海寧以城降捷至上大喜悉以所留人命基縱之熒惑守心羣臣皆懼基密奏宜罪已以回天意翌日上臨朝即以基言諭羣臣衆心始安大旱上命基讞滯獄平反者甚衆天應時雨上大喜基因奏請宜立法定制從之張士誠既滅張昶欲亂政使人上書頌功德勸及時為樂上示基基曰是欲為趙髙也未幾昶以罪誅上嘗以事責丞相李善長憲使凌恱因彈之基言李公舊勳能輯和諸將上曰是數欲害汝汝乃為之地耶汝之忠勳足以任此基叩頭曰易柱必得大木小木為之必將速覆上怒遂解洪武元年上即皇帝位基密奏立軍衛法拜御史臺中丞中丞章溢奏定處州七縣稅糧如宋制畞悉加五合上特命青田縣止科五合且曰使劉伯溫鄉里子孫世世為美談也上幸鳳陽基居守請曰宋元以來寬縱日久必使紀綱振肅而後惠政可施乃命憲司糾察諸道彈劾無所避基劾中書省都事李彬不法事罪當死而丞相李善長素厚彬請緩其事不聽馳奏行在上從基處彬死刑基承旨斬之上還京師李公訴之基乃乞歸上問基何言基因奏曰鳳陽雖帝鄉然非建都之地王巴拜雖可取未易輕也後定西失利王巴拜竟走沙漢上手詔敘基勳伐召至京師纍欲進基爵基曰陛下天授臣何敢當上欲相楊憲基素善憲以為不可上怪之基曰憲有相才而無相器夫宰相者持心如水以義理為權衡者也今憲不然能無敗乎上曰汪廣洋何如基曰此𥚹淺觀其人可知胡惟庸何如基曰此小犢耳將僨轅而破犂矣上曰吾知無逾先生者基曰臣疾惡太深又不耐繁劇為之且辜大恩天下何患無才願虛心求之如目前諸人臣誠未見其可也三年授𢎞文館學士進封誠意伯四年歸老鄉里上嘗以手書問天象事基悉條答大略言霜雷之後必有陽春今國威已立自宜少濟以寬書奏悉以付史館尋入朝八年疾作命馳驛歸薨于家先是楊憲敗汪廣洋繼之尋貶廣東乃相惟庸基語人曰吾言而驗其如蒼生何遂憂憤成疾死之前數日以天文書授長子璉使上之且戒勿習復命其仲子璟曰胡惟庸必敗我欲奉遺表亡益他日上必思我如有問當密奏之其略以為修德省刑祈天永命之本也政之寬猛如循環然諸形勝要害之地宜與京師聲勢相連絡幸聖主留意後胡惟庸敗世以基為知人璉字孟藻仕至江西右參政有父風論曰劉公以鴻漸之翼困于燕雀不卑小官其與五就桀者何異既佐真主謀謨幃幄言行計從歡若魚水觀其先楚後吳決成敗於一言定皇業於呼吸真王佐才也及其功成身退可謂明且哲矣而卒困讒口向非髙皇聖明不亦殆哉詩曰讒人罔極又曰貪人敗類吁可畏也夫宋濓宋濓字景濓金華人母妊七月而生稍長好學極博羣書從吳貞文公萊習古文辭復從遊栁文肅公貫黃文獻公溍二公皆當代大儒亟稱濓且自謂勿如也由是文名震海內至正中執政者薦為翰林國史編修官固辭入龍門山著書歲庚子髙皇帝遣使者樊觀走書幣徵濓濓曰吾聞大亂極而真人生今其時矣遂應詔與青田劉基麗水葉琛龍泉章溢入見髙皇帝尊禮之語必稱先生授江南等處儒學提舉奉旨授皇太子經召講春秋左氏傳濓進曰春秋乃孔子褒善貶惡之書茍能遵行則賞罰適均天下可定也改起居注上御端門論黃石公三略且口釋之濓曰尚書二典三謨帝王大經大法靡不畢具願留意講明之上曰朕非不知典謨為治之道但三略乃時務所先耳嘗論賞賚濓曰得天下以人心為本上詔丞相李善長歸江西軍中所掠牛於其民無牛者官給之勿取其租丞相退上顧問濓曰適所言事當乎濓對曰捐利於民興邦之要也以疾豫告賜金帛皇太子致贈有加上箋皇太子勉以孝友敬恭進德修業以副天下之望上覽書甚喜召皇太子語以書意且賜書答洪武二年詔徵濓總修元史除翰林院學士知制誥兼修國史時甘露屢降上問災祥之故對曰受命不于天于其人休符不于祥于其仁皇姪文正以荒淫擅殺得罪濓曰文正罪固當死陛下體親親之義生之而置諸逺地則善矣上嘗言古之帝王當晏安之餘多好神仙使國治民安心神恬康即神仙也對曰漢武好神仙而方士至梁武好佛而異僧集使移此心以求賢天下其有不治乎上既追封外王父為楊王立廟京師御通天冠絳袍以祭祭畢上召問大臣朕祭外王父卿等以為不當服衮冕何也濓曰衮冕惟祭天地宗廟用之餘則當降禮也上嘗祀方丘患心不寧濓進曰孟軻有言養心莫善於寡欲上稱善三年遷國子司業四年授安逺縣知縣五年召還授禮部主事遷太子贊善大夫上問帝王之學何書最要濓請觀真德秀大學衍義上覽令左右大書揭之兩廡壁諦觀之六年上御西廡大臣皆侍坐上指衍義中司馬遷論黃老事命濓講析俾在坐者聽之濓既如詔復進曰漢武好神仙喜征伐民力既竭嚴刑以震服之臣以為人主能以義理養心則邪説不能入興學校教民則禍亂無由作矣刑罰非所先也上嘗語濓曰朕為君上畏天地下畏兆民兢兢業業不敢自逸濓對曰陛下此心古先哲王之心也願慎終如始天下幸甚上御齋室問三代厯數封疆修短廣狹濓歷言之且曰三代之治天下也以仁義故歷年多後世莫及進翰林侍講學士奉詔作辨姦録祖訓成命濓序之上稱善嘗侍上後苑觀穫上曰農事成矣濓曰國以民為本民以食為先陛下念稼穡之艱難實盛德也上嘗問曰三代以上所讀何書對曰上古載籍未立人尚躬行君人者兼治教之責躬行以率之天下有弗化者乎詔纂修大明日厯一百卷擇其大者為寶訓五卷濓總裁其事朝夕禁中濓在朝久凡郊社宗廟山川百神之典朝享宴慶禮樂律厯衣冠之制四夷朝貢賞賚之儀及勳臣名卿功德之文承上意旨論次紀述咸可傳於後世在上前所陳説必以誠即問家事亦一一道之上嘗問濓昨日飲酒否坐客誰肴羞何物悉以其人及肴饌對上笑曰朕潛使人視卿卿真不欺益親信濓欲使參大政濓辭曰臣少無他長惟知文墨不願居職任也上愈厚之每燕見必命茶賜坐每旦令侍膳詢訪舊章講求政理或夜分乃退召問廷臣臧否苐言其善者復問否者為誰濓曰其善者與臣交臣故知之其否者縱有之臣不知也卒無所毁或命賦詩為文必寓忠告奉制詠鷹七步而成有自古戒禽荒之語上曰卿可謂善諫矣濓畏慎凡禁中語絶不以語人署溫樹二字於所居之壁有以禁中事問者即指以示之上嘗與濓飲濓辭強之至三觴面如赭行不成步上大歡笑御製楚辭一章以賜命侍臣咸賦醉學士歌且曰使後世知朕君臣同樂若此也甘露降上召濓賜坐乃躬執金杓煉湯於鼎以甘露投之手注于巵以賜濓曰此和氣所凝能愈疾延年故與卿共之耳九年拜翰林學士上謂濓曰朕以布衣為天子卿亦起草萊列侍從為開國文臣之首使世世與國同休不亦美乎詔徵濓孫慎為殿廷儀禮司序班尋拜中子璲為中書舍人上時試璲與慎而訓戒之上笑語濓曰卿為朕教太子諸王朕為卿教子孫濓頓首謝濓或奏事久稱倦上命璲與慎共掖扶下殿三世官內廷人以為榮復以行步艱詔皇太子選良馬以賜上親作良馬歌詔羣臣和之時有上疏萬餘言者上厭其迂笞之而怒未解召問濓濓曰彼應詔言事其心忠耳惡可深罪乎上默然上嘗廷譽濓曰古之人太上為聖其次為賢其次為君子若宋景濓者事朕十有九年未嘗有一言之偽誚一人之短寵辱不驚始終無異其君子者乎非止君子抑可謂賢矣十年冬致仕將歸賜御製文集及綺帛上曰朕最慎賞嘉卿忠誠可貫金石故以是賜卿卿今年幾何矣對曰六十有八上曰藏此綺候三十二年後作百歲衣也濓叩首謝至家拜表稱謝上箋皇太子論正心治國之要土賜詔褒答焉初濓辭歸請歲一來朝明年秋入朝上佇想已久廷問者數矣及至大喜皇太子諸王皆動色相賀上降敕符遣儀曹賜醪膳諸物日侍上遊厯觀闕盤旋禁籞侍食便殿日晏始退上嘆曰純臣哉爾濓方今四夷皆知卿名卿其自愛濓避謝不敢當歲暮辭歸復遣中貴人賜上尊既行數日上語璲曰朕疇昔之夜夢見爾父笑談如平生爾父雖去其容儀儼然在朕目中也璲謝曰非陛下過念臣父何以形諸夢寐濓方入朝朝之百執事惟恐濓之弗留也下至寺人衛卒咸以手加額相推排迎拜爭先覩濓蠻夷朝貢者數問濓安否髙句麗安南使者至購濓文集日本得潛溪集刻板國中其使者奉敕請文以百金為獻弗受上以問濓對曰天朝侍從之官而受小夷金非所以崇國體也上深然之濓于學無不窺而尤以篤行為尚嘗曰古之學者使心正身修措之行事俯仰無愧而已繁辭復説道之蔽也篤於人倫好接引後學惟恐弗及逺方來者授館而飲食之久而不厭遇人拜雖三尺童子必屈膝以答至王公貴人曾不少降一候其門朝廷有大議援古今辨説侃侃不回平居布衣蔬食無異貧士不事産業自少至老手不廢書及歸青蘿山閉戶纂述人罕窺其面視近甚明能一黍上作十餘字十三年以慎獲罪安置茂州卒於夔所著有潛溪集四十卷蘿山集五卷龍門子三卷浦陽人物記二卷翰苑集四十卷芝園集四十卷行于世懌濓之孫也建文君即位念濓舊學召懌復官翰林而濓之門人樓璉鄭楷皆見擢用論曰夫謂天道福善禍淫豈不信哉而有否者謂天之未定非耶故藎臣貞士碩輔鴻儒砥德樹行明道立言其至也當與日月並曜金石同堅而或乃蒙投杼之疑受蜂蠆之螫髠首剖肝引頸齒劍亦或隱山被焚懷沙自溺赭衣胥靡囊頭圜棘瑣尾流離或竄或黜不幸甚矣而耿光懿烈垂範不磨流丹青之譽而享爼豆之封亦或慶流後人俾昌俾熾至于乘軒析璧之雄管喉舌而專紱冕吐嗽雲雨噓吸霜露攫金道途下石機穽自謂一世之桀而爝滅澌散者孰與較得失哉宋公隱居龍川究天人之藴遡濓洛之宗博綜丘墳考槃飲泌終其身不悔矣一旦當締構之運遭龍虎之期乃始敷闡大猷贊襄休治優遊禁近非堯舜之道不陳非湯武之事不道諷不失正語必施行卒之潤色鴻業使禮樂文章炳與三代同風焯乎稱偉烈矣迹其褒許隆重寵冠羣臣不為不遇而知幾秉哲勇退急流即大雅君子何可得過乃竟罹詿誤擯死遐陬生鮮剖符之榮死歉首丘之願天之未定顧不信耶李善長李善長濠州定逺人至正甲午髙皇帝南略滁陽善長伏謁上以其長者禮之問曰戰鬭紛紛何時定乎善長對曰昔秦失其政四方蜂涌漢髙起自布衣提三尺劍不五載而稱帝由豁達大度知人善使故也今元運丁百六倫紀隳斁法理蠧廢賦調繁重視秦為烈羣雄蝟起天厭其德非人力也主公産於濠城距沛不逺山川王氣與漢髙同能法漢髙天下不足定也上曰漢髙用三傑今徐達勇略或可方韓信張良蕭何先生可當之乎善長對曰張良後世鮮倫善長何敢望若何之供給餽餉或可勉耳上曰古張良不可得今可為張良者先生幸以教孤對曰今天下才智之士甚衆不能悉知所知者惟金華宋濓博學且知象緯上曰以孤所聞知象緯者無如青田劉基善長曰雅聞其名宜悉招致之上大悅留置幕下俾掌書記贊畫軍機饋餉甚見親信上謀取和陽謂善長曰滁厄嶇山不通舟楫且無形勢可據非用武地欲圖和陽可乎善長對曰和城兵無紀律師一臨即下然亦非用武地欲圖大業非金陵不可上曰善上嘗從容語善長曰方今羣雄並爭非智者不可與謀吾觀羣雄中用事者多短毁將士將士弗得效其能汝宜協和諸將毋效彼所為也滁陽王欲拔善長置麾下善長弗肯往涕泣訴于上諭曰主帥之命不可違也善長終不肯往乙未和陽既下滁陽王命上總和陽兵諸將多不恱賴善長調護得安上嘗出擊雞籠山寨元兵寇和陽善長督兵敗之殺獲甚衆久之上謀渡江無舟巢湖俞通海等以舟師來附上甚喜善長曰此天意也願急渡江六月朔上遂渡江拔采石乘勝取太平上之發采石也令善長為戒戢軍士榜入太平即張之初士卒欲肆剽掠見榜揭通衢皆愕然不敢動城中肅然拜善長元帥府都事丙申三月從克建康上欲取京口患諸將縱士卒暴橫為民害召而數之欲置之法善長力救乃免七月善長等奉上為吳國公乃拜善長為行省參議時江右草創命將四征善長傳供給億軍無乏食戊戌上征婺州善長留守庚子友諒僭號約張士誠共侵建康上與康茂才謀速友諒茂才曰吾家有老閽嘗事友諒令齎書往約為內應友諒信之必速來以問善長善長曰方以賊來為憂奈何速之上曰使二賊合吾何以支先破此賊士誠膽落矣善長曰善乃遣老閽老閽進書友諒甚喜問康公何在曰今守江東橋又問橋何如曰木橋也乃遣還曰吾當即至至則呼老康為號老閽還具以告善長乃以鐵石易江東橋一夕而成友諒至見非木橋呼老康無有應者惶遽還走伏發大敗之友諒僅以身免降其將張志雄等辛丑善長議立鹽法錢法茶法上皆從之以善長兼大都督府司馬事尋參中書省事上親征江州及大戰彭蠡取武昌善長皆留守甲辰奉上為吳王升右相國偽漢滅建議立康山忠臣廟報死事者乙巳承詔歸江西軍中所掠牛於民無者官給之建議江西湖廣魚課歲可得穀一百餘萬石上從之李濟據濠州上命善長為書招之濟遂降吳元年六月率羣臣勸上即皇帝位不許善長等力請曰殿下起濠梁不階尺土遂成大業四方羣雄剗削殆盡人肯歸心願早正位號以慰羣望上猶未許時刑獄太繁善長奏宜欽恤無更連坐上可其奏九月姑蘇破執張士誠送建康論功封宣國公尋命百官禮儀俱尚左改善長左相國命中書省定律令以善長為總裁官議取中原及福建廣西十二月善長復率羣臣奉表勸進復至再三乃率禮官以即位禮儀進明年戊申正月乙亥上祭告帝祗于南郊即皇帝位于郊壇南定有天下之號曰大明建元洪武善長率羣臣及都城父老拜舞上還御奉天殿善長率百官上表賀上命善長奉册寶立皇后及皇太子進上柱國録軍國重事尋兼太子少師二月善長率禮官進圜丘方丘宗廟社稷議各具沿革以進詔大將軍徐達等北伐中原命善長祭告江河漢濟然後出師五月上幸汴梁善長留守軍國事皆決焉駕還善長奏定六部官制十二月定官民喪服之制及三司朝賀東宫儀二年正月承制立功臣廟於雞籠山定太歲風雲雷雨嶽鎮海瀆山川城隍諸神祭禮及翰林院官制二月命善長監修元史奉詔立皇陵碑四月奉詔編祖訓録定封建諸王國邑及官屬之制八月定大祀受誓戒十二月議賞平定中原功三年正月議北征沙漠三月議定朝臣服色四月定官民書禮儀式禁民間名字毋得犯先聖先賢大國君臣及漢晉唐宋國號議置司農司於河南從善長議也五月承制給存恤祿於武官陳亡物故無子孫而有父母及妻者六月奏禁淫犯及僧道師巫諸邪術詔從之議定文武官朝服之制七月元史成賜善長綺帛左丞楊憲恃寵専恣挾私忿劾奏右丞相汪廣洋隂事善長怒奏憲上命羣臣按治憲伏誅進封韓國公禮部尚書陶凱請專選東宫官罷善長等兼職上曰古者官不必備惟其人朕以廷臣有才望勳德者兼東宫官非亡謂也嘗慮廷臣與宫寮不合遂成嫌隙或生姦謀離間骨肉其禍非細江充之事可為明鑑朕今立此兼職父子一體君臣一心庶無相搆之患也四年善長乞致仕許之賜臨濠地若干頃守墳人及佃戶詔董建臨濠宫殿七年上謂善長曰濠吾故鄉兵革之後人少田荒乃移江南民十有四萬于濠命官監墾田畝以善長總之十三年正月胡惟庸謀逆事覺辭連善長羣臣請併罪善長上曰此吾初起時股肱心腹也不忍罪之其勿問五月復命善長理臺事十四年議征漠北及雲南奉詔定封贈蔭敘之例二十三年五月星變其占為大臣災未幾善長薨長子祺尚臨安公主論曰髙皇帝之趨彭蠡也西畏強楚東逼徑吳謀臣猛將空國以爭死敵建康草創人無固志岌岌乎殆哉李公一書生固守根本晏然無虞此與蕭相國何異東征西討給饋餉繕器械未嘗乏絶和輯諸將一心同力以贊王業其所奏定法制綱洪目細可繼可傳若李公者孰能使無聞哉陶安陶安字主敬太平當塗人也元末舉浙江鄉試授明道書院山長調髙節書院避亂家居髙皇帝渡江取太平安與李習等出迎安見上狀貌謂習等曰龍姿鳳質非常人也今有主矣上召安與語時事安因獻言曰方今四海鼎沸豪傑並爭攻城屠邑互相雄長然其志皆在子女玉帛非有撥亂救民之心明公率衆渡江神武不殺人心悅服以此順天應人天下不足平也上曰足下言善吾欲取金陵何如安曰金陵龍蟠虎踞限以長江據其形勝以臨四方何向不克上大喜授安元帥府令史從克金陵轉行省都事拜左司員外郎升郎中上既得劉基宋濓章溢葉琛四人因問安四人者何如對曰臣謀略不及劉基學問不如宋濓治才不如章溢業琛上多其善讓克武昌命安知黃州改桐城令移知饒州時方征伐急軍需安勸諭其民民皆樂輸信州盜蕭明攻饒安率吏民拒守援兵至賊敗走諸將以鄉民多從賊欲屠之安曰為賊所脅耳奈何殺之由是民皆得全上嘉其功賜詩褒美安入朝饒人歌之曰千里榛蕪侯來之初萬姓耕闢侯去之日既而復守饒州饒人復歌之曰湖水悠悠侯澤之流湖水有塞我思侯德建生祠尸祝之吳元年初置翰林院首召安為學士時方召四方宿儒集闕下議禮命總之詔修律令安為議律官洪武元年安與劉基言於上曰聞將倣元制設中書令以太子為之上言取法於古必擇其善者而從之元制豈足法太子宜尊禮師傅博通古今他日軍國重務皆令啓聞何必效彼作中書令乎因選大臣勳德者兼東宫官職上嘗御東閣安與章溢等侍因論前代興亡上曰喪亂之源由於驕佚今聞卿等論此豈不信與上與儒臣論學術安對曰道之不明邪説害之也上曰邪説不去則正道不興天下烏得而治安曰陛下所言深探其本安與省臣李善長等進郊社宗廟議請分祭天地於南北郊冬至祀上帝於圜丘以大明夜明星辰太歲從祀夏至祀地祗於方丘以嶽鎮海瀆從祀宗廟則四代各為一廟皆南向以四孟及歲除凡五享孟春特祭於太廟孟夏孟秋孟冬歲除則合祭於髙祖廟社稷宜祭以仲春仲秋上戊日皆從之安復奏古者天子大社必受霜露風雨以達天地之氣若亡國之社則屋之不受天陽也今創屋非禮若祭而遇風雨則於齋宫望祭上是之復奏議冕服之制凡國家制度禮文多安所定擬上嘗製對賜安曰國朝謀略無雙士翰苑文章第一家時有御史言安隱過上曰朕素知安安寧有此且爾何由知之對曰聞之道路上曰御史但取道路言毁譽人邪命黜御史尋拜安江西行省參政卒于官安博學尤精於易筮驗如神所著有文集若干卷行于世論曰髙皇渡江三吳豪傑未有至者而安獨首先謁所言皆大計卒之定基金陵弔伐之師逺過湯武安言悉驗非王佐才能之乎尚論其世亦劉宋之儔也章溢章溢字三益處州龍泉人從王叔剛遊講正心修身之學浙東憲使圖沁布哈請與語悅之改官陜西要溢與俱至武林忽心悸辭歸父病已革八日而逝人以為純孝所感至正間蘄黃妖賊犯龍泉溢從子存仁為賊所執溢詣賊請代賊聞溢名得溢大喜就問計策溢正色拒之曰若等皆有父母妻子獨不畏族滅邪賊怒繫脅之降溢曰死即死不為不義賊壯之不敢加害乘夜紿守者脫歸集民兵擊走之數從舒穆嚕宜孫平寇有功授龍泉縣主簿不受復纍戰功升松陽縣尹福建行省檢校僉浙東都元帥事皆辭不受結廬匡山避入閩髙皇遣使聘溢與劉基葉琛宋濓同至建業上問勞曰我為天下屈四先生四海紛紛何時定乎對曰天道無常惟德是輔惟不嗜殺人者能一之上曰卿等其留輔豫擢僉營田司事巡行江東兩淮田之荒蕪及耕墾者皆分籍之定其賦役溢久病在告上以問都事張來碩對曰溢日夜念母不置主上遇之厚不敢言歸成疾耳即日命溢歸省浙東始設按察司拜僉事尋改湖廣建議荆襄多曠地宜分兵屯田且以控制北方上深善之按察使宋思顔孔克仁僉事王璹先後以事逮獄辭連溢溢憂懼上遣劉基喻曰素知章溢守法勿疑也胡深敗沒處州煽動升溢浙東按察副使往鎮之溢辭曰臣前任浙東亡狀同列皆獲罪而臣獨蒙宥今若加擢益重臣過上重違其志命仍僉司事比至賊寇慶元龍泉時官軍盡戍浦城城中軍少溢召舊所部義兵使據要害賊不敢犯戍浦城者乏食上以屬溢暨行省右丞李文忠文忠欲運處州糧以餉之溢曰今舟車不通軍中所掠糧甚多請拘入官均給之建寧守將阮德柔遣使納款人以為詐溢曰陳友定據全閩勢必不能容故德柔為自全計非詐也具以聞詔許之而德柔已為友定所併溢因留其使厚恤之中書省命處州造海船并僉溪船户一千為水軍既有領之者復𨽻軍府溢奏設水軍千戶所以專統之處多山少田軍需不足胡深為奏免雜稅而行省復有所科奏罷之浙西諸郡皆平上召溢且命分兵取閩中而以其子存道守處州溢入見上諭羣臣曰章溢雖儒臣父子宣力一方寇盜盡平其功誠不在諸將後問征閩諸將何如溢對曰御史大夫湯和由海道進平章胡廷瑞自江西入此固必勝然閩中尤服李文忠信若令文忠從浦城取建寧此萬全計也即日詔文忠出師如溢策處州糧舊額一萬餘軍興加十倍民不堪命溢言之丞相丞相入奏詔從其舊洪武元年拜御史中丞兼太子贊善大夫溢務大體不屑屑細故或以為言溢曰憲臺百司之儀表居是職者當先養人亷恥使人不犯豈直恃摶擊哉上親祀社稷會大風雨還坐外朝怒儀曹議禮不合以致天變將殺之溢奏曰風雨連朝無怪者縱禮官議有未盡陛下一誠自足以格神明願寬雷霆之怒上為霽威存道部鄉兵萬五千從李文忠入閩閩平詔存道以所部從海道北征溢持不可曰鄉兵農人耳始令征閩許以事平歸農今復調之是不信也上不懌而罷溢繼奏曰兵已征閩者放歸農其昔嘗叛逆者宜籍為軍使北征一舉而恩威著矣上喜曰孰謂儒者果迂闊哉苐為一行可成茲事溢受詔即行會母艱馳歸乞守制不許溢灑泣台戎事鄉兵既集命存道部領由永嘉浮海北行章再上乞終喪詔可其奏哀毁卒于家論曰章公一儒者提戈躍馬掃清妖氛牧民馭衆之才兼資文武立臺端振肅綱紀表儀百僚務存大體可謂正直忠厚者矣今獻備遺卷二
