  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_033-1a, image: WYG0453/WYG0453-0684c.png}
body:
  text: 今獻備遺卷三十三明項篤夀撰張敷華張敷華字公實江西安福人父洪監察御史死于土木景泰初以死事蔭敷華為國子生敷華少負竒氣甫七嵗里社有竹木之祟指領群兒斬伐殆盡天順甲申登進士第選翰林庶吉士有文名大學士李賢彭時欲留官翰林力辭不就成化改元授兵部主事纍遷郎中數忤貴勢捃托無所得升浙江右參議監溫處礦課景寧有礦盜數千人敷華曰此可撫而定也乃刻日使自歸及期親馳撫之賊露刃以待及諦視曰果我張公也皆駢首聽命乃執其首惡十二人餘悉宥之歷遷湖廣左布政使嵗大飢全活不可勝計進都察院副都御史巡撫山西嵗歉奏暫增解池鹽課以補王府嵗祿會霖雨躬禱于神鹽池獨不壞大同邊餉嵗給多折納敷華請太原以北可通車者聽運米改撫陜西五臺山有妖僧馬文升曰張公實在必有處分比報至則已生縛之矣總督漕運拜左都御史請嚴天下有司貪酷奔競之禁正德改元逆瑾用事憚敷華強執矯旨令致仕卒贈太子少保諡簡肅子鰲山正德辛未進士選翰林庶吉士拜監察御史督學南畿有父風論曰簡肅公受知孝皇帝執法內臺力振頽綱與華容禹陽諸公一心同德可否相濟翊贊熙和之業可謂盛矣晚值否運觸忤權逆歸老丘樊既明且哲身名兩得世濟其美不亦偉乎戴珊戴珊字廷珍江西浮梁人也天順甲申進士授御史督學南畿品藻精明以文藝占器識其最所賞譽者大學士王鏊也遷陜西按察副使仍専學政歷升都察院副都御史撫治鄖陽進左都御史益振風紀孝皇勵精親鞫大獄諸司悚震珊從容開析特受知眷每召問政事移晷方出纍疏告老優詔勉留卒贈太子太保諡恭簡論曰世稱浮梁戴公知人每試士閲文辭即知其人心術器識至年命修短位秩崇卑十不失一及踐上卿秉憲貞度正已格物遭孝皇殊顧得行所學卓為名卿與簡肅嫓美矣張恱張恱字時敏直𨽻華亭人天順庚辰進士歷任浙江按察副使提督學政初糊名校士尋去之曰我且自疑人誰信我所奬拔或出新進往往有名士皆帖服莫敢以私千者成化甲辰以湖廣按察使入覲升工部侍郎𢎞治改元遷禮部再遷吏部癸丑大旱上疏請遵舊章恤小民崇儉素裁冗食禁濫罰復上修德圖治疏悉嘉納嘗兩攝選輿議稱允升南京兵部尚書參贊機務尋加太子少保鎮靜簡易上下安之性素清約終始不渝致仕歸杜門不出以節儉率人卒贈太子太保諡莊簡論曰張公醇德清節晉陟大僚國之楨幹鄉之羽儀庶幾兼有之矣許進許進字季升河南靈寶人成化丙戌進士擢御史出按甘肅山東所至持風裁官吏豪右不法多自按問不下所司墨吏皆望風解去都御史陳鉞妄殺建州之人啓釁遼東御史強珍劾鉞汪直誣奏珍逮下獄進論救且言直罪狀詔奪俸三月珍謫戍遼東湖廣總兵李經有道士以黃白術干之者不用怨經乃誣經不軌首其事于汪直直奏逮經百口赴錦衣衛獄進察其寃具狀以聞即日詔誅道士且禁校尉勿再妄緝事直愈怒日令邏卒偵于門無所得後竟以章疏字訛奏進杖午門下幾死遷山東按察副使監試有欲私貴介子者執不從東昌一武官子懷金同儒生飲酒家是夜被殺有司疑生嚴訊誣服進遍閲商歷知酒家以殺人之翌日買布數匹遂伏辜尋以公事逮赴錦衣獄會赦得出升廣西按察使擢都察院右僉都御史巡撫大同上備邊四事一曰定策應二曰備戰具三曰修墩牆四曰築屯堡復陳邊事者八曰恤邊軍寬邊民専主守平輸納復軍糧便接遞去無益革冗官劾太監石岩岩誣進擅用旗幟降知兖州府進陜西按察使甲寅敵侵甘涼拜左僉都御史巡撫甘肅土魯畨世讐哈密其首阿哈瑪特遣將伊蘭襲據其城進與都督劉寧調集齊勤罕東諸兵夜冒雪進兵伊蘭遁走城中人從亂者餘八百或請盡屠之以徼封矦進不可曰得城無人城誰與守遂復哈密以功進右副都御史巡撫陜西陳八事召為户部右侍郎論救刑部主事鄭嶽彗見復上修省數事會推大臣或不協輿議即正言人以為侵官進曰古之大臣知無不言今既曰會議而乃默默耶庚申和碩攻宣大命兼左僉都御史提督諸軍事時平江伯陳鋭出師無功進坐纍免官乙丑以薦起為兵部右侍郎提督團營進尚書正德改元上疏請勤聖學戒遊逸改吏部尚書加太子少保逆瑾擅政嫉進違異乃以署員外郎再署郎中者為非制謫令致仕又以進嘗薦雍泰為失當坐除名而怒猶未巳乃招進在大同時嘗籍軍丁出銀雇役為典守者所尅故苛為稽察因以中進事未結瑾敗復官致仕進已先卒贈太子太保諡襄毅所著有平畨始末何瑭曰語稱忠臣不和和臣不忠豫嘗疑之舜命九官濟濟相讓和之至也豈皆不忠者乎近世仕者唯唯而言循循而行於世多同者往往立致通顯言必據理行必守法不肯苟同於衆者往往不免挫折乃知語所稱者為後世言耳襄毅公自為御史至吏部纍經挫折而剛方正大始終不變蓋忠臣不和之效也夫人情經利害禍福往往懲創往事剛者變柔方變圓甚則易而從邪者有之如公始終不變豈易得哉然公卒登台鼎使德業聲名布於天下後世豈非天定而能勝人乎論曰國家凖周建治庶政掌於六官尚書總喉舌之司酌台衡之運非宏德碩望推賢朝寧及上意所殊眷者莫之得任也况父子世登斯位也哉二百年來父子尚書者凡十八九家海內歆談以為章縫異遇其間奮庸熙洽垂休揚烈銘勒金石者非無其人至於拱默盱睢無所可否外席隆寵而中慚尸素者蓋亦有焉望崇者易墮任重者多仆豈不難哉許襄毅公始忤汪直中抗劉瑾幽囚不攝廷撻不挫其剛心徑氣生死得失靡能動之若少傅公讃司徒公誥司馬公論父子兄弟世掌邦治兼總樞務蹇蹇侃侃承弼六朝西北市事至今不廢迹其正直忠厚終始靡疚辟之璠瑜之性寧毁不渝麟鳳在庭馴而不狎庶幾哉匪躬之節鼎畫之臣矣可不謂世濟其美者哉他若吏部尚書兼翰林學士承旨詹公同太子少保吏部尚書兼都察院左都御史徽太子太保吏部尚書何公文淵刑部尚書喬新少保吏部尚書謹身殿大學士王公文南京禮部尚書宗彛刑部尚書耿公九疇太子太保吏部尚書裕南京刑部尚書周公瑄太子太保禮部尚書經南京禮部尚書倪公謙太子少保吏部尚書嶽刑部尚書施公禮太子少保禮部尚書掌鴻臚寺純太子少保兵部尚書白公圭太子少保禮部尚書翰林院學士鉞太子太保吏部尚書王公恕南京户部尚書承裕南京工部尚書侯公瓉户部尚書觀南京兵部尚書林公瀚太子太保工部尚書廷南京禮部尚書廷機及其子南京禮部尚書燫南京吏部尚書王公華新建伯南京兵部尚書都察院左都御史守仁南京刑部尚書吳公洪刑部尚書山户部尚書李公讃太子賔客户部尚書翰林院學士廷相太子少保刑部尚書劉公璟刑部尚書訒南京工部尚書何公詔刑部尚書鰲皆以父子繼其官云王槩王槩字同節廬陵人正統七年進士授刑部主事歷遷河南按察使天順初被誣下獄會襄憲王入朝上問所過官吏賢否王對曰臣過河南百姓遮道訴王廉使寃且言王廉使清徑鋤豪拊善有恩有威殿下幸為百姓奏皇帝還我王亷使上喜立命法司雪之還任尋升右副都御史巡撫陜西設法救荒全活數萬人流徙歸業天順七年遷大理卿時吏諳律比者類多深刻槩獨持明允濟以長厚諸所審駁會文切理倫要簡暢轉相傳録類成卷籍成化八年遷刑部尚書疏陳時政十事上嘉納商文毅知之薦代姚文敏吏部主議者不喜南人竟用尹同仁十年卒諡恭毅黃紱黃紱字用章封丘人正統十三年進士歷南刑部郎中亷直遇事飈發即重忤時貴不恤人或笑黃郎中呆紱抗不移歷四川右布政使初督松茂軍餉劾治將領侵冒擒諸倚勢豪肆邊上者過崇慶忽旋風起輿前擁不得行紱曰即有寃且散吾為若理風遂止抵州沐禱城隍夢中若有神言州西寺云起即密訪州西四十里有寺當孔道倚山為巢旦率吏兵急抵寺盡逮諸僧諸僧中一人少而狀且惡詰之無祠諜即塗醋堊額上晒洗之隱有巾痕紱曰是盜也即訊諸僧諸僧不能隱盡得其姦狀蓋寺西有巨塘夜殺投宿人沉塘中衆共分其囊負有妻女則又分其妻女匿妻女隱窖中恣淫毒久矣盡按律殺僧毁其寺倉吏倚王親侵沒官糧萬計王曲庇倉吏竟按如法右使時奏閉建昌礦左使湖廣妖僧繼曉至勢薰人紱曰繼曉以妖術故不離上左右今且得罪避出名掃墓實逸賊檄武昌府館之後堂好飲食無令得出入俄事敗檻送京師伏誅副都御史巡撫延綏劾參將郭鏞等擒豪姦張網紱行道望見川中飲馬婦片布遮下體大慚俯首嘆息曰我為巡撫令健兒家貧至此何面目坐臨其上亟令豫出餉三月邊健兒素貧苦延綏特甚大臣巡撫者輒厚自奉健兒雖凍餓死不問延綏人又素忠朴至死無怨言聞之慚嘆軍中人人感泣願出死力焉俄有詔毁庵寺紱令汰尼盡轉軍門給配軍中壯無妻者比去延綏有攜子女拜道傍送者已為尚書户部益不屑顧忌威稜截然盡革財賦內外諸積弊改左都御史入臺天下仰望風采第戅直崖異忤人自恐伏禍不可測請老去未幾卒論曰王公長厚所至有惠政迹其被知藩邸上回聖心豈其歡虞為哉黃公威稜凛凛有汲直風而優恤健兒又何其愷悌君子也延綏故槖駝軍以驍勇聞自嘉靖庚戌敵殘薊東之後每嵗徴兵入衛客死戍所者至十之半凡二十年所矣頃在壬午幸奉明詔始得息肩仁人哉兹舉其利溥哉今獻備遺卷三十三
