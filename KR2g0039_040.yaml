  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0039_WYG_040-1a, image: WYG0453/WYG0453-0709c.png}
body:
  text: 今獻備遺卷四十明項篤夀撰劉珝劉珝字叔溫夀光人正統十三年進士改庶吉士成化十年升吏部左侍郎明年兼翰林學士入內閣十四年加太子少保兼文淵閣大學士十八年修續資治通鑑綱目纂文華大訓成進太子太保謹身殿大學士珝素薄萬安時對客言安負國無恥安積恨百計中之二十一年致仕去卒贈太保諡文和珝善談論遇人無矯飾景泰初議迎鑾成化初議睿皇后喪禮末年論李孜省左道亂政動搖國本密疏昌言卒定儲位有大臣之節當是時與博野同在內閣人稱珝東劉博野北劉林俊嘗曰余以妖僧孽寺售術貢邪不揆狂躁上干宸怒縛下詔獄劉公立為上解乃得薄謫崔銑曰公秉心不疑諒直無顧而讒嫉肆作搆惡於群小假威於邏卒竟去位嘉靖二年言官疏公孝友孚化於鄉閭為立昭賢祠祀之論曰文和端詳徑直屢陳讜謨而好善嫉邪别白太過竟蒙讒阻惜哉謝遷謝遷字于喬餘姚人成化十一年進士授修撰𢎞治四年升少詹事兼侍讀學士與長沙同入內閣泰陵大漸入受顧命康陵初奄瑾専政正德元年乞致仕去瑾指遷等為姦黨矯上旨榜示天下成化𢎞治間翰林聲望最重者吳文定公及遷二人皆進士第一人並負公輔之望丘文莊卒文定適憂去遷入內閣十餘年間能持正為賢相文定竟不得入內閣洛陽為首相遷數言文定洛陽曰吾且去用之未晚他日又言曰吾豈私原博耶顧渠科第先豫年齒先豫望實先豫故言之公終不聽耶洛陽笑不答正德初天變輔臣皆上章自劾遷求去不得復上疏薦文定及王文恪自代初入內閣宜興洛陽相繼為首相當是時長沙位在遷上凡條答敷奏章疏皆出長沙遷與洛陽並勒致仕長沙為首相文恪以時望所屬焦芳欲援以為重告瑾內閣宜南北各用一人以故芳與文恪同入內閣嘉靖初遣使存問嘉靖六年復召入內閣尋進户部尚書大學士如故明年乞歸卒年八十贈太傅諡文正論曰文正見幾明決不俟終日觀其纍薦文定可謂休休文定卒不能得之洛陽長沙故乃能容文恪語曰力田不如逢年又信然矣劉忠劉忠字司直陳留人成化十四年進士庶吉士正德二年升南京禮部侍郎尋進尚書明年改南京吏部焦芳薦其賢五年瑾傳旨召入翰林比至又不喜改吏部尚書兼翰林學士掌詹事府事管誥敕是年瑾誅始入內閣是時張永幸用事忠不加禮大不説乞致仕不許纍進少傅兼太子太傅吏部尚書謹身殿大學士輒進讜言貴幸益不恱正德六年纍疏辭疾未允強起考禮部貢士出院即乞省墓上忽召長沙至暖閣摘録中語言欲罪之長沙為之力解即日陛辭去嘉靖初遣使存問卒贈太保諡文肅石珤石珤字邦彥藁城人成化二十三年進士庶吉士授檢討正德元年為南院侍讀學士嘉靖初代王瓊吏部尚書吏部黷亂者數年珤以孤貞行一意柄臣不恱閲兩月解吏部以尚書兼學士仍掌詹事府事嘉靖三年五月大禮議起諸大臣相繼去兼文淵閣大學士入內閣五年六月加少保兼太子太保大學士武英殿尚書如故時時召對平臺暖閣議廟樂再議廟衢又議章聖太后皇后謁太廟儀上謂珤非通儒珤又三封內批忤旨六年致仕卒諡文隱兄玠同舉進士纍官戶部尚書論曰文肅不比佞幸旋召旋更文隱清仕路旋用旋罷去侃侃有大臣風可謂一代偉人者矣今獻備遺卷四十
