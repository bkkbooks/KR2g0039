body:
  text: 今獻備遺卷七明項篤夀撰解縉解縉字大紳江西吉水人也少穎悟絶人日記數千言終其身不忘年十八舉江西鄉試第一人洪武二十一年進士廷試所對䇿過髙讀卷者抑寘三甲時兄綸及妹婿黄金華同登第髙皇帝喜授綸祠祭主事縉與金華皆中書庶吉士日侍左右甚見愛重數召見論議上諭縉曰爾試舉當今施政所宜直述以聞即具奏言陛下得國之正非唐宋所及取天下於羣盜救生民於塗炭徐定燕都市不易肆而女寵外戚寺人藩鎭之患銷融底定皆處之有法矣不邇聲色不殖貨利不為遊畋無愧三代聖王矣惟願喜怒一聽於天理而推誠任使不以察為明又言畏民者畏天之本治心者治民之本令不必數改刑不宜太繁法司近有朋姦罔上倚法為姦二條人無所措手足矣御覽之書宜集唐虞夏商周孔及濓洛關閩之言隨事𩔖别以備勸戒六經殘缺莫甚禮樂宜正禮經及訪求審樂之儒作樂書祀天宜復掃地尊祖宜備七廟太常不可肄俗樂僧道之壯者宜黜之使復人倫經呪之妄者宜火之以杜誑惑斷瑜伽之教禁符式之科絶鬼巫破淫祀以正風俗進人當擇賢否授職當量重輕今大誥有不為君用之罪則仕者不復擇矣古者鄉隣善惡必記今雖設申明旌善二亭而無黨庠鄉學之教互知之法雖嚴訓告之方未備宜取古人治家睦隣之法如吕氏鄉約及鄭氏家範布之天下世臣大族率先以勸旌之復之以為民表而教化興矣近世狃於宴安墮城池銷鋒鏑諱言兵事一旦或有不測之虞何以為備宜勅有司以時脩城浚濠教民以農隙習兵且乞設武舉以收異材脩復書院以養賢極刑之禁慮有遺材給配婦人恐傷節義書奏上奇其才拜江西道監察御史時都御史袁泰怙勢不法縉上章劾之泰雖獲宥而直聲益振上慮縉為衆所傾召其父諭之曰人才甚難大器晚成其以而子歸益進其學復諭縉曰朕於爾義則君臣恩同父子歸其益盡心於古人後十年來朝朕大用爾遂侍父歸數嵗髙皇帝上賓赴臨忌縉者謂赴臨非詔㫖坐謫河州歲餘召還以為翰林待詔文皇帝初首問縉旣見寘諸左右深信任之凡詔勑及大制作悉出縉手每預宻議寵賚殊厚陞侍讀進侍讀學士上初與武臣邱福等二三人議建儲文臣惟金忠預焉皆靖難功臣也武臣咸請立髙煦上不聽獨召縉宻議旣定秘不發明年冊立仁廟為皇太子封髙煦為漢王拜縉翰林學士兼右春坊大學士又明年福等初議頗泄髙煦譛於上遂出為廣西布政司右叅議而李至剛復誣縉改交阯八年入奏事京師時文皇帝北征見仁廟而歸駕還髙煦言縉徑歸無人臣禮遂徵下獄後三年病死獄中仁廟即位特官其從子禎期為中書舍人縉負奇才名聞中外嘗脩髙皇帝實録及永樂大典皆為總裁性孝友重義輕利篤於故舊喜引拔士類文翰皆精絶嘗語人曰寧為有瑕玉不作無瑕石中人張興恃寵笞人於左順門下縉過之厲聲叱曰御座在此敢爾横邪興俛首歛退同官有失在上前率引為已過文皇帝嘗與縉論羣臣御筆書蹇義等十八名命各䟽於下於義曰其資厚重而中無定見於夏原吉曰有徳有量而不逺小人於劉儁曰雖有才幹不知顧義於鄭賜曰可為君子頗短於才於李至剛曰誕而附勢雖才不端於黄福曰秉心易直確有執守於陳瑛曰刻於用法好惡頗端於宋禮曰戅直而苛人怨不恤於陳洽曰䟽通警敏亦不失正於方賔曰簿書之才駔儈之心旣奏上以授仁廟曰李至剛朕所洞燭餘徐驗之仁廟因問縉建文所用諸人對曰此皆洪武中人才往事不足論復問尹昌隆王汝玉對曰昌隆君子而量不宏汝玉文翰不易得所惜者市心耳後十餘年仁廟出其所奏十人者以示楊士奇且曰人率謂縉狂士縉非狂士向所論皆定見也論曰昔賈生通達國體遭遇漢文坐困絳灌廢死長沙解公論奏切中世務皆可施行人倫檢鏡十不失一遭際兩朝不數年遂參大政可謂遇矣甚哉䜛人之罔極也語曰髙才不達直木先伐何足恠哉胡廣胡廣字光大吉水人革除庚辰擢進士第一賜名靖授翰林院脩撰文皇帝入正大統復名廣拜翰林學士兼左春坊大學士為上所知一時制命多出其手詔脩五經四書性理大全命廣總裁扈從北征出居庸入大漠王師所至皆廣所紀癸巳再扈從出塞禮部郎中周訥奏請封禪羣臣多以為言上皆不聽廣作却封禪頌上之丁母憂召還上問百姓安否對曰安但郡縣窮治姦惡外親為民厲耳遽詔罷之進文淵閣大學士兼官如故卒贈禮部尚書諡文穆仁廟初加贈少師金㓜孜金㓜孜者名善以字行臨川人洪武末中進士乙科授戸科給事中文皇帝即位改翰林檢討簡入内閣陞侍講昭皇帝在東宫時作春秋要㫖以進永樂五年陞右春坊右諭徳兼侍講七年駕幸北京及累征北漠㓜孜多從陞翰林學士仍兼諭徳詔脩五經四書性理大全為總裁官預脩髙皇帝實錄十八年拜文淵閣大學士仍兼翰林學士二十二年復從北征士卒多道病思歸文皇帝問羣臣㓜孜具以實對請班師上從之㑹宫車晏駕凡喪禮軍務皆㓜孜與楊榮決焉仁廟即位進戸部右侍郎仍兼文淵閣大學士翰林學士尋陞太子少保兼武英殿大學士賜銀圖書文曰繩愆糾謬洪熈元年兼禮部尚書有詔法司論死罪多寃抑者自今臨決必㑹大學士同審㓜孜與焉宣廟即位脩兩朝實錄為總裁宣徳六年卒所著有前後北征録論曰胡金二公皆以文學遇主致身清華即鴻議宻謨不可得聞而胡却封禪金勸班師持正不足多乎胡儼胡儼字若思江西南昌人也洪武中㑹試乙榜授華亭教諭改授長垣上䟽乞近地便養親詔許之改饒之餘干遂著為令己卯薦陞桐城令政務便民奏免積逋邑中多虎禱於神害遂除嘗督漕至三山值大風雪中流有覆舟命僕夫急援之全活者衆捕蝗道見餓死者命掖就民舍給以藥食是夜風雨大作所全活數百人壬午文皇帝入正大統召試稱㫖授翰林檢討陞侍講簡直内閣凡有顧問必審度而對甲申陞左春坊諭徳尋拜國子祭酒庚寅上北征命以祭酒兼侍講掌翰林院事輔皇太孫監國在講筵凡古今治亂得失必反覆開陳及官祭酒以身率士文皇帝甚禮重之幸太學賜坐講經賚予優渥時國子生有以故告歸者皆坐戍以儼言獲免洪熈間引疾加太子賓客致仕家居二十餘年以徳望重天下正統八年卒論曰胡公以身為教不言而諸生化之語曰前有宋胡後有李陳信哉黄淮黄淮字宗豫永嘉人洪武三十年進士為中書舍人靖難初召見訪政務稱㫖每朝解縉及淮立御榻左備顧問論議宻務令入内閣專掌制勑旣又選五人與共事名直文淵閣上北征長沙妖人李法良反遣豐城侯李彬及淮侍太子擒法良十二年坐奉表迎上不敬逮詔獄凡十三年獄中有省愆集自省錄獻陵即位出獄中陞通政使兼武英殿大學士仍入内閣獻陵大漸太子在南京未至中外洶洶西楊及淮佐鄭襄二王監國候太子至憂危嘔血宣徳二年請老上賜塟父來謝賜遊西苑與公侯伯師傅尚書十一人俱肩輿登萬歲山宴山麓比辭又宴太液池諭淮曰明年朕生日卿其復來至期淮至上喜八年適禮部㑹試命與學士王直充考試官正統十四年卒年八十三謚文簡永樂初黨獄大起南人避北官者又有編戍法淮言不可阿嚕台歸欵欲并女真吐蕃東西諸部落聽其約束請朝廷出誓詞鐫金定集諸國磨酒中飲為盟衆議且從之公言邊塞勢分易制併力一心後患滋大此奸謀不可許文皇善公言顧左右曰淮如立髙岡逺覽爾輩直平地見目前耳初同入閣者七人胡儼早休胡廣先卒解縉没詔獄惟西楊秉政最久東楊謀幄最宻竝總脩累朝實録而淮圜土十年家食餘二十年髙穀髙穀字世用揚州興化人永樂十三年進士改庶吉士二十三年改春坊司直郎洪熈初為翰林侍講正統元年楊文貞薦充講官脩實錄景泰初進工部尚書兼翰林學士是年邊數請使迎上皇侵我上谷雲中急議相顧忌不能决中書舍人趙榮毅然獨請往穀壯榮解金帶贈榮曰子忠義人也上皇將至言奉迎禮宜厚㑹有千戸龔遂榮投匿名書公所袖入朝傳示羣公卿言官䟽聞上詰匿名書從何所得穀曰得自臣所遂榮恐累穀自縛闕下下詔獄上亦不深罪遂榮也二年進少保東閣大學士明年廢東宫立懷獻為太子穀悲憤不敢争加太子太傅亦不敢辭是時内閣不相能上䟽言經筵日講關係聖徳尤在得人遂薦大理少卿陳詢侍講楊鼎充日講官左都御史王文大理卿蕭維禎庶子王恂入内閣上令詢鼎侍經筵文遂得入内閣文旣入内閣又輒與穀相擠五年勑穀視南畿灾尋還朝力救都給事中林聰得不死七年進少保大學士謹身殿是年陳循及王文皆以子不得舉訐順天考鄉試官劉文介公儼上令穀覆試穀曰貴胄與寒畯爭進已不可况從而為之辭奏斥林廷一人事遂已裕陵復辟内閣諸臣皆流放竄殛英宗曰穀在内閣每議迎駕及南内事輙左右朕穀無他膓可致仕穀官至台鼎而家業蕭然敝廬瘠田僅足衣食身没未幾子孫貧窶方毅端靖潔亷無私卓然有古大臣之風成化初姚文敏旣請諡王佐鄺埜又上言穀鯁直不回端亮有守始以翰林學士侍英宗經筵入内閣輔政孜孜為國恪持公論景泰間力主遣使迎鑾之議及其還駕獨建備禮郊迎䇿天順初以老疾乞歸田里遂卒于家進退有道始終不渝得贈太保諡文毅論曰黄文簡勤愼詳宻見危能安髙文毅亷靖端方臨難不懼迹其保䕶儲宫十年瀕死力主迎鑾以忠謹稱可謂大臣也已吕原呂原字逄原秀水人正統七年進士第二入翰林時選翰林講讀官裴綸杜寧謝璉王玉江淵陳文李紹商輅劉俊及原十人習制誥於東閣十四年罷景泰中倪謙及原教内官黄賜等書于文華殿東廡上一日至廡中命二人講倪講詩國風原講書堯典上悦問二人官謙對臣左中允兼翰林侍講公對臣右中允兼侍講上又問中允講讀官品對曰皆正六品上曰品同安得相兼令左右取官制覽顧二人曰進汝二人講讀學士兼中允他日上再至二人遷坐旁壁下上曰何跼蹐乃爾二人頓首對君父嘗臨坐臣子避不敢當上喜後至館輒立語或東西行不復坐天順初改通政左叅議仍兼侍講入内閣尋陞翰林學士石曹寵用事知敬原朝㑹衣青袍亨笑曰行為先生易緋不答未幾岳正曁原列上石曹罪状䟽留中不𤼵曹石恐謀摘承天門灾詔中有訕語上大怒召對近臣曰正大膽固敢爾原素謹厚左右正何也岳旣去原得留與李賢同在内閣李通達見事立斷原守正謹恪稍濟之持重脩大明一統志充總裁官居母憂尋卒贈禮部左侍郎諡文懿論曰吕公醇徳至列曹石罪状何其直也人有不為而後可以有為信矣惜以𢎞徳淪促齡謂非命耶公子太常㦂㦂子京兆言言子鄉貢進士科進士程及穆皆以文學行藝紹其家聲科旣死室無寧嵗天之報施善人其何如哉今獻備遺卷七
