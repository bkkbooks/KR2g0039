body:
  text: 今獻備遺卷十四明項篤壽撰魏驥魏驥字仲房浙江蕭山人也舉永樂三年鄉試為松江府學訓導勵志作人諸生宿號者攜茶視之夜分則以粥供誦讀者九載滿去諸生詣闕請留復任三年兩考江西鄉試十七年吏部尚書師逵薦陞南京太常博士侍昭皇帝北上留行在與聞大事宣徳元年陞行在考功員外郎轉南京太常少卿三考㑹試正統三年召試行在吏部左侍郎巨璫王振獨禮驥八年以老辭調禮部又辭改南京郎中殷時暴亡親往弔以已木歛之拒直不受戊辰進尚書己巳率諸司條陳破敵安民之䇿景泰改元年七十七請老至京師大學士陳循驥所取士也請曰先生願少待驥退語人曰渠將朝廷事為已事邪竟致仕去家居二十餘年布袍糲飯不治生業成化七年卒年九十八御史梁昉言驥耆德請優禮之詔遣行人存問賜羊酒有司月給米三石勑至驥已卒卒之前一夕大星隕舍旁遺言辭䘏典從之諡文靖所著有南齋集松江志水利切要理學正義傳于世吳訥吳訥字敏德直𨽻常熟人父遵道沅陵縣主簿誣繫京師乞身代事未白而父没以學行聲聞江東郡縣薦為校官不就永樂末舉醫生至南京所居隣有婺矛牙婦少而美夜穿壁將奔之訥亟排戸冐大雨出旦日即遷他所時仁皇帝監國命教諸功臣子弟拜監察御史巡按貴州還三司所遺餽金題之詩曰蕭蕭行李向東還要過前途最險灘若有贓私并土物任教沉匿碧波間亷而不激類此厯陞南京都察院右僉都左副都御史致仕亷直敬慎持正不撓為文根據義理而本于六經有文章辨體行于世卒年八十六諡文恪魯穆魯穆字希文浙江天台人也登永樂丙戌進士賜歸杜門力學及赴召有司以鈔為贐謝弗受且曰筮仕之始未有益于鄉里而先厲之可乎嘗覈江北諸衞倉糧巡兩淮鹽法及監龍江抽分竹木局綜理精密吏莫肆其奸拜監察御史文皇帝巡北京仁宗皇帝監國漢庶人不法穆具啓聞不報擢福建按察僉事理寃滯繩貪墨摧豪右無所顧避漳民許姓者有妾生子許死兄子言孤子非叔出逐之奄有其資妾訴于穆穆潛以許孤雜羣兒中父老指孤類許某悉歸孤資宣廟初大臣薦穆治行拜右僉都御史卒之日家無以為歛公卿賻治其喪論曰魏公建事耄年好學不倦吳公剛嚴方正表儀有位魯公亷潔執法不回身死家無餘藏此三公者翩翩焉其盛世之孤標與今獻備遺卷十四
